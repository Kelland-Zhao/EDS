<script>
    console.log('故障报告验证页面JavaScript加载开始...');
    const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
    const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

    let followupTable = null;
    let followupData = [];
    let currentUserName = '';
    let currentUserEmail = '';
    let userIsAdmin = false;
    let showCompleted = false;
    const _sessionProc = (sessionStorage.getItem('Process') || sessionStorage.getItem('pmProcess') || '').toString().trim().toUpperCase();
    const _defaultProc = (_sessionProc === 'INJ' ? 'IM' : _sessionProc);
    let currentProc = (_defaultProc === 'IM' || _defaultProc === 'TF' || _defaultProc === 'PK') ? _defaultProc : 'ALL';

    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex, rowData) {
        if (!followupTable || settings.nTable !== followupTable.table().node()) return true;
        const status = String((rowData || {}).status || '');
        const proc = String((rowData || {}).process || '').toUpperCase();
        const procOk = (currentProc === 'ALL') || (proc === currentProc) || (currentProc === 'IM' && proc === 'INJ');
        return procOk && (showCompleted || (!status.includes('已通过') && !status.includes('已取消')));
    });

    function setupCompletedToggle() {
        if (!$('#completedToggle').length) {
            $('#followupTable').closest('.table-responsive').after(
                '<div id="completedToggle" style="cursor:pointer;padding:8px 14px;margin-top:8px;border-radius:6px;background:#f8f9fa;border:1px solid #dee2e6;font-size:0.9rem;"></div>'
            );
            $(document).on('click', '#completedToggle', function() {
                showCompleted = !showCompleted;
                followupTable.draw();
                updateCompletedToggle();
            });
        }
        updateCompletedToggle();
    }

    function updateCompletedToggle() {
        const passedCount = (followupData || []).filter(function(r) { return String(r.status || '').includes('已通过'); }).length;
        const cancelledCount = (followupData || []).filter(function(r) { return String(r.status || '').includes('已取消'); }).length;
        const total = passedCount + cancelledCount;
        const $t = $('#completedToggle');
        if (total === 0) { $t.hide(); return; }
        $t.show();
        $t.html((showCompleted ? '▼' : '▶') + ' 已通过 ' + passedCount + ' 条 / 已取消 ' + cancelledCount + ' 条' +
            ' &nbsp;<small class="text-muted">— ' + (showCompleted ? '收起 / Collapse' : '展开 / Expand') + '</small>');
    }

    const STATUS_OPTIONS = ['未验证 / Not Verified', '未通过 / Not Passed', '已通过 / Passed'];
    const FIELD_LABELS = {
        paPlan: '措施描述 / Action Desc',
        status: '状态 / Status'
    };

    const loadingSpinner = {
        show: function() {
            $('#loadingSpinner').show();
        },
        hide: function() {
            $('#loadingSpinner').hide();
        }
    };

    // 从hidden input获取当前用户信息
    function getCurrentUser() {
        const name = $('#currentUserName').val() || '';
        return name;
    }

    $(document).ready(function() {
        console.log('页面DOM加载完成，开始初始化...');

        currentUserName = getCurrentUser();
        currentUserEmail = sessionStorage.getItem('Email') || '';
        console.log('当前用户:', currentUserName);

        Swal.fire({
            title: swalTitle('加载中...', 'Loading...'),
            html: swalHtml('正在获取验证记录，请稍候。', 'Loading verification records, please wait.'),
            allowOutsideClick: false,
            showConfirmButton: false,
            didOpen: function() { Swal.showLoading(); }
        });

        populateVerifyStatusOptions();
        checkUserPermission();
    });

    function escapeHtml(text) {
        return String(text || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function populateVerifyStatusOptions() {
        const $select = $('#verifyStatus');
        if (!$select.length) return;
        const currentValue = $select.val();
        $select.empty();
        $select.append('<option value="">请选择 / Please Select</option>');
        STATUS_OPTIONS.forEach(function(option) {
            $select.append('<option value="' + option + '">' + option + '</option>');
        });
        if (STATUS_OPTIONS.indexOf(currentValue) !== -1) {
            $select.val(currentValue);
        }
    }

    function checkUserPermission() {
        google.script.run
            .withSuccessHandler(function(isAdmin) {
                userIsAdmin = isAdmin === true;
                if (userIsAdmin) {
                    $('#userLevelBadge').text('管理员 / Admin').removeClass('bg-secondary bg-info bg-warning').addClass('bg-success');
                } else {
                    $('#userLevelBadge').text('普通用户 / User').removeClass('bg-secondary bg-warning').addClass('bg-warning text-dark');
                }
                fetchFollowupRecords();
            })
            .withFailureHandler(function() {
                userIsAdmin = false;
                $('#userLevelBadge').text('普通用户 / User').removeClass('bg-secondary').addClass('bg-warning text-dark');
                fetchFollowupRecords();
            })
            .checkFailureReportManagePermission(currentUserEmail, currentUserName);
    }

    function fetchFollowupRecords() {
        if (!Swal.isVisible()) {
            Swal.fire({
                title: swalTitle('加载中...', 'Loading...'),
                html: swalHtml('正在获取验证记录，请稍候。', 'Loading verification records, please wait.'),
                allowOutsideClick: false,
                showConfirmButton: false,
                didOpen: function() { Swal.showLoading(); }
            });
        }

        google.script.run
            .withSuccessHandler(function(response) {
                Swal.close();
                console.log('验证记录获取成功:', response);

                if (response && response.success) {
                    followupData = mapRowsToObjects(response.data || []);
                    initializeTable(followupData);
                } else {
                    Swal.fire({
                        title: '错误 / Error',
                        text: (response && response.message) || '获取验证记录失败 / Failed to get verification records',
                        icon: 'error',
                        confirmButtonText: '确定 / OK'
                    });
                }
            })
            .withFailureHandler(function(error) {
                Swal.close();
                console.error('获取验证记录失败:', error);
                Swal.fire({
                    title: '错误 / Error',
                    text: '获取验证记录失败 / Failed to get verification records: ' + (error.message || ''),
                    icon: 'error',
                    confirmButtonText: '确定 / OK'
                });
            })
            [userIsAdmin ? 'getFollowupRecords' : 'getFollowupRecordsForVerifier'](... (userIsAdmin ? [] : [currentUserName]));
    }

    function mapRowsToObjects(rows) {
        return (rows || []).map(function(row) {
            return {
                followupId: String(row[0] || ''),
                failureReportNo: String(row[1] || ''),
                paType: String(row[2] || ''),
                paPlan: String(row[3] || ''),
                paWho: String(row[4] || ''),
                paWhen: String(row[5] || ''),
                paVerifier: String(row[6] || ''),
                status: String(row[8] || ''),
                followupContent: String(row[12] || ''),
                verifyReply: String(row[13] || ''),
                process: String(row[14] || ''),
                createdDate: String(row[9] || ''),
                updatedDate: String(row[10] || ''),
                pdfUrl: String(row[11] || '')
            };
        });
    }

    function initializeTable(data) {
        console.log('初始化表格，数据行数:', data.length);

        if (followupTable) {
            followupTable.clear();
            followupTable.rows.add(data);
            followupTable.draw();
            updateCompletedToggle();
            return;
        }

        followupTable = $('#followupTable').DataTable({
            data: data,
            columns: [
                { data: 'followupId' },
                { data: 'failureReportNo' },
                { data: 'paType' },
                {
                    data: 'paPlan',
                    className: 'pa-readonly-cell',
                    render: function(value, type) {
                        if (type !== 'display') {
                            return value || '';
                        }
                        const safe = escapeHtml(value || '');
                        const formatted = safe.replace(/\n/g, '<br>');
                        return '<div class="pa-readonly-content">' + (formatted || '<span class="text-muted">（未填写 / Not Provided）</span>') + '</div>';
                    }
                },
                { data: 'paWho', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    // 从"名字【邮箱】"格式中提取名字
                    const name = String(value || '').replace(/【.+】/, '').trim();
                    return name || '<span class="text-muted">-</span>';
                }}, // 责任人只显示名字
                { data: 'paWhen', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    return value || '<span class="text-muted">-</span>';
                }}, // 计划完成日期
                { data: 'paVerifier', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    // 从"名字【邮箱】"格式中提取名字
                    const name = String(value || '').replace(/【.+】/, '').trim();
                    return name || '<span class="text-muted">-</span>';
                }}, // 验证人只显示名字
                {
                    data: 'status',
                    className: 'pa-status-cell',
                    orderable: false,
                    render: function(value, type, row) {
                        if (type !== 'display') return value || '';
                        return buildStatusSelectHtml(row.followupId, value);
                    }
                },
                {
                    data: 'followupContent',
                    className: 'pa-content-cell',
                    orderable: false,
                    render: function(value, type) {
                        if (type !== 'display') return value || '';
                        var safe = escapeHtml(value || '');
                        return safe ? safe.replace(/\n/g, '<br>') : '<span class="text-muted">-</span>';
                    }
                },
                {
                    data: 'verifyReply',
                    className: 'pa-reply-cell',
                    orderable: false,
                    render: function(value, type) {
                        if (type !== 'display') return value || '';
                        if (!value) return '<span class="text-muted">-</span>';
                        var lines = String(value).split('\n').filter(function(l) { return l.trim(); });
                        var html = '<div style="min-width:160px;max-width:240px;">';
                        lines.forEach(function(line, i) {
                            var m = line.match(/^(\[.+?\])\s*([\s\S]*)$/);
                            if (m) {
                                html += (i > 0 ? '<hr style="margin:4px 0;border-color:#dee2e6;">' : '');
                                html += '<div style="font-size:0.72rem;font-weight:bold;color:#856404;background:#fff3cd;border-radius:3px;padding:1px 4px;margin-bottom:2px;">' + escapeHtml(m[1]) + '</div>';
                                html += '<div style="font-size:0.82rem;color:#555;word-break:break-word;">' + escapeHtml(m[2]) + '</div>';
                            } else {
                                html += '<div style="font-size:0.82rem;color:#555;word-break:break-word;">' + escapeHtml(line) + '</div>';
                            }
                        });
                        html += '</div>';
                        return html;
                    }
                },
                { data: 'createdDate', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    return formatDateYMD(value);
                }},
                { data: 'updatedDate' },
                {
                    data: null,
                    className: 'text-center align-middle',
                    orderable: false,
                    render: function(data, type, row) {
                        if (type !== 'display') return '';
                        var btnStyle = 'display:block;width:120px;margin:2px auto;';
                        var status = String(row.status || '');
                        var isEnded = status.includes('已取消');
                        var isPassed = status.includes('已通过');
                        var actions = '';
                        if (!isPassed && !isEnded) {
                            actions += '<button class="btn btn-sm btn-success pass-btn" data-id="' + row.followupId + '" style="' + btnStyle + '">通过<br>Pass</button>';
                        }
                        if (!isPassed && !isEnded) {
                            actions += '<button class="btn btn-sm btn-warning return-btn" data-id="' + row.followupId + '" style="' + btnStyle + ';color:#fff;">退回<br>Return</button>';
                        }
                        if (!isEnded) {
                            actions += '<button class="btn btn-sm btn-secondary cancel-btn" data-id="' + row.followupId + '" style="' + btnStyle + '">取消<br>Cancel</button>';
                        }
                        if (row.pdfUrl) {
                            actions += '<button class="btn btn-sm btn-info view-pdf-btn" data-id="' + row.followupId + '" data-pdf="' + row.pdfUrl + '" data-report="' + row.failureReportNo + '" style="' + btnStyle + '">查看PDF<br>View PDF</button>';
                        }
                        return actions;
                    }
                }
            ],
            language: {
                search: '搜索 / Search:',
                lengthMenu: '显示 _MENU_ 条记录 / Show _MENU_ entries',
                info: '显示第 _START_ 至 _END_ 条记录，共 _TOTAL_ 条 / Showing _START_ to _END_ of _TOTAL_ entries',
                infoEmpty: '没有记录 / No entries',
                infoFiltered: '(从 _TOTAL_ 条记录中过滤 / filtered from _TOTAL_ total entries)',
                paginate: {
                    first: '首页 / First',
                    last: '末页 / Last',
                    next: '下一页 / Next',
                    previous: '上一页 / Previous'
                },
                emptyTable: '暂无数据 / No data available'
            },
            order: [[8, 'desc']],
            pageLength: 25,
            responsive: true,
            drawCallback: function() {
                $('#followupTable textarea.verify-reply-input').each(function() {
                    this.style.height = 'auto';
                    this.style.height = this.scrollHeight + 'px';
                });
            }
        });

        followupTable.draw(false);
        setupCompletedToggle();

        // 工序筛选按钮事件（首次初始化时绑定，委托方式避免重复绑定）
        if (!$('.filter-bar .btn').data('bound')) {
            $('.filter-bar .btn').data('bound', true).on('click', function() {
                $('.filter-bar .btn').removeClass('active');
                $(this).addClass('active');
                currentProc = $(this).data('proc');
                followupTable.draw();
            });
            // 按用户工序默认选中
            $('.filter-bar .btn').removeClass('active');
            $('.filter-bar .btn[data-proc="' + currentProc + '"]').addClass('active');
        }

        console.log('表格初始化完成');
    }

    function buildStatusSelectHtml(followupId, currentValue) {
        const v = String(currentValue || '').trim();
        if (v.includes('已通过'))  return '<span class="badge bg-success" style="font-size:12px;white-space:normal;">已通过<br>Passed</span>';
        if (v.includes('需补充')) return '<span class="badge bg-warning text-dark" style="font-size:12px;white-space:normal;">需补充<br>Requires Supplement</span>';
        if (v.includes('已取消')) return '<span class="badge bg-secondary" style="font-size:12px;white-space:normal;">已取消<br>Cancelled</span>';
        if (v.includes('未通过'))  return '<span class="badge bg-danger" style="font-size:12px;white-space:normal;">未通过<br>Not Passed</span>';
        return '<span class="badge bg-warning text-dark" style="font-size:12px;white-space:normal;">未验证<br>Not Verified</span>';
    }

    function formatDateYMD(val) {
        if (!val) return '';
        var s = String(val);
        if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);
        var d = new Date(s);
        if (!isNaN(d.getTime())) {
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }
        return s;
    }

    function showToast(message, icon) {
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: icon || 'success',
            title: message,
            showConfirmButton: false,
            timer: 1800,
            timerProgressBar: true,
            didOpen: function(toast) {
                toast.addEventListener('mouseenter', Swal.stopTimer);
                toast.addEventListener('mouseleave', Swal.resumeTimer);
            }
        });
    }

    function buildDualMessage(fieldKey, suffixCn, suffixEn) {
        const label = FIELD_LABELS[fieldKey] || '字段 / Field';
        const parts = label.split(' / ');
        const cn = parts[0] || label;
        const en = parts[1] || 'Field';
        return cn + suffixCn + ' / ' + en + suffixEn;
    }

    function updateFollowupField(fieldKey, followupId, value, onSuccess, onError) {
        loadingSpinner.show();
        google.script.run
            .withSuccessHandler(function(response) {
                loadingSpinner.hide();
                if (response && response.success) {
                    if (typeof onSuccess === 'function') onSuccess(response);
                } else {
                    if (typeof onError === 'function') onError(response ? response.message : '');
                }
            })
            .withFailureHandler(function(error) {
                loadingSpinner.hide();
                console.error('更新跟进字段失败:', error);
                if (typeof onError === 'function') onError(error && error.message ? error.message : '');
            })
            .updateFollowupFieldValue(followupId, fieldKey, value);
    }

    // 通过按钮
    $(document).on('click', '.pass-btn', function() {
        if (!followupTable) return;
        var followupId = $(this).data('id');
        var rowApi = followupTable.row($(this).closest('tr'));
        var rowData = rowApi.data();
        if (!rowData) return;
        Swal.fire({
            title: swalTitle('通过验证', 'Pass Verification'),
            html: '<div class="text-start">'
                + '<div class="mb-2"><label class="form-label fw-bold">验证回复 Verification Reply <small class="text-muted">（选填 / Optional）</small></label>'
                + '<textarea id="swal-pass-reply" class="form-control" rows="3" placeholder="输入验证回复（选填）/ Enter verification reply (optional)"></textarea></div></div>',
            showCancelButton: true,
            confirmButtonText: '确认通过 / Confirm Pass',
            cancelButtonText: '返回 / Back',
            confirmButtonColor: '#198754',
            preConfirm: function() { return { reply: $('#swal-pass-reply').val().trim() }; }
        }).then(function(result) {
            if (!result.isConfirmed) return;
            var reply = result.value.reply;
            loadingSpinner.show();
            google.script.run
                .withSuccessHandler(function(resp) {
                    loadingSpinner.hide();
                    if (resp && resp.success) {
                        var updated = Object.assign({}, rowData, { status: '已通过 / Passed', verifyReply: reply || rowData.verifyReply, updatedDate: resp.updatedDate });
                        rowApi.data(updated).draw(false);
                        var idx = followupData.findIndex(function(r) { return r.followupId === followupId; });
                        if (idx !== -1) followupData[idx] = updated;
                        updateCompletedToggle();
                        showToast('已通过验证 / Verification passed', 'success');
                    } else { showToast((resp && resp.message) || '操作失败 / Failed', 'error'); }
                })
                .withFailureHandler(function(err) { loadingSpinner.hide(); showToast('操作失败 / Failed: ' + (err.message || ''), 'error'); })
                .saveVerifyStatusAndReply(followupId, '已通过 / Passed', reply || '', currentUserName);
        });
    });

    // 验证回复 textarea 自动高度
    $(document).on('input', '.verify-reply-input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    // 退回按钮
    $(document).on('click', '.return-btn', function() {
        if (!followupTable) return;
        var followupId = $(this).data('id');
        var rowApi = followupTable.row($(this).closest('tr'));
        var rowData = rowApi.data();
        if (!rowData) return;
        Swal.fire({
            title: swalTitle('退回跟进', 'Return Follow-up'),
            html: '<div class="text-start">'
                + '<div class="mb-3"><label class="form-label fw-bold">退回原因 Return Reason <span class="text-danger">*</span></label>'
                + '<textarea id="swal-return-reason" class="form-control" rows="3" placeholder="请输入退回原因 / Please enter return reason"></textarea></div>'
                + '<div class="mb-2"><label class="form-label fw-bold">新完成日期 New Completion Date <span class="text-danger">*</span></label>'
                + '<input type="date" id="swal-new-date" class="form-control" value="' + new Date().toISOString().slice(0,10) + '"></div></div>',
            showCancelButton: true,
            confirmButtonText: '确认退回 / Confirm',
            cancelButtonText: '返回 / Back',
            confirmButtonColor: '#fd7e14',
            preConfirm: function() {
                var reason = $('#swal-return-reason').val().trim();
                var newDate = $('#swal-new-date').val();
                if (!reason) { Swal.showValidationMessage('请输入退回原因 / Please enter return reason'); return false; }
                if (!newDate) { Swal.showValidationMessage('请选择新完成日期 / Please select new completion date'); return false; }
                return { reason: reason, newDate: newDate };
            }
        }).then(function(result) {
            if (!result.isConfirmed) return;
            loadingSpinner.show();
            google.script.run
                .withSuccessHandler(function(resp) {
                    loadingSpinner.hide();
                    if (resp && resp.success) {
                        var updated = Object.assign({}, rowData, { status: '需补充 / Requires Supplement', verifyReply: resp.updatedReply || rowData.verifyReply, paWhen: result.value.newDate, updatedDate: resp.updatedDate });
                        rowApi.data(updated).draw(false);
                        var idx = followupData.findIndex(function(r) { return r.followupId === followupId; });
                        if (idx !== -1) followupData[idx] = updated;
                        updateCompletedToggle();
                        showToast('已退回，责任人将收到邮件通知 / Returned, responsible person notified', 'success');
                    } else { showToast((resp && resp.message) || '退回失败 / Return failed', 'error'); }
                })
                .withFailureHandler(function(err) { loadingSpinner.hide(); showToast('退回失败 / Return failed: ' + (err.message || ''), 'error'); })
                .returnFollowupRecord(followupId, result.value.reason, result.value.newDate, currentUserName);
        });
    });

    // 取消按钮
    $(document).on('click', '.cancel-btn', function() {
        if (!followupTable) return;
        var followupId = $(this).data('id');
        var rowApi = followupTable.row($(this).closest('tr'));
        var rowData = rowApi.data();
        if (!rowData) return;
        Swal.fire({
            title: swalTitle('取消条目', 'Cancel Entry'),
            html: '<div class="text-start">'
                + '<div class="mb-2"><label class="form-label fw-bold">取消原因 Cancel Reason <span class="text-danger">*</span></label>'
                + '<textarea id="swal-cancel-reason" class="form-control" rows="3" placeholder="请输入取消原因 / Please enter cancel reason"></textarea></div></div>',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '确认取消 / Confirm Cancel',
            cancelButtonText: '返回 / Back',
            confirmButtonColor: '#6c757d',
            preConfirm: function() {
                var reason = $('#swal-cancel-reason').val().trim();
                if (!reason) { Swal.showValidationMessage('请输入取消原因 / Please enter cancel reason'); return false; }
                return { reason: reason };
            }
        }).then(function(result) {
            if (!result.isConfirmed) return;
            loadingSpinner.show();
            google.script.run
                .withSuccessHandler(function(resp) {
                    loadingSpinner.hide();
                    if (resp && resp.success) {
                        var updated = Object.assign({}, rowData, { status: '已取消 / Cancelled', verifyReply: resp.updatedReply || rowData.verifyReply, updatedDate: resp.updatedDate });
                        rowApi.data(updated).draw(false);
                        var idx = followupData.findIndex(function(r) { return r.followupId === followupId; });
                        if (idx !== -1) followupData[idx] = updated;
                        updateCompletedToggle();
                        showToast('条目已取消，通知已发送 / Entry cancelled, notifications sent', 'success');
                    } else { showToast((resp && resp.message) || '取消失败 / Cancel failed', 'error'); }
                })
                .withFailureHandler(function(err) { loadingSpinner.hide(); showToast('取消失败 / Cancel failed: ' + (err.message || ''), 'error'); })
                .cancelFollowupRecord(followupId, result.value.reason, currentUserName);
        });
    });

    // 查看PDF按钮点击事件
    $(document).on('click', '.view-pdf-btn', function() {
        const pdfUrl = $(this).data('pdf');
        const reportNo = $(this).data('report');
        console.log('查看PDF:', { pdfUrl: pdfUrl, reportNo: reportNo });

        if (pdfUrl) {
            window.open(pdfUrl, '_blank');
        } else {
            Swal.fire({
                title: '提示 / Info',
                text: 'PDF链接无效 / Invalid PDF link',
                icon: 'warning',
                confirmButtonText: '确定 / OK'
            });
        }
    });

    // 下拉更新（支持状态列和验证列）
    $('#followupTable tbody').on('change', 'select.followup-select', function() {
        if (!followupTable) return;
        const $select = $(this);
        const fieldKey = $select.data('field');
        const followupId = $select.data('id');
        const rowApi = followupTable.row($select.closest('tr'));
        const rowData = rowApi.data();
        if (!fieldKey || !followupId || !rowData) return;

        // 状态通过保存按钮提交，不自动保存
        if (fieldKey === 'status') return;

        const newValue = String($select.val() || '').trim();
        const previousValue = String(rowData[fieldKey] || '').trim();
        if (newValue === previousValue) {
            return;
        }

        const originalRow = Object.assign({}, rowData);
        $select.prop('disabled', true);

        updateFollowupField(fieldKey, followupId, newValue, function(response) {
            $select.prop('disabled', false);
            const updatedRow = Object.assign({}, rowData);
            updatedRow[fieldKey] = newValue;
            if (response && response.updatedDate) {
                updatedRow.updatedDate = response.updatedDate;
            }
            rowApi.data(updatedRow).draw(false);
            // 同步更新全局 followupData 数组
            const index = followupData.findIndex(function(r) {
                return r.followupId === followupId;
            });
            if (index !== -1) {
                followupData[index] = updatedRow;
            }
            showToast(buildDualMessage(fieldKey, '已更新', ' updated'), 'success');
        }, function(message) {
            $select.prop('disabled', false);
            rowApi.data(originalRow).draw(false);
            showToast(message || buildDualMessage(fieldKey, '更新失败', ' update failed'), 'error');
        });
    });

    function refreshFollowupData() {
        console.log('刷新验证数据...');
        loadingSpinner.show();

        google.script.run
            .withSuccessHandler(function(response) {
                loadingSpinner.hide();
                console.log('验证记录刷新成功:', response);

                if (response && response.success) {
                    followupData = mapRowsToObjects(response.data || []);
                    initializeTable(followupData);
                } else {
                    showToast((response && response.message) || '刷新数据失败 / Failed to refresh data', 'error');
                }
            })
            .withFailureHandler(function(error) {
                loadingSpinner.hide();
                console.error('验证记录刷新失败:', error);
                showToast('刷新数据失败 / Failed to refresh data: ' + (error.message || ''), 'error');
            })
            [userIsAdmin ? 'getFollowupRecords' : 'getFollowupRecordsForVerifier'](... (userIsAdmin ? [] : [currentUserName]));
    }

    // 邮件提醒责任人按钮点击事件
    $('#btnEmailResponsible').click(function() {
        // 筛选出验证状态不等于"已验证"的记录
        const unverifiedRecords = followupData.filter(function(record) {
            return record.status !== '已通过 / Passed';
        });

        if (unverifiedRecords.length === 0) {
            showToast('没有未通过的记录需要提醒 / No unpassed records to remind', 'warning');
            return;
        }

        Swal.fire({
            title: '确认发送 / Confirm Send',
            text: '确定要发送邮件提醒责任人吗？共有 ' + unverifiedRecords.length + ' 条未验证记录。 / Are you sure you want to send email reminders to responsible persons? There are ' + unverifiedRecords.length + ' unverified records.',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: '发送 / Send',
            cancelButtonText: '取消 / Cancel'
        }).then(function(result) {
            if (result.isConfirmed) {
                sendResponsibleReminderEmail(unverifiedRecords);
            }
        });
    });

    // 发送提醒邮件给责任人
    function sendResponsibleReminderEmail(records) {
        loadingSpinner.show();

        // 构建要发送的数据
        const emailData = records.map(function(record) {
            return {
                followupId: record.followupId,
                failureReportNo: record.failureReportNo,
                paType: record.paType,
                paPlan: record.paPlan,
                paWho: record.paWho,
                paWhen: record.paWhen,
                status: record.status
            };
        });

        google.script.run
            .withSuccessHandler(function(response) {
                loadingSpinner.hide();
                if (response && response.success) {
                    showToast('邮件发送成功：' + response.sentCount + ' 封 / Email sent successfully: ' + response.sentCount + ' emails', 'success');
                } else {
                    showToast((response && response.message) || '邮件发送失败 / Email sending failed', 'error');
                }
            })
            .withFailureHandler(function(error) {
                loadingSpinner.hide();
                console.error('邮件发送失败:', error);
                showToast('邮件发送失败 / Email sending failed: ' + (error.message || ''), 'error');
            })
            .sendReminderToResponsiblePersons(emailData);
    }

    $(window).on('beforeunload', function() {
        console.log('页面即将卸载，清理资源...');
        if (followupTable) {
            followupTable.destroy();
        }
    });

    console.log('故障报告验证页面JavaScript加载完成');
</script>
