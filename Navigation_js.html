<script>
  // 双语 Swal 提示 helper：中文在上，英文在下（小字号、灰色）
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

  // 权限检查完成后的回调：关闭 loading 并显示完成 toast
  function onCardsLoaded() {
    Swal.close();
    Swal.fire({
      icon: 'success',
      title: swalTitle('加载完成', 'Loading Complete'),
      html: swalHtml('所有功能卡片已就绪。', 'All function cards are ready.'),
      timer: 1500,
      showConfirmButton: false
    });
  }

  $(document).ready(() => {
    // 显示加载 toast
    Swal.fire({
      title: swalTitle('加载中...', 'Loading...'),
      html: swalHtml('正在加载导航卡片，请稍候。', 'Loading navigation cards, please wait.'),
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: () => { Swal.showLoading(); }
    });

    let name = sessionStorage.getItem('Name');
    let id = sessionStorage.getItem('ID');
    let pwd = sessionStorage.getItem('PWD');
    let process = sessionStorage.getItem('Process');
    let workshop = sessionStorage.getItem('Workshop');
    let siWebPage = sessionStorage.getItem('siWebPage');

    sessionStorage.setItem('ID', id);
    sessionStorage.setItem('Name', name);
    sessionStorage.setItem('Process', process);
    sessionStorage.setItem('Workshop', workshop);
    sessionStorage.setItem('siWebPage', siWebPage);
    $("#name").text(name);

    google.script.run
      .withSuccessHandler((result) => {
        try {
          const permission = JSON.parse(result || '{}');
          if (permission.hasPermission) $('#INJSDMCardWrap').show();
        } catch (e) {
          console.error('INJ SDM permission parse error', e);
        }
        onCardsLoaded();
      })
      .withFailureHandler((error) => {
        console.error('INJ SDM permission check failed', error);
        onCardsLoaded();
      })
      .checkINJSDMPermission(name, '');

    $('#PM').click(() => {
        $('#pmModal').modal('show');
    });

    $('#PM_Plan').click(() => {
        let url = siWebPage + '?v=PM_Plan_1.0'
            + '&ID=' + encodeURIComponent(id)
            + '&Name=' + encodeURIComponent(name)
            + '&Process=' + encodeURIComponent(process)
            + '&Workshop=' + encodeURIComponent(workshop);
        window.open(url);
        $('#pmModal').modal('hide');
    });

    $('#PM_ShiftFollowUp').click(() => {
        // TODO: 请提供具体的跳转页面URL
        let url = siWebPage + '?v=PM_ShiftFollowUp'
            + '&ID=' + encodeURIComponent(id)
            + '&Name=' + encodeURIComponent(name)
            + '&Process=' + encodeURIComponent(process)
            + '&Workshop=' + encodeURIComponent(workshop);
        window.open(url);
        $('#pmModal').modal('hide');
    });

    // --- 此处已更新 ---
    $('#PM_Task').click(() => {

        let url = siWebPage + '?v=TaskManagement'

    $('#Handover').click(() => {

    // 交接班子按钮 - 交接班

        $('#handoverModal').modal('hide');

    // 交接班子按钮 - 故障记录

        window.open(url);

    $('#PonitCheck').click(() => {

    // 点检执行

        let url = siWebPage + '?v=FailureReport_Upload'
            + '&ID=' + encodeURIComponent(id)
            + '&Name=' + encodeURIComponent(name)
            + '&Process=' + encodeURIComponent(process)
            + '&Workshop=' + encodeURIComponent(workshop);
        window.open(url);
        $('#failureReportModal').modal('hide');
    });

    // 故障报告管理

        let url = siWebPage + '?v=FailureReport_Manage'
            + '&ID=' + encodeURIComponent(id)
            + '&Name=' + encodeURIComponent(name)

    });

    // 故障报告跟进验证 - 弹出选择对话框
    $('#FailureReport_Followup').click(() => {
        Swal.fire({
            title: '请选择操作 / Please Select Action',
            text: '请选择您要进入的页面 / Please select which page you want to enter',
            icon: 'question',
            showCancelButton: true,
            showDenyButton: true,
            confirmButtonText: '跟进 / Follow-up',
            denyButtonText: '验证 / Verify',
            cancelButtonText: '取消 / Cancel',
            confirmButtonColor: '#3085d6',
            denyButtonColor: '#28a745'
        }).then((result) => {
            if (result.isConfirmed) {
                // 跟进页面
                let url = siWebPage + '?v=FailureReport_Followup_Manage'
                    + '&ID=' + encodeURIComponent(id)
                    + '&Name=' + encodeURIComponent(name)
                    + '&Process=' + encodeURIComponent(process)
                    + '&Workshop=' + encodeURIComponent(workshop);
                window.open(url);
            } else if (result.isDenied) {
                // 验证页面
                let url = siWebPage + '?v=FailureReport_Followup_Verify'
                    + '&ID=' + encodeURIComponent(id)
                    + '&Name=' + encodeURIComponent(name)

                    + '&Workshop=' + encodeURIComponent(workshop);
                window.open(url);
            }
            $('#failureReportModal').modal('hide');
        });
    });

    $('#PPMS').click(() => {

        window.open(url);

        window.open(url);
    });

    $('#TLMoC').click(() => {

    $('#SHSP').click(() => {

    $('#MMS').click(() => {

    let moldBaseUrl = siWebPage.indexOf('/dev') !== -1
        ? "https://script.google.com/a/macros/colpal.com/s/AKfycbzPkjt4dleuNMc6-GyhkxrK-KehT4rk37DvztwzaOBN/dev"
        : "https://script.google.com/a/macros/colpal.com/s/AKfycbw1MZrc24Kf40NsBHF3SggBD6sFKbFxalH_4dkXICgqnWJ5SQ2-5b5C2WNvPlLW_cQc6Q/exec";

    $('#Mold_Repair').click(() => {

            + '&loginId=' + encodeURIComponent(id)

            + '&loginId=' + encodeURIComponent(id)
            + '&loginName=' + encodeURIComponent(name)
            + '&loginWorkshop=' + encodeURIComponent(workshop)
            + '&loginProcess=' + encodeURIComponent(process);

    $('#Mold_ChangeOver').click(() => {

            + '&loginId=' + encodeURIComponent(id)
            + '&loginName=' + encodeURIComponent(name)
            + '&loginWorkshop=' + encodeURIComponent(workshop)
            + '&loginProcess=' + encodeURIComponent(process);
        window.open(url);
        $('#moldModal').modal('hide');
    });

    $('#moldSurfaceCleanButton').on('click', () => {
        let url = siWebPage + '?v=MoldSurfaceClean'
            + '&ID=' + encodeURIComponent(id || '')
            + '&Name=' + encodeURIComponent(name || '')
            + '&Process=' + encodeURIComponent(process || '')
            + '&Workshop=' + encodeURIComponent(workshop || '');
        window.open(url);
    });

    $('#INJSDMSummary').on('click', () => {
        let url = siWebPage + '?v=INJ_SDM_Summary'
            + '&ID=' + encodeURIComponent(id || '')
            + '&Name=' + encodeURIComponent(name || '')
            + '&Process=' + encodeURIComponent(process || '')
            + '&Workshop=' + encodeURIComponent(workshop || '');

    // 项目跟进
    $('#ProjectTracking').on('click', () => {
        let url = siWebPage + '?v=ProjectTracking'
            + '&ID=' + encodeURIComponent(id || '')
            + '&Name=' + encodeURIComponent(name || '')
            + '&Process=' + encodeURIComponent(process || '')
            + '&Workshop=' + encodeURIComponent(workshop || '');

    });

    $('#FailureReport_Template').click(() => {
        let url = siWebPage + '?v=FailureReport_Template';
        window.open(url);
        $('#failureReportModal').modal('hide');
    });
  });
</script>
