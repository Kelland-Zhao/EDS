<script>
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

$(document).ready(function () {

  let draftKey = 'fr_draft_noId';
  let autoSaveTimer = null;
  let requiredFields = [];
  let paFieldDefs = [];
  let userNames = [];
  let paTypes = [];

  // === 需求5：RCA 动态列状态 ===
  // columns: [{ id, type:'管理系统'|'技术系统', rootCause }]
  // rows: 固定5行，每行是 columns 长度的字符串数组
  const RCA_ROW_COUNT = 5;
  const RCA_TYPES = ['管理系统', '技术系统'];
  const RCA_ROOT_CAUSE_OPTIONS = ['人 / Man', '机 / Machine', '料 / Material', '法 / Method', '环 / Environment'];
  let rcaState = { columns: [], rows: [] };

  function genColId() {
    return 'col_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
  }

  function emptyRcaRows(colCount) {
    const rows = [];
    for (let i = 0; i < RCA_ROW_COUNT; i++) {
      const r = [];
      for (let j = 0; j < colCount; j++) r.push('');
      rows.push(r);
    }
    return rows;
  }

  function initDefaultRca() {
    rcaState.columns = [
      { id: genColId(), type: '管理系统', rootCause: '' },
      { id: genColId(), type: '技术系统', rootCause: '' }
    ];
    rcaState.rows = emptyRcaRows(rcaState.columns.length);
  }

  // 同类型下显示序号（① ② ③）
  function getDisplayIndex(colIdx) {
    const col = rcaState.columns[colIdx];
    if (!col) return 0;
    let n = 0;
    for (let i = 0; i <= colIdx; i++) {
      if (rcaState.columns[i].type === col.type) n++;
    }
    return n;
  }

  function getCircled(n) {
    const arr = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
    return arr[n - 1] || ('(' + n + ')');
  }

  // RCA 列删除时清空 CAPA 引用
  function purgeProblemRootCauseRefs(colId) {
    $('#paTableBody select.pa-problem-root-cause').each(function() {
      if ($(this).val() === colId) {
        $(this).val('').trigger('change');
      }
    });
  }

  function rebuildProblemRootCauseOptions() {
    const opts = [];
    rcaState.columns.forEach(function(col, idx) {
      const label = col.type + getCircled(getDisplayIndex(idx)) + (col.rootCause ? ' - ' + col.rootCause : '');
      opts.push('<option value="' + col.id + '">' + label + '</option>');
    });
    const html = opts.join('');
    $('#paTableBody select.pa-problem-root-cause').each(function() {
      const cur = $(this).val();
      $(this).html(html);
      if (cur && rcaState.columns.some(function(c) { return c.id === cur; })) {
        $(this).val(cur);
      } else {
        $(this).val('');
      }
    });
  }

  function renderRcaTable() {
    const totalCols = rcaState.columns.length;

    // Toolbar: 缺失类型补充添加按钮
    const presentTypes = rcaState.columns.map(function(c) { return c.type; });
    let toolbarHtml = '';
    RCA_TYPES.forEach(function(t) {
      if (presentTypes.indexOf(t) === -1) {
        toolbarHtml += '<button type="button" class="btn btn-outline-secondary btn-sm rca-toolbar-add" data-type="' + t + '">+ ' + t + '</button>';
      }
    });
    $('#rcaToolbar').html(toolbarHtml);

    // Header
    let head = '<tr><th rowspan="2" style="width:60px">层<br>Level</th>';
    rcaState.columns.forEach(function(col, idx) {
      const dispIdx = getDisplayIndex(idx);
      const canDelete = totalCols > 1;
      head += '<th style="text-align:center;vertical-align:middle;">'
        + col.type + getCircled(dispIdx)
        + ' <button type="button" class="btn btn-outline-light btn-sm py-0 px-1 rca-add" data-type="' + col.type + '" data-idx="' + idx + '" title="新增 / Add">+</button>'
        + (canDelete ? ' <button type="button" class="btn btn-outline-light btn-sm py-0 px-1 rca-del" data-idx="' + idx + '" title="删除 / Delete">-</button>' : '')
        + '<div style="font-size:0.7rem;font-weight:normal;">' + (col.type === '管理系统' ? 'Management System' : 'Technical System') + '</div>'
        + '</th>';
    });
    head += '</tr>';
    $('#rcaTableHead').html(head);

    // Body: 5 rows × columns
    let body = '';
    for (let r = 0; r < RCA_ROW_COUNT; r++) {
      body += '<tr><td class="text-center fw-bold">Why' + (r + 1) + '</td>';
      for (let c = 0; c < totalCols; c++) {
        const val = (rcaState.rows[r] && rcaState.rows[r][c]) || '';
        body += '<td><textarea name="rca_cell_' + r + '_' + c + '" rows="3" data-row="' + r + '" data-col="' + c + '">' + escapeText(val) + '</textarea></td>';
      }
      body += '</tr>';
    }
    $('#rcaTableBody').html(body);

    // Foot: 根本原因 dropdown per column
    let foot = '<tr><th style="text-align:center;vertical-align:middle;">根本原因<br>Root Cause</th>';
    rcaState.columns.forEach(function(col, idx) {
      let opts = '<option value=""></option>';
      RCA_ROOT_CAUSE_OPTIONS.forEach(function(o) {
        const sel = o === col.rootCause ? ' selected' : '';
        opts += '<option value="' + o + '"' + sel + '>' + o + '</option>';
      });
      foot += '<td><select class="rca-root-cause" data-idx="' + idx + '">' + opts + '</select></td>';
    });
    foot += '</tr>';
    $('#rcaTableFoot').html(foot);

    rebuildProblemRootCauseOptions();
  }

  function escapeText(v) {
    return String(v == null ? '' : v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function syncRcaRowsFromDom() {
    $('#rcaTableBody textarea[name^=rca_cell_]').each(function() {
      const r = parseInt($(this).data('row'));
      const c = parseInt($(this).data('col'));
      if (!rcaState.rows[r]) rcaState.rows[r] = [];
      rcaState.rows[r][c] = $(this).val() || '';
    });
  }

  function addRcaColumn(type) {
    syncRcaRowsFromDom();
    // 插入到同类型最后一个之后；如果不存在则按类型分组顺序插入
    let insertAt = rcaState.columns.length;
    for (let i = rcaState.columns.length - 1; i >= 0; i--) {
      if (rcaState.columns[i].type === type) { insertAt = i + 1; break; }
    }
    if (insertAt === rcaState.columns.length && type === '管理系统') {
      // 管理系统在前
      for (let i = 0; i < rcaState.columns.length; i++) {
        if (rcaState.columns[i].type === '技术系统') { insertAt = i; break; }
      }
    }
    const newCol = { id: genColId(), type: type, rootCause: '' };
    rcaState.columns.splice(insertAt, 0, newCol);
    rcaState.rows.forEach(function(r) { r.splice(insertAt, 0, ''); });
    if (rcaState.rows.length === 0) rcaState.rows = emptyRcaRows(rcaState.columns.length);
    renderRcaTable();
  }

  function removeRcaColumn(idx) {
    if (rcaState.columns.length <= 1) return;
    syncRcaRowsFromDom();
    const removed = rcaState.columns[idx];
    rcaState.columns.splice(idx, 1);
    rcaState.rows.forEach(function(r) { r.splice(idx, 1); });
    renderRcaTable();
    purgeProblemRootCauseRefs(removed.id);
  }

  $(document).on('click', '.rca-add', function() {
    const type = $(this).data('type');
    addRcaColumn(type);
  });
  $(document).on('click', '.rca-toolbar-add', function() {
    const type = $(this).data('type');
    addRcaColumn(type);
  });
  $(document).on('click', '.rca-del', function() {
    removeRcaColumn(parseInt($(this).data('idx')));
  });
  $(document).on('change', '#rcaTableFoot select.rca-root-cause', function() {
    const idx = parseInt($(this).data('idx'));
    if (rcaState.columns[idx]) {
      rcaState.columns[idx].rootCause = $(this).val() || '';
      rebuildProblemRootCauseOptions();
    }
  });
  $(document).on('input change', '#rcaTableBody textarea[name^=rca_cell_]', function() {
    const r = parseInt($(this).data('row'));
    const c = parseInt($(this).data('col'));
    if (!rcaState.rows[r]) rcaState.rows[r] = [];
    rcaState.rows[r][c] = $(this).val() || '';
  });

  // === 工具函数 ===
  function todayStr() {
    const d = new Date();
    const yy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return yy + '-' + mm + '-' + dd;
  }

  function normalizeUsers(rawUsers) {
    return (rawUsers || []).map(function(u) {
      if (typeof u === 'string') {
        const m = u.match(/【([^】]+)】/);
        const em = m ? m[1].trim() : '';
        return { display: u, email: em, defaultVerifierEmail: '' };
      }
      return {
        display: String((u && u.display) || '').trim(),
        email: String((u && u.email) || '').trim(),
        defaultVerifierEmail: String((u && u.defaultVerifierEmail) || '').trim()
      };
    }).filter(function(u) { return u.display; });
  }

  function collectFormData() {
    syncRcaRowsFromDom();

    const d = {};
    d.aem_no         = $('#fld_aem_no').val() || '';
    d.present_status = $('#fld_present_status').val() || '';
    d.case_code      = $('#fld_case_code').val() || '';
    d.analyst        = ($('#fld_analyst').val() || []).join(',');
    d.time_used      = $('#fld_time_used').val() || '';
    d.what           = $('#fld_what').val() || '';
    d.when           = $('#fld_when').val() || '';
    d.where          = $('#fld_where').val() || '';
    d.pdesc_who      = ($('#fld_pdesc_who').val() || []).join(',');
    d.trouble_desc   = $('#fld_trouble_desc').val() || '';
    d.actions = [];
    $('#actionTableBody tr').each(function(idx) {
      const i = idx + 1;
      d.actions.push({
        proc:   $('[name=a_proc_' + i + ']').val() || '',
        who:    $('[name=a_who_' + i + ']').val() || '',
        date:   $('[name=a_date_' + i + ']').val() || '',
        time:   $('[name=a_time_' + i + ']').val() || '',
        result: $('[name=a_result_' + i + ']').val() || ''
      });
    });
    d.photo = $('#photo_preview').is(':visible') ? ($('#photo_preview').attr('src') || '') : '';

    // RCA JSON
    d.rca_json = JSON.stringify({ columns: rcaState.columns, rows: rcaState.rows });

    d.pa_fields = paFieldDefs.map(function(f) { return { id: f.Field_ID, cn: f.Label_CN, en: f.Label_EN }; });
    d.pa = [];
    $('#paTableBody tr').each(function(i) {
      const row = { type: $('[name=pa_type_' + i + ']').val() || '' };
      paFieldDefs.forEach(function(f) { row[f.Field_ID] = $('[name=' + f.Field_ID + '_' + i + ']').val() || ''; });
      row.problem_root_cause = $('[name=pa_problem_root_cause_' + i + ']').val() || '';
      d.pa.push(row);
    });
    return d;
  }

  function restoreFormData(d) {
    if (d.present_status) $('#fld_present_status').val(d.present_status);
    if (d.analyst) {
      const analystArray = Array.isArray(d.analyst) ? d.analyst : d.analyst.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
      $('#fld_analyst').val(analystArray).trigger('change');
    }
    if (d.time_used)      $('#fld_time_used').val(d.time_used);
    if (d.what)           $('#fld_what').val(d.what);
    if (d.when)           $('#fld_when').val(d.when);
    if (d.where)          $('#fld_where').val(d.where);
    if (d.pdesc_who) {
      const whoArray = Array.isArray(d.pdesc_who) ? d.pdesc_who : d.pdesc_who.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
      // 对于旧数据可能不在选项里，先动态补齐
      whoArray.forEach(function(v) {
        if ($('#fld_pdesc_who option[value="' + v.replace(/"/g, '\\"') + '"]').length === 0) {
          $('#fld_pdesc_who').append('<option value="' + v + '">' + v + '</option>');
        }
      });
      $('#fld_pdesc_who').val(whoArray).trigger('change');
    }
    if (d.trouble_desc)   $('#fld_trouble_desc').val(d.trouble_desc);
    if (d.actions) {
      while ($('#actionTableBody tr').length < d.actions.length) {
        if (typeof window.addActionRow === 'function') window.addActionRow();
        else break;
      }
      d.actions.forEach(function(a, i) {
        const n = i + 1;
        $('[name=a_proc_' + n + ']').val(a.proc);
        const actionWhoEl = $('[name=a_who_' + n + ']');
        actionWhoEl.val(a.who);
        if (actionWhoEl.hasClass('sel2-user') && $.fn.select2) actionWhoEl.trigger('change');
        $('[name=a_date_' + n + ']').val(a.date);
        $('[name=a_time_' + n + ']').val(a.time);
        $('[name=a_result_' + n + ']').val(a.result);
      });
    }
    if (d.photo) { $('#photo_preview').attr('src', d.photo).show(); }

    // ===== RCA 还原 =====
    let restoredRca = false;
    if (d.rca_json) {
      try {
        const obj = (typeof d.rca_json === 'string') ? JSON.parse(d.rca_json) : d.rca_json;
        if (obj && Array.isArray(obj.columns) && obj.columns.length > 0) {
          rcaState.columns = obj.columns.map(function(c) {
            return { id: c.id || genColId(), type: c.type || '管理系统', rootCause: c.rootCause || '' };
          });
          const rowCount = Math.max(RCA_ROW_COUNT, (obj.rows || []).length);
          rcaState.rows = [];
          for (let r = 0; r < RCA_ROW_COUNT; r++) {
            const src = (obj.rows && obj.rows[r]) || [];
            const row = [];
            for (let c = 0; c < rcaState.columns.length; c++) row.push(src[c] || '');
            rcaState.rows.push(row);
          }
          renderRcaTable();
          restoredRca = true;
        }
      } catch (e) { console.warn('rca_json 解析失败', e); }
    }
    if (!restoredRca && d.rca && Array.isArray(d.rca) && d.rca.length > 0) {
      // 旧数据兼容：3 列均映射为"管理系统"
      const oldCols = [
        { id: genColId(), type: '管理系统', rootCause: '' },  // desc
        { id: genColId(), type: '管理系统', rootCause: '' },  // cause
        { id: genColId(), type: '管理系统', rootCause: '' }   // action
      ];
      rcaState.columns = oldCols;
      rcaState.rows = [];
      for (let r = 0; r < RCA_ROW_COUNT; r++) {
        const old = d.rca[r] || {};
        rcaState.rows.push([old.desc || '', old.cause || '', old.action || '']);
      }
      renderRcaTable();
      restoredRca = true;
    }
    if (!restoredRca) {
      // 默认 1 管理 + 1 技术
      initDefaultRca();
      renderRcaTable();
    }

    // ===== CAPA 还原 =====
    if (d.pa) {
      const existingLen = $('#paTableBody tr').length;
      while ($('#paTableBody tr').length < d.pa.length) {
        if (typeof window.addPaRow === 'function') window.addPaRow(true);
        else break;
      }
      const fids = d.pa_fields ? d.pa_fields.map(function(f){return f.id;}) : paFieldDefs.map(function(f){return f.Field_ID;});
      d.pa.forEach(function(p, i) {
        $('[name=pa_type_' + i + ']').val(p.type || '');
        fids.forEach(function(fid) {
          const el = $('[name=' + fid + '_' + i + ']');
          el.val(p[fid] || '');
          if (el.hasClass('sel2-user') && $.fn.select2) el.trigger('change');
        });
        const $prc = $('[name=pa_problem_root_cause_' + i + ']');
        if ($prc.length && p.problem_root_cause) {
          $prc.val(p.problem_root_cause);
        }
        // 同步 pa_verifier_when 的 min 约束
        const $when = $('[name=pa_when_' + i + ']');
        const $vwhen = $('[name=pa_verifier_when_' + i + ']');
        if ($when.length && $vwhen.length) {
          $vwhen.attr('min', $when.val() || todayStr());
        }
      });
    }
  }

  function scheduleSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(function() {
      localStorage.setItem(draftKey, JSON.stringify(collectFormData()));
    }, 2000);
  }

  Swal.fire({
    title: swalTitle('加载模板中...', 'Loading template...'),
    html: swalHtml('正在加载表单模板，请稍候。', 'Loading form template, please wait.'),
    allowOutsideClick: false,
    allowEscapeKey: false,
    showConfirmButton: false,
    didOpen: function() { Swal.showLoading(); }
  });

  // ===== 模板加载 =====
  google.script.run
    .withSuccessHandler(function(r) {
      const init = JSON.parse(r);
      if (init.error) {
        Swal.fire({ title: '加载失败 / Load Failed', text: init.error, icon: 'error', confirmButtonText: '确定 / OK' });
        return;
      }
      const template = init.template;
      userNames = normalizeUsers(init.users || []);
      const fm = {};
      template.forEach(function(f) { fm[f.Field_ID] = f; });
      requiredFields = template
        .filter(function(f) { return f.Required === 'Y'; })
        .map(function(f) { return { id: f.Field_ID, label: f.Label_CN + ' / ' + f.Label_EN, section: f.Section, type: f.Type }; });

      function lbl(id, f) {
        if (f) $('#lbl_' + id).text(f.Label_CN + ' ' + f.Label_EN);
      }
      function splitOpts(str) {
        return str.includes('|') ? str.split('|') : str.split('/');
      }

      if (fm['doc_no']) $('#doc_no_display').text(fm['doc_no'].Label_CN);

      lbl('aem_no', fm['aem_no']);
      lbl('present_status', fm['present_status']);
      if (fm['present_status'] && fm['present_status'].Options) {
        const opts = splitOpts(fm['present_status'].Options);
        $('#fld_present_status').html('<option value=""></option>' +
          opts.map(function(o) { return '<option value="' + o.trim() + '">' + o.trim() + '</option>'; }).join(''));
      }
      lbl('case_code', fm['case_code']);
      lbl('analyst', fm['analyst']);

      // 名字列表（去掉邮箱部分）
      const nameOnlyList = userNames.map(function(u) { return String(u.display || '').replace(/【.+】/, '').trim(); });
      if (userNames && userNames.length > 0) {
        const analystOpts = nameOnlyList.map(function(name) {
          return '<option value="' + name + '">' + name + '</option>';
        }).join('');
        $('#fld_analyst').html(analystOpts);
        $('#fld_analyst').select2({
          placeholder: '请选择 / Select',
          width: '100%',
          minimumResultsForSearch: 1,
          matcher: function(params, data) {
            if ($.trim(params.term) === '') return data;
            if (typeof data.text === 'undefined') return null;
            return data.text.toLowerCase().indexOf(params.term.toLowerCase()) > -1 ? data : null;
          }
        });
        // pdesc_who（Who 人员）— 多选，数据源与分析人员一致，纯人名
        $('#fld_pdesc_who').html(analystOpts);
        $('#fld_pdesc_who').select2({
          placeholder: '请选择 / Select',
          width: '100%',
          minimumResultsForSearch: 1,
          matcher: function(params, data) {
            if ($.trim(params.term) === '') return data;
            if (typeof data.text === 'undefined') return null;
            return data.text.toLowerCase().indexOf(params.term.toLowerCase()) > -1 ? data : null;
          }
        });
      }
      lbl('time_used', fm['time_used']);
      lbl('photo', fm['photo']);
      lbl('what', fm['what']);
      lbl('when', fm['when']);
      lbl('where', fm['where']);
      lbl('pdesc_who', fm['pdesc_who']);
      lbl('trouble_desc', fm['trouble_desc']);

      if (fm['action_proc'])   $('#th_action_proc').text(fm['action_proc'].Label_CN + ' / ' + fm['action_proc'].Label_EN);
      if (fm['action_who'])    $('#th_action_who').html(fm['action_who'].Label_CN + '<br>' + fm['action_who'].Label_EN);
      if (fm['action_date'])   $('#th_action_date').html(fm['action_date'].Label_CN + '<br>' + fm['action_date'].Label_EN);
      if (fm['action_time'])   $('#th_action_time').html(fm['action_time'].Label_CN);
      if (fm['action_result']) $('#th_action_result').html(fm['action_result'].Label_CN + '<br>Y/N');

      const resultOpts = fm['action_result'] ? splitOpts(fm['action_result'].Options) : ['Y', 'N'];
      const actionWhoOpts = userNames.map(function(u) { return u.display; });

      function buildActionRow(i) {
        return '<tr>' +
          '<td class="text-center">' +
            '<div class="d-flex align-items-center justify-content-center gap-1">' +
              '<span class="action-no-text">' + i + '</span>' +
              '<button type="button" class="btn btn-outline-danger btn-sm py-0 px-1 action-del" title="删除 / Delete">-</button>' +
            '</div>' +
          '</td>' +
          '<td><textarea name="a_proc_' + i + '" rows="2"></textarea></td>' +
          '<td><select name="a_who_' + i + '" class="sel2-user"><option value=""></option>' +
          actionWhoOpts.map(function(o){return '<option value="'+o.trim()+'">'+o.trim()+'</option>';}).join('') + '</select></td>' +
          '<td><input type="date" name="a_date_' + i + '"></td>' +
          '<td><input type="number" name="a_time_' + i + '" min="0"></td>' +
          '<td><select name="a_result_' + i + '"><option value=""></option>' +
          resultOpts.map(function(o) { return '<option>' + o.trim() + '</option>'; }).join('') +
          '</select></td></tr>';
      }

      function reindexActionRows() {
        $('#actionTableBody tr').each(function(i) {
          const n = i + 1;
          $(this).find('.action-no-text').text(n);
          $(this).find('[name]').each(function() {
            this.name = this.name.replace(/_\d+$/, '_' + n);
          });
        });
      }

      function addActionRow() {
        const n = $('#actionTableBody tr').length + 1;
        const $row = $(buildActionRow(n));
        $('#actionTableBody').append($row);
        initUserSelect2($row);
      }
      window.addActionRow = addActionRow;

      let aRows = '';
      for (let i = 1; i <= 6; i++) {
        aRows += buildActionRow(i);
      }
      $('#actionTableBody').html(aRows);

      $('#btnActionAddRow').on('click', function() {
        addActionRow();
      });
      $('#actionTableBody').on('click', '.action-del', function() {
        if ($('#actionTableBody tr').length <= 1) return;
        $(this).closest('tr').remove();
        reindexActionRows();
      });

      // === 初始化 RCA ===
      initDefaultRca();
      renderRcaTable();

      // === CAPA ===
      paFieldDefs = template.filter(function(f) {
        return f.Section === 'PreventiveAction' && f.Field_ID !== 'pa_type';
      });

      // 表头：类型 + 问题根因 + 其他 paFieldDefs
      let paHdr = '<tr><th style="width:90px">类型<br>Type</th>'
        + '<th style="width:150px">问题根因<br>Problem Root Cause</th>';
      paFieldDefs.forEach(function(f) {
        // 行动描述列给更多宽度
        if (f.Field_ID === 'pa_plan') {
          paHdr += '<th style="width:200px">' + f.Label_CN + '<br>' + f.Label_EN + '</th>';
        } else {
          paHdr += '<th>' + f.Label_CN + '<br>' + f.Label_EN + '</th>';
        }
      });
      $('#paTableHead').html(paHdr + '</tr>');

      paTypes = fm['pa_type'] && fm['pa_type'].Options
        ? splitOpts(fm['pa_type'].Options)
        : ['SWI', 'SOP', 'AM', 'PM', 'Kaizen', '纠正措施'];

      function paInputHtml(f, i, isExistingRow) {
        if (f.Type === 'select') {
          const isUsers = f.Options === '$users';
          const opts = isUsers
            ? userNames.map(function(u) { return u.display; })
            : (f.Options ? splitOpts(f.Options) : []);
          return '<select name="' + f.Field_ID + '_' + i + '"' + (isUsers ? ' class="sel2-user"' : '') + '><option value=""></option>' +
            opts.map(function(o){return '<option value="'+o.trim()+'">'+o.trim()+'</option>';}).join('') + '</select>';
        }
        if (f.Type === 'date') {
          // pa_when / pa_verifier_when：新建模式 min=today，编辑模式 isExistingRow=true 不设 min
          const isEdit = !!window._isEditMode;
          let minAttr = '';
          if (!isEdit) {
            // 新建模式：所有行 min=today
            minAttr = ' min="' + todayStr() + '"';
          } else if (!isExistingRow) {
            // 编辑模式但用户新增行
            minAttr = ' min="' + todayStr() + '"';
          }
          return '<input type="date" name="' + f.Field_ID + '_' + i + '"' + minAttr + '>';
        }
        // pa_plan（行动描述）使用 textarea 支持多行输入
        if (f.Field_ID === 'pa_plan') {
          return '<textarea name="' + f.Field_ID + '_' + i + '" rows="2"></textarea>';
        }
        return '<input type="text" name="' + f.Field_ID + '_' + i + '">';
      }

      function buildPaRow(typeVal, i, canDelete, isExistingRow) {
        let cells = '<td>' +
          '<div class="d-flex align-items-center gap-1">' +
          '<select name="pa_type_' + i + '" class="pa-type">' +
          paTypes.map(function(t){
            const tt = t.trim();
            const sel = String(typeVal || '') === tt ? ' selected' : '';
            return '<option value="' + tt + '"' + sel + '>' + tt + '</option>';
          }).join('') +
          '</select>' +
          (canDelete ? '<button type="button" class="btn btn-outline-danger btn-sm py-0 px-2 pa-del" title="删除 / Delete">-</button>' : '') +
          '</div>' +
          '</td>';
        // 问题根因 - 动态下拉，选项从 RCA 列生成
        cells += '<td><select name="pa_problem_root_cause_' + i + '" class="pa-problem-root-cause"></select></td>';
        paFieldDefs.forEach(function(f) {
          cells += '<td>' + paInputHtml(f, i, isExistingRow) + '</td>';
        });
        return '<tr>' + cells + '</tr>';
      }

      function addPaRow(isExistingRow) {
        const idx = $('#paTableBody tr').length;
        const rowHtml = buildPaRow('', idx, true, !!isExistingRow);
        const $row = $(rowHtml);
        $('#paTableBody').append($row);
        initUserSelect2($row);
        rebuildProblemRootCauseOptions();
        // 绑定 pa_when 变更 → pa_verifier_when min 同步
        $row.find('[name^=pa_when_]').on('change', function() {
          const idxRow = this.name.split('_').pop();
          const v = $(this).val();
          const $vw = $('[name=pa_verifier_when_' + idxRow + ']');
          if ($vw.length) {
            $vw.attr('min', v || todayStr());
          }
        });
      }
      window.addPaRow = addPaRow;

      let pRows = '';
      paTypes.forEach(function(t, i) {
        pRows += buildPaRow(t.trim(), i, true, false);
      });
      $('#paTableBody').html(pRows);

      function initUserSelect2(scope) {
        if (!$.fn.select2) return;
        const $targets = scope ? $(scope).find('.sel2-user') : $('#formBody .sel2-user');
        $targets.each(function() {
          const $el = $(this);
          if ($el.hasClass('select2-hidden-accessible')) {
            $el.select2('destroy');
          }
          // pdesc_who 是 multiple, analyst 也 multiple；其它 sel2-user 单选
          const isMultiple = $el.prop('multiple');
          $el.select2({
            width: '100%',
            theme: 'bootstrap',
            placeholder: '请选择 / Select',
            dropdownParent: $('body'),
            dropdownAutoWidth: true,
            templateResult: function(data) {
              if (!data.id) return data.text;
              const txt = data.text || '';
              const m = txt.match(/^(.*)【(.*)】$/);
              if (!m) return txt;
              return $('<div><div style="font-weight:600;line-height:1.2;">' + m[1].trim() + '</div><div style="font-size:12px;color:#6c757d;line-height:1.2;">' + m[2].trim() + '</div></div>');
            },
            templateSelection: function(data) {
              if (!data.id) return data.text;
              const match = data.text.match(/^([^【]+)/);
              return match ? match[1].trim() : data.text;
            },
            escapeMarkup: function(markup) { return markup; }
          });
        });
      }

      initUserSelect2();
      rebuildProblemRootCauseOptions();

      // 初始绑定 pa_when → pa_verifier_when min
      $('#paTableBody [name^=pa_when_]').on('change', function() {
        const idxRow = this.name.split('_').pop();
        const v = $(this).val();
        const $vw = $('[name=pa_verifier_when_' + idxRow + ']');
        if ($vw.length) {
          $vw.attr('min', v || todayStr());
        }
      });

      function reindexPaRows() {
        $('#paTableBody tr').each(function(i) {
          $(this).find('[name]').each(function() {
            const oldName = this.name;
            this.name = oldName.replace(/_\d+$/, '_' + i);
          });
        });
      }

      $('#btnPaAddRow').on('click', function() {
        addPaRow(false);   // 用户新增
      });

      $('#paTableBody').on('click', '.pa-del', function() {
        $(this).closest('tr').remove();
        reindexPaRows();
      });

      const displayToUser = {};
      const emailToDisplay = {};
      userNames.forEach(function(u) {
        displayToUser[u.display] = u;
        if (u.email) emailToDisplay[u.email.toLowerCase()] = u.display;
      });

      $('#paTableBody').on('change', '[name^=pa_who_]', function() {
        const whoName = this.name;
        const idx = whoName.substring('pa_who_'.length);
        const selectedDisplay = $(this).val() || '';
        const selectedUser = displayToUser[selectedDisplay];
        const verifierEl = $('[name=pa_verifier_' + idx + ']');
        const unmatchedText = '未匹配 / Not Matched';
        if (!verifierEl.length) return;

        if (!selectedUser || !selectedUser.defaultVerifierEmail) {
          verifierEl.find('option[value="' + unmatchedText + '"]').remove();
          verifierEl.val('').trigger('change');
          return;
        }
        const target = emailToDisplay[selectedUser.defaultVerifierEmail.toLowerCase()] || '';
        if (!target) {
          if (!verifierEl.find('option[value="' + unmatchedText + '"]').length) {
            verifierEl.append('<option value="' + unmatchedText + '">' + unmatchedText + '</option>');
          }
          verifierEl.val(unmatchedText).trigger('change');
          return;
        }
        verifierEl.find('option[value="' + unmatchedText + '"]').remove();
        verifierEl.val(target).trigger('change');
      });

      Swal.close();
      $('#formWrapper').show();
      $('#formBody').show();
      $('#formBody').on('input change', scheduleSave);

      // URL参数预填 + 编辑模式检测
      google.script.url.getLocation(function(loc) {
        const p = loc.parameter || {};
        const isEditMode = p.editMode === '1';
        window._isEditMode = isEditMode;

        if (p.reportId) {
          draftKey = isEditMode ? 'fr_draft_edit_' + p.reportId : 'fr_draft_' + p.reportId;
          $('#fld_case_code').val(p.reportId).prop('readonly', true).addClass('bg-secondary bg-opacity-10 text-muted');
        }
        if (p.machineNo) {
          $('#fld_aem_no').val(p.machineNo).prop('readonly', true).addClass('bg-secondary bg-opacity-10 text-muted');
        }
        if (p.desc) $('#fld_trouble_desc').val(p.desc);

        // === 需求8：MDT 自动带入且不可编辑 ===
        if (p.mdt && !isEditMode) {
          $('#fld_time_used').val(p.mdt);
        }
        if (!isEditMode) {
          $('#fld_time_used').prop('readonly', true).addClass('bg-secondary bg-opacity-10 text-muted');
        }

        // === 需求7：责任人预填 ===
        function applyResponsiblePrefill(responsibleRaw) {
          if (!responsibleRaw) return;
          const name = String(responsibleRaw || '').replace(/【.+】/, '').trim();
          if (!name) return;
          // 确保选项存在
          if ($('#fld_analyst option[value="' + name.replace(/"/g, '\\"') + '"]').length === 0) {
            $('#fld_analyst').append('<option value="' + name + '">' + name + '</option>');
          }
          const analystCurrent = $('#fld_analyst').val() || [];
          if (analystCurrent.indexOf(name) === -1) {
            $('#fld_analyst').val(analystCurrent.concat([name])).trigger('change');
          }
          if ($('#fld_pdesc_who option[value="' + name.replace(/"/g, '\\"') + '"]').length === 0) {
            $('#fld_pdesc_who').append('<option value="' + name + '">' + name + '</option>');
          }
          const whoCurrent = $('#fld_pdesc_who').val() || [];
          if (whoCurrent.indexOf(name) === -1) {
            $('#fld_pdesc_who').val(whoCurrent.concat([name])).trigger('change');
          }
        }

        // 编辑模式：从服务器加载已有数据
        if (isEditMode && p.reportId) {
          $('#btnSubmit').text('更新 / Update');
          $('.navbar-brand').text('编辑故障报告 / Edit Breakdown Analysis');

          Swal.fire({
            title: swalTitle('加载数据中...', 'Loading Data...'),
            html: swalHtml('正在获取已有报告数据，请稍候。', 'Fetching existing report data, please wait.'),
            allowOutsideClick: false,
            showConfirmButton: false,
            didOpen: function() { Swal.showLoading(); }
          });

          google.script.run
            .withSuccessHandler(function(r) {
              Swal.close();
              const result = JSON.parse(r);
              if (result.success && result.formData) {
                restoreFormData(result.formData);
                if (result.formData.photo) $('#photo_preview').attr('src', result.formData.photo).show();
                // 编辑模式：time_used 回填后设 readonly
                if (result.formData.time_used) {
                  $('#fld_time_used').val(result.formData.time_used);
                }
                $('#fld_time_used').prop('readonly', true).addClass('bg-secondary bg-opacity-10 text-muted');
                // 编辑模式中如果 URL 有 responsible 仍可预填（如果回填后字段为空）
                if (p.responsible) {
                  applyResponsiblePrefill(decodeURIComponent(p.responsible));
                }
                Swal.fire({ title: '数据已加载 / Data Loaded', icon: 'info', timer: 1200, showConfirmButton: false });
              } else {
                Swal.fire({ title: '加载失败 / Load Failed', text: result.message || '无法获取已有报告数据', icon: 'error', confirmButtonText: '确定 / OK' });
              }
            })
            .withFailureHandler(function(e) {
              Swal.close();
              Swal.fire({ title: '加载失败 / Load Failed', text: e.message, icon: 'error', confirmButtonText: '确定 / OK' });
            })
            .getFailureReportFormData(p.reportId);

          return;
        }

        // 新建模式：检查本地草稿 + 预填责任人
        if (p.responsible) {
          applyResponsiblePrefill(decodeURIComponent(p.responsible));
        }
        const saved = localStorage.getItem(draftKey);
        if (saved) {
          Swal.fire({
            title: '发现未提交草稿 / Draft Found',
            text: '检测到上次未提交的草稿，是否恢复？/ Restore last draft?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: '恢复 / Restore',
            cancelButtonText: '忽略 / Ignore'
          }).then(function(result) {
            if (result.isConfirmed) restoreFormData(JSON.parse(saved));
          });
        }
      });
    })
    .withFailureHandler(function(e) {
      Swal.fire({ title: '加载失败 / Load Failed', text: e.message, icon: 'error', confirmButtonText: '确定 / OK' });
    })
    .getFailureReportInit();

  // 图片预览
  $('#fld_photo').on('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        const MAX_W = 400, MAX_H = 300;
        let w = img.width, h = img.height;
        if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
        if (h > MAX_H) { w = Math.round(w * MAX_H / h); h = MAX_H; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const resized = canvas.toDataURL('image/jpeg', 0.75);
        $('#photo_preview').attr('src', resized).show();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // ===== 保存草稿 =====
  $('#btnSaveDraft').on('click', function() {
    localStorage.setItem(draftKey, JSON.stringify(collectFormData()));
    Swal.fire({ title: '草稿已保存 / Draft Saved', icon: 'success', timer: 1500, showConfirmButton: false });
  });

  // ===== 清除草稿 =====
  $('#btnClearDraft').on('click', function() {
    Swal.fire({
      title: '确认清除 / Confirm Clear',
      text: '当前填写内容将全部清除 / All content will be cleared',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '清除 / Clear',
      cancelButtonText: '取消 / Cancel'
    }).then(function(result) {
      if (!result.isConfirmed) return;
      localStorage.removeItem(draftKey);
      $('#formBody input:not([readonly]), #formBody select, #formBody textarea').val('');
      // 重置 RCA
      initDefaultRca();
      renderRcaTable();
      Swal.fire({ title: '已清除 / Cleared', icon: 'success', timer: 1000, showConfirmButton: false });
    });
  });

  // ===== 提交 =====
  $('#btnSubmit').on('click', function() {
    $('#formBody .is-invalid').removeClass('is-invalid');
    const data = collectFormData();
    if (window._isEditMode) data._editMode = true;
    const missing = [];
    const followupRequired = ['pa_plan', 'pa_who', 'pa_when', 'pa_verifier', 'pa_verifier_when'];
    const followupLabel = {
      pa_plan: '行动描述 / Action Description',
      pa_who: '责任人 / Responsible',
      pa_when: '完成时间 / Due Date',
      pa_verifier: '验证人 / Verifier',
      pa_verifier_when: '验证时间 / Verify Date'
    };
    const tableFieldMap = {
      'action_proc': 'a_proc_', 'action_who': 'a_who_',
      'action_date': 'a_date_', 'action_time': 'a_time_', 'action_result': 'a_result_'
    };
    paFieldDefs.forEach(function(f) { tableFieldMap[f.Field_ID] = f.Field_ID + '_'; });
    requiredFields.forEach(function(f) {
      // 跳过已废弃的 rca_desc/rca_cause/rca_action
      if (f.id === 'rca_desc' || f.id === 'rca_cause' || f.id === 'rca_action') return;
      let isEmpty = false;
      if (tableFieldMap[f.id]) {
        isEmpty = $('[name^=' + tableFieldMap[f.id] + ']').toArray().every(function(el) {
          return !$(el).val() || $(el).val().trim() === '';
        });
      } else {
        const el = $('#fld_' + f.id);
        const val = el.val();
        isEmpty = !val || (Array.isArray(val) ? val.length === 0 : val.trim() === '');
        if (isEmpty) el.addClass('is-invalid');
      }
      if (isEmpty) missing.push(f.label);
    });

    // RCA 至少一行有内容
    syncRcaRowsFromDom();
    const rcaHasContent = rcaState.rows.some(function(r) {
      return r.some(function(cell) { return String(cell || '').trim(); });
    });
    if (!rcaHasContent) {
      missing.push('根本原因分析 / RCA Analysis');
    }

    // RCA 列中有 Why 内容但根本原因未选 → 报错
    rcaState.columns.forEach(function(col, idx) {
      const colHasContent = rcaState.rows.some(function(r) {
        return String((r && r[idx]) || '').trim();
      });
      if (colHasContent && !String(col.rootCause || '').trim()) {
        const label = col.type + getCircled(getDisplayIndex(idx));
        missing.push('根本原因分析 - ' + label + '：根本原因未选择 / Root Cause Missing');
      }
    });

    if (missing.length > 0) {
      Swal.fire({
        title: '必填项未完成 / Required Fields Missing',
        html: '<ul style="text-align:left">' + missing.map(function(m) { return '<li>' + m + '</li>'; }).join('') + '</ul>',
        icon: 'warning',
        confirmButtonText: '确定 / OK'
      });
      return;
    }

    const followupRowErrors = [];
    let followupCompleteCount = 0;
    (data.pa || []).forEach(function(row, idx) {
      const missingFields = followupRequired.filter(function(fid) {
        return !String((row && row[fid]) || '').trim();
      });
      if (missingFields.length === followupRequired.length) return;
      // 行动描述非空时，问题根因也必须填写
      if (String((row && row.pa_plan) || '').trim() && !String((row && row.problem_root_cause) || '').trim()) {
        missingFields.push('problem_root_cause');
      }
      if (missingFields.length > 0) {
        followupRowErrors.push('第' + (idx + 1) + '行（' + (row.type || 'PA') + '）：' + missingFields.map(function(fid){
          if (fid === 'problem_root_cause') return '问题根因 / Problem Root Cause';
          return followupLabel[fid] || fid;
        }).join('、'));
        return;
      }
      followupCompleteCount += 1;
    });

    if (followupRowErrors.length > 0) {
      Swal.fire({
        title: 'CAPA 未填写完整 / CAPA Row Incomplete',
        html: '<div style="text-align:left">以下行已开始填写但未完整：<br/>Rows started but incomplete:<ul style="margin-top:6px">' +
          followupRowErrors.map(function(m){ return '<li>' + m + '</li>'; }).join('') +
          '</ul></div>',
        icon: 'warning',
        confirmButtonText: '确定 / OK'
      });
      return;
    }

    if (followupCompleteCount === 0) {
      Swal.fire({
        title: '缺少 CAPA / Missing Follow-up',
        text: '请至少完整填写1条 CAPA 后再提交 / Please complete at least one CAPA row before submit.',
        icon: 'warning',
        confirmButtonText: '确定 / OK'
      });
      return;
    }

    Swal.fire({
      title: '确认提交 / Confirm Submit',
      text: '提交后数据将写入记录表 / Data will be saved to records',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: '提交 / Submit',
      cancelButtonText: '取消 / Cancel'
    }).then(function(res) {
      if (!res.isConfirmed) return;
      Swal.fire({ title: '提交中... / Submitting...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });
      google.script.run
        .withSuccessHandler(function(r) {
          Swal.close();
          const result = JSON.parse(r);
          if (result.success) {
            localStorage.removeItem(draftKey);
            const isEdit = window._isEditMode;
            Swal.fire({
              title: isEdit ? '更新成功 / Updated' : '提交成功 / Submitted',
              html: (isEdit ? '报告已更新并重新生成PDF<br>Report updated and PDF regenerated.<br><br>' : '报告已生成PDF并存档<br>Report PDF saved.<br><br>') +
                '<a href="' + result.fileUrl + '" target="_blank">' + result.fileName + '</a>',
              icon: 'success',
              confirmButtonText: '确定 / OK'
            });
          } else {
            Swal.fire({ title: '提交失败 / Failed', text: result.message, icon: 'error', confirmButtonText: '确定 / OK' });
          }
        })
        .withFailureHandler(function(e) {
          Swal.close();
          Swal.fire({ title: '提交失败 / Failed', text: e.message, icon: 'error', confirmButtonText: '确定 / OK' });
        })
        .submitFailureReport(JSON.stringify(data));
    });
  });

});
</script>
