<script>
  
  let timerInterval;
  let clickNum=0;

  window.onload = function () {
    document.onkeydown = function () {
      var e = window.event || arguments[0];

        return false;
      } else if ((e.ctrlKey) && (e.shiftKey) && (e.keyCode == 73)) {
        return false;
      }
    }
    document.oncontextmenu = function () {
      return false;

      else{

      }
    }).getPMrecord(PM_Info);
    /**************************************************************************************/
    $("#confirmPeople").click(() => {
      if(timerInterval){clearInterval(timerInterval)}
      swal.fire({
        title: "确认保养人员信息",
        text: "一旦确认本次保养人员信息将无法更改",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: '确认',
        cancelButtonText: '取消',
        reverseButtons: true
      }).then((result) => {
        if (result.value) {
          swal.fire({
            title: '已确认',
            text: '本次保养已开始',
            icon: 'success',

          $("#status").val("Ongoing");
          let PMno = dayjs($("#mainDate").val()).format("YYYYMMDD") + $("#workcenter").val();
          $("#PMno").val(PMno);
          $("#PMend,#saveProgress").prop("disabled", false);
          let PM_Personal_info = $("#PM_People_add").bootstrapTable("getData");
          let ID = new Array();
          PM_Personal_info.forEach(function (r) {
            ID.push(r.ID)
          })
          $("#pmPeople").val(JSON.stringify(ID));
          let TableData = getTableData();
          let TableDataRecordJson=TableData[0];
          showRunning('正在保存保养开始数据……','','',120000,'')
          google.script.run.withFailureHandler(judgeFailure).withSuccessHandler((resultWrite)=>{
            if(resultWrite[0]=="OK"){
              $("#PMstart").prop("disabled", true);
              showRunResult('success','保养开始数据写入成功','','',2000,false,'');
            }
            else{
              showRunResult('success','保养开始数据写入失败',result[1],'','',true,'联系相关人员');

    /**************************************************************************************/
    $("#addTask").click(function () {
      if(timerInterval){clearInterval(timerInterval)}
      let status = $("#status").val();
      let code = new String();
      if ($("#unite").val() == "" || $("#module").val() == "" || $("#jobContent").val() == "") {
        swal.fire("信息未填写完整")
        return false;

        allowOutsideClick:false,

          if (status == "未开始") {

            workcenter: PM_Info.workcenter,

            jobContent: $("#jobContent").val(),

            estimatePerson: $("#estimatePerson").val(),

                }

              showRunResult('error','保养开始数据写入失败',resultAddTask[1],'','',true,'联系相关人员');

  // 删除行
  function deleteRow(obj) {
    $("#PM_People_add").bootstrapTable("remove", {
      field: "ID",
      values: $(obj).closest("tr").find("td").eq(0).text()
    })
  }

  // 保养开始
  function PMstart() {
    let idList = new Array();
    let nameList = new Array();
    let name = new String();
    let id = new String();
    /**************************************************************************************/
    $("#PMstart").click(function () {
      let notification = $("#notification").val();
      if (notification == "") {
        showRunResult('error','请输入工单号','','',2000,false,'');
        return false
      }
      else {
        google.script.run.withFailureHandler(judgeFailure).withSuccessHandler(function (userID) {
          idList = userID.map(function (r) { return r[0] });
          nameList = userID.map(function (r) { return r[1] });
          $("#append_PM_People").prop("disabled", false)
        }).getUseID();
      }
      /**************************************************************************************/
      $("#workNo").change(() => {
        id = $("#workNo").val();

        if (id.length == 5) {

          let position = idList.indexOf(id);

          if (position > -1) {
            name = nameList[position]
          } else {
            name = "用户不存在"
          }
          $("#PM_name").val(name);
          M.updateTextFields();
        }
      })
      /**************************************************************************************/
      $("#append_PM_People").click(() => {
        if(timerInterval){clearInterval(timerInterval)}
        let info = { ID: id, name: name, delete: "<a class='btn waves-effect waves-light' onclick = 'deleteRow(this)'>删除</a>" };
        let data = $("#PM_People_add").bootstrapTable("getData");
        let ID = new Array();
        /*********************判断用户名合法性**************************/
        if (name == "用户不存在" || name == "") {
          swal.fire({
            title: "人员信息错误",
            icon: "error",
            showConfirmButton: false,
            timer: 1500
          })
          return false;
        }
        /*************************************************************/
        if (data == "") {
          $("#PM_People_add").bootstrapTable("append", info);
        } else {
          for (i = 0; i < data.length; i++) {
            ID.push(data[i].ID);
          }
          let result = ID.filter(function (r) {
            return r == id
          })
          if (result != "") {
            swal.fire("重复输入人员信息，请核实")
          } else {
            $("#PM_People_add").bootstrapTable("append", info);
          }
        }
      })
    })
  }

  // 结束保养
  function PMend() {
    $("#PMend").click(function () {
      if(timerInterval){clearInterval(timerInterval)}
      let TableData = getTableData();
      let TableDataRecordJson=TableData[0];
      swal.fire({
        allowOutsideClick:false,
        title: "确认结束本次保养？",
        text: "确认结束后无法更改本次保养相关内容",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: '确认',
        cancelButtonText: '取消',
        reverseButtons: true,
        footer:"<p>共"+"<b style='color:blue'>"+TableDataRecordJson[11]+"</b>条任务；未完成<b style='color:red'>"+TableDataRecordJson[13]+"</b>条任务</p>"
      }).then((result) => {
        if (result.value) {
          $("#endDate").val(formatDateTime(new Date()));
          $("#endTime").val(formatTime(new Date()));
          $("#status").val("Finished");
          TableData = getTableData();
          TableDataRecordJson=TableData[0];
          let arrErrorData=judgeTableData(TableData[1]);
          if(arrErrorData.length>0){
            showRunResult('error','表格中有数据错误','',arrErrorData.join("<br>"),'',true,'');
          }
          else{
            showRunning('正在保存保养结束任务……','','',120000,'');
            google.script.run.withFailureHandler(judgeFailure).withSuccessHandler((resultPmEnd)=>{
              if(resultPmEnd[0]=="OK"){
                showRunResult('success','保养结束数据写入成功','','',2000,false,'')
                $("#saveProgress").prop("disabled",true);
                $("#PMend").prop("disabled", true);
                $("#addRow").attr("disabled", true);
              }
              else{
                showRunResult('error','保养结束数据写入失败',result[1],'','',true,'联系相关人员')
              }
            }).PMend_writeback(workshop, process, TableDataRecordJson,TableData[1]);
          }
        }
        else {
          return false;
        }  
      });
    })
  }

  function getTableData() {   //表格里的数据
    let jsonName=["任务编号","单元","模块","失效模式","任务类型","任务描述","频率","状态","任务属性","工具"];
    let arrPmInfoJson =[$("#PMno").val(),$("#status").val(),$("#notification").val(),$("#pmPeople").val(),$("#mainDate").val(),$("#startDate").val(),$("#startTime").val(),$("#endDate").val(), $("#endTime").val(),$("#workcenter").val()];
    let arrPmInfoLeft=[$("#PMno").val(),$("#status").val(),$("#notification").val(),$("#pmPeople").val(),$("#mainDate").val(),$("#startDate").val(),$("#startTime").val(),$("#endDate").val(), $("#endTime").val(),$("#workcenter").val()];
    console.log("测试结束时间",arrPmInfoLeft);
    let arrPmInfo=[];
    let obj={};
    let objFalse={};
    let objRemark={};
    let arrJson=[];
    let arrJsonFalse=[];
    let arrJsonRemark=[];
    let numTrue=0;
    let numFalse=0;
    let numRemark=0;
    for (i = 0; i < $("#tbody").find("tr").length; i++) {
      obj={};
      objFalse={};
      objRemark={};
      arrPmInfo.push([$("#PMno").val(),$("#workcenter").val(),$("#startDate").val(),$("#endDate").val(),$("#startTime").val(),$("#endTime").val(),$("#notification").val()]);
      let c = $("#tbody").find("tr").eq(i).find("input").eq(0).is(":checked");
      let d = $("#tbody").find("tr").eq(i).find("textarea").val();
      let rowTaskNo=$("#tbody").find("tr").eq(i).find("td").eq(0).text();
      for (j = 0; j < $("#tbody").find("tr").eq(0).find("td").length - 3; j++) {
        let b = $("#tbody").find("tr").eq(i).find("td").eq(j).text();
        obj[jsonName[j]]=b;
        arrPmInfo[arrPmInfo.length-1].push(b);
        if(!c){objFalse[jsonName[j]]=b;}
        if(d){objRemark[jsonName[j]]=b;}
      }
      obj["是否完成"]=c;
      obj["备注"]=d;
      obj["图片"]=$("#tbody").find("tr").eq(i).find("input").eq(1).val();
      if(c){numTrue=numTrue+1}else{numFalse=numFalse+1;objFalse["是否完成"]=c;objFalse["备注"]=d;arrJsonFalse.push(objFalse);}
      if(d){numRemark=numRemark+1;objRemark["是否完成"]=c;objRemark["备注"]=d;arrJsonRemark.push(objRemark);}
      arrJson.push(obj);
      arrPmInfo[arrPmInfo.length-1].push(c);
      arrPmInfo[arrPmInfo.length-1].push(d);
      arrPmInfo[arrPmInfo.length-1].push($("#tbody").find("tr").eq(i).find("input").eq(1).val());
    }
    let taskNums=numTrue+numFalse;
    arrPmInfoJson.push(JSON.stringify(arrJson),taskNums,JSON.stringify(arrJsonFalse),numFalse,JSON.stringify(arrJsonRemark),numRemark);

  function formatDateTime(inputTime) {
    var date = new Date(inputTime);
    var y = date.getFullYear();
    var m = date.getMonth() + 1;
    m = m < 10 ? ('0' + m) : m;
    var d = date.getDate();
    d = d < 10 ? ('0' + d) : d;
    var h = date.getHours();
    h = h < 10 ? ('0' + h) : h;
    return y + '-' + m + '-' + d;
  }

  // 
  function formatTime(inputTime) {
    var date = new Date(inputTime);
    var h = date.getHours();
    h = h < 10 ? ('0' + h) : h;
    var minute = date.getMinutes();
    var second = date.getSeconds();
    minute = minute < 10 ? ('0' + minute) : minute;
    second = second < 10 ? ('0' + second) : second;
    return h + ':' + minute + ':' + second;
  };

  function judgeTableData(arrTableData){

  }

  /**============显示函数运行状态============**/
  function showRunning(strTitle,strText,strHtml,times,strFooter){
    if(timerInterval){clearInterval(timerInterval)}
    swal.fire({
      allowOutsideClick:false,
      icon:'info',
      title:strTitle,
      text:strText,
      html:'窗口将在 <b></b> 秒内自动关闭.',
      timer:times,
      footer:strFooter,
      timerProgressBar:true,
      onBeforeOpen: () => {
        if(timerInterval){clearInterval(timerInterval)}
        Swal.showLoading()
        const b = Swal.getContent().querySelector('b')
        timerInterval = setInterval(() => {
          b.textContent = (Swal.getTimerLeft()/1000).toFixed(0);
        }, 1000)
      },
      onClose:()=>{
        if(timerInterval){clearInterval(timerInterval)}
      }
    }).then((result) => {
    if (result.dismiss === Swal.DismissReason.timer) {
      if(timerInterval){clearInterval(timerInterval)}
      Swal.fire("程序在2分钟内未响应,尝试点击按钮再来一次");
    }});
  }
