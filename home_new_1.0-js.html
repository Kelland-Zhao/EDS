<script>
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

  let pageLoadComplete = false;
  let webPageLoaded = false;
  let userInfoLoaded = false;

  $(document).ready(() => {
    Swal.fire({
      title: swalTitle('正在加载数据...', 'Loading Data...'),
      html: swalHtml('正在获取数据，请稍候。', 'Fetching data, please wait.'),
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });

    google.script.run.withSuccessHandler(htmlGetReleaseWebPage).getReleaseWebPage();
    // google.script.run.withSuccessHandler(getName).getUseID();
    google.script.run.withSuccessHandler(login).getIDinfo();
    // 延迟初始化Bootstrap，避免与SweetAlert冲突
    setTimeout(() => {
      initializeBootstrap();
    }, 100);
  })

  function htmlGetReleaseWebPage(result) {
    sessionStorage.setItem("siWebPage", result)
    webPageLoaded = true;
    checkPageLoadComplete();
  }

  function initializeBootstrap() {
    // Bootstrap 5 不需要手动初始化大部分组件
    // 模态框会自动初始化，但我们可以确保它们正常工作
    console.log('Bootstrap components initialized');
  }

  // 检查页面加载是否完成
  function checkPageLoadComplete() {
    if (webPageLoaded && userInfoLoaded && !pageLoadComplete) {
      pageLoadComplete = true;
      showPageLoadComplete();
    }
  }

  // 数据加载完成，关闭 loading
  function showPageLoadComplete() {
    Swal.close();
  }

  // 移除查询功能的事件处理
  // $("#viewData").click(() => {
  //   window.open(sessionStorage.getItem("siWebPage") + "?v=ViewHistory")
  // })

  function login(userID) {
    // console.log('userID', userID);
    let id = '';
    let name = '';
    let PWD = '';
    let process = '';
    let workshop = '';
    
    userInfoLoaded = true;
    checkPageLoadComplete();

    $("#id").change(() => {
      id = $("#id").val();
      if (id.length == 5) {
        let user = userID.filter((r) => {
          return r.ID == id;
        })
        if (user.length > 0) {
          console.log('user', user);
          sessionStorage.setItem('ID', user[0].ID);
          sessionStorage.setItem('Name', user[0].Name);
          sessionStorage.setItem('PWD', user[0].PWD);
          sessionStorage.setItem('Process', user[0].Process);
          sessionStorage.setItem('Workshop', user[0].Workshop);
          name = user[0].Name;
          PWD = user[0].PWD;
          process = user[0].Process;
          workshop = user[0].Workshop;
          $("#login").prop("disabled", false);
          // google.script.run.writeUserLogInformation(id, name);//有问题
        } else {
          name = "用户不存在"
          console.log(name);
        }
        $("#Name").val(name);
        // Bootstrap不需要手动更新文本字段
      } else {
        $("#Name").val("请输入正确的工号");
        // Bootstrap不需要手动更新文本字段
      }
    })


    $("#login").click(() => {
      let pd = $("#pd").val();
      // console.log('id', id, 'pd', pd, 'PWD', PWD)
      if (id == '') {
        Swal.fire({ icon: 'warning', title: swalTitle('请输入工号', 'Employee ID Required') });
        return false;
      }
      else {
        if (pd == '') {
          Swal.fire({ icon: 'warning', title: swalTitle('请输入密码', 'Password Required') });
          return false;
        }
        else {
          if (pd == PWD) {
            window.open(sessionStorage.getItem("siWebPage")
              + "?v=Navigation"
              + '&ID=' + encodeURIComponent(id)
              + '&Name=' + encodeURIComponent(name)
              + '&Process=' + encodeURIComponent(process)
              + '&Workshop=' + encodeURIComponent(workshop)
            );//+"&webPage="+sessionStorage.getItem("siWebPage")
            $("#Name,#id,#pd").val("");
            // console.log('Pass')
          } else {
            Swal.fire({ icon: 'error', title: swalTitle('密码错误', 'Password Error') });
            return false;
          }
        }
      }

    })

  }

  // 删除不再需要的Materialize相关函数
  // function modal() { ... }
  // function closeModal() { ... }
  // window.onclick = function (event) { ... }

  // <!--  -->
  $("#confirmChange").click(() => {
    let id = $("#id1").val();
    let oldPd = $("#oldPd").val();
    let new_Pd = $("#newPd").val();
    let confirmPd = $("#confirmPd").val();
    let info = [id, oldPd, new_Pd, confirmPd];
    google.script.run.withSuccessHandler((a) => {
      Swal.fire({ title: a, icon: 'success', timer: 2000, showConfirmButton: false });
    }).changePassword(info);

    $("#id1,#oldPd,#newPd,#confirmPd").val("");
  })

</script>
