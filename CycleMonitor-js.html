<script>
// §4.11.1 双语 Helper
const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

var allMachines = { TB1: [], TB2: [] };
var allData = [];
var currentDays = 7;

$(document).ready(function() {
  // §4.1: fill #name from sessionStorage
  $('#name').text(sessionStorage.getItem('Name') || '');

  $('#daysSelect').on('change', function() {
    currentDays = parseInt($(this).val());
    loadData();
  });

  $('#refreshBtn').on('click', loadData);

  // Bootstrap nav-tabs: resize ECharts when hidden tab becomes visible
  $('#workshopTabs').on('shown.bs.tab', function(e) {
    var targetId = $(e.target).data('bs-target'); // '#content-tb1' or '#content-tb2'
    $(targetId).find('.cell-chart').each(function() {
      var chart = $(this).data('echart');
      if (chart) chart.resize();
    });
  });

  loadData();
});

function loadData() {
  // §4.11.2 Loading toast
  Swal.fire({
    title: swalTitle('加载数据中...', 'Loading Data...'),
    html: swalHtml('正在获取数据，请稍候。', 'Fetching data, please wait.'),
    allowOutsideClick: false,
    showConfirmButton: false,
    didOpen: () => { Swal.showLoading(); }
  });

  // 获取机台列表和实际数据
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && !result.error) {
        allMachines = result;
        fetchData();
      } else {
        // §4.11.2 Error toast
        Swal.fire({
          icon: 'error',
          title: swalTitle('加载失败', 'Load Failed'),
          html: swalHtml(
            (result && result.error) || '无法获取机台列表',
            (result && result.error) || 'Cannot get machine list'
          )
        });
      }
    })
    .getCycleMonitorMachineList();
}

function fetchData() {
  var allMachineList = allMachines.TB1.concat(allMachines.TB2);

  google.script.run
    .withSuccessHandler(function(result) {
      Swal.close();
      if (result && !result.error && result.machines) {
        allData = result.machines;
        renderGrid();
        updateBadges();
        updateDateRange();
      } else {
        // §4.11.2 Error toast
        Swal.fire({
          icon: 'error',
          title: swalTitle('数据加载失败', 'Data Load Failed'),
          html: swalHtml(
            (result && result.error) || '未知错误',
            (result && result.error) || 'Unknown error'
          )
        });
      }
    })
    .getCycleMonitorData(allMachineList, currentDays);
}

function updateBadges() {
  var counts = { TB1: 0, TB2: 0 };
  allData.forEach(function(m) {
    var ws = (m.name.indexOf('H1') === 0) ? 'TB1' : 'TB2';
    if (m.anomalyCount > 0) counts[ws] += 1;
  });

  ['TB1', 'TB2'].forEach(function(ws) {
    var badge = $('#' + ws.toLowerCase() + 'Badge');
    var count = counts[ws];
    if (count > 0) {
      badge.text(count + '台异常').show();
    } else {
      badge.hide();
    }
  });
}

function updateDateRange() {
  var today = new Date();
  var start = new Date(today.getTime() - currentDays * 24 * 60 * 60 * 1000);
  var fmt = function(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
  };
  $('#dateRangeLabel').text(fmt(start) + ' ~ ' + fmt(today));
}

function renderGrid() {
  // Render TB1 machines into chartGridTB1
  renderMachineGroup('TB1', '#chartGridTB1', true);
  // Render TB2 machines into chartGridTB2
  renderMachineGroup('TB2', '#chartGridTB2', false);
}

function renderMachineGroup(workshop, gridSelector, isTB1) {
  var machines = allData.filter(function(m) {
    return (workshop === 'TB1' && m.name.indexOf('H1') === 0) ||
           (workshop === 'TB2' && m.name.indexOf('H2') === 0);
  });

  var $grid = $(gridSelector);
  if (isTB1) {
    $grid.addClass('tb1-layout');
  } else {
    $grid.removeClass('tb1-layout');
  }

  // Dispose existing ECharts instances before clearing grid
  $grid.find('.cell-chart').each(function() {
    var chart = $(this).data('echart');
    if (chart) {
      chart.dispose();
      $(this).removeData('echart');
    }
  });
  $grid.empty();

  if (!machines.length) {
    $grid.html('<div class="empty-state">暂无数据 / No data</div>');
    return;
  }

  // Create chart cells
  machines.forEach(function(machine) {
    var $cell = $('<div class="chart-cell"></div>');

    // Title
    var titleHtml = machine.name;
    if (machine.anomalyCount > 0) {
      titleHtml += ' <span class="anomaly-dot"></span>';
    }
    if (machine.standard === null || machine.standard === undefined) {
      titleHtml += '<br><small style="color:#E67E22;">标准值缺失</small>';
    }
    $cell.append('<div class="cell-title">' + titleHtml + '</div>');

    if (!machine.points || !machine.points.length) {
      $cell.append('<div class="cell-chart" style="display:flex;align-items:center;justify-content:center;color:#999;font-size:12px;">暂无数值<br>No data</div>');
    } else {
      var chartDiv = $('<div class="cell-chart"></div>');
      $cell.append(chartDiv);
    }

    $cell.on('click', function() { openDetail(machine); });
    $grid.append($cell);
  });

  // Initialize ECharts for each cell (after DOM is in place)
  machines.forEach(function(machine, index) {
    if (!machine.points || !machine.points.length) return;
    var chartDom = $grid.find('.cell-chart').eq(index)[0];
    if (!chartDom) return;
    initMiniChart(chartDom, machine);
  });
}

function initMiniChart(dom, machine) {
  var chart = echarts.init(dom);

  var dates = machine.points.map(function(p) { return p.date; });
  var greenPts  = machine.points.filter(function(p) { return p.status === 'green'; });
  var orangePts = machine.points.filter(function(p) { return p.status === 'orange'; });
  var redPts    = machine.points.filter(function(p) { return p.status === 'red'; });
  var noStdPts  = machine.points.filter(function(p) { return p.status === null; });
  var std = machine.standard;

  var yMin, yMax;
  if (std !== null && std !== undefined) {
    yMin = std - 7;
    yMax = std + 10;
  } else {
    var cycles = machine.points.map(function(p) { return p.cycle; });
    yMin = Math.min.apply(null, cycles) - 2;
    yMax = Math.max.apply(null, cycles) + 2;
  }

  var series = [];

  // Green: deviation within [-1, 0) — slightly below standard, acceptable
  if (greenPts.length) {
    series.push({
      name: '偏低 / Low',
      type: 'scatter',
      data: greenPts.map(function(p) { return [p.date, p.cycle]; }),
      symbolSize: 8,
      itemStyle: { color: '#27AE60' }
    });
  }

  // Orange: deviation within [0, +3] — above standard, warning
  if (orangePts.length) {
    series.push({
      name: '偏高 / High',
      type: 'scatter',
      data: orangePts.map(function(p) { return [p.date, p.cycle]; }),
      symbolSize: 8,
      itemStyle: { color: '#F39C12' }
    });
  }

  // Red: deviation > +3 or < -1 — anomaly
  if (redPts.length) {
    series.push({
      name: '异常 / Anomaly',
      type: 'scatter',
      data: redPts.map(function(p) { return [p.date, p.cycle]; }),
      symbolSize: 10,
      itemStyle: { color: '#E74C3C' }
    });
  }

  // Gray: no standard value available
  if (noStdPts.length) {
    series.push({
      name: '无标准值 / No Std',
      type: 'scatter',
      data: noStdPts.map(function(p) { return [p.date, p.cycle]; }),
      symbolSize: 8,
      itemStyle: { color: '#95A5A6' }
    });
  }

  // Reference lines (only if standard exists)
  if (std !== null && std !== undefined) {
    // Standard line
    series.push({
      name: '标准线 / Standard',
      type: 'line',
      data: [[dates[0], std], [dates[dates.length - 1], std]],
      symbol: 'none',
      lineStyle: { color: '#3498DB', type: 'dashed', dashOffset: 0, width: 2 },
      silent: true
    });
    // Upper limit
    series.push({
      name: '上限线 / Upper Limit',
      type: 'line',
      data: [[dates[0], std + 3], [dates[dates.length - 1], std + 3]],
      symbol: 'none',
      lineStyle: { color: '#E74C3C', type: [5, 5], width: 1.5 },
      silent: true
    });
    // Lower limit
    series.push({
      name: '下限线 / Lower Limit',
      type: 'line',
      data: [[dates[0], std - 1], [dates[dates.length - 1], std - 1]],
      symbol: 'none',
      lineStyle: { color: '#F39C12', type: [5, 5], width: 1.5 },
      silent: true
    });
  }

  var option = {
    grid: { left: 40, right: 8, top: 8, bottom: 24 },
    xAxis: {
      type: 'category',
      data: dates,
      axisLabel: { fontSize: 9, rotate: 45 },
      axisTick: { show: false },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      min: yMin,
      max: yMax,
      axisLabel: { fontSize: 9 },
      splitLine: { lineStyle: { color: '#eee', type: 'dashed' } }
    },
    series: series,
    tooltip: {
      trigger: 'item',
      formatter: function(params) {
        if (params.seriesType === 'line') return '';
        var d = params.data;
        var machineName = machine.name;
        var stdVal = machine.standard !== null ? machine.standard : '--';
        return '<b>' + machineName + '</b><br/>' +
               '日期: ' + d[0] + '<br/>' +
               '周期: ' + d[1] + 's<br/>' +
               '标准: ' + stdVal + 's';
      }
    }
  };

  chart.setOption(option);

  // Store chart instance for resize
  chart.dom = dom;
  $(dom).data('echart', chart);
}

function openDetail(machine) {
  // §4.5: Modal title format — "H1HTA755 周期详情 / Cycle Detail"
  $('#detailTitle').text(machine.name + ' 周期详情 / Cycle Detail');
  $('#detailModal').modal('show');

  // Delay chart init until modal is visible
  setTimeout(function() {
    var dom = document.getElementById('detailChart');
    var chart = echarts.init(dom);

    var greenPts  = machine.points.filter(function(p) { return p.status === 'green'; });
    var orangePts = machine.points.filter(function(p) { return p.status === 'orange'; });
    var redPts    = machine.points.filter(function(p) { return p.status === 'red'; });
    var noStdPts  = machine.points.filter(function(p) { return p.status === null; });
    var dates = machine.points.map(function(p) { return p.date; });
    var std = machine.standard;

    var series = [];

    if (greenPts.length) {
      series.push({
        name: '偏低 / Low',
        type: 'scatter',
        data: greenPts.map(function(p) { return [p.date, p.cycle, p.shift]; }),
        symbolSize: 10,
        itemStyle: { color: '#27AE60' }
      });
    }

    if (orangePts.length) {
      series.push({
        name: '偏高 / High',
        type: 'scatter',
        data: orangePts.map(function(p) { return [p.date, p.cycle, p.shift]; }),
        symbolSize: 10,
        itemStyle: { color: '#F39C12' }
      });
    }

    if (redPts.length) {
      series.push({
        name: '异常 / Anomaly',
        type: 'scatter',
        data: redPts.map(function(p) { return [p.date, p.cycle, p.shift]; }),
        symbolSize: 12,
        itemStyle: { color: '#E74C3C' }
      });
    }

    if (noStdPts.length) {
      series.push({
        name: '无标准值 / No Std',
        type: 'scatter',
        data: noStdPts.map(function(p) { return [p.date, p.cycle, p.shift]; }),
        symbolSize: 10,
        itemStyle: { color: '#95A5A6' }
      });
    }

    if (std !== null && std !== undefined) {
      series.push({
        name: '标准线 / Standard',
        type: 'line',
        data: [[dates[0], std], [dates[dates.length - 1], std]],
        symbol: 'none',
        lineStyle: { color: '#3498DB', type: 'dashed', width: 2 },
        silent: true,
        markLine: {}
      });
      series.push({
        name: '上限 / Upper Limit',
        type: 'line',
        data: [[dates[0], std + 3], [dates[dates.length - 1], std + 3]],
        symbol: 'none',
        lineStyle: { color: '#E74C3C', type: [5, 5], width: 1.5 },
        silent: true
      });
      series.push({
        name: '下限 / Lower Limit',
        type: 'line',
        data: [[dates[0], std - 1], [dates[dates.length - 1], std - 1]],
        symbol: 'none',
        lineStyle: { color: '#F39C12', type: [5, 5], width: 1.5 },
        silent: true
      });
    }

    var option = {
      grid: { left: 60, right: 30, top: 20, bottom: 60 },
      xAxis: {
        type: 'category',
        data: dates,
        axisLabel: { fontSize: 11, rotate: 45 },
        name: '日期 / Date',
        nameLocation: 'center',
        nameGap: 35
      },
      yAxis: {
        type: 'value',
        name: '周期(秒) / Cycle(s)',
        axisLabel: { fontSize: 11 },
        splitLine: { lineStyle: { color: '#eee', type: 'dashed' } }
      },
      series: series,
      tooltip: {
        trigger: 'item',
        formatter: function(params) {
          if (params.seriesType === 'line') return '';
          var d = params.data;
          return '<b>' + machine.name + '</b><br/>' +
                 '日期: ' + d[0] + '<br/>' +
                 '班别: ' + (d[2] || '--') + '<br/>' +
                 '平均周期: ' + d[1] + 's<br/>' +
                 '标准: ' + (machine.standard !== null ? machine.standard : '--') + 's';
        }
      },
      dataZoom: [
        { type: 'inside', xAxisIndex: 0 },
        { type: 'slider', xAxisIndex: 0, bottom: 10 }
      ]
    };

    chart.setOption(option);
    $(dom).data('echart', chart);

    // Resize handler
    $('#detailModal').off('shown.bs.modal').on('shown.bs.modal', function() {
      chart.resize();
    });
  }, 200);

  // Cleanup on modal hide
  $('#detailModal').off('hidden.bs.modal').on('hidden.bs.modal', function() {
    var dom = document.getElementById('detailChart');
    var chart = $(dom).data('echart');
    if (chart) {
      chart.dispose();
      $(dom).removeData('echart');
    }
  });
}

// Resize all charts on window resize
var resizeTimer;
$(window).on('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    $('.cell-chart').each(function() {
      var chart = $(this).data('echart');
      if (chart) chart.resize();
    });
  }, 200);
});
</script>
