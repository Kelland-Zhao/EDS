<script>
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

  $(document).ready(function () {
    const userName = sessionStorage.getItem('Name') || '';
    const userEmail = sessionStorage.getItem('Email') || '';
    let scUsers = [];
    let historyRecords = [];
    let editingReportId = '';

    $('#name').text(userName);

    const pad = n => String(n).padStart(2, '0');
    const formatLocalDate = date => `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);

    function showLoading(cn, en) {
      Swal.fire({
        title: swalTitle(cn, en),
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => Swal.showLoading()
      });
    }

    function showError(cn, en) {
      Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(cn, en) });
    }

    function showSuccess(cn, en) {
      Swal.fire({ icon: 'success', title: swalTitle('成功', 'Success'), html: swalHtml(cn, en), timer: 1500, showConfirmButton: false });
    }

    function parseResponse(raw) {
      return typeof raw === 'string' ? JSON.parse(raw) : raw;
    }

    function cardFor(type) {
      if (type === 'major') return $('#MajorCard');
      if (type === 'outstanding') return $('#OutstandingCard');
      return $('#CommunicationCard');
    }

    function updateCounts() {
      $('.issue-card').each(function () {
        $(this).find('.count-badge').text($(this).find('.item-row').length);
        $(this).find('.item-num').each(function (index) { $(this).text(index + 1); });
      });
    }

    function workshopChoice(name, selected) {
      return `<div class="workshop-choice" role="radiogroup" aria-label="车间 / Workshop">
        <input type="radio" id="${name}-tb1" name="${name}" value="TB1" ${selected === 'TB1' ? 'checked' : ''}><label for="${name}-tb1">TB1</label>
        <input type="radio" id="${name}-tb2" name="${name}" value="TB2" ${selected === 'TB2' ? 'checked' : ''}><label for="${name}-tb2">TB2</label>
      </div>`;
    }

    function ownerChoice(name, selectedOwners) {
      const selected = Array.isArray(selectedOwners) ? selectedOwners : [];
      return `<div class="owner-choice" role="group" aria-label="责任人 / Owners">${scUsers.map((user, index) => {
        const id = `${name}-owner-${index}`;
        return `<input type="checkbox" id="${id}" value="${$('<div>').text(user.name).html()}" ${selected.includes(user.name) ? 'checked' : ''}><label for="${id}">${$('<div>').text(user.name).html()}</label>`;
      }).join('')}</div>`;
    }

    function addIssueRow(type, data) {
      const item = data || {};
      const name = `${type}-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      const workshop = Object.prototype.hasOwnProperty.call(item, 'workshop') ? item.workshop : 'TB1';
      const row = $(`<div class="item-row" data-type="${type}">
        <span class="item-num"></span>
        ${workshopChoice(name, workshop)}
        <input class="form-control machine-no" placeholder="机台号 / Machine No." value="${$('<div>').text(item.machineNo || '').html()}">
        <textarea class="form-control description" rows="2" placeholder="问题描述 / Description">${$('<div>').text(item.description || '').html()}</textarea>
        <button type="button" class="delete-item" title="删除 / Delete">×</button>
      </div>`);
      cardFor(type).find('.item-list').append(row);
      updateCounts();
    }

    function addCommunicationRow(data) {
      const item = data || {};
      const name = `communication-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      const row = $(`<div class="item-row communication" data-type="communication">
        <span class="item-num"></span>
        <textarea class="form-control description" rows="2" placeholder="沟通事项 / Communication">${$('<div>').text(item.description || '').html()}</textarea>
        ${ownerChoice(name, item.owners || [])}
        <button type="button" class="delete-item" title="删除 / Delete">×</button>
      </div>`);
      $('#CommunicationCard .item-list').append(row);
      updateCounts();
    }

    function resetForm() {
      editingReportId = '';
      $('#ReportDate').val(formatLocalDate(today));
      $('#DataStartDate,#DataEndDate').val(formatLocalDate(yesterday));
      $('.item-list').empty();
      addIssueRow('major', {});
      addIssueRow('outstanding', {});
      addCommunicationRow({});
      $('#CancelEdit').addClass('d-none');
      $('#SaveReport').html('<i class="bi bi-save"></i> 保存 / Save');
      clearValidation();
    }

    function reloadTodayReport() {
      google.script.run
        .withSuccessHandler(raw => {
          const result = parseResponse(raw);
          if (!result.success || !result.todayReport) {
            resetForm();
            return;
          }
          populateForm(result.todayReport);
        })
        .withFailureHandler(() => resetForm())
        .getINJSDMInitData(userName, userEmail);
    }

    function populateForm(report) {
      editingReportId = report.reportId;
      $('#ReportDate').val(report.reportDate);
      $('#DataStartDate').val(report.dataStartDate);
      $('#DataEndDate').val(report.dataEndDate);
      $('.item-list').empty();
      (report.major.length ? report.major : [{}]).forEach(item => addIssueRow('major', item));
      (report.outstanding.length ? report.outstanding : [{}]).forEach(item => addIssueRow('outstanding', item));
      (report.communication.length ? report.communication : [{}]).forEach(item => addCommunicationRow(item));
      $('#CancelEdit').removeClass('d-none');
      $('#SaveReport').html('<i class="bi bi-save"></i> 更新 / Update');
      clearValidation();
    }

    function expectedWorkshop(machineNo) {
      const machine = String(machineNo || '').trim().toUpperCase();
      if (/^(E0|H1|V1|S1)/.test(machine)) return 'TB1';
      if (/^(H2|V2)/.test(machine)) return 'TB2';
      return '';
    }

    function clearValidation() {
      $('.invalid-field').removeClass('invalid-field');
      $('.invalid-choice').removeClass('invalid-choice');
      $('#ValidationSummary').removeClass('show').empty();
    }

    function collectAndValidate() {
      clearValidation();
      const errors = [];
      const payload = {
        reportId: editingReportId,
        reportDate: $('#ReportDate').val(),
        dataStartDate: $('#DataStartDate').val(),
        dataEndDate: $('#DataEndDate').val(),
        major: [],
        outstanding: [],
        communication: []
      };
      const mark = (element, message, choice) => {
        $(element).addClass(choice ? 'invalid-choice' : 'invalid-field');
        errors.push(message);
      };

      if (!payload.dataStartDate) mark('#DataStartDate', '请选择数据开始日期');
      if (!payload.dataEndDate) mark('#DataEndDate', '请选择数据结束日期');
      if (payload.dataStartDate && payload.dataEndDate && payload.dataStartDate > payload.dataEndDate) {
        mark('#DataStartDate', '数据开始日期不能晚于结束日期');
        $('#DataEndDate').addClass('invalid-field');
      }
      if (payload.dataEndDate && payload.reportDate && payload.dataEndDate > payload.reportDate) {
        mark('#DataEndDate', '数据日期不能晚于填报日期');
      }

      ['major', 'outstanding'].forEach(type => {
        const title = type === 'major' ? '大故障/大问题' : '今日遗留问题';
        cardFor(type).find('.item-row').each(function (index) {
          const workshop = $(this).find('.workshop-choice input:checked').val() || '';
          const machineNo = $(this).find('.machine-no').val().trim().toUpperCase();
          const description = $(this).find('.description').val().trim();
          if (!machineNo && !description) return;
          if (!workshop) mark($(this).find('.workshop-choice'), `${title}第 ${index + 1} 条请选择车间`, true);
          if (!machineNo) mark($(this).find('.machine-no'), `${title}第 ${index + 1} 条缺少机台号`);
          if (!description) mark($(this).find('.description'), `${title}第 ${index + 1} 条缺少问题描述`);
          const expected = expectedWorkshop(machineNo);
          if (expected && workshop && expected !== workshop) {
            mark($(this).find('.workshop-choice'), `${title}第 ${index + 1} 条机台号应属于 ${expected}`, true);
          }
          if (workshop && machineNo && description) payload[type].push({ workshop, machineNo, description });
        });
      });

      $('#CommunicationCard .item-row').each(function (index) {
        const description = $(this).find('.description').val().trim();
        const owners = $(this).find('.owner-choice input:checked').map(function () { return this.value; }).get();
        if (!description && !owners.length) return;
        if (!description) mark($(this).find('.description'), `沟通事项第 ${index + 1} 条缺少事项内容`);
        if (!owners.length) mark($(this).find('.owner-choice'), `沟通事项第 ${index + 1} 条请选择责任人`, true);
        if (description && owners.length) payload.communication.push({ description, owners });
      });

      if (!payload.major.length && !payload.outstanding.length && !payload.communication.length) {
        errors.push('请至少填写一条完整事项');
      }
      if (errors.length) {
        $('#ValidationSummary').addClass('show').html(`<strong>请检查以下内容 / Please check:</strong><br>${[...new Set(errors)].map(x => `• ${x}`).join('<br>')}`);
        document.getElementById('ValidationSummary').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return null;
      }
      return payload;
    }

    function parseBulk(text) {
      const parsed = [], invalid = [];
      String(text || '').split(/\r?\n/).map(x => x.trim()).filter(Boolean).forEach(line => {
        const match = line.match(/^([A-Za-z0-9_]+)(?:\s*[-:：]\s*|\s+)(.+)$/);
        if (!match) { invalid.push(line); return; }
        const machineNo = match[1].toUpperCase();
        parsed.push({ machineNo, description: match[2].trim(), workshop: expectedWorkshop(machineNo) });
      });
      return { parsed, invalid };
    }

    function dataDateText(report) {
      return report.dataStartDate === report.dataEndDate ? report.dataStartDate : `${report.dataStartDate} ～ ${report.dataEndDate}`;
    }

    function renderHistory(records) {
      const tbody = $('#HistoryTable tbody').empty();
      if (!records.length) {
        tbody.append('<tr><td colspan="6" class="text-muted py-4">没有符合条件的记录 / No matching records</td></tr>');
        return;
      }
      records.forEach(report => {
        tbody.append(`<tr>
          <td>${report.reportDate}</td><td>${dataDateText(report)}</td>
          <td>${report.major.length} 条</td><td>${report.outstanding.length} 条</td><td>${report.communication.length} 条</td>
          <td><div class="d-flex gap-1 flex-wrap justify-content-center">
            <button class="btn btn-outline-primary btn-sm view-report" data-id="${report.reportId}">查看<br><small>View</small></button>
            <button class="btn btn-primary btn-sm edit-report" data-id="${report.reportId}">编辑<br><small>Edit</small></button>
            <button class="btn btn-danger btn-sm delete-report" data-id="${report.reportId}">删除<br><small>Delete</small></button>
          </div></td>
        </tr>`);
      });
    }

    function renderDetail(report) {
      const issueList = items => items.length ? `<ol>${items.map(item => `<li><strong>${item.workshop} - ${item.machineNo}</strong> ${$('<div>').text(item.description).html()}</li>`).join('')}</ol>` : '<div class="text-muted">无 / None</div>';
      const communicationList = report.communication.length ? `<ol>${report.communication.map(item => `<li>${$('<div>').text(item.description).html()} <span class="text-muted">（责任人：${item.owners.join('、')}）</span></li>`).join('')}</ol>` : '<div class="text-muted">无 / None</div>';
      $('#DetailBody').html(`
        <div class="bg-light rounded p-2"><strong>填报日期：</strong>${report.reportDate}　<strong>数据日期：</strong>${dataDateText(report)}<br><small class="text-muted">最后修改：${report.updatedAt || '-'}</small></div>
        <div class="detail-block"><h6>大故障 / 大问题</h6>${issueList(report.major)}</div>
        <div class="detail-block"><h6>今日遗留问题</h6>${issueList(report.outstanding)}</div>
        <div class="detail-block"><h6>SDM / Team 沟通事项</h6>${communicationList}</div>`);
      bootstrap.Modal.getOrCreateInstance(document.getElementById('DetailModal')).show();
    }

    function loadHistory() {
      showLoading('加载历史记录中...', 'Loading History...');
      google.script.run
        .withSuccessHandler(raw => {
          Swal.close();
          const result = parseResponse(raw);
          if (!result.success) return showError(result.message || '加载失败', 'Failed to load history.');
          historyRecords = result.records || [];
          renderHistory(historyRecords);
        })
        .withFailureHandler(error => { Swal.close(); showError(error.message || String(error), 'Failed to load history.'); })
        .getINJSDMHistory($('#HistoryStartDate').val(), $('#HistoryEndDate').val(), userName, userEmail);
    }

    $(document).on('click', '.add-item', function () {
      const type = $(this).data('type');
      type === 'communication' ? addCommunicationRow({}) : addIssueRow(type, {});
    });
    $(document).on('click', '.delete-item', function () { $(this).closest('.item-row').remove(); updateCounts(); });
    $(document).on('click', '.show-bulk', function () { $(this).closest('.issue-card').find('.bulk-panel').addClass('open').find('textarea').focus(); });
    $(document).on('click', '.cancel-bulk', function () { $(this).closest('.bulk-panel').removeClass('open'); });
    $(document).on('click', '.import-bulk', function () {
      const panel = $(this).closest('.bulk-panel');
      const card = panel.closest('.issue-card');
      const type = card.attr('id') === 'MajorCard' ? 'major' : 'outstanding';
      const result = parseBulk(panel.find('textarea').val());
      if (!result.parsed.length) return showError('未识别到有效内容。', 'No valid entries were found.');
      const rows = card.find('.item-row');
      if (rows.length === 1 && !rows.find('.machine-no').val().trim() && !rows.find('.description').val().trim()) rows.remove();
      result.parsed.forEach(item => addIssueRow(type, item));
      panel.removeClass('open').find('textarea').val('');
      if (result.invalid.length) {
        Swal.fire({ icon:'warning', title:swalTitle('部分内容未识别','Some Lines Were Not Parsed'), html:swalHtml(`已生成 ${result.parsed.length} 条；未识别：${result.invalid.join('；')}`, `${result.parsed.length} records created. Please review unrecognized lines.`) });
      } else showSuccess(`已生成 ${result.parsed.length} 条记录。`, `${result.parsed.length} records created.`);
    });

    $('#SaveReport').on('click', function () {
      const payload = collectAndValidate();
      if (!payload) return showError('请根据页面红色提示修正数据。', 'Please correct the highlighted fields.');
      showLoading('保存中...', 'Saving...');
      google.script.run
        .withSuccessHandler(raw => {
          Swal.close();
          const result = parseResponse(raw);
          if (!result.success) return showError(result.message || '保存失败', 'Failed to save.');
          showSuccess(result.updated ? '记录已更新。' : '记录已保存。', result.updated ? 'Record updated.' : 'Record saved.');
          reloadTodayReport();
        })
        .withFailureHandler(error => { Swal.close(); showError(error.message || String(error), 'Failed to save.'); })
        .saveINJSDMReport(payload, userName, userEmail);
    });

    $('#CancelEdit').on('click', resetForm);
    $('#HistoryTab').on('shown.bs.tab', loadHistory);
    $('#SearchHistory').on('click', loadHistory);
    $(document).on('click', '.view-report', function () {
      const report = historyRecords.find(x => x.reportId === $(this).data('id'));
      if (report) renderDetail(report);
    });
    $(document).on('click', '.edit-report', function () {
      const report = historyRecords.find(x => x.reportId === $(this).data('id'));
      if (!report) return;
      populateForm(report);
      bootstrap.Tab.getOrCreateInstance(document.querySelector('[data-bs-target="#EntryPane"]')).show();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    $(document).on('click', '.delete-report', function () {
      const reportId = $(this).data('id');
      Swal.fire({
        icon:'warning', title:swalTitle('确认删除','Confirm Deletion'),
        html:swalHtml('删除后记录将不再显示，是否继续？','The record will be hidden after deletion. Continue?'),
        showCancelButton:true, confirmButtonText:'确认 / Confirm', cancelButtonText:'取消 / Cancel'
      }).then(result => {
        if (!result.isConfirmed) return;
        showLoading('删除中...', 'Deleting...');
        google.script.run
          .withSuccessHandler(raw => {
            Swal.close();
            const response = parseResponse(raw);
            if (!response.success) return showError(response.message || '删除失败', 'Failed to delete.');
            showSuccess('记录已删除。', 'Record deleted.');
            loadHistory();
          })
          .withFailureHandler(error => { Swal.close(); showError(error.message || String(error), 'Failed to delete.'); })
          .deleteINJSDMReport(reportId, userName, userEmail);
      });
    });

    showLoading('加载数据中...', 'Loading Data...');
    google.script.run
      .withSuccessHandler(raw => {
        Swal.close();
        const result = parseResponse(raw);
        if (!result.success) return showError(result.message || '加载失败', 'Failed to initialize.');
        if (!result.hasPermission) {
          $('#PermissionDenied').removeClass('d-none');
          return;
        }
        scUsers = result.scUsers || [];
        $('#AppContent').removeClass('d-none');
        resetForm();
        if (result.todayReport) populateForm(result.todayReport);
      })
      .withFailureHandler(error => { Swal.close(); showError(error.message || String(error), 'Failed to initialize.'); })
      .getINJSDMInitData(userName, userEmail);
  });
</script>
