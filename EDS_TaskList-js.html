<script>
// ============================================================
//  任务列表 JS / Task List JS  (V20260720 — 并行加载优化)
// ============================================================
const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

const PRIORITY_CLASS = { '高': 'badge bg-danger', '中': 'badge bg-warning text-dark', '低': 'badge bg-secondary' };
const STATUS_CLASS = { '未开始': 'status-pending', '进行中': 'status-ongoing', '等待中': 'status-waiting', '已完成': 'status-completed', '已取消': 'status-cancelled', '已超期': 'status-overdue' };

let taskTable = null;
let currentPermission = '';
let currentSapID = '';
let currentUserName = '';
let allTasksCache = [];
let select2DataAll = [];  // cache for resolveSelect2Id

// ============================================================
//  页面加载入口 — 3个服务端调用并行发起
// ============================================================
$(document).ready(function () {
  const name = sessionStorage.getItem('Name') || '';
  currentPermission = sessionStorage.getItem('EDSTaskPermission') || '';
  currentUserName = name;
  $('#name').text(name);

  // 用户权限徽章（先显示，权限结果回来后再更新）
  if (currentPermission) {
    updateUserBadge(currentPermission);
  }

  // 加载 toast
  Swal.fire({
    title: swalTitle('加载数据中...', 'Loading Data...'),
    html: swalHtml('正在获取任务列表，请稍候。', 'Fetching task list, please wait.'),
    allowOutsideClick: false,
    showConfirmButton: false,
    didOpen: function () { Swal.showLoading(); }
  });

  // ==========================================================
  //  并行发起 3 个服务端调用（同时进行，不等待彼此）
  // ==========================================================
  var permDone = false, usersDone = false, tasksDone = false;
  var usersData = [];

  function onAllReady() {
    if (!permDone || !usersDone || !tasksDone) return;
    Swal.close();
    finalInit(usersData);
  }

  // Call 1: 权限检查
  google.script.run
    .withSuccessHandler(function (result) {
      var perm = JSON.parse(result || '{}');
      currentSapID = perm.sapID || '';
      currentPermission = perm.permission || currentPermission;
      if (currentPermission) {
        sessionStorage.setItem('EDSTaskPermission', currentPermission);
        updateUserBadge(currentPermission);
      }
      permDone = true; onAllReady();
    })
    .withFailureHandler(function () { permDone = true; onAllReady(); })
    .checkEDSTaskPermission(name, '');

  // Call 2: 人员列表（Select2用）
  google.script.run
    .withSuccessHandler(function (result) {
      usersData = JSON.parse(result || '[]');
      usersDone = true; onAllReady();
    })
    .withFailureHandler(function () { usersDone = true; onAllReady(); })
    .loadTodayStaffForSelect(new Date().toISOString().split('T')[0]);

  // Call 3: 任务数据（合并接口，一次返回手动+PM任务）
  google.script.run
    .withSuccessHandler(function (result) {
      var res = JSON.parse(result || '{}');
      if (res.success && res.merged) {
        allTasksCache = res.merged;
      }
      tasksDone = true; onAllReady();
    })
    .withFailureHandler(function () { tasksDone = true; onAllReady(); })
    .loadAllTasksForList();

  // Back to dashboard (简单绑定，不依赖异步数据)
  $('#btnBackDashboard').on('click', function (e) {
    e.preventDefault();
    window.open(buildUrl('EDS_TodayDashboard'));
  });
});

// ============================================================
//  所有数据就绪后的初始化
// ============================================================
function finalInit(usersData) {
  // 1. Select2 初始化
  var select2Data = Array.isArray(usersData) ? usersData.map(function (u) { return { id: u.id, text: u.text }; }) : [];
  select2DataAll = select2Data;  // cache for resolveSelect2Id
  $('#taskOwner').select2({
    data: select2Data,
    placeholder: '选择负责人 / Select Owner',
    allowClear: true,
    width: '100%',
    dropdownParent: $('#taskDetailModal')
  });
  $('#taskCollaborators').select2({
    data: select2Data,
    placeholder: '选择协作人 / Select Collaborators',
    allowClear: true,
    width: '100%',
    multiple: true,
    closeOnSelect: false,
    dropdownParent: $('#taskDetailModal')
  });

  // 2. DataTable 初始化
  taskTable = $('#taskTable').DataTable({
    pageLength: 25,
    order: [[6, 'asc']],
    columns: [
      { data: 'taskID', width: '100px' },
      { data: 'priority', render: function (d) { return '<span class="' + (PRIORITY_CLASS[d] || '') + '" style="font-size:10px;">' + (d || '') + '</span>'; } },
      { data: 'status', render: function (d) { return '<span class="' + (STATUS_CLASS[d] || '') + '">' + (d || '') + '</span>'; } },
      { data: 'title' },
      { data: 'taskType', render: function (d, type, row) {
        if (d === '保养' && (row.createdBy === 'PM Module' || row.createdBy === 'PM Plan')) return '保养';
        if (d === '非常规保养') return '保养（非常规）';
        return d;
      }},
      { data: 'planStartDate' },
      { data: 'dueDate' },
      { data: null, render: function (d, type, row) { return (row.ownerNames && row.ownerNames.length > 0 ? row.ownerNames : row.owners || []).join(', '); } },
      { data: null, render: function (d, type, row) { return (row.collaboratorNames && row.collaboratorNames.length > 0 ? row.collaboratorNames : row.collaborators || []).join(', '); } },
      { data: null, orderable: false, width: '160px', render: function (d, type, row) {
        var btnStyle = 'font-size:0.7rem;width:70px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2;white-space:normal;';
        var html = '<div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;">';
        var isPM = row.taskType === '保养' && (row.createdBy === 'PM Module' || row.createdBy === 'PM Plan');
        html += '<button class="btn btn-sm btn-outline-primary edit-task-btn" data-tid="' + row.taskID + '" style="' + btnStyle + '"><i class="bi bi-eye"></i> 查看<br>View</button>';
        if (!isPM && row.status !== '已完成' && row.status !== '已取消') {
          if (currentPermission === 'admin' || currentPermission === 'supervisor' ||
              row.owners.indexOf(currentSapID) !== -1 || row.collaborators.indexOf(currentSapID) !== -1) {
            html += '<select class="form-select form-select-sm status-quick" data-tid="' + row.taskID + '" style="font-size:10px;width:70px;padding:2px;">';
            html += '<option value="">变更状态...</option>';
            html += '<option value="进行中">进行中</option>';
            html += '<option value="等待中">等待中</option>';
            html += '<option value="已完成">已完成</option>';
            if (currentPermission === 'admin' || currentPermission === 'supervisor') {
              html += '<option value="已取消">已取消</option>';
            }
            html += '</select>';
          }
        }
        html += '</div>';
        return html;
      }}
    ],
    language: {
      emptyTable: '暂无任务 / No tasks',
      search: '搜索:',
      lengthMenu: '每页 _MENU_ 条',
      info: '第 _START_ - _END_ 条，共 _TOTAL_ 条'
    }
  });

  // 3. 设置默认筛选：显示"进行中"
  $('.pf-btn[data-process]').removeClass('active');
  $('.pf-btn[data-process=""]').addClass('active');
  $('.pf-btn[data-status]').removeClass('active');
  $('.pf-btn[data-status="进行中"]').addClass('active');
  applyFiltersAndRender();

  // 4. 绑定所有交互事件
  bindEvents();

  // 5. URL参数：如果有 taskID，延迟打开详情
  var urlParams = new URLSearchParams(window.location.search);
  var taskIDParam = urlParams.get('taskID');
  if (taskIDParam) {
    setTimeout(function () { openTaskModal(taskIDParam); }, 500);
  }
}

// ============================================================
//  事件绑定（集中管理，避免重复绑定）
// ============================================================
function bindEvents() {
  // Process, Status & TaskType filter buttons
  $(document).on('click', '.pf-btn', function () {
    var $btn = $(this);
    var group;
    if ($btn.data('process') !== undefined) group = 'process';
    else if ($btn.data('status') !== undefined) group = 'status';
    else group = 'tasktype';
    $('.pf-btn[data-' + group + ']').removeClass('active');
    $btn.addClass('active');
    applyFiltersAndRender();
  });

  // Filter / Search
  $('#btnFilter').on('click', function () { applyFiltersAndRender(); });
  $('#filterSearch').on('keypress', function (e) { if (e.which === 13) applyFiltersAndRender(); });

  // New task
  $('#btnNewTask').on('click', function () { openTaskModal(); });

  // Save task
  $('#btnSaveTask').on('click', function () { saveTaskFromModal(); });

  // Complete task
  $('#btnCompleteTask').on('click', function () {
    var tid = $('#editTaskID').val();
    if (!tid) return;
    Swal.fire({
      title: swalTitle('确认', 'Confirm'),
      html: swalHtml('确认完成任务？', 'Confirm to complete this task?'),
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '确认 / Confirm',
      cancelButtonText: '取消 / Cancel'
    }).then(function (r) {
      if (!r.isConfirmed) return;
      showLoading();
      google.script.run
        .withSuccessHandler(function (res) {
          Swal.close();
          var r2 = JSON.parse(res || '{}');
          if (r2.success) {
            Swal.fire({ icon: 'success', title: swalTitle('成功', 'Success'), html: swalHtml(r2.message, ''), timer: 1500 });
            $('#taskDetailModal').modal('hide');
            reloadData(function () { applyFiltersAndRender(); });
          } else {
            Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(r2.message, '') });
          }
        })
        .closeTask(tid, currentSapID, currentUserName);
    });
  });

  // Cancel task
  $('#btnCancelTask').on('click', function () {
    var tid = $('#editTaskID').val();
    if (!tid) return;
    Swal.fire({
      title: swalTitle('警告', 'Warning'),
      html: swalHtml('确认取消此任务？此操作不可恢复。', 'Cancel this task? This cannot be undone.'),
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '确认取消 / Confirm Cancel',
      cancelButtonText: '返回 / Back'
    }).then(function (r) {
      if (!r.isConfirmed) return;
      showLoading();
      google.script.run
        .withSuccessHandler(function (res) {
          Swal.close();
          var r2 = JSON.parse(res || '{}');
          if (r2.success) {
            Swal.fire({ icon: 'success', title: swalTitle('成功', 'Success'), html: swalHtml(r2.message, ''), timer: 1500 });
            $('#taskDetailModal').modal('hide');
            reloadData(function () { applyFiltersAndRender(); });
          } else {
            Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(r2.message, '') });
          }
        })
        .cancelTask(tid, currentSapID, currentUserName);
    });
  });

  // Edit task button (delegated)
  $(document).on('click', '.edit-task-btn', function () {
    var tid = $(this).data('tid');
    openTaskModal(tid);
  });

  // Quick status change (delegated)
  $(document).on('change', '.status-quick', function () {
    var tid = $(this).data('tid');
    var newStatus = $(this).val();
    if (!newStatus) return;
    if (newStatus === '已完成' || newStatus === '已取消') {
      var action = newStatus === '已完成' ? '完成' : '取消';
      Swal.fire({
        title: swalTitle('确认', 'Confirm'),
        html: swalHtml('确认' + action + '此任务？', 'Confirm to ' + (newStatus === '已完成' ? 'complete' : 'cancel') + '?'),
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '确认 / Confirm',
        cancelButtonText: '取消 / Cancel'
      }).then(function (r) {
        if (!r.isConfirmed) { applyFiltersAndRender(); return; }
        doUpdateStatus(tid, newStatus);
      });
    } else {
      doUpdateStatus(tid, newStatus);
    }
  });
}

// ============================================================
//  工具函数
// ============================================================
function updateUserBadge(permission) {
  var labels = { 'admin': '管理员 / Admin', 'supervisor': '主管 / Supervisor', 'employee': '员工 / Employee' };
  var cls = permission === 'admin' ? 'bg-danger' : (permission === 'supervisor' ? 'bg-warning text-dark' : 'bg-secondary');
  $('#userLevelBadge').removeClass('bg-secondary bg-danger bg-warning').addClass(cls).text(labels[permission] || '');
}

function buildUrl(page) {
  var siWebPage = sessionStorage.getItem('siWebPage') || '';
  return siWebPage + '?v=' + page
    + '&ID=' + encodeURIComponent(sessionStorage.getItem('ID') || '')
    + '&Name=' + encodeURIComponent(currentUserName)
    + '&Process=' + encodeURIComponent(sessionStorage.getItem('Process') || '')
    + '&Workshop=' + encodeURIComponent(sessionStorage.getItem('Workshop') || '');
}

// Select2 option id format is "Name|SAPID" — resolve bare SAP ID back to that format
function resolveSelect2Id(sapID) {
  if (!sapID) return null;
  // Try exact match first
  for (var i = 0; i < select2DataAll.length; i++) {
    var optId = select2DataAll[i].id;
    if (optId === sapID) return sapID;
    if (optId.indexOf('|' + sapID) !== -1) return optId;
    // Also check if the id IS the sapID (backward-compat)
    var pipeIdx = optId.indexOf('|');
    if (pipeIdx > 0 && optId.substring(pipeIdx + 1) === sapID) return optId;
  }
  // Fallback: return sapID as-is (may still match if Select2 data uses bare IDs)
  return sapID;
}

function showLoading() {
  Swal.fire({
    title: swalTitle('处理中...', 'Processing...'),
    html: swalHtml('请稍候。', 'Please wait.'),
    allowOutsideClick: false,
    showConfirmButton: false,
    didOpen: function () { Swal.showLoading(); }
  });
}

// 刷新数据 — 使用合并接口，传 forceRefresh=true 跳过缓存
function reloadData(callback) {
  google.script.run
    .withSuccessHandler(function (result) {
      var res = JSON.parse(result || '{}');
      if (res.success && res.merged) {
        allTasksCache = res.merged;
      }
      if (callback) callback();
    })
    .withFailureHandler(function () { if (callback) callback(); })
    .loadAllTasksForList(true);
}

// 筛选 + 渲染
function applyFiltersAndRender() {
  var process = $('.pf-btn.active[data-process]').data('process') || undefined;
  var status = $('.pf-btn.active[data-status]').data('status') || undefined;
  var tasktype = $('.pf-btn.active[data-tasktype]').data('tasktype') || undefined;
  var search = $('#filterSearch').val().trim().toLowerCase();
  var filtered = allTasksCache;
  if (status) {
    filtered = filtered.filter(function (t) { return t.status === status; });
  }
  if (process) {
    filtered = filtered.filter(function (t) {
      var pc = (t.process || '').toUpperCase();
      if (process === 'INJ') return pc === 'INJ' || pc === 'IM';
      return pc === process;
    });
  }
  if (tasktype) {
    filtered = filtered.filter(function (t) { return t.taskType === tasktype; });
  }
  if (search) {
    filtered = filtered.filter(function (t) {
      return (t.title || '').toLowerCase().indexOf(search) >= 0
        || (t.description || '').toLowerCase().indexOf(search) >= 0;
    });
  }
  taskTable.clear().rows.add(filtered).draw();
}

// ============================================================
//  任务模态框
// ============================================================
function openTaskModal(taskID) {
  if (taskID) {
    showLoading();
    google.script.run
      .withSuccessHandler(function (result) {
        Swal.close();
        var res = JSON.parse(result || '{}');
        var tasks = (res.success && res.data) ? res.data : [];
        var task = tasks.find(function (t) { return t.taskID === taskID; });
        if (task) fillTaskForm(task);
        else Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml('任务未找到', 'Task not found') });
      })
      .loadTasks(JSON.stringify({}));
  } else {
    $('#taskDetailTitle').text('新建任务 / New Task');
    $('#editTaskID').val('');
    $('#taskTitle').val('').prop('readonly', false);
    $('#taskDescription').val('').prop('readonly', false);
    $('#taskType').val('非常规保养').prop('disabled', false);
    $('#taskPriority').val('中').prop('disabled', false);
    $('#taskStatus').val('未开始').prop('disabled', false);
    $('#taskPlanStart').val(new Date().toISOString().split('T')[0]).prop('readonly', false);
    $('#taskDueDate').val('').prop('readonly', false);
    $('#taskRemark').val('').prop('readonly', false);
    $('#taskOwner').val(null).trigger('change').prop('disabled', false);
    $('#taskCollaborators').val(null).trigger('change').prop('disabled', false);
    $('#btnSaveTask').show();
    $('#btnCompleteTask').hide();
    $('#btnCancelTask').hide();
    $('#taskLogsContent').html('新任务，暂无日志 / New task, no logs yet');
    $('#taskDetailModal').modal('show');
  }
}

function fillTaskForm(task) {
  var isPM = task.taskType === '保养' && (task.createdBy === 'PM Module' || task.createdBy === 'PM Plan');
  var isAdmin = currentPermission === 'admin';
  var isSupervisor = currentPermission === 'supervisor';
  var isOwner = task.owners.indexOf(currentSapID) !== -1;
  var isCollab = task.collaborators.indexOf(currentSapID) !== -1;
  var canEdit = !isPM && (isAdmin || isSupervisor || isOwner || (task.status !== '已完成' && task.status !== '已取消' && isCollab));
  var isCompleted = task.status === '已完成' || task.status === '已取消';

  $('#taskDetailTitle').text(canEdit ? '编辑任务 / Edit Task' : '任务详情 / Task Detail');
  $('#editTaskID').val(task.taskID);
  $('#taskTitle').val(task.title).prop('readonly', !canEdit);
  $('#taskDescription').val(task.description).prop('readonly', !canEdit);
  $('#taskType').val(task.taskType).prop('disabled', !canEdit);
  $('#taskPriority').val(task.priority).prop('disabled', !canEdit);
  $('#taskStatus').val(task.status).prop('disabled', !canEdit && !isAdmin && !isSupervisor);
  $('#taskPlanStart').val(task.planStartDate).prop('readonly', !canEdit);
  $('#taskDueDate').val(task.dueDate).prop('readonly', !canEdit);
  $('#taskRemark').val(task.remark).prop('readonly', !canEdit);

  if (task.owners && task.owners.length > 0) {
    var ownerId = resolveSelect2Id(task.owners[0]);
    if (ownerId) $('#taskOwner').val(ownerId).trigger('change');
    else $('#taskOwner').val(null).trigger('change');
  } else {
    $('#taskOwner').val(null).trigger('change');
  }
  $('#taskOwner').prop('disabled', !canEdit && !isAdmin && !isSupervisor);
  if (task.collaborators && task.collaborators.length > 0) {
    var collabIds = task.collaborators.map(function (sid) { return resolveSelect2Id(sid); }).filter(Boolean);
    if (collabIds.length > 0) $('#taskCollaborators').val(collabIds).trigger('change');
    else $('#taskCollaborators').val(null).trigger('change');
  } else {
    $('#taskCollaborators').val(null).trigger('change');
  }
  $('#taskCollaborators').prop('disabled', !canEdit && !isAdmin && !isSupervisor);

  $('#btnSaveTask').toggle(canEdit && !isCompleted);
  $('#btnCompleteTask').toggle((isAdmin || isSupervisor || isOwner) && !isCompleted);
  $('#btnCancelTask').toggle((isAdmin || isSupervisor) && !isCompleted);

  // Load task logs
  google.script.run
    .withSuccessHandler(function (result) {
      var logs = JSON.parse(result || '[]');
      if (Array.isArray(logs) && logs.length > 0) {
        var html = '<div style="font-size:11px;">';
        logs.forEach(function (l) {
          html += '<div style="padding:4px 0;border-bottom:1px solid #eee;">'
            + '<strong>' + (l.action || '') + '</strong> '
            + '<span style="color:#888;">' + (l.operatorName || '') + '</span> '
            + '<span style="color:#adb5bd;">' + (l.createdAt || '') + '</span>'
            + '</div>';
        });
        html += '</div>';
        $('#taskLogsContent').html(html);
      } else {
        $('#taskLogsContent').html('暂无操作记录 / No operation logs');
      }
    })
    .loadTaskLogs('Task', task.taskID);

  $('#taskDetailModal').modal('show');
}

function saveTaskFromModal() {
  var tid = $('#editTaskID').val();
  var title = $('#taskTitle').val().trim();
  if (!title) {
    Swal.fire({ icon: 'warning', title: swalTitle('提示', 'Info'), html: swalHtml('请输入任务标题', 'Please enter task title') });
    return;
  }
  var taskData = {
    taskID: tid,
    title: title,
    description: $('#taskDescription').val().trim(),
    taskType: $('#taskType').val(),
    priority: $('#taskPriority').val(),
    process: $('#taskProcess').val(),
    planStartDate: $('#taskPlanStart').val(),
    dueDate: $('#taskDueDate').val(),
    remark: $('#taskRemark').val().trim()
  };
  var newStatus = $('#taskStatus').val();

  // Collect members (owner + collaborators) — used by both create and update
  var ownerVal = $('#taskOwner').val();
  var collabVals = $('#taskCollaborators').val() || [];
  var members = [];
  if (ownerVal) members.push({ sapID: ownerVal, memberRole: 'owner' });
  collabVals.forEach(function (v) { members.push({ sapID: v, memberRole: 'collaborator' }); });

  showLoading();

  if (tid) {
    google.script.run
      .withSuccessHandler(function (res) {
        var r = JSON.parse(res || '{}');
        if (r.success) {
          updateStatusIfNeeded(tid, newStatus);
        } else {
          Swal.close();
          Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(r.message, '') });
        }
      })
      .updateTask(JSON.stringify(taskData), JSON.stringify(members), currentSapID, currentUserName);
  } else {
    taskData.status = newStatus;

    google.script.run
      .withSuccessHandler(function (res) {
        Swal.close();
        var r = JSON.parse(res || '{}');
        if (r.success) {
          Swal.fire({ icon: 'success', title: swalTitle('成功', 'Success'), html: swalHtml(r.message, ''), timer: 1500 });
          $('#taskDetailModal').modal('hide');
          reloadData(function () { applyFiltersAndRender(); });
        } else {
          Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(r.message, '') });
        }
      })
      .withFailureHandler(function (error) {
        Swal.close();
        Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml('网络错误: ' + error.message, 'Network error: ' + error.message) });
      })
      .createTask(JSON.stringify(taskData), JSON.stringify(members), currentSapID, currentUserName);
  }
}

function updateStatusIfNeeded(taskID, newStatus) {
  google.script.run
    .withSuccessHandler(function (res) {
      Swal.close();
      var r = JSON.parse(res || '{}');
      if (r.success) {
        Swal.fire({ icon: 'success', title: swalTitle('成功', 'Success'), html: swalHtml(r.message, ''), timer: 1500 });
        $('#taskDetailModal').modal('hide');
        reloadData(function () { applyFiltersAndRender(); });
      } else {
        Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(r.message, '') });
      }
    })
    .updateTaskStatus(taskID, newStatus, currentSapID, currentUserName);
}

function doUpdateStatus(taskID, newStatus) {
  showLoading();
  google.script.run
    .withSuccessHandler(function (res) {
      Swal.close();
      var r = JSON.parse(res || '{}');
      if (r.success) {
        Swal.fire({ icon: 'success', title: swalTitle('成功', 'Success'), html: swalHtml(r.message, ''), timer: 1500 });
        reloadData(function () { applyFiltersAndRender(); });
      } else {
        Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(r.message, '') });
      }
    })
    .updateTaskStatus(taskID, newStatus, currentSapID, currentUserName);
}
</script>
