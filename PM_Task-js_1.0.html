<script>
  let global_Name = sessionStorage.getItem('Name');
  let global_Process = sessionStorage.getItem('Process');
  let global_ID = sessionStorage.getItem('ID');
  let global_Workshop = sessionStorage.getItem('Workshop');
  let global_siWebPage = sessionStorage.getItem('siWebPage');
  let global_data = sessionStorage.getItem("data");
  let global_UserID = [];
  let global_workingorder;
  let table;
  let table_tasklist;
  let table_TempTask;
  let global_PM_Status = sessionStorage.getItem("PM_Stauts");
  let PM_Workorder_Database = []; // PM工单数据库（从后端异步获取）

  // PM Planner确认逻辑函数（全局作用域）
  function triggerPmPlannerConfirmation() {
    Swal.fire({
      title: 'PM Planner 确认',
      html: `
        <div class="mb-2">
          <label>工号：</label>
          <input type="text" id="plannerCode" class="swal2-input" placeholder="请输入工号" autocomplete="off">
        </div>
        <div class="mb-2">
          <label>姓名：</label>
          <input type="text" id="plannerName" class="swal2-input" placeholder="自动显示" readonly>
        </div>
        <div class="mb-2">
          <label>密码：</label>
          <input type="password" id="plannerPwd" class="swal2-input" placeholder="请输入密码">
        </div>
      `,
      focusConfirm: false,
      showCancelButton: true,
      confirmButtonText: '确认',
      cancelButtonText: '取消',
      preConfirm: () => {
        const code = document.getElementById('plannerCode').value.trim();
        const name = document.getElementById('plannerName').value.trim();
        const pwd = document.getElementById('plannerPwd').value.trim();

        if (!code || !name || !pwd) {
          Swal.showValidationMessage('请完整填写工号、姓名和密码');
          return false;
        }

        // 查找用户并验证密码
        const user = global_UserID.find(u => u.WorkingCode === code);
        if (!user) {
          Swal.showValidationMessage('用户不存在');
          return false;
        }
        if (user.Name !== name) {
          Swal.showValidationMessage('用户信息不匹配');
          return false;
        }
        if (user.Password !== pwd) {
          Swal.showValidationMessage('密码错误，请重新输入');
          return false;
        }
        return { code, name, pwd };
      },
      didOpen: () => {
        const codeInput = document.getElementById('plannerCode');
        const nameInput = document.getElementById('plannerName');
        codeInput.addEventListener('input', function () {
          let code = this.value.trim();
          let user = global_UserID.find((r) => r.WorkingCode === code);
          if (user) {
            nameInput.value = user.Name;
          } else {
            nameInput.value = "用户不存在";
          }
        });
      }
    }).then((result) => {
      if (result.isConfirmed) {
        // 保存确认人信息用于后续提交
        const confirmUser = `${result.value.code}/${result.value.name}`;

        // 如果确认，继续执行原有逻辑
        let PM_Stauts = $("#PmStatus").val();
        if (!PM_Stauts.includes('Ongoing')) {
          let message = "保养未开始";
          alert(message);
          return false;
        }

        // 在PM Planner验证后检查未完成任务
        let uncheckedCount = 0;
        let uncheckedRows = [];

        table_tasklist.rows().every(function (rowIdx) {
          let row = this.node();
          let rowData = this.data();
          let taskStatusCheckbox = $(row).find('.form-check-input').prop('checked');

          if (!taskStatusCheckbox) {
            uncheckedCount++;
            uncheckedRows.push({
              rowIndex: rowIdx + 1,
              taskDescription: rowData['Task Description'] || '未知任务'
            });
          }
        });

        // 如果有未选中的复选框，要求输入原因和措施
        if (uncheckedCount > 0) {
          let uncheckedDetails = uncheckedRows.map(item =>
            `第${item.rowIndex}行：${item.taskDescription}`
          ).join('\n');

          Swal.fire({
            title: '任务未完成说明',
            html: `
              <div style="text-align: left;">
                <p>检测到 <strong>${uncheckedCount}</strong> 个任务未完成：</p>
                <div style="max-height: 150px; overflow-y: auto; background-color: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 12px; margin-bottom: 15px;">
                  <pre style="margin: 0; white-space: pre-wrap;">${uncheckedDetails}</pre>
                </div>
                <div class="mb-3">
                  <label for="incompleteReason" class="form-label">任务未完成的原因：</label>
                  <textarea id="incompleteReason" class="form-control" rows="3" placeholder="请详细说明任务未完成的原因..."></textarea>
                </div>
                <div class="mb-3">
                  <label for="nextSteps" class="form-label">下一步措施：</label>
                  <textarea id="nextSteps" class="form-control" rows="3" placeholder="请说明后续的处理措施..."></textarea>
                </div>
              </div>
            `,
            showCancelButton: true,
            confirmButtonText: '确认并继续',
            cancelButtonText: '取消',
            preConfirm: () => {
              const reason = document.getElementById('incompleteReason').value.trim();
              const steps = document.getElementById('nextSteps').value.trim();

              if (!reason || !steps) {
                Swal.showValidationMessage('请完整填写任务未完成的原因和下一步措施');
                return false;
              }

              return { reason, steps };
            }
          }).then((inputResult) => {
            if (inputResult.isConfirmed) {
              // 保存用户输入的原因和措施，然后继续提交流程
              const incompleteTaskInfo = {
                reason: inputResult.value.reason,
                steps: inputResult.value.steps
              };

              // 继续执行提交流程，并传递未完成任务信息
              executeSubmissionProcess(confirmUser, incompleteTaskInfo);
            }
          });
        } else {
          // 所有任务都已完成，直接执行提交流程
          executeSubmissionProcess(confirmUser, null);
        }
      }
    });
  }

  // 执行提交流程的函数（全局作用域）
  function executeSubmissionProcess(confirmUser, incompleteTaskInfo) {
    Swal.fire({
      title: "确认提交？",
      text: "一旦提交将无法修改",
      icon: "question",
      showCancelButton: true,
      confirmButtonText: "确认",
      cancelButtonText: "取消"
    }).then(async (result) => {
      if (result.isConfirmed) {
        try {
          let status = $("#PmStatus").val();
          let currentDate = new Date();
          let year = currentDate.getFullYear();
          let month = currentDate.getMonth() + 1;
          let day = currentDate.getDate();
          month = month < 10 ? '0' + month : month;
          day = day < 10 ? '0' + day : day;
          let formattedDate = year + "-" + month + "-" + day;

          let hours = currentDate.getHours();
          let minutes = currentDate.getMinutes();
          let seconds = currentDate.getSeconds();
          hours = hours < 10 ? '0' + hours : hours;
          minutes = minutes < 10 ? '0' + minutes : minutes;
          seconds = seconds < 10 ? '0' + seconds : seconds;
          let formattedTime = hours + ':' + minutes + ':' + seconds;

          $("#PmStatus").val("已完成");
          $("#PmEndDate").val(formattedDate);
          $("#PmEndTime").val(formattedTime);
          $('#PmEnd').prop('disabled', true);
          $('#PmStatus').css({
            'background-color': '#3CB371',
            'color': 'white',
            'font-weight': 'bold'
          });

          // ====== 构造表单数据（与测试按钮一致） ======
          let data = {};
          let task = [];
          let uncheckedTasks = [];
          let uncheckedCount = 0;
          let nonEmptyNotes = [];
          let nonEmptyNotesCount = 0;
          let Count_of_image = 0;
          let images = [];
          let promises = [];

          table_tasklist.rows().every(function (rowIdx) {
            let obj = {};
            let row = this.node();
            let rowData = this.data();
            let taskStatusCheckbox = $(row).find('.form-check-input').prop('checked');
            let valueAndNote = $(row).find('input[type="text"]').val();
            let photoInput = $(row).find('.photo-input').get(0);
            let file = photoInput.files[0];
            let image = '无图片';

            // 【图片上传相关】如有图片，转Base64并存入images数组，后续上传（只保留一处，避免重复）
            if (file != undefined) {
              Count_of_image++;
              image = "见文件夹";
              // 仅在内存中临时存储 imageContent 字段用于预览和上传
              let lastIndex = task.length;
              let promise = convertImageToBase64(file).then(base64Image => {
                let obj = {
                  imageName: $("#PmNo").val() + '_' + rowData['Task No'],
                  mimeType: file.type,
                  base64Image: base64Image
                }
                images.push(obj);
                if (task[lastIndex]) {
                  task[lastIndex].imageContent = base64Image;
                }
              })
              promises.push(promise)
            }

            // 构建任务数据时，不包含 imageContent 字段，只存图片标记或文件名
            let taskData = {
              ...rowData,
              taskStatus: taskStatusCheckbox,
              valueAndNote: valueAndNote,
              image: image
            };

            if (!taskStatusCheckbox) {
              uncheckedTasks.push({ ...taskData });
              uncheckedCount++;
            }
            if (valueAndNote.trim() !== "") {
              nonEmptyNotes.push({ ...taskData });
              nonEmptyNotesCount++;
            }
            task.push(taskData);
          })
          // 提交到表格时，移除所有 imageContent 字段，确保任务明细无base64内容
          task = task.map(t => { let { imageContent, ...rest } = t; return rest; });
          uncheckedTasks = uncheckedTasks.map(t => { let { imageContent, ...rest } = t; return rest; });
          nonEmptyNotes = nonEmptyNotes.map(t => { let { imageContent, ...rest } = t; return rest; });

          let totalRows = table_tasklist.rows().count();
          data["PM No."] = $("#PmNo").val();
          data["PmStatus"] = $("#PmStatus").val();
          data["Notification"] = "";
          data["PM People"] = "";
          data["Plan PM Date"] = "";
          data["SatrtDate"] = "";
          data["StartTime"] = "";
          data["EndDate"] = formattedDate;
          data["EndTime"] = formattedTime;
          data["Workcenter"] = "";
          data["任务明细"] = JSON.stringify(task);
          data["TaskCount"] = totalRows;
          data["UncheckedTasks"] = JSON.stringify(uncheckedTasks);
          data["UncheckedCount"] = uncheckedCount;
          data["NonEmptyNotesTasks"] = JSON.stringify(nonEmptyNotes);
          data["NonEmptyNotesCount"] = nonEmptyNotesCount;
          data["SheetName"] = global_data["工序"] + "-" + global_data["车间"];
          data["Status"] = "End";


          PdMData();

          let finalConfirmUser = confirmUser;
          if (incompleteTaskInfo) {
            finalConfirmUser = `${confirmUser}|原因:${incompleteTaskInfo.reason}|措施:${incompleteTaskInfo.steps}`;
          }
          let data_Submit_Result = await dataSubmit(data, finalConfirmUser);
          let Count_Image_Upload = 0;

          // ====== 再上传图片 ======
          if (Count_of_image > 0) {
            let PM_NO = $("#PmNo").val();
            let ID = await check_Image_Content(PM_NO);
            let folderId = '';
            if (ID == null) {
              folderId = await createFolder();
            } else {
              folderId = ID;
            }
            await Promise.all(promises);
            let uploadPromises = images.map(r => {
              return new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(function (result) {
                  Count_Image_Upload++;
                  resolve(result);
                }).withFailureHandler(function (error) {
                  reject(error);
                }).uploadBase64ImageToDrive(r.base64Image, folderId, r.imageName, r.mimeType);
              });
            });
            try {
              await Promise.all(uploadPromises);
              let image_Submit_Result = (Count_of_image == Count_Image_Upload);
              if (data_Submit_Result == '提交成功' && image_Submit_Result) {
                Swal.fire({
                  title: '提交成功',
                  text: '数据和图片均已成功上传！',
                  icon: 'success',
                  confirmButtonText: '确定'
                });
              } else if (data_Submit_Result != '提交成功' && image_Submit_Result) {
                Swal.fire({
                  title: '部分成功',
                  text: '数据上传失败，但图片上传成功。',
                  icon: 'warning',
                  confirmButtonText: '确定'
                });
              } else if (data_Submit_Result == '提交成功' && !image_Submit_Result) {
                Swal.fire({
                  title: '部分成功',
                  text: '数据上传成功，但图片上传失败。',
                  icon: 'warning',
                  confirmButtonText: '确定'
                });
              } else {
                Swal.fire({
                  title: '上传失败',
                  text: '数据和图片均上传失败，请重试。',
                  icon: 'error',
                  confirmButtonText: '确定'
                });
              }
            } catch (e) {
              Swal.fire({
                title: '上传失败',
                text: '图片上传过程中发生错误，请重试。',
                icon: 'error',
                confirmButtonText: '确定'
              });
            }
          } else {
            if (data_Submit_Result == '提交成功') {
              Swal.fire({
                title: '提交成功',
                text: '数据已成功上传。',
                icon: 'success',
                confirmButtonText: '确定'
              });
            } else {
              Swal.fire({
                title: '上传失败',
                text: '数据上传失败，请重试。',
                icon: 'error',
                confirmButtonText: '确定'
              });
            }
          }

          // 存储PM Planner确认信息到sessionStorage（仅在提交成功时）
          if (data_Submit_Result == '提交成功') {
            // 格式化为标准时间格式 "2025-01-20 19:38:02"
            const confirmationTime = `${formattedDate} ${formattedTime}`;
            const pmPlannerConfirmation = {
              confirmedBy: finalConfirmUser,
              confirmationTime: confirmationTime,
              timestamp: new Date().toISOString()
            };

            // 如果有未完成任务信息，添加到确认信息中
            if (incompleteTaskInfo) {
              pmPlannerConfirmation.incompleteTaskReason = incompleteTaskInfo.reason;
              pmPlannerConfirmation.nextSteps = incompleteTaskInfo.steps;
            }

            sessionStorage.setItem('PM_Planner_Confirmation', JSON.stringify(pmPlannerConfirmation));
            console.log('PM Planner confirmation saved to sessionStorage:', pmPlannerConfirmation);

            // 保存完整的任务清单数据到sessionStorage
            const completeTaskList = [];
            table_tasklist.rows().every(function () {
              let row = this.node();
              let rowData = this.data();
              let taskStatusCheckbox = $(row).find('.form-check-input').prop('checked');
              let valueAndNote = $(row).find('input[type="text"]').val();

              // 创建完整的任务数据对象
              const completeTaskData = {
                ...rowData,
                taskStatus: taskStatusCheckbox,
                valueAndNote: valueAndNote,
                'Task Status': taskStatusCheckbox, // 兼容不同的字段名
                '数值记录&备注': valueAndNote,
                // 确保执行人员信息被正确包含
                '执行人员': rowData['执行人员'] || 'N/A'
              };

              completeTaskList.push(completeTaskData);
            });

            // 将任务清单保存到sessionStorage
            sessionStorage.setItem('PM_Task_Details', JSON.stringify(completeTaskList));
          }

          sessionStorage.setItem('PM_SerialNumber', $("#PmNo").val());

          if (global_data["设备类型1"] != 'UV') {
            window.open(sessionStorage.getItem("siWebPage")
              + "?v=PM_Production_Confirm"
            )
          }
        } catch (e) {
          Swal.fire('错误', '提交过程中发生异常，请联系管理员。', 'error');
        }
      }
    });
  }

  sessionStorage.setItem('siWebPage', global_siWebPage);
  sessionStorage.setItem("Name", global_Name);
  sessionStorage.setItem("Process", global_Process);
  sessionStorage.setItem("ID", global_ID);
  sessionStorage.setItem("Workshop", global_Workshop);
  sessionStorage.setItem("data", global_data);

  $(document).ready(function () {
    if (typeof $.fn.DataTable === 'undefined') {
      Swal.fire({
        icon: 'error',
        title: '插件加载失败',
        text: 'DataTables插件未正确加载，请刷新页面重试。',
        confirmButtonText: '确定'
      });
      return;
    }

    Initialization();

    let Equipment_No_in_EAM;

    google.script.run.withSuccessHandler((r) => {
      try {
        Equipment_No_in_EAM = JSON.parse(r);

        let data = global_data;

        // 获取 global_data 中的 AEM# 值
        let aemValue = data && data["AEM#"] ? data["AEM#"] : null;

        if (aemValue && Equipment_No_in_EAM && Array.isArray(Equipment_No_in_EAM)) {
          // 在数组中查找匹配的 Workcenter
          let matchedItem = Equipment_No_in_EAM.find(function (item) {
            return item.Workcenter === aemValue;
          });

          if (matchedItem && matchedItem.Equipment) {
            // 找到匹配项，获取 Equipment 值并显示在输入框中
            let Equipment = matchedItem.Equipment;

            $("#Equipment").val(Equipment);

          } else {
            // 未找到匹配项
            console.log('未找到匹配的 Workcenter:', aemValue);
            $("#Equipment").val("");
          }
        } else {
          console.log('数据未准备好 - aemValue:', aemValue, 'Equipment_No_in_EAM:', Equipment_No_in_EAM);
          $("#Equipment").val("");
        }
      } catch (error) {
        console.error('处理设备编号数据失败:', error);
        $("#Equipment").val("");
      }
    }).withFailureHandler(function (error) {
      console.error('获取设备编号失败:', error);
      $("#Equipment").val("");
    }).get_Equipment_No_in_EAM()

    // 获取PM工单数据
    google.script.run.withSuccessHandler(function (r) {
      try {
        PM_Workorder_Database = JSON.parse(r);
        
        // 检查是否为错误对象
        if (PM_Workorder_Database && PM_Workorder_Database.success === false) {
          console.error('获取工单数据失败:', PM_Workorder_Database.message);
          PM_Workorder_Database = [];
          return;
        }

        // 确保是数组
        if (!Array.isArray(PM_Workorder_Database)) {
          console.error('工单数据格式错误:', PM_Workorder_Database);
          PM_Workorder_Database = [];
          return;
        }

        console.log("PM Workorder Database 加载成功，共 " + PM_Workorder_Database.length + " 条记录");
      } catch (error) {
        console.error('解析工单数据失败:', error);
        PM_Workorder_Database = [];
      }
    }).withFailureHandler(function (error) {
      console.error('获取工单数据失败:', error);
      PM_Workorder_Database = [];
    }).get_PM_Workorder();


    google.script.run.withSuccessHandler(function (data) {
      global_UserID = data.map(function (row) {
        return {
          WorkingCode: row[0],  // 工号
          Name: row[1],         // 姓名
          Password: row[2]      // 密码
        };
      });
    }).getUseID();
    if (global_PM_Status == "Not Start") {


      if (!$('#PmStatus').val().includes('Ongoing')) {
        $('#AddTemTask').prop('disabled', true);
      }
      // 添加失败处理
      google.script.run
        .withSuccessHandler(function (data) {
          Tasklist(data);
        })
        .withFailureHandler(function (error) {
          console.error('后端调用失败:', error);
          Swal.fire({
            icon: 'error',
            title: '数据加载失败',
            text: '无法从服务器获取任务清单，错误信息：' + error.message,
            confirmButtonText: '确定'
          });
        })
        .get_Tasklist_new();

    } else if (global_PM_Status == "Ongoing") {
      let PM_Info = {
        process: global_data['工序'],
        workshop: global_data['车间'],
        Plan_SD: global_data['开始日期'],
        workcenter: global_data['AEM#']
      };

      google.script.run.withSuccessHandler((r) => {
        let dataFilter = JSON.parse(r[1]);
        let head = ["PM No.",
          "PmStatus",
          "Notification",
          "PM People",
          "Plan PM Date",
          "SatrtDate",
          "StartTime",
          "EndDate",
          "EndTime",
          "Workcenter",
          "任务明细",
          "总任务数量",
          "任务未完成明细",
          "任务未完成数量",
          "任务备注明细",
          "任务备注数量"]
        let obj = {};
        for (let i = 0; i < head.length; i++) { obj[head[i]] = dataFilter[0][i] };
        
        // 字段名映射：中文 -> 英文（兼容不同数据源）
        const fieldMapping = {
          '任务编号': 'Task No',
          '频率': 'Frecuency',
          '单元': 'Section',
          '模块': 'Function',
          '失效模式': 'Failure Mode',
          '任务类型': 'Task Type',
          '任务描述': 'Task Description',
          '状态': 'Line Status',
          '任务属性': 'Strategy',
          '工具': 'Tools & Equip',
          '是否完成': 'Task Status',
          '备注': 'Notes',
          '图片': 'Image'
        };
        
        // 转换字段名（如果存在中文字段名）
        let tasklist = JSON.parse(obj['任务明细']);
        tasklist = tasklist.map(item => {
          let newItem = {};
          for (let key in item) {
            let newKey = fieldMapping[key] || key; // 如果有映射就用映射，否则保持原样
            newItem[newKey] = item[key];
          }
          return newItem;
        });

        const isEditable = obj["PmStatus"].includes('进行中');
        const table_head = buildTableHead(isEditable);

        $('#PmNo').val(obj["PM No."]);
        $('#PmPeople').val(obj["PM People"]);
        $('#PmStartDate').val(obj["SatrtDate"]);
        $('#PmStartTime').val(obj["StartTime"]);

        if (obj["PmStatus"].includes('进行中')) {
          $('#PmStart').prop('disabled', true);
        } else {
          $('#PmStart').prop('disabled', false);
        }

        // showTable(table_head, tasklist) 之前，统一处理"执行人员"字段为数组
        tasklist.forEach(row => {
          if (row['执行人员']) {
            if (Array.isArray(row['执行人员'])) {
              // 已经是数组，无需处理
            } else if (typeof row['执行人员'] === 'string') {
              try {
                // 尝试解析为数组
                let arr = JSON.parse(row['执行人员']);
                if (Array.isArray(arr)) {
                  row['执行人员'] = arr;
                } else {
                  // 逗号分隔字符串
                  row['执行人员'] = row['执行人员'].split(',').map(s => s.trim());
                }
              } catch {
                // 逗号分隔字符串
                row['执行人员'] = row['执行人员'].split(',').map(s => s.trim());
              }
            } else {
              row['执行人员'] = [];
            }
          } else {
            row['执行人员'] = [];
          }
        });
        showTable(table_head, tasklist);
        Swal.close();
        Swal.fire({
          title: '加载成功',
          html: '<span style="font-size:14px;color:#6c757d;">LOADING SUCCESS</span>',
          icon: 'success'
        });
      }).getPMrecord(PM_Info);
    } else {
      return false
    }

    // --- 此处为主要修改：采用更稳健的事件委托方式 ---

  function dataFilter(data) {
    let Machine1 = global_data["设备类型1"];
    let Machine2 = global_data["设备类型2"];
    let Auto = global_data["自动化类型"];
    // 显示前5条原始数据的详细信息
    // if (data && data.length > 0) {
    //   console.log('前5条原始数据:');
    //   data.slice(0, 5).forEach((item, index) => {
    //     console.log(`第${index + 1}条:`, {
    //       Status: `"${item["Status"]}"`,
    //       Status类型: typeof item["Status"],
    //       Status长度: item["Status"] ? item["Status"].length : 0,
    //       MachineType: `"${item["MachineType"]}"`,
    //       MachineType类型: typeof item["MachineType"]
    //     });
    //   });

    //   // 显示所有出现的Status值
    //   const allStatuses = [...new Set(data.map(item => item["Status"]))];
    //   console.log('所有出现的Status值:', allStatuses);

    //   // 显示所有出现的MachineType值
    //   const allMachineTypes = [...new Set(data.map(item => item["MachineType"]))];
    //   console.log('所有出现的MachineType值:', allMachineTypes);
    // }

    // 先筛选出匹配机型的所有记录
    let machineMatchedData = data.filter(function (r, index) {
      const machineType = r["MachineType"];
      const machineMatch = (machineType == Machine1 || machineType == Machine2 || machineType == Auto);
      return machineMatch;
    });

    // 按状态分类
    let effectiveRecords = machineMatchedData.filter(r => r["Status"] == '生效/ Effective');
    let waitingRecords = machineMatchedData.filter(r => r["Status"] == '待发放/ Wait for Dissminater');
    let pendingRecords = machineMatchedData.filter(r => r["Status"] == '待审批/ Pending');

    // 返回分类后的结果
    return {
      effective: effectiveRecords,
      waiting: waitingRecords,
      pending: pendingRecords,
      allMatched: machineMatchedData
    };
  }

  // --- 此函数已重构 ---
  function DataProcess(data) {
    try {
      if (!data || (!data.effective && !data.waiting && !data.pending)) {
        const machineTypes = [global_data["设备类型1"], global_data["设备类型2"], global_data["自动化类型"]].filter(Boolean).join(', ');
        Swal.fire('加载失败', `未找到与设备 [${machineTypes}] 匹配的、状态为"生效"的标准任务清单。请检查后台数据。<br>No standard task list with "Effective" status found matching equipment [${machineTypes}]. Please check backend data.`, 'error');
        return;
      }

      // 按优先级处理状态
      if (data.effective && data.effective.length > 0) {
        // 有生效记录，正常处理
        processEffectiveRecords(data.effective);
      } else if (data.waiting && data.waiting.length > 0) {
        // 仅有待发放记录
        Swal.fire({
          title: '提示',
          html: `
            文件处于待发放状态<br>
            Document is waiting for distribution
          `,
          icon: 'warning'
        });
        return;
      } else if (data.pending && data.pending.length > 0) {
        // 仅有待审批记录
        Swal.fire({
          title: '提示',
          html: `
            该保养任务还未审批<br>
            This PM task is still pending approval
          `,
          icon: 'warning'
        });
        return;
      }
    } catch (error) {
      console.error('DataProcess函数发生错误:', error);
      Swal.fire({
        title: '错误',
        html: `
          数据处理发生错误<br>
          <span style="font-size:14px;color:#6c757d;">AN ERROR OCCURRED DURING DATA PROCESSING</span>
        `,
        icon: 'error'
      });
    }
  }

  function processEffectiveRecords(effectiveRecords) {
    try {
      let finalTaskList = [];
      effectiveRecords.forEach((machineTaskDefinition, index) => {
        try {
          if (!machineTaskDefinition['Tasklist']) {
            console.warn(`第${index + 1}条数据缺少Tasklist字段`);
            return;
          }

          const parsedTasks = JSON.parse(machineTaskDefinition['Tasklist']);
          if (Array.isArray(parsedTasks)) {
            finalTaskList = finalTaskList.concat(parsedTasks);
          } else {
            console.warn(`第${index + 1}条Tasklist解析后不是数组:`, parsedTasks);
          }
        } catch (e) {
          console.error("解析Tasklist失败:", e, "原始数据:", machineTaskDefinition['Tasklist']);
        }
      });

      // console.log('任务总数:', finalTaskList.length);

      if (finalTaskList.length === 0) {
        Swal.fire('加载失败', '标准任务清单为空或格式错误。<br>Standard task list is empty or format error.', 'error');
        return;
      }

      // 验证每个任务对象的结构
      const validTasks = finalTaskList.filter((task, index) => {
        if (!task || typeof task !== 'object') {
          console.warn(`第${index + 1}个任务不是有效对象:`, task);
          return false;
        }
        return true;
      });

      const table_head = buildTableHead(false); // 对于"未开始"的任务，表格总是不可编辑
      showTable(table_head, validTasks);
    } catch (error) {
      console.error('processEffectiveRecords函数发生错误:', error);
      Swal.fire({
        title: '错误',
        html: `
          有效记录处理发生错误<br>
          <span style="font-size:14px;color:#6c757d;">AN ERROR OCCURRED DURING EFFECTIVE RECORDS PROCESSING</span>
        `,
        icon: 'error'
      });
    }
  }

  // --- 新增的辅助函数，用于统一生成表头 ---
  function buildTableHead(isEditable) {
    let table_head = [];
    let desiredOrder = [
      "MachineType", "Task No", "Task Type", "Line Status", "Tools & Equip", "Resource",
      "Frecuency", "Section", "Function", "Failure Mode", "Strategy", "No Resources",
      "Skill Level", "Estimated Time", "Task Description", "执行人员", "Task Status",
      "数值记录&备注", "操作"
    ];

    desiredOrder.forEach((title) => {
      let colDef = { title: title, data: title, defaultContent: "" };

      if (title === '执行人员') {
        colDef.render = function (data, type, row) {
          // 兼容数组、JSON字符串、逗号分隔字符串
          if (Array.isArray(data)) {
            return data.join(' / ');
          }
          if (typeof data === 'string' && data.length > 0) {
            try {
              // 尝试解析为数组
              let arr = JSON.parse(data);
              if (Array.isArray(arr)) return arr.join(' / ');
              // 如果是逗号分隔的字符串
              return data.split(',').join(' / ');
            } catch {
              return data.split(',').join(' / ');
            }
          }
          return '';
        };
      }
      if (title === 'Task Status') {
        colDef.render = function (data, type, row) {
          const checked = data === true || row.taskStatus === true;
          return `<input class="form-check-input" type="checkbox" value="" style="border: 2px solid #696969; width: 24px; height: 24px; cursor: pointer;" ${checked ? 'checked' : ''} ${!isEditable ? 'disabled' : ''}>`;
        };
      }
      if (title === '数值记录&备注') {
        colDef.render = function (data, type, row) {
          const noteValue = data || row.valueAndNote || '';
          return `<input type="text" class="form-control text-center" value="${noteValue}" placeholder="输入数值" ${!isEditable ? 'readonly' : ''}>`;
        };
      }
      if (title === '操作') {
        colDef.render = function (data, type, row) {
          return `<button class="btn btn-info btn-sm text-center preview-btn">预览<br>PREVIEW</button>
                        <input type="file" accept="image/*" capture="camera" style="display: none;" class="photo-input">
                        <button class="btn btn-warning btn-sm text-center take-photo-btn" ${!isEditable ? 'disabled' : ''}>拍照<br>PHOTO</button>`;
        };
      }
      table_head.push(colDef);
    });
    return table_head;
  }

  // --- 此函数已简化 ---
  function showTable(head, content) {
    try {
      // 检查DOM元素是否存在
      if (!$("#table_tasklist").length) {
        console.error('错误：找不到table_tasklist元素');
        return;
      }

      // 安全地销毁现有表格
      if (table_tasklist && typeof table_tasklist.destroy === 'function') {
        try {
          table_tasklist.destroy();
          console.log('现有表格已销毁');
        } catch (e) {
          console.warn('销毁表格时出现警告:', e);
        }
      }

      // 检查内容数据是否有效
      if (!Array.isArray(content)) {
        console.error('错误：内容数据不是数组类型');
        return;
      }

      table_tasklist = $("#table_tasklist").DataTable({
        columns: head,
        columnDefs: [
          {
            targets: [0, 2, 3, 4, 9, 10, 11, 12, 13],
            visible: false
          },
          { "width": "5%", "targets": 1 },
          { "width": "5%", "targets": 5 },
          { "width": "5%", "targets": 6 },
          { "width": "20%", "targets": 14 },
          { "width": "15%", "targets": 16 },
          { "width": "10%", "targets": -1 }
        ],
        order: [
          [0, 'asc'],
          [1, 'asc']],
        pageLength: 100,
        // 添加错误处理
        "error": function (xhr, error, thrown) {
          console.error('DataTable错误:', error, thrown);
        }
      });

      $('#table_tasklist thead th').css({
        'background-color': '#E60012',
        'color': 'white'
      });

      // 安全地添加数据
      if (table_tasklist && typeof table_tasklist.clear === 'function') {
        table_tasklist.clear().draw();
        table_tasklist.rows.add(content).draw();
      }
    } catch (error) {
      console.error('showTable函数发生错误:', error);
      // 显示用户友好的错误信息
      Swal.fire({
        icon: 'error',
        title: '表格加载失败',
        text: '加载任务表格时发生错误，请刷新页面重试。',
        confirmButtonText: '确定'
      });
    }
  }

  function alert(message) {
    if (message == '确认提交') {
      Swal.fire({
        title: "确认提交？",
        text: "一旦提交将无法修改",
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "确认",
        cancelButtonText: "取消"
      }).then((result) => {
        if (result.isConfirmed) {
          return true
        } else {
          return false
        }
      })
      return true
    } else if (message == "提交成功") {
      Swal.close();
      Swal.fire({
        title: '保存成功',
        icon: 'success'
      });

    } else if (message == "提交中") {
      Swal.fire({
        title: '数据提交中',
        text: '数据提交中，请稍后...',
        icon: 'info',
        allowOutsideClick: false,
        showConfirmButton: false,
      });
    } else if (message !== '确认提交') {
      Swal.fire({
        icon: 'warning',
        title: '警告',
        text: message,
        confirmButtonText: '确定'
      }).then((result) => {
        if (result.isConfirmed) {
          return "警告"
        }
      })
    }
  }

  // 新增：计算周数的函数
  function getWeekNumber(date) {
    let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    let dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    let yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return `WK${Math.ceil((((d - yearStart) / 86400000) + 1)/7)}`;
  }

  // 新增：基于Logic类型判断是否超限
  function checkPdMLimit(logic, record, llLimit, hhLimit) {
    // 将字符串转换为数字
    let recordValue = parseFloat(record);
    let llValue = parseFloat(llLimit);
    let hhValue = parseFloat(hhLimit);

    // 如果无法转换为数字，返回false
    if (isNaN(recordValue)) {
      return false;
    }

    // 根据Logic类型进行判断
    switch(logic) {
      case 'HighAlarm_Max':
        // 高报警_最大值：记录值 > HH限制值
        return !isNaN(hhValue) && recordValue > hhValue;
      
      case 'HighAlarm_Min':
        // 高报警_最小值：记录值 > HH限制值
        return !isNaN(hhValue) && recordValue > hhValue;
      
      case 'HighAlarm_Average':
        // 高报警_平均值：记录值 > HH限制值
        return !isNaN(hhValue) && recordValue > hhValue;
      
      case 'HighAlarm_Slope':
        // 高报警_斜率：记录值 > HH限制值
        return !isNaN(hhValue) && recordValue > hhValue;
      
      case 'LowAlarm_Max':
        // 低报警_最大值：记录值 < LL限制值
        return !isNaN(llValue) && recordValue < llValue;
      
      case 'LowAlarm_Min':
        // 低报警_最小值：记录值 < LL限制值
        return !isNaN(llValue) && recordValue < llValue;
      
      case 'LowAlarm_Average':
        // 低报警_平均值：记录值 < LL限制值
        return !isNaN(llValue) && recordValue < llValue;
      
      case 'LowAlarm_Slope':
        // 低报警_斜率：记录值 < LL限制值
        return !isNaN(llValue) && recordValue < llValue;
      
      case 'Out_of_range':
        // 超出范围：记录值 < LL限制值 或 记录值 > HH限制值
        return (!isNaN(llValue) && recordValue < llValue) || 
               (!isNaN(hhValue) && recordValue > hhValue);
      
      default:
        return false;
    }
  }

  function convertImageToBase64(file) {
    return new Promise((resolve, reject) => {
      // 检查文件是否存在且有效
      if (!file || file.size === 0) {
        reject(new Error('文件无效或为空'));
        return;
      }

      // 检查文件类型
      if (!file.type.startsWith('image/')) {
        reject(new Error('文件不是有效的图片格式'));
        return;
      }

      let reader = new FileReader();
      reader.onload = function (event) {
        try {
          const base64 = event.target.result.split(',')[1];
          if (!base64) {
            reject(new Error('图片转换失败'));
            return;
          }
          resolve(base64);
        } catch (error) {
          reject(error);
        }
      };
      reader.onerror = function (error) {
        reject(new Error('读取文件失败: ' + error));
      };
      reader.readAsDataURL(file);
    });
  }

                obj["No Resources"] = "基于任务需求";
                obj["Skill Level"] = "NA";
                obj["Estimated Time"] = "基于任务需求";
                obj["Task Description"] = r["Task_Description"];
                obj["Task Status"] = '<input class="form-check-input" type="checkbox" value=""  style="border: 2px solid #696969; width: 24px; height: 24px; cursor: pointer;">';
                obj["数值记录&备注"] = '';
                obj["操作"] = button;
                data.push(obj)
              })
              table_tasklist.rows.add(data).draw(false);

              $('#table_tasklist tbody').on('click', '.preview-btn', function () {
                let fileInput = $(this).siblings('.photo-input').get(0);
                let file = fileInput.files[0];
                if (file) {
                  let reader = new FileReader();
                  reader.onload = function (e) {
                    Swal.fire({
                      title: '图片预览',
                      imageUrl: e.target.result,
                      imageAlt: 'Custom image',
                      showConfirmButton: false,
                    });
                  };
                  reader.readAsDataURL(file);
                } else {
                  Swal.fire({
                    icon: 'warning',
                    title: '警告',
                    text: '请先选择一张图片',
                    confirmButtonText: '确定'
                  });
                }
              });

              $('#table_tasklist tbody').on('click', '.take-photo-btn', function () {
                $(this).siblings('.photo-input').click();
              });

              $('#table_tasklist tbody').on('change', '.photo-input', function () {
                let fileInput = this;
                let file = this.files[0];
                if (file) {
                  let reader = new FileReader();
                  reader.onload = function (e) {
                    let imageContent = e.target.result;
                    let row = table_tasklist.row($(fileInput).closest('tr'));
                    let rowData = row.data();
                    rowData.imageContent = imageContent;
                    row.data(rowData).draw(false);
                  };
                }
              });
              return true
            } else {
              return false
            }
          })
        }
      } else {
      }
    })
  })

  function getFormattedTimestamp() {
    var now = new Date();
    var year = now.getFullYear();
    var month = (now.getMonth() + 1).toString().padStart(2, '0');
    var day = now.getDate().toString().padStart(2, '0');
    var hours = now.getHours().toString().padStart(2, '0');
    var minutes = now.getMinutes().toString().padStart(2, '0');
    var seconds = now.getSeconds().toString().padStart(2, '0');
    var milliseconds = now.getMilliseconds().toString().padStart(3, '0');
    return `${year}-${month}-${day}_${hours}:${minutes}:${seconds}:${milliseconds}`;
  }
