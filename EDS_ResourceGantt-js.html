<script>
const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

let resourceData = null;
let activeGroupKey = '';
let showAllPersonnel = true;

$(document).ready(function () {
  $('#userName').text(sessionStorage.getItem('Name') || '--');
  // Default to Monday of current week
  var now = new Date();
  var dow = now.getDay();
  var daysFromMonday = dow === 0 ? 6 : dow - 1;
  var monday = new Date(now);
  monday.setDate(now.getDate() - daysFromMonday);
  $('#startDate').val(formatDateYMD(monday));
  $('#refreshBtn').on('click', loadResourceGantt);
  $('#startDate, #daysCount').on('change', loadResourceGantt);
  $('#toggleIdleBtn').on('click', function () {
    showAllPersonnel = !showAllPersonnel;
    $(this).toggleClass('active', showAllPersonnel);
    $(this).html(showAllPersonnel
      ? '<i class="bi bi-people-fill"></i> 全部人员<br><small>All Personnel</small>'
      : '<i class="bi bi-person-check-fill"></i> 仅任务人员<br><small>With Tasks</small>');
    renderGantt();
  });
  loadResourceGantt();
});

function formatDateYMD(d) {
  const y = d.getFullYear();
  const m = ('0' + (d.getMonth() + 1)).slice(-2);
  const day = ('0' + d.getDate()).slice(-2);
  return y + '-' + m + '-' + day;
}

function shortDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const names = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  return (d.getMonth() + 1) + '/' + d.getDate() + '<br><small>' + names[d.getDay()] + '</small>';
}

function loadResourceGantt() {
  const start = $('#startDate').val();
  const days = $('#daysCount').val() || '14';
  if (!start) return;
  $('#ganttRoot').html('<div class="empty-state">加载中... / Loading...</div>');
  Swal.fire({
    title: swalTitle('加载任务规划...', 'Loading Resource Gantt...'),
    html: swalHtml('正在汇总人员与任务数据。', 'Aggregating staff and task data.'),
    allowOutsideClick: false,
    showConfirmButton: false,
    didOpen: function () { Swal.showLoading(); }
  });
  google.script.run
    .withSuccessHandler(function (result) {
      Swal.close();
      const res = JSON.parse(result || '{}');
      if (!res.success) {
        Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml(res.message || '加载失败', 'Load failed') });
        return;
      }
      resourceData = res.data;
      if (!activeGroupKey) {
        activeGroupKey = 'all';
      }
      renderGroupTabs();
      renderGantt();
    })
    .withFailureHandler(function (err) {
      Swal.close();
      Swal.fire({ icon: 'error', title: swalTitle('错误', 'Error'), html: swalHtml('加载失败: ' + err.message, 'Load failed: ' + err.message) });
    })
    .loadResourceGanttData(start, days);
}

function renderGroupTabs() {
  const groups = (resourceData && resourceData.groups) || [];
  const totalCount = groups.reduce(function (sum, g) { return sum + (g.people || []).length; }, 0);
  let html = '<button class="group-tab ' + (activeGroupKey === 'all' ? 'active' : '') + '" data-group="all">'
    + '所有人 <small>(' + totalCount + ')</small><br><span style="font-size:10px;font-weight:400;">All</span></button>';
  html += groups.map(function (g) {
    const count = (g.people || []).length;
    return '<button class="group-tab ' + (g.key === activeGroupKey ? 'active' : '') + '" data-group="' + g.key + '">'
      + g.name + ' <small>(' + count + ')</small><br><span style="font-size:10px;font-weight:400;">' + g.en + '</span></button>';
  }).join('');
  $('#groupTabs').html(html);
  $('.group-tab').off('click').on('click', function () {
    activeGroupKey = $(this).data('group');
    renderGroupTabs();
    renderGantt();
  });
}

function renderGantt() {
  if (!resourceData) return;
  const days = resourceData.days || [];
  const todayStr = formatDateYMD(new Date());
  const todayIdx = days.indexOf(todayStr);
  const allGroups = resourceData.groups || [];

  // ---- 所有人视图: 合并全部组 ----
  let merged;
  if (activeGroupKey === 'all') {
    merged = { key: 'all', name: '所有人', en: 'All', people: {}, dailyCounts: {} };
    days.forEach(function (d) { merged.dailyCounts[d] = 0; });
    allGroups.forEach(function (g) {
      (g.people || []).forEach(function (p) {
        const key = p.sapID || p.name;
        if (!merged.people[key]) {
          merged.people[key] = { sapID: p.sapID, name: p.name, workshop: p.workshop, process: p.process, team: p.team, shift: p.shift, hasTasks: p.hasTasks, dailyStatus: p.dailyStatus || {}, groupName: g.name, tasks: [] };
        }
        merged.people[key].tasks = merged.people[key].tasks.concat(p.tasks || []);
      });
      Object.keys(g.dailyCounts || {}).forEach(function (d) {
        merged.dailyCounts[d] = (merged.dailyCounts[d] || 0) + (g.dailyCounts[d] || 0);
      });
    });
  } else {
    merged = allGroups.filter(function (g) { return g.key === activeGroupKey; })[0];
    if (merged) {
      // Tag each person with their group name
      (merged.people || []).forEach(function (p) { p.groupName = merged.name; });
    }
  }

  if (!merged) {
    $('#ganttRoot').html('<div class="empty-state">暂无数据 / No data</div>');
    return;
  }

  let people = Object.values(merged.people || {});
  if (!showAllPersonnel) {
    people = people.filter(function (p) { return (p.tasks || []).length > 0; });
  }
  // 排序：有任务在上，空闲在下
  people.sort(function (a, b) {
    const aHas = (a.tasks || []).length > 0 ? 1 : 0;
    const bHas = (b.tasks || []).length > 0 ? 1 : 0;
    return bHas - aHas;
  });
  let html = '<div class="gantt-grid" style="--day-count:' + days.length + ';">';
  html += '<div class="gantt-head first">人员 / 日期</div>';
  days.forEach(function (d, idx) {
    html += '<div class="gantt-head' + (idx === todayIdx ? ' today-col' : '') + '">' + shortDate(d) + '</div>';
  });

  html += '<div class="gantt-name">组任务数<small>Task count</small></div>';
  days.forEach(function (d, idx) {
    const val = merged.dailyCounts ? (merged.dailyCounts[d] || 0) : 0;
    html += '<div class="gantt-count' + (val >= 10 ? ' hot' : '') + (idx === todayIdx ? ' today-col' : '') + '">' + (val || '-') + '</div>';
  });

  if (people.length === 0) {
    html += '</div><div class="empty-state">当前组暂无人员 / No personnel in this group</div>';
    $('#ganttRoot').html(html);
    return;
  }

  people.forEach(function (person) {
    const groupLabel = person.groupName ? '<small style="color:#E60012;">' + escapeHtml(person.groupName) + '</small>' : '';
    const idleLabel = !person.hasTasks && (person.tasks || []).length === 0
      ? ' <span style="color:#fd7e14;font-size:11px;">空闲 <small>Idle</small></span>' : '';
    const shiftShort = person.shift ? person.shift.replace('班','') : '';
    const shiftBadgeColors = { '早': 'background:#fff3cd;color:#856404', '中': 'background:#d1e7dd;color:#0f5132', '夜': 'background:#cfe2ff;color:#084298' };
    const shiftBadge = shiftShort
      ? '<span style="' + (shiftBadgeColors[shiftShort] || 'background:#e9ecef;color:#495057') + ';padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;">' + shiftShort + '</span>'
      : '';
    const teamText = person.team ? '<span style="color:#0d6efd;">' + escapeHtml(person.team) + '</span>' : '';
    const sep = teamText && shiftBadge ? ' ' : '';
    const teamBadge = (teamText || shiftBadge) ? ' <small style="font-weight:600;">' + teamText + sep + shiftBadge + '</small>' : '';
    html += '<div class="gantt-name">' + escapeHtml(person.name || person.sapID || '--')
      + idleLabel
      + teamBadge
      + groupLabel
      + '<small>' + escapeHtml([person.workshop, person.process].filter(Boolean).join(' / ')) + '</small></div>';
    html += '<div class="person-lane">';

    // 收集有任务覆盖的天（列索引）
    const coveredDays = {};
    (person.tasks || []).forEach(function (task) {
      const rawSIdx = days.indexOf(task.start);
      const rawEIdx = days.indexOf(task.end);
      // Clamp: start before range → 0; end after range → last day
      const sIdx = rawSIdx < 0 ? 0 : rawSIdx;
      const eIdx = rawEIdx < 0 ? days.length - 1 : rawEIdx;
      // Skip only if task is entirely outside range (start after range or end before range)
      if (sIdx >= days.length || eIdx < 0) return;
      for (let d = sIdx; d <= eIdx; d++) coveredDays[d] = true;
    });

    // 周一到周六的空白天高亮（周日=0 跳过）；非在岗天显示休假标记
    days.forEach(function (d, idx) {
      if (coveredDays[idx]) return;
      const dow = new Date(d + 'T00:00:00').getDay();
      if (dow === 0) return; // 周日跳过
      const dayStatus = (person.dailyStatus || {})[d];
      const todayClass = idx === todayIdx ? ' today-col' : '';
      if (dayStatus && dayStatus !== '在岗') {
        const abbr = getStatusAbbr(dayStatus);
        html += '<div class="empty-leave' + todayClass + '" title="' + escapeHtml(dayStatus) + '" style="grid-column:' + (idx + 1) + ';grid-row:1;">' + abbr + '</div>';
      } else {
        html += '<div class="empty-day' + todayClass + '" style="grid-column:' + (idx + 1) + ';grid-row:1;">空</div>';
      }
    });

    (person.tasks || []).forEach(function (task, index) {
      const rawStart = days.indexOf(task.start);
      const rawEnd = days.indexOf(task.end);
      const startIdx = rawStart < 0 ? 0 : rawStart;
      const endIdx = rawEnd < 0 ? days.length - 1 : rawEnd;
      if (startIdx >= days.length || endIdx < 0) return;
      let cls = getTaskClass(task);
      // 检查任务跨度内是否有非在岗天 → 叠加斜线条纹
      const ds = person.dailyStatus || {};
      let onLeave = false;
      for (let di = startIdx; di <= endIdx; di++) {
        const s = ds[days[di]];
        if (s && s !== '在岗') { onLeave = true; break; }
      }
      if (onLeave) cls += ' task-on-leave';
      html += '<div class="task-bar ' + cls + '" style="grid-column:' + (startIdx + 1) + ' / ' + (endIdx + 2) + ';grid-row:' + (index + 1) + ';"'
        + ' title="' + escapeHtml(task.taskID + ' | ' + task.title + ' | ' + task.start + ' ~ ' + task.end) + '">'
        + escapeHtml(String(task.title || '').replace(/^PM:\s*/, '')) + (task.role === 'collaborator' ? ' (协作)' : '') + '</div>';
    });

    // 任务覆盖天的休假徽章（覆盖在任务条上方，精确定位到天）
    days.forEach(function (d, idx) {
      const dayStatus = (person.dailyStatus || {})[d];
      if (!dayStatus || dayStatus === '在岗') return;
      if (!coveredDays[idx]) return; // 已在前面 empty-leave 处理
      const dow = new Date(d + 'T00:00:00').getDay();
      if (dow === 0) return;
      const abbr = getStatusAbbr(dayStatus);
      html += '<div class="task-leave-badge' + (idx === todayIdx ? ' today-col' : '') + '" title="' + escapeHtml(dayStatus) + '" style="grid-column:' + (idx + 1) + ';grid-row:1;">' + abbr + '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  $('#ganttRoot').html(html);
}

function getTaskClass(task) {
  if (task.status === '已完成') return 'task-done';
  if (task.status === '等待中') return 'task-wait';
  if (task.taskType === 'follow') return 'task-follow';
  if (task.taskType === '非常规保养') return 'task-nonroutine';
  const text = [task.taskType, task.title].join(' ');
  if (text.indexOf('测试') >= 0 || /TEST/i.test(text)) return 'task-test';
  if (text.indexOf('维修') >= 0 || text.indexOf('故障') >= 0) return 'task-cm';
  return 'task-pm';
}

function getStatusAbbr(status) {
  if (!status || status === '在岗') return '';
  if (status.indexOf('休') >= 0) return '休';
  if (status.indexOf('假') >= 0) return '假';
  if (status.indexOf('外') >= 0) return '外';
  if (status.indexOf('训') >= 0) return '训';
  if (status.indexOf('差') >= 0) return '差';
  return status.substring(0, 1);
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
