<script>
  let globalWorkcenter = [];
  let globalName = [];
  let globalErrorCode = [];
  let globalFailureProcessConfig = [];
  let globalFailureProcessItems = [];
  let globalFailureProcessItemsModal = [];
  let global_Name = sessionStorage.getItem('Name');
  let global_Process = sessionStorage.getItem('Process');
  
  // 页面加载状态跟踪
  let pageLoadComplete = false;
  let selectItemLoaded = false;
  let tableDataLoaded = false;
  let failureProcessLoaded = false;

  $(document).ready(function () {
    Swal.fire({
      title: '正在加载数据...\nLoading data...',
      text: '请稍候\nPlease wait',
      allowOutsideClick: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });

    google.script.run.withSuccessHandler(showSelectItem).SelectItem();
    google.script.run.withSuccessHandler(showTablehead).getAllshiftData();
    google.script.run.withSuccessHandler(showFailureProcessConfig).getFailureProcessConfigData();

  });

  function resetFailureProcessMain() {
    globalFailureProcessItems.forEach((item) => {
      if (item.isFollow) {
        $('#Follow_N').prop('checked', true);
        $('#followone,#followedone').val('');
        $('.dynamic-follow-group').remove();
      } else {
        $(`#${item.yesId}`).prop('checked', true);
        $(`#${item.descId}`).val('');
      }
    });
    inputInitialization();
  }

  // 检查页面是否完全加载完成
  function checkPageLoadComplete() {
    if (selectItemLoaded && tableDataLoaded && failureProcessLoaded && !pageLoadComplete) {
      pageLoadComplete = true;
      Swal.close();
      Swal.fire({
        title: '页面加载完成 / Page Loaded',
        text: '请填写交接班记录和故障信息',
        icon: 'success',
        timer: 3000,
        showConfirmButton: false
      });
    }
  }

  function normalizeProcess(process) {
    if (process === 'INJ') {
      return 'IM';
    }
    return process;
  }

  function showFailureProcessConfig(data) {
    globalFailureProcessConfig = data || [];
    let process = normalizeProcess(sessionStorage.getItem('Process'));
    let filtered = globalFailureProcessConfig.filter((r) => r.Process === process);

    renderFailureProcess(filtered);
    inputInitialization();

    failureProcessLoaded = true;
    checkPageLoadComplete();
  }

  function renderFailureProcess(configItems) {
    let container = $('#failureProcessContainer');
    container.empty();
    globalFailureProcessItems = [];

    let hasFollowRow = false;
    configItems.forEach((item, index) => {
      let isFollow = item.Remark === '跟从' && !hasFollowRow;
      let html = '';

      if (isFollow) {
        hasFollowRow = true;
        html = `
          <div class="row align-items-center mb-2">
            <div class="col-4">
              <label>${item.Description}</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="Follow_Y" name="Follow">
              <label class="form-check-label" for="Follow_Y">是/ Yes</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="Follow_N" name="Follow" checked>
              <label class="form-check-label" for="Follow_N">否/ No</label>
            </div>
            <div class="col-5">
              <div class="input-group-container">
                <div class="input-group">
                  <input type="number" step="1" class="form-control follow-cavity" placeholder="跟从穴号/ Follow Cavity" id="followone">
                  <div class="arrow">&rarr;</div>
                  <input type="number" step="1" class="form-control followed-cavity" placeholder="被跟从穴号/ Followed Cavity" id="followedone">
                </div>
                <button type="button" class="btn btn-primary add-input-group">+</button>
              </div>
            </div>
          </div>
        `;

        globalFailureProcessItems.push({
          Description: item.Description,
          Remark: item.Remark,
          isFollow: true,
          yesId: 'Follow_Y',
          noId: 'Follow_N',
        });
      } else {
        let key = `FP_${index}`;
        let yesId = `${key}_Y`;
        let noId = `${key}_N`;
        let descId = `${key}_Description`;

        html = `
          <div class="row align-items-center mb-2">
            <div class="col-4">
              <label>${item.Description}</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="${yesId}" name="${key}" checked>
              <label class="form-check-label" for="${yesId}">是/ Yes</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="${noId}" name="${key}">
              <label class="form-check-label" for="${noId}">否/ No</label>
            </div>
            <div class="col-5">
              <textarea class="form-control" id="${descId}" rows="1" placeholder="${item.Placeholder || ''}"></textarea>
            </div>
          </div>
        `;

        globalFailureProcessItems.push({
          Description: item.Description,
          Remark: item.Remark,
          isFollow: false,
          yesId: yesId,
          noId: noId,
          descId: descId,
        });
      }

      container.append(html);
    });
  }

  /**
   * 为跟进弹窗动态渲染故障处理区域（与主页面同数据源、同结构，id 带后缀避免冲突）
   */
  function renderFailureProcessForModal(containerSelector, configItems, idSuffix) {
    let container = $(containerSelector);
    container.empty();
    globalFailureProcessItemsModal = [];
    let hasFollowRow = false;
    configItems.forEach((item, index) => {
      let isFollow = item.Remark === '跟从' && !hasFollowRow;
      let html = '';
      if (isFollow) {
        hasFollowRow = true;
        html = `
          <div class="row align-items-center mb-2">
            <div class="col-4">
              <label>${item.Description}</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="Follow_Y${idSuffix}" name="Follow${idSuffix}">
              <label class="form-check-label" for="Follow_Y${idSuffix}">是/ Yes</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="Follow_N${idSuffix}" name="Follow${idSuffix}" checked>
              <label class="form-check-label" for="Follow_N${idSuffix}">否/ No</label>
            </div>
            <div class="col-5">
              <div class="input-group-container">
                <div class="input-group">
                  <input type="number" step="1" class="form-control follow-cavity${idSuffix}" placeholder="跟从穴号/ Follow Cavity">
                  <div class="arrow">&rarr;</div>
                  <input type="number" step="1" class="form-control followed-cavity${idSuffix}" placeholder="被跟从穴号/ Followed Cavity">
                </div>
                <button type="button" class="btn btn-primary add-input-group${idSuffix}">+</button>
              </div>
            </div>
          </div>
        `;
        globalFailureProcessItemsModal.push({
          Description: item.Description,
          Remark: item.Remark,
          isFollow: true,
          yesId: `Follow_Y${idSuffix}`,
          noId: `Follow_N${idSuffix}`,
        });
      } else {
        let key = `FP_${index}`;
        let yesId = `${key}_Y${idSuffix}`;
        let noId = `${key}_N${idSuffix}`;
        let descId = `${key}_Description${idSuffix}`;
        html = `
          <div class="row align-items-center mb-2">
            <div class="col-4">
              <label>${item.Description}</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="${yesId}" name="${key}${idSuffix}" checked>
              <label class="form-check-label" for="${yesId}">是/ Yes</label>
            </div>
            <div class="col-1 form-check form-check-inline">
              <input class="form-check-input" type="radio" id="${noId}" name="${key}${idSuffix}">
              <label class="form-check-label" for="${noId}">否/ No</label>
            </div>
            <div class="col-5">
              <textarea class="form-control" id="${descId}" rows="1" placeholder="${item.Placeholder || ''}"></textarea>
            </div>
          </div>
        `;
        globalFailureProcessItemsModal.push({
          Description: item.Description,
          Remark: item.Remark,
          isFollow: false,
          yesId: yesId,
          noId: noId,
          descId: descId,
        });
      }
      container.append(html);
    });
  }

  function inputInitialization() {
    globalFailureProcessItems.forEach((item) => {
      if (item.isFollow) {
        if ($('#Follow_Y').is(':checked')) {
          $('.follow-cavity, .followed-cavity').prop('disabled', false);
          $('.add-input-group').prop('disabled', false);
        } else {
          $('.follow-cavity, .followed-cavity').prop('disabled', true);
          $('.add-input-group').prop('disabled', true);
        }
      } else {
        toggleInputBasedOnRadio(item.yesId, item.noId, item.descId);
      }
    });
  }

  /** 取故障处理项标题的中文部分（写入后端用），如 "设备维修/ Equipment Maintenance" -> "设备维修" */
  function descriptionChineseOnly(desc) {
    if (desc == null) return '';
    let s = desc.toString().trim();
    let i = s.indexOf('/');
    return i >= 0 ? s.slice(0, i).trim() : s;
  }

  function submitFailure(id) {
    let obj = {};
    let followCavities = [];
    let followedCavities = [];

    if (id == 'submitFailure') {
      obj['编号'] = (getCurrentDateTime() + "-" + "0").toString();
      obj['班次'] = $("#shift").val();
      obj['机台号'] = $("#workcenter").val();
      obj['问题描述'] = $("#Description").val();
      obj['直接原因'] = ($("#DirectCause").val() || '').toString().trim();
      obj['建议措施'] = ($("#SuggestedAction").val() || '').toString().trim();

      let processLines = [];
      globalFailureProcessItems.forEach((item) => {
        if (item.isFollow) return;
        let val = $(`#${item.yesId}`).is(':checked') ? ($(`#${item.descId}`).val() || '') : '';
        processLines.push(`【${descriptionChineseOnly(item.Description)}】：${val}`);
      });
      obj['处理过程'] = processLines.join('\n');

      obj['状态'] = $("#Status").val();
      obj['维修人'] = $("#owner").val();
      obj['维修时间'] = $("#MaintenanceDuration").val();
      obj['故障代码'] = $("#errorCode").val();
      obj['工单号'] = $("#Workorder").val();
      obj['车间'] = $("#workshop").val();
      obj['先前编号'] = ''
      // 遍历所有跟从穴号输入框并收集它们的值
      $('.follow-cavity').each(function () {
        followCavities.push('#' + $(this).val());
      });
      // 遍历所有被跟从穴号输入框并收集它们的值
      $('.followed-cavity').each(function () {
        followedCavities.push('#' + $(this).val());
      });

      // console.log('submitFailure');
    } else if (id == 'ModalSubmit') {

      let codeValue = $('#Code2').val();// 获取 Code2 的值
      let newCode = '';
      if (codeValue.includes('-')) {// 检查 codeValue 是否包含 '-'
        let parts = codeValue.split('-');
        let lastNumber = parseInt(parts[parts.length - 1], 10) + 1;
        newCode = parts.slice(0, -1).join('-') + '-' + lastNumber;
      } else {
        newCode = codeValue + '-1';
      }
      obj['先前编号'] = codeValue;
      obj['编号'] = newCode;
      obj['班次'] = $("#shift2").val();
      obj['机台号'] = $("#workcenter2").val();
      obj['问题描述'] = $("#Description2").val();
      obj['直接原因'] = ($("#DirectCause2").val() || '').toString().trim();
      obj['建议措施'] = ($("#SuggestedAction2").val() || '').toString().trim();
      let processLinesModal = [];
      globalFailureProcessItemsModal.forEach((item) => {
        if (item.isFollow) return;
        let val = $(`#${item.yesId}`).is(':checked') ? ($(`#${item.descId}`).val() || '') : '';
        processLinesModal.push(`【${descriptionChineseOnly(item.Description)}】：${val}`);
      });
      obj['处理过程'] = processLinesModal.join('\n');
      obj['状态'] = $("#Status2").val();
      obj['维修人'] = $("#owner2").val();
      obj['维修时间'] = $("#MaintenanceDuration2").val();
      obj['故障代码'] = $("#errorCode2").val();
      obj['工单号'] = $("#Workorder2").val();
      obj['车间'] = $("#workshop2").val();
      // 遍历所有跟从穴号输入框并收集它们的值
      $('.follow-cavity2').each(function () {
        followCavities.push('#' + $(this).val());
      });
      // 遍历所有被跟从穴号输入框并收集它们的值
      $('.followed-cavity2').each(function () {
        followedCavities.push('#' + $(this).val());
      });
      // console.log('ModalSubmit');
    } else {
      console.log('Error')
    }

    obj['是否跟随'] = '';
    if (/\d/.test(followCavities)) {
      obj['是否跟随'] += '是： ';
      for (let i = 0; i < followCavities.length; i++) {
        obj['是否跟随'] += followCavities[i];
        obj['是否跟随'] += '跟随';
        obj['是否跟随'] += followedCavities[i] + ';';
      }

    } else {
      obj['是否跟随'] = '否';
    }

    // obj['编号'] = (getCurrentDateTime() + "-" + "0").toString();
    obj['交接人'] = '';
    obj['提交日期'] = getCurrentDate().toString();
    obj['是否转保养'] = '';
    obj['填写人'] = global_Name;
    obj['工序'] = global_Process;
    obj['参与人数'] = '';
    obj['机型'] = '';
    obj['是否已安排PM跟进'] = '';
    // 判断是否需要填写故障报告（按工序阈值）：
    // IM 维修时间 < 240min → 填“否”
    // TF 维修时间 < 120min → 填“否”
    // PK 维修时间 < 60min  → 填“否”
    // 其他情况 → 填空值
    let maintenanceTime = parseFloat(obj['维修时间']);
    let processForJudge = (obj['工序'] || '').toString().trim();
    if (processForJudge === 'INJ') processForJudge = 'IM'; // INJ/IM 视为同一工序口径

    obj['是否需要填写故障报告'] = '';
    if (!Number.isNaN(maintenanceTime)) {
      if (processForJudge === 'IM' && maintenanceTime < 240) {
        obj['是否需要填写故障报告'] = '否';
      } else if (processForJudge === 'TF' && maintenanceTime < 120) {
        obj['是否需要填写故障报告'] = '否';
      } else if (processForJudge === 'PK' && maintenanceTime < 60) {
        obj['是否需要填写故障报告'] = '否';
      }
    }
    obj['判断是否最后'] = '';
    console.log(obj)

    let isModalSubmit = (id === 'ModalSubmit');
    Swal.fire({
      title: '数据上传中/ Data Uploading',
      icon: 'info',
      allowOutsideClick: false,
      showConfirmButton: false
    });
    google.script.run.withSuccessHandler((r) => {
      console.log(r)
      if (r[1] == true) {
        if (isModalSubmit) {
          // 跟进模态框提交成功：先刷新表格，表格数据添加完成后再关闭弹窗并提示保存成功
          google.script.run.withSuccessHandler((data) => {
            showTablehead(data);
            Swal.close();
            Swal.fire({
              title: '保存成功/ Saving Success',
              icon: 'success'
            });
          }).getAllshiftData();
        } else {
          Swal.close();
          Swal.fire({
            title: '保存成功/ Saving Success',
            icon: 'success'
          });
          addNewRow(obj);
          console.log("清空数据")
          $('#workcenter').val("机台号/ Workcenter").trigger('change');
          $("#shift").val("班次/ Shift").trigger("change");
          $("#owner").val("维修人/ Maintenance Owner").trigger("change");
          $("#errorCode").val("故障代码/ Failure Code").trigger("change");
          $("#Status").val("状态/ Status").trigger("change");
          $("#MaintenanceDuration,#Workorder,#Description,#DirectCause,#SuggestedAction").val("");
          resetFailureProcessMain();
        }
      } else {
        Swal.close();
        Swal.fire({
          icon: "error",
          title: "保存失败，请联系工程师"
        })
      }
    }).submitFailure(obj)
  }

  $("#submitFailure").click(function () {
    let id = $(this).attr('id');
    let checkResult = checkNotEmpty(id);
    // console.log('checkResult_submitFailure', checkResult);
    if (checkResult == true) {
      submitFailure(id);
    }

  })

  function addNewRow(obj) {
    console.log(obj)
    let table = $("#Failure_History_Table").DataTable();
    table.row.add(obj).draw();
  }

  function showSelectItem(result) {
    // console.log(result);
    let process = sessionStorage.getItem('Process');
    console.log('当前工序:', process);
    
    // 设置SelectItem加载完成状态
    selectItemLoaded = true;

    // 根据工序过滤机台号
    let filteredWorkcenter = result[0].filter((r) => {
      // INJ 和 IM 都表示注塑工序
      if (process === "INJ" && r.process === "IM") {
        return true;
      }
      if (process === "IM" && r.process === "IM") {
        return true;
      }
      if (process === "INJ" && r.process === "INJ") {
        return true;
      }
      return r.process === process;
    });
    
    // 如果找到匹配的工序，使用过滤后的数据；否则使用所有数据
    let workcenterToUse = filteredWorkcenter.length > 0 ? filteredWorkcenter : result[0];
    
    let workcenter = [];
    workcenterToUse.forEach((r) => {
      let item = {};
      item.id = r.workcenter;
      item.text = r.workcenter;
      item.workshop = r.workshop;  // 保存车间信息
      workcenter.push(item);
    })
    globalWorkcenter = workcenter;
    console.log('机台号数量:', workcenter.length);
    console.log('是否找到匹配工序:', filteredWorkcenter.length > 0);

    let name = [];
    // console.log(result[1]);
    result[1].forEach((r) => {
      if (r.process == process) {
        let item = {};
        item.id = r.name;
        item.text = r.name;
        name.push(item);
      }
    })
    globalName = name;
    // console.log(globalName);

    // 处理新的故障代码数据结构
    let errorCode = [];
    let filteredErrorCode = result[2].filter((r) => {
      // INJ 和 IM 都表示注塑工序
      if (process === "INJ" && r.Process === "IM") {
        return true;
      }
      if (process === "IM" && r.Process === "IM") {
        return true;
      }
      return r.Process === process;
    });
    
    // 如果找到匹配的工序，使用过滤后的数据；否则使用所有数据
    let errorCodeToUse = filteredErrorCode.length > 0 ? filteredErrorCode : result[2];
    
    errorCodeToUse.forEach((r) => {
      let item = {};
      item.id = r.UPDT_Local;  // 使用UPDT (Local Language)列
      item.text = r.UPDT_Local;  // 使用UPDT (Local Language)列
      errorCode.push(item);
    });
    
    globalErrorCode = errorCode;
    console.log('故障代码数量:', errorCode.length);
    console.log('当前工序:', process);
    console.log('是否找到匹配工序:', filteredErrorCode.length > 0);
    console.log('工序匹配说明: INJ和IM都表示注塑工序');
    
    // 检查页面是否完全加载完成
    checkPageLoadComplete();

    $("#Status,#shift,#workshop,#Workshop,#Process").select2({
      theme: 'bootstrap', // 使用 Bootstrap 主题
      minimumResultsForSearch: -1 // 禁用搜索框
    });
    $('#workcenter').select2({
      data: workcenter,
      theme: 'bootstrap' // 使用 Bootstrap 主题
    });
    $('#errorCode').select2({
      data: errorCode,
      theme: 'bootstrap' // 使用 Bootstrap 主题
    });

    $('#owner').select2({
      data: name,
      theme: 'bootstrap' // 使用 Bootstrap 主题
    });

    $("#workcenter").on("change", function () {
      let workcenter = $("#workcenter").val();
      let item = result[0].filter((r) => { return r.workcenter == workcenter });
      console.log(item)
      if (item == "") {
        $("#workshop").val("车间/ Workshop").trigger('change');
      } else {
        $("#workshop").val(item[0].workshop).trigger('change');
      }

      // console.log("workshop_modal", item)
    })
  }

  /**
   * 合并行内按组对齐：同一组的各列 group-row 使用相同最小高度，使该组首行对齐。
   */
  function alignMergedGroupRows() {
    $('#Failure_History_Table tbody tr').each(function () {
      let $cells = $(this).find('td');
      let maxIndex = -1;
      $cells.find('.group-row').each(function () {
        let i = parseInt($(this).attr('data-group-index'), 10);
        if (!isNaN(i) && i > maxIndex) maxIndex = i;
      });
      for (let gi = 0; gi <= maxIndex; gi++) {
        let selector = '.group-row[data-group-index="' + gi + '"]';
        let maxH = 0;
        $cells.find(selector).each(function () {
          let h = $(this).outerHeight();
          if (h > maxH) maxH = h;
        });
        if (maxH > 0) {
          $cells.find(selector).css('min-height', maxH + 'px');
        }
      }
    });
  }

  /**
   * 按“编号”中“-”前前缀分组，合并为一行显示；状态取“-”后数字最大条目的状态。
   */
  function mergeFailureHistoryRows(content, head) {
    const groups = {};
    content.forEach((r) => {
      let code = (r['编号'] || '').toString().trim();
      let idx = code.indexOf('-');
      let prefix = idx >= 0 ? code.slice(0, idx) : code;
      let suffix = idx >= 0 ? parseInt(code.slice(idx + 1), 10) : 0;
      if (!groups[prefix]) groups[prefix] = [];
      groups[prefix].push({ ...r, _suffix: suffix });
    });
    const merged = [];
    Object.keys(groups).forEach((prefix) => {
      let list = groups[prefix].sort((a, b) => a._suffix - b._suffix);
      let maxRow = list[list.length - 1];
      let base = { ...maxRow };
      delete base._suffix;
      if (list.length === 1) {
        merged.push(base);
        return;
      }
      let rev = list.slice().reverse();
      let faultInfoParts = rev.map((e) => {
        let desc = (e['问题描述'] || '').toString().trim();
        let directCause = (e['直接原因'] || '').toString().trim();
        let suggestedAction = (e['建议措施'] || '').toString().trim();
        let lines = [];
        lines.push(`【问题描述】：${desc}`);
        lines.push(`【直接原因】：${directCause}`);
        lines.push(`【建议措施】：${suggestedAction}`);
        return lines.join('<br>');
      });
      let rowStyle = 'margin-bottom: 0.75em;';
      base._merged故障信息 = faultInfoParts.map((html, i) => '<div class="group-row" data-group-index="' + i + '" style="' + rowStyle + '">' + html + '</div>').join('');
      base._merged处理过程 = rev.map((e, i) => '<div class="group-row" data-group-index="' + i + '" style="' + rowStyle + '">' + (e['处理过程'] || '').toString().replace(/\n/g, '<br>') + '</div>').join('');
      let timeParts = rev.map((e) => (e['维修时间'] || '').toString().trim());
      let totalMins = list.reduce((acc, e) => acc + (parseFloat(e['维修时间']) || 0), 0);
      base._merged维修时间 = '<div style="display: flex; flex-direction: column; min-height: 100%;">' +
        timeParts.map((p, i) => '<div class="group-row" data-group-index="' + i + '" style="' + rowStyle + '">' + p + '</div>').join('') +
        '<div style="margin-top: auto; text-align: left;">【合计维修时间】：' + totalMins + '</div>' +
        '</div>';
      base._merged维修人 = rev.map((e, i) => '<div class="group-row" data-group-index="' + i + '" style="' + rowStyle + '">' + (e['维修人'] || '').toString().trim() + '</div>').join('');
      base._merged故障代码 = rev.map((e, i) => '<div class="group-row" data-group-index="' + i + '" style="' + rowStyle + '">' + (e['故障代码'] || '').toString().trim() + '</div>').join('');
      base._merged提交日期 = rev.map((e, i) => '<div class="group-row" data-group-index="' + i + '" style="' + rowStyle + '">' + (e['提交日期'] || '').toString().trim() + '</div>').join('');
      base._merged是否跟随 = rev.map((e, i) => '<div class="group-row" data-group-index="' + i + '" style="' + rowStyle + '">' + (e['是否跟随'] || '').toString().trim() + '</div>').join('');
      merged.push(base);
    });
    return merged;
  }

  function checkNotEmpty(id) {
    // 定义需要检查的固定字段ID（主页面与模态框均校验，suffix 主页面为 ''、模态框为 '2'）
    const fixedFields = [
      'workcenter',
      'workshop',
      'shift',
      'owner',
      'errorCode',
      'Status',
      'MaintenanceDuration',
      'Description',
      'DirectCause',
      'SuggestedAction'
    ];
    const suffix = id === 'ModalSubmit' ? '2' : '';
    let allFixedFieldsFilled = fixedFields.every(field => {
      let value = $(`#${field}${suffix}`).val() || '';
      return value.trim() !== '';
    });

    let yesOptionsWithDescriptions = {};
    if (id === 'ModalSubmit') {
      globalFailureProcessItemsModal.forEach((item) => {
        if (item.isFollow) {
          yesOptionsWithDescriptions[`#${item.yesId}`] = `.follow-cavity${suffix}, .followed-cavity${suffix}`;
        } else {
          yesOptionsWithDescriptions[`#${item.yesId}`] = `#${item.descId}`;
        }
      });
    } else {
      globalFailureProcessItems.forEach((item) => {
        if (item.isFollow) {
          yesOptionsWithDescriptions[`#${item.yesId}`] = `.follow-cavity, .followed-cavity`;
        } else {
          yesOptionsWithDescriptions[`#${item.yesId}`] = `#${item.descId}`;
        }
      });
    }
    // 检查是否至少有一个“是”选项被选中
    const atLeastOneYes = Object.keys(yesOptionsWithDescriptions).some(selector => $(selector).is(':checked'));

    // console.log('atLeastOneYes', atLeastOneYes)
    // 检查所有被选中的“是”选项后面的描述输入框是否不为空
    const allDescriptionsFilled = Object.entries(yesOptionsWithDescriptions).every(([yesSelector, descSelector]) => {
      // 如果“是”选项被选中，检查对应的描述输入框是否不为空
      if ($(yesSelector).is(':checked')) {
        // 对于热流道跟从的特殊处理，需要检查两个输入框
        if (yesSelector === `#Follow_Y${suffix}` || yesSelector === '#Follow_Y') {
          return $(descSelector).toArray().every(input => $(input).val().trim() !== '');
        }
        // 对于其他描述输入框，只需要检查对应的一个输入框
        return $(descSelector).val().trim() !== '';
      }
      return true; // 如果“是”选项未被选中，则不需要检查描述输入框，返回 true
    });
    // console.log('allDescriptionsFilled', allDescriptionsFilled)

    // 如果所有字段都已填写（含直接原因、建议措施必填）
    if (allFixedFieldsFilled && atLeastOneYes && allDescriptionsFilled) {
      console.log('数据填写完整', true);
      return true;
    } else {
      // 如果有字段未填写，显示错误提示
      Swal.fire({
        icon: "error",
        title: "请将数据填写完整/ Please fill in the data completely",
        timer: 2000
      });
      console.log('数据未填写完整', false);
      return false;
    }
  }

  function extractTextBetweenBraces(input) {
    // 将输入转换为字符串
    var text = String(input);

    // 正则表达式匹配所有大括号中的文本
    var regex = /{([^}]+)}/g;
    var matches = text.match(regex);

    // 检查是否有至少两对大括号
    if (matches && matches.length >= 2) {
      // 提取第一对和第二对大括号之间的文本
      var firstBraceEndIndex = text.indexOf(matches[0]) + matches[0].length;
      var secondBraceStartIndex = text.indexOf(matches[1]);
      var extractedText = text.substring(firstBraceEndIndex, secondBraceStartIndex).trim();
      return extractedText;
    } else {
      // 如果没有两对大括号，返回原始文本
      return text;
    }
  }

  function getCurrentDateTime() {
    var now = new Date();
    var year = now.getFullYear();
    var month = ('0' + (now.getMonth() + 1)).slice(-2); // 月份是从0开始的
    var day = ('0' + now.getDate()).slice(-2);
    var hours = ('0' + now.getHours()).slice(-2);
    var minutes = ('0' + now.getMinutes()).slice(-2);
    var seconds = ('0' + now.getSeconds()).slice(-2);

    return '' + year + month + day + hours + minutes + seconds;
  }

  function getCurrentDate() {
    var now = new Date();

    var year = now.getFullYear();
    var month = ('0' + (now.getMonth() + 1)).slice(-2); // 月份是从0开始的
    var day = ('0' + now.getDate()).slice(-2);

    return year + '/' + month + '/' + day;
  }

  $("#upload").click(function () {
    // console.log('上传');
    Swal.fire({
      title: '数据上传中/ Data Uploading',
      icon: 'info',
      allowOutsideClick: false,
      showConfirmButton: false
    });
    var fileInput = document.getElementById('take-photo');
    var file = fileInput.files[0]; // 获取选中的文件对象
    if (file) {
      // 读取文件内容为一个数据URL
      let currentDateTime = getCurrentDateTime();
      let filename = currentDateTime + '_' + global_Process + '_' + global_Name;
      // console.log('filename', filename);
      let reader = new FileReader();
      reader.onload = function (e) {
        var dataURL = reader.result;
        var base64 = dataURL.split(',')[1]; // 获取base64编码部分

        // 调用Google Apps Script的uploadFileToDrive函数来处理文件上传
        google.script.run.withSuccessHandler(function (response) {
          Swal.close();
          // 清空输入框
          fileInput.value = '';
          Swal.fire({
            title: '保存成功/ Saving Success',
            icon: 'success'
          });
          console.log('文件上传成功:', response);
          // 这里可以添加上传成功后的逻辑
        }).withFailureHandler(function (error) {
          Swal.close();
          Swal.fire({
            icon: "error",
            title: "文件上传失败"
          })
          console.error('文件上传失败:', error);
          // 这里可以添加上传失败后的逻辑
        }).uploadFileToDrive(base64, filename, file.type);
      };
      reader.readAsDataURL(file); // 开始读取文件
    } else {
      alert('请选择一个文件上传。');
    }
  })

  $(document).on('click', '.add-input-group', function () {
    var newInputGroup = $('<div class="input-group dynamic-follow-group">' +
      '<input type="number" step="1" class="form-control follow-cavity" placeholder="跟从穴号/ Follow Cavity">' +
      '<div class="arrow">&rarr;</div>' +

  function toggleInputBasedOnRadio(radioYesId, radioNoId, inputId) {
    if ($('#' + radioYesId).is(':checked')) {
      $('#' + inputId).prop('disabled', false); // 启用输入框
    } else if ($('#' + radioNoId).is(':checked')) {
      $('#' + inputId).prop('disabled', true); // 禁用输入框
    }
  }

  // 使用事件委托为所有单选按钮组添加事件监听器
  $(document).on('change', 'input[type=radio]', handleRadioButtonChange);

  // 定义一个函数来处理单选按钮的变化
  function handleRadioButtonChange() {
    let name = $(this).attr('name');
    let suffix = name.endsWith('2') ? '2' : ''; // 检查是否有后缀 '2'
    name = name.replace('2', ''); // 移除后缀 '2' 以获取基本名称

    switch (name) {
      case 'EquM':
        toggleInputBasedOnRadio(`EquM_Y${suffix}`, `EquM_N${suffix}`, `EquMDescription${suffix}`);
        break;
      case 'MoldM':
        toggleInputBasedOnRadio(`MoldM_Y${suffix}`, `MoldM_N${suffix}`, `MoldMDescription${suffix}`);
        break;
      case 'AutoM':
        toggleInputBasedOnRadio(`AutoM_Y${suffix}`, `AutoM_N${suffix}`, `AutoMDescription${suffix}`);
        break;
      case 'ProcessAD':
        toggleInputBasedOnRadio(`ProcessAD_Y${suffix}`, `ProcessAD_N${suffix}`, `ProcessADDes${suffix}`);
        break;
      case 'Follow':
        // 特殊情况，因为这里控制的是两个输入框
        if ($(`#Follow_Y${suffix}`).is(':checked')) {
          $(`.follow-cavity${suffix}, .followed-cavity${suffix}`).prop('disabled', false); // 启用输入框
          $(`.add-input-group${suffix}`).prop('disabled', false); // 启用按钮
        } else {
          $(`.follow-cavity${suffix}, .followed-cavity${suffix}`).prop('disabled', true); // 禁用输入框
          $(`.add-input-group${suffix}`).prop('disabled', true); // 禁用按钮
        }
        break;
      default:
        if (name.startsWith('FP_')) {
          toggleInputBasedOnRadio(`${name}_Y`, `${name}_N`, `${name}_Description`);
        }
        break;
    }
  }
</script>
