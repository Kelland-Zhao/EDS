<script>

  /**============定义变量？============**/
  let timerInterval;
  let clickNum = 0;
  let arrAlreadyPointCheckData = [];

  /**============禁用鼠标右键============**/
  window.onload = function () {
    document.onkeydown = function () {
      let e = window.event || arguments[0];
      if (e.keyCode == 123) {
        return false;
      } else if ((e.ctrlKey) && (e.shiftKey) && (e.keyCode == 73)) {
        return false;
      }
    };
    document.oncontextmenu = function () {
      return false;
    };
  }

  /**============加载页面载入数据============**/
  $(document).ready(async function () {
    initializeMaterialCSS();
    let name = $("#name").text();
    let id = $("#id").text();
    let userType = $("#userType").text();
    if (!name && !id && !userType) {
      name = sessionStorage.getItem('name');
      id = sessionStorage.getItem('id');
      userType = sessionStorage.getItem('userType');
    }
    else {
      sessionStorage.setItem('name', name);
      sessionStorage.setItem('id', id);
      sessionStorage.setItem('userType', userType);
    }
    document.getElementById('name').textContent = name;
    document.getElementById('id').textContent = '328' + id;
    document.getElementById('userType').textContent = userType;
    let workshop = "";
    let process = "";
    let { value: type } = await swal.fire({
      allowOutsideClick: false,
      title: '链接部门工序',
      input: 'select',
      inputOptions: {
        TB1_INJ: 'TB1注塑',
        TB1_TF: 'TB1植磨毛',
        TB1_PK: 'TB1包装',
        TB2_INJ: 'TB2注塑',
        TB2_TF: 'TB2植磨毛',
        TB2_PK: 'TB2包装'
      },
      inputPlaceholder: '请选择部门工序',
      showCancelButton: true,
      inputValidator: (value) => {
        return new Promise((resolve) => {
          if (value !== '') {
            resolve()
          } else {
            resolve('请选择部门工序')
          }
        })
      }
    })
    if (type) {
      workshop = type.split("_")[0];
      process = type.split("_")[1];
      showRunning('正在加载点检标准数据……', '', '', 120000, '');
      google.script.run.withFailureHandler(judgeFailure).withSuccessHandler(main).getData_PointCheck(workshop, process);
    }
    else {
      console.log("取消")
    }
  });

  /**============初始化============**/
  function initializeMaterialCSS() {
    $('.parallax').parallax();
    $('.dropdown-trigger').dropdown();
    $('select').formSelect();
    $('.sidenav').sidenav();
    $('.modal').modal();
    $('.datepicker').datepicker({ format: 'yyyy-mm-dd', autoClose: true });
  }

  /**============载入后台数据，加载监控函数============**/
  function main(result) {
    let arr_workcenter = new Array();
    if (result[0] == "OK") {
      let info = JSON.parse(result[1]);
      arrAlreadyPointCheckData = info.alreadyPointCheckData;
      console.log(info)
      let user_EQU = info.user;
      let idList = info.user.map((r) => { return r[0] })
      let userData = new Array();
      for (i = 0; i < user_EQU.length; i++) {
        userData.push({ id: user_EQU[i][0], text: user_EQU[i][0] })
      };
      console.log(userData)
      $("#userID").select2({
        placeholder: "328工号",
        data: userData
      })
      $("#machine_type").select2({
        placeholder: "类型",
        minimumResultsForSearch: Infinity,  //隐藏搜索框
      })
      $("#frequency").select2({
        placeholder: "频次",
        minimumResultsForSearch: Infinity,  //隐藏搜索框
      })
      $("#pointChecker").select2({
        placeholder: "点检人",
        minimumResultsForSearch: Infinity,  //隐藏搜索框
      })
      /**============响应用户变更函数============**/
      $("#userID").change(() => {
        let position = idList.indexOf($("#userID").select2("val"))
        let userItem = info.user[position];
        $("#userName").val(userItem[1]);
        $("#workshop").val(info.loginWorkshop);
        $("#process").val(info.loginProcess);
        let selectData_pointChecker = [{ id: "", text: "点检人" }];
        let pointCheckerbyProcess = info.tasklist.filter((r) => { return r[9] == info.loginProcess });
        let arrPointCheckerbyProcess = [];
        pointCheckerbyProcess.forEach((r) => {
          if (arrPointCheckerbyProcess.indexOf(r[8]) == -1) {
            selectData_pointChecker.push({ id: r[8], text: r[8] });
            arrPointCheckerbyProcess.push(r[8]);
          }
        })
        $("#pointChecker").empty();
        $("#pointChecker").select2({
          data: selectData_pointChecker,
          placeholder: "点检人",
          minimumResultsForSearch: Infinity,  //隐藏搜索框
        })
        M.updateTextFields();
        /**============响应点检岗位变更函数============**/
        $("#pointChecker").change(() => {
          let pointChecker = $("#pointChecker").val();
          let selectData_machineType = new Array();
          let machineTypebyProcess = info.tasklist.filter((r) => { return r[9] == info.loginProcess && r[8] == pointChecker });
          let arrMachineTypebyProcess = [];
          machineTypebyProcess.forEach((r) => {
            if (arrMachineTypebyProcess.indexOf(r[7]) == -1) {
              selectData_machineType.push({ id: r[7], text: r[7] });
              arrMachineTypebyProcess.push(r[7]);
            }
          })
          $("#machine_type").empty();
          $("#machine_type").select2({
            data: selectData_machineType,
            placeholder: "类型",
            minimumResultsForSearch: Infinity,  //隐藏搜索框
          })
          M.updateTextFields()
        })
      })
      /**============响应点击获取检查清单按钮函数============**/
      $("#getCheckList").click(() => {
        /**============响应点检表操作按钮函数============**/
        window.fileOperatesEvents = {
          "click #uploadPic": function (e, value, row, index) {
            let tableRow = index + 1;
            $("#photoId").val("");
            $("#photoFile").val("");
            $("#photoFileHelp").html("");
            $("#photoPathName").val("");
            $("#modalTableRow").val(tableRow);
            // $("#modalPhoto").modal('open');
            let modalInstance = $('#modalPhoto').modal({
              dismissible: false    // This will prevent the modal from closing when clicking outside of it
            });
            // Open the modal
            modalInstance.modal('open');
          },
          "click #browserPic": function (e, value, row, index) {
            let tableRow = index + 1;
            let picId = $("#PointCheckTable").find("tr").eq(tableRow).find("td").eq(11).find("input").val();
            if (picId) {
              window.open("https://drive.google.com/file/d/" + picId + "/preview");
            }
            else {
              showRunResult('info', '', '点检人未提供图片', '', '', true, '');
            }
          }
        }
        /**========================**/
        arr_workcenter = new Array();
        arr_workcenter.push({ id: "机台", text: "",secondInfo: "" });
        let machineTypeTmep = $("#machine_type").select2("val");
        let pointCheckerTemp = $("#pointChecker").select2("val");
        let frequencyTemp = $("#frequency").select2("val");
        console.log('arrAlreadyPointCheckData', arrAlreadyPointCheckData)
        let arrAlreadyPointCheckDataTemp = arrAlreadyPointCheckData.filter(v => { return v[1] == frequencyTemp && v[2] == machineTypeTmep && v[3] == pointCheckerTemp }).map(v => { return v[0] });
        console.log('arrAlreadyPointCheckDataTemp', arrAlreadyPointCheckDataTemp)
        let workcenter = info.machine_info.filter((r) => { return r[1] == info.loginWorkshop && r[2] == $("#machine_type").select2("val") && r[4] == pointCheckerTemp && arrAlreadyPointCheckDataTemp.indexOf(r[5]+r[3])==-1});
        console.log('workcenter', workcenter)
        workcenter.forEach((r) => {
          arr_workcenter.push({ id: r[3], text: r[3],secondInfo: r[6] })
        });
        $("#workcenter").empty();
        $("#workcenter").select2({
          data: arr_workcenter,
          placeholder: "机台号",
          templateResult: formatOption, // 设置自定义模板
          width: '18.5vw'
        })

        // 创建自定义模板函数
        function formatOption(option) {
          // 如果option没有第二信息，返回原始内容
          if (!option.id) {
            return option.text;
          }
          
          // 使用option的data属性来获取第二信息
          let secondInfo = option.secondInfo;

          let $result =$('<span>' + '' + '</span><span class="second-info" style="margin-left:10px;color:red;font-size:xx-small">' + '' + '</span>')
          // 构建新的显示内容，包括第二信息
          if(secondInfo){
            $result = $('<span>' + option.text + '</span><span class="second-info" style="margin-left:10px;color:red;font-size:xx-small">' + secondInfo + '</span>');
          }
          else{
            $result = $('<span>' + option.text + '</span><span class="second-info" style="margin-left:10px;color:red;font-size:xx-small">' + '' + '</span>');
          }
          return $result;
        }

        $("#checkTeam").select2({
          placeholder: "班别",
          width: '7.5vw',
          minimumResultsForSearch: Infinity,  //隐藏搜索框
        })
        M.updateTextFields()
        $("#ownner").val($("#userName").val());
        $("#frequency2").val($("#frequency").select2("val"));
        let data = [$("#userID").select2("val"), $("#userName").val(), $("#workshop").val(), $("#process").val(), $("#frequency").select2("val"), $("#machine_type").select2("val")];
        if (data.every((r) => { return r != "" }) == false) {
          showRunFalilure('', '内容未填写完整', '', '', '');
          return false
        }
        $("#date").val(dayjs(new Date()).format("YYYY/MM/DD"));
        let tasklist = info.tasklist.filter((r) => { return r[7] == $("#machine_type").select2("val") && r[6] == $("#frequency2").val() && r[8] == $("#pointChecker").select2("val") })
        if (tasklist == "") {
          showRunResult('info', '', '不存在该项检查', '', '', true, '')
          return false
        }
        let arr_tasklist = new Array();
        tasklist.forEach((r) => {
          arr_tasklist.push({
            unite: r[0],
            module: r[1],
            checkStd: r[2],
            tool: r[3],
            way: r[4],
            machineStatus: r[5],
            frequency: r[6],
            ownner: r[9]
          })
        })
        $("#PointCheckTable").bootstrapTable({
          data: arr_tasklist
        })
        $("#part2").css("display", "block");
        $("#getCheckList").prop("disabled", true);
        $("#userID").prop("disabled", true);
        $("#frequency").prop("disabled", true);
        $("#pointChecker").prop("disabled", true);
        $("#machine_type").prop("disabled", true);
        M.updateTextFields()
        /**============响应模态框图片文件变更函数============**/
        $("#photoFile").on("change", function () {
          let tbody = $("#newAmTbody");
          let file1, reader1 = new FileReader();
          let fileName = dayjs(new Date()).format("YYYY-MM-DD_HH:mm:ss:SSS");
          file1 = $('#photoFile')[0].files[0];
          if (!file1) {
            showRunResult('info', '', '未选择文件', '', '', true, '')
            $('#photoId').val("");
            $('#photoFileHelp').addClass('red-text').html("请选择文件……");
            return false;
          }
          else {
            let Compressor = window.Compressor;
            new Compressor(file1, {
              quality: 0.5,
              success(result) {
                showPhotoMessage("正在上传……");
                reader1.readAsDataURL(result);
              },
              error(err) {
                console.log(err.message);
              }
            })
            reader1.onloadend = function (e) {
              google.script.run.withSuccessHandler(showPhotoMessage).uploadPhotoFileToGoogleDrive(e.target.result, fileName);
            }
          }
        });
        /**============显示图片上传过程信息函数============**/
        function showPhotoMessage(result) {
          if (timerInterval) { clearInterval(timerInterval) }
          let startTime = 120;
          let e = result;
          if (e.toString().indexOf('正在上传') != -1) {
            $('#photoId').val("正在上传……");
            $('#photoFileHelp').addClass('red-text').html("正在上传……");
            timerInterval = setInterval(() => {
              $('#photoFileHelp').removeClass('red-text').html("正在上传……" + startTime.toFixed(0) + "秒");
              startTime = startTime - 1;
              if (startTime <= 1) {
                if (timerInterval) { clearInterval(timerInterval) }
                $('#photoFileHelp').removeClass('red-text').html("尝试点击按钮再上传一次");
                showRunResult('error', '', '程序在2分钟内未响应', '', '', true, '尝试点击按钮再来一次')
              }
            }, 1000)
          }
          else if (e.toString().indexOf("错误") == -1) {
            $('#photoId').val(e);
            let html = '<a href=https://drive.google.com/file/d/' + e + '/preview target="_blank"' + '>预览图片' + '</a>';
            $('#photoFileHelp').removeClass('red-text').html(html);
          }
          else {
            $('#photoId').val(e);
            $('#photoFileHelp').addClass('red-text').html(e);
          }
        }
        /**============响应点击模态框提交按钮函数============**/
        $("#modalBtnSubmitPhoto").on("click", function () {
          let trSeq = $("#modalTableRow").val();
          let tbody = $("#PointCheckTable");
          let picId = $('#photoId').val();
          if (picId.toString().indexOf("正在上传") != -1) {
            showRunResult('info', '请稍候……', '有图片正在上传', '', '', true, '');
          }
          else if (picId.toString().indexOf("错误") != -1) {
            showRunResult('error', '', '图片上传出错', '', '', true, '')
          }
          else {
            tbody.find("tr").eq(trSeq).find("td").eq(11).find("input").val(picId);
            $("#modalPhoto").modal('close');
          }
        });
      })
      /**============响应机台变更函数============**/
      $("#workcenter").change(() => {
        info.machine_info.forEach((r) => {
          if (r[3] == $("#workcenter").select2("val")) {
            $("#workshop2").val(r[1])
          }
        })
        M.updateTextFields()
      })
      /**============响应点检表单元格变更函数============**/
      $("#PointCheckTable").on("change", "td", function () {
        let tdSeq = $(this).index();
        if (tdSeq == 8) {
          let objChecked = $(this).find("input").eq(0).is(":checked")
          if (objChecked) {
            $(this).next().next().find("input").eq(0).prop("checked", true);
            $(this).next().next().find("input").eq(0).prop("disabled", true);
          }
          else {
            $(this).next().next().find("input").eq(0).prop("checked", false);
            $(this).next().next().find("input").eq(0).prop("disabled", false);
          }
        }
        if (tdSeq == 10) {
          let objChecked = $(this).find("input").eq(0).is(":checked")
          if (!objChecked) {
            $(this).prev().prev().find("input").eq(0).prop("checked", false);
          }
        }
      })
      /**============响应点击提交按钮函数============**/
      $("#submit").click(() => {
        let selectWorkcenterInfo=arr_workcenter.filter(v=>v.id==$("#workcenter").select2("val"))[0].secondInfo;
        let weekPointCheck=new Date().getYearWeek();
        let datePointCheck=dayjs(new Date()).format("YYYYMMDD");
        let datePointCheckFormat=dayjs(new Date()).format("YYYY-MM-DD");
        if(selectWorkcenterInfo){weekPointCheck=selectWorkcenterInfo.split("_")[0];datePointCheck=dayjs(new Date(selectWorkcenterInfo.split("_")[1])).format("YYYYMMDD");datePointCheckFormat=dayjs(new Date(selectWorkcenterInfo.split("_")[1])).format("YYYY-MM-DD")}

        let obj = {
          code: datePointCheck + weekPointCheck + $("#workcenter").val(),
          workshop: $("#workshop2").val(),
          process: $("#process").val(),
          machinetype: $("#machine_type").select2("val"),
          frequency: $("#frequency").select2("val"),
          pointChecker: $("#pointChecker").select2("val"),
          ownner: $("#ownner").val(),
          date: dayjs(new Date()).format("YYYY/MM/DD-HH:mm"),
          workcenter: $("#workcenter").select2("val"),
          checkTeam: $("#checkTeam").select2("val")
        }
        if ((Object.values(obj).every((r) => { return r != "" }) == false) || obj.workcenter.length < 3) {
          swal.fire({
            allowOutsideClick: false,
            title: "内容填写有误",
            icon: "warning",
            showCancelButton: true,
            // confirmButtonColor:'#3085d6',
            // cancelButtonColor:'#d33',
            confirmButtonText: '是，返回重填!',
            cancelButtonText: '否,重置重选'
          }).then((result) => {
            if (result.value) {
              return false;
            }
            else {
              $("#getCheckList").prop("disabled", false);
              $("#workcenter").val("").select2();
              $("#PointCheckTable").bootstrapTable('destroy');
              $("#part2").css("display", "none");
              $("#userID").prop("disabled", false);
              $("#frequency").prop("disabled", false);
              $("#pointChecker").prop("disabled", false);
              $("#machine_type").prop("disabled", false);
              return false;
            }
          })
        }
        else {
          let tableData = new Array();
          for (i = 0; i < $("#PointCheckTable").find("tbody").find("tr").length; i++) {
            let rowData = new Array();
            let taskNo = (i + 1).toString();
            for (let l = taskNo.length; l < 3; l++) {
              taskNo = "0" + taskNo;
            }
            taskNo = $("#PointCheckTable").find("tbody").find("tr").eq(i).find("td").eq(7).text() + "PC" + taskNo;
            rowData.push(taskNo)
            for (j = 0; j < $("#PointCheckTable").find("tbody").find("tr").eq(i).find("td").length - 4; j++) {
              rowData.push($("#PointCheckTable").find("tbody").find("tr").eq(i).find("td").eq(j).text())
            }
            rowData.push($("#PointCheckTable").find("tbody").find("tr").eq(i).find("input").eq(0).is(":checked"))
            rowData.push($("#PointCheckTable").find("tbody").find("tr").eq(i).find("textarea").val())
            rowData.push($("#PointCheckTable").find("tbody").find("tr").eq(i).find("input").eq(1).is(":checked"))
            rowData.push($("#PointCheckTable").find("tbody").find("tr").eq(i).find("input").eq(2).val())
            tableData.push(rowData)
          }
          let a = true;
          tableData.forEach((r) => {
            if ((!r[9] && r[11] && r[10] == "")||(!r[9] && !r[11] && (r[10] == ""||r[12]==""))) {
              a = false
            }
          })
          if (a == false) {
            swal.fire({
              allowOutsideClick: false,
              title: "存在异常问题，未填写备注和上传照片",
              icon: "warning",
              showCancelButton: true,
              // confirmButtonColor:'#3085d6',
              // cancelButtonColor:'#d33',
              confirmButtonText: '是，返回重填!',
              cancelButtonText: '否,重置重选'
            }).then((result) => {
              if (result.value) {
                return false;
              }
              else {
                $("#getCheckList").prop("disabled", false);
                $("#workcenter").val("").select2();
                $("#PointCheckTable").bootstrapTable('destroy');
                $("#part2").css("display", "none");
                $("#userID").prop("disabled", false);
                $("#frequency").prop("disabled", false);
                $("#pointChecker").prop("disabled", false);
                $("#machine_type").prop("disabled", false);
                return false;
              }
            })
          }
          else {
            obj.tableData = tableData
            let jsonName = ["单元", "部位及内容", "检查标准", "使用工具", "方法", "设备状态", "检查频率", "点检人", "检查状态", "备注", "是否解决", "图片"];
            let arrPmInfoJson = [obj.code, obj.workshop, obj.process, obj.machinetype, obj.frequency, obj.pointChecker, obj.ownner, obj.date, obj.workcenter, obj.checkTeam];
            let arrPmInfo = [];
            let objAll = {};
            let objFalseNoSolved = {};
            let objFalseSolved = {};
            let objRemark = {};
            let arrJson = [];
            let arrJsonFalseNoSolved = [];
            let arrJsonFalseSolved = [];
            let arrJsonRemark = [];
            let numTrue = 0;
            let numFalseNoSolved = 0;
            let numFalseSolved = 0;
            let numRemark = 0;
            for (i = 0; i < $("#PointCheckTable").find("tbody").find("tr").length; i++) {
              objAll = {};
              objFalseNoSolved = {};
              objFalseSolved = {};
              objRemark = {};
              arrPmInfo.push([obj.code, obj.workshop, obj.process, obj.machinetype, obj.frequency, obj.ownner, obj.date, obj.workcenter, obj.workcenter, obj.checkTeam]);
              let taskNo = (i + 1).toString();
              for (let l = taskNo.length; l < 3; l++) {
                taskNo = "0" + taskNo;
              }
              taskNo = $("#PointCheckTable").find("tbody").find("tr").eq(i).find("td").eq(7).text() + "PC" + taskNo;
              objAll["编号"] = taskNo;
              let c = $("#PointCheckTable").find("tbody").find("tr").eq(i).find("input").eq(0).is(":checked");
              let d = $("#PointCheckTable").find("tbody").find("tr").eq(i).find("textarea").val();
              let e = $("#PointCheckTable").find("tbody").find("tr").eq(i).find("input").eq(1).is(":checked");
              let f = $("#PointCheckTable").find("tbody").find("tr").eq(i).find("input").eq(2).val();
              if (!c && !e) { objFalseNoSolved["编号"] = taskNo; }
              if (!c && e) { objFalseSolved["编号"] = taskNo; }
              if (d) { objRemark["编号"] = taskNo; }
              for (j = 0; j < $("#PointCheckTable").find("tbody").find("tr").eq(0).find("td").length - 4; j++) {
                let b = $("#PointCheckTable").find("tbody").find("tr").eq(i).find("td").eq(j).text();
                objAll[jsonName[j]] = b;
                arrPmInfo[arrPmInfo.length - 1].push(b);
                if (!c && !e) { objFalseNoSolved[jsonName[j]] = b; }
                if (!c && e) { objFalseSolved[jsonName[j]] = b; }
                if (d) { objRemark[jsonName[j]] = b; }
              }
              objAll["检查状态"] = c;
              objAll["备注"] = d;
              objAll["是否解决"] = e;
              objAll["图片"] = f;
              if (c) { numTrue = numTrue + 1 } else if (!e) { numFalseNoSolved = numFalseNoSolved + 1; objFalseNoSolved["检查状态"] = c; objFalseNoSolved["备注"] = d; objFalseNoSolved["是否解决"] = e; objFalseNoSolved["图片"] = f; arrJsonFalseNoSolved.push(objFalseNoSolved); } else if (e) { numFalseSolved = numFalseSolved + 1; objFalseSolved["检查状态"] = c; objFalseSolved["备注"] = d; objFalseSolved["是否解决"] = e; objFalseSolved["图片"] = f; arrJsonFalseSolved.push(objFalseSolved); }
              if (d) { numRemark = numRemark + 1; objRemark["检查状态"] = c; objRemark["备注"] = d, objRemark["是否解决"] = e; objRemark["图片"] = f; arrJsonRemark.push(objRemark); }
              arrJson.push(objAll);
              arrPmInfo[arrPmInfo.length - 1].push(c);
              arrPmInfo[arrPmInfo.length - 1].push(d);
              arrPmInfo[arrPmInfo.length - 1].push(e);
              arrPmInfo[arrPmInfo.length - 1].push(f);
            }
            let taskNums = numTrue + numFalseNoSolved + numFalseSolved;
            arrPmInfoJson.push(JSON.stringify(arrJson), taskNums, JSON.stringify(arrJsonFalseSolved), numFalseSolved, JSON.stringify(arrJsonFalseNoSolved), numFalseNoSolved, JSON.stringify(arrJsonRemark), numRemark);
            console.log(arrPmInfoJson);
            showRunning('', '正在保存点检数据……', '', 120000, '');
            google.script.run.withFailureHandler(judgeFailure).withSuccessHandler((resultSave) => {
              if (resultSave[0] == "OK") {
                let thisYearWeek = new Date(datePointCheckFormat).getYearWeek();

  $("#customSelect").on("dblclick", function () {

    let rowCheck;
    if (clickNum % 2 == 0) {
      for (let i = 1; i < rows; i++) {
        rowCheck = table.find("tr").eq(i).find("input").eq(0);
        if (!rowCheck.is(':checked')) {
          rowCheck.prop('checked', true);
        }
        rowCheck = table.find("tr").eq(i).find("input").eq(1);
        if (!rowCheck.is(':checked')) {
          rowCheck.prop('checked', true);
          rowCheck.prop('disabled', true);
        }
      }
    }
    else {
      for (let i = 1; i < rows; i++) {
        rowCheck = table.find("tr").eq(i).find("input").eq(0);
        if (rowCheck.is(':checked')) {
          rowCheck.prop('checked', false);
        }
        rowCheck = table.find("tr").eq(i).find("input").eq(1);
        if (rowCheck.is(':checked')) {
          rowCheck.prop('checked', false);
          rowCheck.prop('disabled', false);
        }
      }
    }
    clickNum = clickNum + 1;
  })

  /**============获取日期所在年周的周【方法2】(每年第一天早于周四，第一周延后七天)============**/
  Date.prototype.getWeek = function () {
    /**截掉时分秒保留整数天**/
    let date = new Date(this || new Date());
    /**设置日期为当前周周四**/
    date.setDate(date.getDate() + (4 - (date.getDay() || 7)));
    let year = date.getFullYear();
    let firstDate = new Date(year, 0, 1);
    firstDate.setDate(firstDate.getDate() + (4 - (firstDate.getDay() || 7)));
    /**当年第一天早于周四 第一周延后七天**/
    if (firstDate.getFullYear() < year) {
      firstDate.setDate(firstDate.getDate() + 7);
    }
    /**计算当前周和第一周之间周数差**/
    let weekNum = Math.ceil(((date - firstDate) / 86400000 + 1) / 7);
    weekNum = weekNum < 10 ? "0" + weekNum : weekNum;
    return "W" + weekNum;
  }

  /**============获取日期所在年周的年周【方法2】(每年第一天早于周四，第一周延后七天)============**/
  Date.prototype.getYearWeek = function () {
    /**截掉时分秒保留整数天**/
    let date = new Date(this || new Date());
    /**设置日期为当前周周四**/
    date.setDate(date.getDate() + (4 - (date.getDay() || 7)));
    let year = date.getFullYear();
    let firstDate = new Date(year, 0, 1);
    firstDate.setDate(firstDate.getDate() + (4 - (firstDate.getDay() || 7)));
    /**当年第一天早于周四 第一周延后七天**/
    if (firstDate.getFullYear() < year) {
      firstDate.setDate(firstDate.getDate() + 7);
    }
    /**计算当前周和第一周之间周数差**/
    let weekNum = Math.ceil(((date - firstDate) / 86400000 + 1) / 7);
    weekNum = weekNum < 10 ? "0" + weekNum : weekNum;
    return year + "W" + weekNum;
  }

  /**============显示函数运行状态============**/
  function showRunning(strTitle, strText, strHtml, times, strFooter) {
    if (timerInterval) { clearInterval(timerInterval) }
    swal.fire({
      allowOutsideClick: false,
      icon: 'info',
      title: strTitle,
      text: strText,
      html: '窗口将在 <b></b> 秒内自动关闭.',
      timer: times,
      footer: strFooter,
      timerProgressBar: true,
      onBeforeOpen: () => {
        if (timerInterval) { clearInterval(timerInterval) }
        Swal.showLoading()
        const b = Swal.getContent().querySelector('b')
        timerInterval = setInterval(() => {
          b.textContent = (Swal.getTimerLeft() / 1000).toFixed(0);
        }, 1000)
      },
      onClose: () => {
        if (timerInterval) { clearInterval(timerInterval) }
      }
    }).then((result) => {
      if (result.dismiss === Swal.DismissReason.timer) {
        if (timerInterval) { clearInterval(timerInterval) }
        Swal.fire("程序在2分钟内未响应,尝试点击按钮再来一次");
      }
    });
  }

  /**============显示函数运行结果============**/
  function showRunResult(strIcon, strTitle, strText, strHtml, times, booleanButton, strFooter) {
    if (timerInterval) { clearInterval(timerInterval) }
    swal.fire({ allowOutsideClick: false, icon: strIcon, title: strTitle, text: strText, html: strHtml, timer: times, showConfirmButton: booleanButton, footer: strFooter });
  }
