<script>
  let global_UserData = [];
  // <!--  -->
  $(document).ready(() => {
    google.script.run.withSuccessHandler(htmlGetReleaseWebPage).getReleaseWebPage();
    function htmlGetReleaseWebPage(result) {
      sessionStorage.setItem("siWebPage", result)
    }
    google.script.run.withSuccessHandler(getName).getUseID();
    initializeMaterialCSS();
  })

  // <!--  -->
  function initializeMaterialCSS() {
    $('select').formSelect();
    $('.sidenav').sidenav();
    $('.datepicker').datepicker();
    $('.dropdown-trigger').dropdown();
    $('.tabs').tabs();
    $('.modal').modal();
  }

  // <!--  -->
  $("#login").click(() => {
    let pd = $("#pd").val();
    let id = $("#id").val();
    sessionStorage.setItem('id', id);

    if (id == '') {
      swal.fire('请输入328工号');
      return false;
    }
    else {
      if (pd == '') {
        swal.fire('请输入密码');
        return false;
      }
      else {
        google.script.run.withSuccessHandler((a) => {
          // console.log(a, pd);
          if (a == pd) {
            let process = '';
            let ID = '';
            let name = '';
            let workshop = '';
            global_UserData.forEach((r) => {
              if (r['工号'] == id) {
                process = r['工序'];
                ID = r['工号'];
                name = r['姓名'];
                workshop = r['车间'];
                sessionStorage.setItem('ID', r['工号']);
                sessionStorage.setItem('Name', r['姓名']);
                sessionStorage.setItem('PWD', r['密码']);
                sessionStorage.setItem('Process', r['工序']);
                sessionStorage.setItem('Workshop', r['车间']);
              }
            })
            console.log(ID, process, name, workshop)
            if (process == 'INJ') {

              window.open(sessionStorage.getItem("siWebPage") + "?v=Navigation"
                + '&ID=' + encodeURIComponent(id)
                + '&Name=' + encodeURIComponent(name)
                + '&Process=' + encodeURIComponent(process)
                + '&Workshop=' + encodeURIComponent(workshop))
            }
            else {
              window.open(sessionStorage.getItem("siWebPage") + "?v=PM_Plan");//+"&webPage="+sessionStorage.getItem("siWebPage")
            }


          } else {
            swal.fire('密码错误');
          }
        }).IdCheck(id);
      }
    }
    // if (id == '') {
    //   swal.fire('请输入328工号');
    //   return false;
    // }
    // else {
    //   if (pd == '') {
    //     swal.fire('请输入密码');
    //     return false;
    //   }
    //   else {
    //     google.script.run.withSuccessHandler((a) => {
    //       console.log(a, pd);
    //       if (a == pd) {
    //         window.open(sessionStorage.getItem("siWebPage") + "?v=PM_Plan");//+"&webPage="+sessionStorage.getItem("siWebPage")
    //       } else {
    //         swal.fire('密码错误');
    //       }
    //     }).IdCheck(id);
    //   }
    // }

    $("#Name,#id,#pd").val("");
  })

  $("#viewData").click(() => {
    window.open(sessionStorage.getItem("siWebPage") + "?v=ViewHistory")
  })

  // <!--  -->
  function getName(userID) {
    // console.log(userID);

    for (let i = 0; i < userID.length; i++) {
      let obj = {};
      obj['工号'] = userID[i][0];
      obj['姓名'] = userID[i][1];
      obj['密码'] = userID[i][2];
      obj['车间'] = userID[i][13];
      obj['工序'] = userID[i][14];
      obj['职位'] = userID[i][15];
      global_UserData.push(obj);
    }
    console.log(global_UserData)
    let id = new String();
    let position = new String();
    let idList = new Array();
    let nameList = new Array();
    $("#login").prop("disabled", false);
    $("#id").change(() => {
      id = $("#id").val()
      if (id.length == 5) {
        idList = userID.map(function (r) { return r[0] });
        nameList = userID.map(function (r) { return r[1] });
        typeList = userID.map(function (r) { return r[15] });
        position = idList.indexOf(id);
        if (position > -1) {
          name = nameList[position]
          userType = typeList[position]
          sessionStorage.setItem('name', name);     //储存姓名
          sessionStorage.setItem('userType', userType);
          google.script.run.writeUserLogInformation(id, name);
        } else {
          name = "用户不存在"
        }
        $("#Name").val(name);
        M.updateTextFields();
      } else {
        $("#Name").val("请输入正确的工号");
        M.updateTextFields();
      }
    })
  }

  // <!--  -->
  function modal() {
    document.getElementById('myModal').style.display = "block";
  }

  // <!-- 点击 <span> (x), 关闭弹窗 -->
  function closeModal() {
    document.getElementById('myModal').style.display = "none";
  }

  // <!-- 在用户点击其他地方时，关闭弹窗 -->
  window.onclick = function (event) {
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }

  // <!--  -->
  $("#confirmChange").click(() => {
    let id = $("#id1").val();
    let oldPd = $("#oldPd").val();
    let new_Pd = $("#newPd").val();
    let confirmPd = $("#confirmPd").val();
    let info = [id, oldPd, new_Pd, confirmPd];
    google.script.run.withSuccessHandler((a) => {
      swal.fire(a)
    }).changePassword(info);

    $("#id1,#oldPd,#newPd,#confirmPd").val("");
  })

</script>
