<script>
  var globalName = sessionStorage.getItem('Name') || '';
  var globalId = sessionStorage.getItem('ID') || '';
  var globalProcess = sessionStorage.getItem('Process') || '';
  var globalWorkshop = sessionStorage.getItem('Workshop') || '';
  var siWebPage = sessionStorage.getItem('siWebPage') || '';
  sessionStorage.setItem('siWebPage', siWebPage);

  var globalData = null;
  var minDate = null;
  var maxDate = null;
  var totalDays = 0;
  var today = new Date();
  today.setHours(0, 0, 0, 0);

  $(document).ready(function() {
    $('#userInfo').text(globalName + ' | ' + globalProcess);
    loadData();
    preloadUserList();

    $('#refreshBtn').click(function() { loadData(); });
    $('#todayBtn').click(function() { scrollToToday(); });
    $('#saveBtn').click(function() { saveUpdates(); });
    $('#addProjectBtn').click(function() { openAddModal(); });
    $('#addSubmitBtn').click(function() { submitAddProject(); });

    // Status editor check
    var isLyon = (globalName === 'Lyon Zhang');
    if (isLyon) {
      $('#modalStatus').prop('disabled', false);
      $('#statusHelp').text('你可以修改状态 / You can edit status').css('color', '#E60012');
    }
  });

  // Preload user list at page init for instant add-modal open
  function preloadUserList() {
    google.script.run.withSuccessHandler(function(result) {
      try {
        var users = typeof result === 'string' ? JSON.parse(result) : result;
        if (!users.error && Array.isArray(users)) {
          userListCache = users.map(function(u) {
            return { id: u.display, text: u.display, name: u.name, display: u.display };
          });
        }
      } catch(e) { /* degrade gracefully */ }
    }).getUserList();
  }

  function loadData() {
    $('#loadingOverlay').show();
    $('#ganttContainer').hide();
    google.script.run
      .withSuccessHandler(function(result) {
        $('#loadingOverlay').hide();
        $('#ganttContainer').show();
        try {
          var data = typeof result === 'string' ? JSON.parse(result) : result;
          if (data.error) { Swal.fire('错误 / Error', data.error, 'error'); return; }
          globalData = data;
          renderGantt();
        } catch(e) {
          Swal.fire('错误 / Error', '数据解析失败 / Data parse error: ' + e.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        $('#loadingOverlay').hide();
        Swal.fire('错误 / Error', '加载失败 / Load failed: ' + err.message, 'error');
      })
      .getProjectTrackingData();
  }

  function parseDate(val) {
    if (!val || val === 'NA' || val === '') return null;
    // Handle Date objects (GAS getValues returns Date for date cells)
    if (Object.prototype.toString.call(val) === '[object Date]') {
      return new Date(val.getFullYear(), val.getMonth(), val.getDate());
    }
    var s = String(val).trim();
    // ISO timestamp from JSON: "2026-04-04T00:00:00.000Z"
    var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2]) - 1, parseInt(iso[3]));
    // YYYY-MM-DD
    var m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
    // M/D or M/D/YYYY
    m = s.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);
    if (m) {
      var year = m[3] ? parseInt(m[3]) : today.getFullYear();
      return new Date(year, parseInt(m[1]) - 1, parseInt(m[2]));
    }
    // Full date string from GAS: "Mon Apr 04 2026 ..."
    var jsDate = new Date(s);
    if (!isNaN(jsDate.getTime())) return new Date(jsDate.getFullYear(), jsDate.getMonth(), jsDate.getDate());
    return null;
  }

  function formatDateYMD(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
  }

  function normalizeDate(val) {
    if (!val || val === 'NA' || val === '') return '';
    if (Object.prototype.toString.call(val) === '[object Date]') {
      return formatDateYMD(val);
    }
    var d = parseDate(val);
    return d ? formatDateYMD(d) : String(val);
  }

  function formatHeader(header) {
    if (!header) return '';
    var parts = header.split(' / ');
    if (parts.length >= 2) {
      return parts[0] + '<br><small style="font-weight:normal;font-size:10px;">' + parts.slice(1).join(' / ') + '</small>';
    }
    return header;
  }

  function calculateDateRange() {
    if (!globalData || !globalData.projects) return;
    var allDates = [];
    globalData.projects.forEach(function(proj) {
      proj.milestones.forEach(function(ms) {
        var d = parseDate(ms.planned);
        if (d) allDates.push(d);
        d = parseDate(ms.actual);
        if (d) allDates.push(d);
      });
    });
    if (allDates.length === 0) {
      minDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      maxDate = new Date(today.getFullYear(), today.getMonth() + 3, 1);
    } else {
      allDates.sort(function(a, b) { return a - b; });
      minDate = new Date(allDates[0]);
      maxDate = new Date(allDates[allDates.length - 1]);
    }
    // Add 1 month margin on each side
    minDate = new Date(minDate.getFullYear(), minDate.getMonth() - 1, 1);
    maxDate = new Date(maxDate.getFullYear(), maxDate.getMonth() + 2, 0);
    totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
    if (totalDays < 30) totalDays = 30;
  }

  function getStatusColor(status) {
    switch (status) {
      case 'Done': return '#28a745';
      case 'Ongoing': return '#007bff';
      case 'Delayed': return '#dc3545';
      case 'Not start': return '#6c757d';
      default: return '#6c757d';
    }
  }

  function getStatusText(status) {
    switch (status) {
      case 'Done': return '已完成';
      case 'Ongoing': return '进行中';
      case 'Delayed': return '延误';
      case 'Not start': return '未开始';
      default: return status;
    }
  }

  function getMilestoneShortName(name) {
    if (!name) return '';
    var parts = name.split(' / ');
    var cn = parts[0] || name;
    // Use short label for display
    var map = {
      '模具/自动化改造（供应商）': '模具改造',
      'FAT': 'FAT',
      '现场安装': '现场安装',
      'IQ/OQ': 'IQ/OQ',
      '工程测试': '工程测试',
      'PQ': 'PQ',
      'Mass Production': 'MP'
    };
    return map[cn] || cn.substring(0, 6);
  }

  function getMilestoneColor(ms) {
    var actual = parseDate(ms.actual);
    if (actual) return '#28a745'; // green - has actual date
    var planned = parseDate(ms.planned);
    if (!planned) return '#adb5bd'; // gray - no date
    if (planned < today) return '#dc3545'; // red - overdue
    return '#adb5bd'; // gray - pending (future)
  }

  function getMilestoneTitle(ms) {
    var parts = ms.name.split(' / ');
    var shortName = parts[0] || ms.name;
    var lines = [shortName];
    if (ms.planned && ms.planned !== 'NA') {
      lines.push('计划: ' + normalizeDate(ms.planned));
    } else {
      lines.push('计划: NA');
    }
    if (ms.actual) {
      lines.push('实际完成: ' + normalizeDate(ms.actual));
      lines.push('状态: 已完成 / Completed');
    } else {
      var planned = parseDate(ms.planned);
      if (planned && planned < today) {
        lines.push('状态: 逾期未完成 / Overdue');
      } else if (planned) {
        lines.push('状态: 待完成 / Pending');
      } else {
        lines.push('状态: 无计划 / Not Scheduled');
      }
    }
    return lines.join('<br>');
  }

  function rgba(color, alpha) {
    // Convert hex to rgba for td backgrounds (opacity on td would fade ◆ too)
    var r = parseInt(color.slice(1,3), 16);
    var g = parseInt(color.slice(3,5), 16);
    var b = parseInt(color.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function renderGantt() {
    calculateDateRange();

    // Find earliest project start to trim leading empty months
    var trimStart = maxDate;
    globalData.projects.forEach(function(proj) {
      proj.milestones.forEach(function(ms) {
        var d = parseDate(ms.planned) || parseDate(ms.actual);
        if (d && d < trimStart) trimStart = d;
      });
    });
    // Align trimStart to first day of its month
    var effectiveMin = new Date(trimStart.getFullYear(), trimStart.getMonth(), 1);

    // Build month columns starting from effectiveMin
    var months = [];
    var cur = new Date(effectiveMin);
    while (cur <= maxDate) {
      months.push({
        label: cur.getFullYear() + '.' + (cur.getMonth() + 1),
        start: new Date(cur.getFullYear(), cur.getMonth(), 1),
        end: new Date(cur.getFullYear(), cur.getMonth() + 1, 0)
      });
      cur.setMonth(cur.getMonth() + 1);
    }

    function inMonth(date, month) {
      return date >= month.start && date <= month.end;
    }

    // Year row: group months by year
    var yearSpans = [];
    var lastYear = -1;
    for (var m = 0; m < months.length; m++) {
      var yr = parseInt(months[m].label.split('.')[0]);
      if (yr !== lastYear) {
        yearSpans.push({ year: yr, count: 1, start: m });
        lastYear = yr;
      } else {
        yearSpans[yearSpans.length - 1].count++;
      }
    }

    // Header: year row + month row
    var headHtml = '<tr>';
    headHtml += '<th rowspan="2">项目名称<br><small>Project Name</small></th>';
    headHtml += '<th rowspan="2">Leader<br><small>状态 Status</small></th>';
    for (var y = 0; y < yearSpans.length; y++) {
      var ys = yearSpans[y];
      headHtml += '<th colspan="' + ys.count + '" style="font-size:10px;">' + ys.year + '</th>';
    }
    headHtml += '<th rowspan="2" style="width:72px;">操作<br><small>Action</small></th>';
    headHtml += '</tr>';

    headHtml += '<tr>';
    for (var m = 0; m < months.length; m++) {
      headHtml += '<th style="font-size:9px;min-width:54px;">' + months[m].label.split('.')[1] + '月</th>';
    }
    headHtml += '</tr>';
    $('#ganttHead').html(headHtml);

    // Body
    var bodyHtml = '';
    globalData.projects.forEach(function(proj, idx) {
      var stColor = getStatusColor(proj.status);
      var stText = getStatusText(proj.status);
      var barBg = rgba(stColor, 0.25);

      // Project date span
      var projStart = null, projEnd = null;
      proj.milestones.forEach(function(ms) {
        var d = parseDate(ms.planned) || parseDate(ms.actual);
        if (d) {
          if (!projStart || d < projStart) projStart = d;
          if (!projEnd || d > projEnd) projEnd = d;
        }
      });

      // Build milestone lookup: monthIndex → [{color, title}]
      var msByMonth = {};
      proj.milestones.forEach(function(ms) {
        var planned = parseDate(ms.planned);
        if (!planned) return;
        for (var m = 0; m < months.length; m++) {
          if (inMonth(planned, months[m])) {
            if (!msByMonth[m]) msByMonth[m] = [];
            msByMonth[m].push({
              color: getMilestoneColor(ms),
              title: getMilestoneTitle(ms)
            });
            break;
          }
        }
      });

      bodyHtml += '<tr class="gantt-row">';
      bodyHtml += '<td class="gantt-info">' + proj.projectName + '</td>';
      // Leader + Status merged cell
      bodyHtml += '<td style="text-align:center;white-space:nowrap;font-size:12px;">' + proj.leader + '<br><span class="status-badge" style="background:' + stColor + ';">' + stText + '</span></td>';

      // Month cells
      for (var m = 0; m < months.length; m++) {
        var month = months[m];
        var cellStyle = 'text-align:center;vertical-align:middle;';
        var cellContent = '';

        // Bar background if project spans this month
        if (projStart && projEnd && projEnd >= month.start && projStart <= month.end) {
          cellStyle += 'background:' + barBg + ';';
        }

        // Today highlight
        var tdClass = inMonth(today, month) ? ' class="today-col"' : '';

        // Milestone ◆ diamonds — 16px with white border via text-shadow
        if (msByMonth[m]) {
          for (var n = 0; n < msByMonth[m].length; n++) {
            var item = msByMonth[m][n];
            cellContent += '<span class="ms-node" data-ms-title="' + item.title.replace(/"/g, '&quot;') + '" style="display:inline-block;margin:0 2px;font-size:20px;padding:2px 4px;line-height:1;color:' + item.color + ';cursor:pointer;text-shadow:-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">&#9670;</span>';
          }
        }

        bodyHtml += '<td' + tdClass + ' style="' + cellStyle + '">' + cellContent + '</td>';
      }

      // Update button — icon + text
      bodyHtml += '<td style="text-align:center;white-space:nowrap;width:72px;">';
      bodyHtml += '<button class="btn btn-sm btn-outline-danger gantt-update-btn" data-project="' + proj.projectName + '" title="更新 / Update" style="font-size:11px;">&#9998; 更新<br><small>Update</small></button>';
      bodyHtml += '</td>';
      bodyHtml += '</tr>';
    });

    $('#ganttBody').html(bodyHtml);

    // Custom jQuery hover tooltip — no Bootstrap/Popper dependency
    $('.ms-node').off('mouseenter mouseleave').on('mouseenter', function(e) {
      var $tip = $('#msTooltip');
      if (!$tip.length) {
        $tip = $('<div id="msTooltip" style="position:fixed;z-index:9999;max-width:200px;padding:6px 10px;background:rgba(0,0,0,0.85);color:#fff;border-radius:4px;font-size:12px;line-height:1.6;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>');
        $('body').append($tip);
      }
      $tip.html($(this).data('ms-title')).css({ left: e.clientX + 12, top: e.clientY - 8 }).show();
    }).on('mousemove', function(e) {
      $('#msTooltip').css({ left: e.clientX + 12, top: e.clientY - 8 });
    }).on('mouseleave', function() {
      $('#msTooltip').hide();
    });

    // Update button → open modal
    $('#ganttBody').on('click', '.gantt-update-btn', function() {
      openUpdateModal($(this).data('project'));
    });

    $('#dataRangeInfo').text('时间范围: ' + formatDateYMD(effectiveMin) + ' ~ ' + formatDateYMD(maxDate) + ' | 共 ' + months.length + ' 个月');
  }

  function scrollToToday() {
    var cell = $('.today-col').first();
    if (cell.length) {
      $('#ganttContainer').animate({
        scrollLeft: cell[0].offsetLeft - $('#ganttContainer').width() / 2
      }, 500);
    }
  }

  function openUpdateModal(projectName) {
    if (!globalData) return;
    var proj = null;
    for (var i = 0; i < globalData.projects.length; i++) {
      if (globalData.projects[i].projectName === projectName) {
        proj = globalData.projects[i];
        break;
      }
    }
    if (!proj) return;

    $('#modalProjectName').val(proj.projectName);
    $('#modalLeader').val(proj.leader);
    $('#modalStatus').val(proj.status);

    // Check if current user is Lyon Zhang
    var isLyon = (globalName === 'Lyon Zhang');
    $('#modalStatus').prop('disabled', !isLyon);

    // Build milestone rows
    var msHtml = '';
    proj.milestones.forEach(function(ms, i) {
      var plannedDisplay = normalizeDate(ms.planned) || (ms.planned === 'NA' ? 'NA' : ms.planned);
      msHtml += '<div class="modal-milestone-row">';
      msHtml += '<div class="modal-milestone-label">' + formatHeader(ms.name) + '</div>';
      msHtml += '<div class="modal-milestone-dates">';
      msHtml += '<div class="flex-fill"><label style="font-size:10px;color:#666;">计划日期<br><small>Planned (YYYY-MM-DD)</small></label><input type="text" class="form-control form-control-sm readonly-field" value="' + (plannedDisplay || '') + '" readonly></div>';
      msHtml += '<div class="flex-fill"><label style="font-size:10px;color:#666;">实际完成<br><small>Actual</small></label><input type="date" class="form-control form-control-sm ms-actual" data-ms-index="' + i + '" value="' + normalizeDate(ms.actual) + '"></div>';
      msHtml += '</div>';
      msHtml += '</div>';
    });
    $('#modalMilestones').html(msHtml);

    // Store current project for save
    $('#updateModal').data('projectName', proj.projectName);
    $('#updateModal').modal('show');
  }

  function saveUpdates() {
    var projectName = $('#updateModal').data('projectName');
    var newStatus = $('#modalStatus').val();
    var isStatusChanged = false;

    // Find project to compare status
    var proj = null;
    for (var i = 0; i < globalData.projects.length; i++) {
      if (globalData.projects[i].projectName === projectName) {
        proj = globalData.projects[i];
        break;
      }
    }
    if (proj && proj.status !== newStatus) {
      isStatusChanged = true;
    }

    var milestones = [];
    $('#modalMilestones .ms-actual').each(function() {
      var idx = parseInt($(this).data('msIndex'));
      var actual = $(this).val().trim();
      milestones.push({ index: idx, actual: actual });
    });

    var updates = { milestones: milestones };
    if (isStatusChanged) {
      updates.status = newStatus;
    }

    Swal.fire({
      title: '正在保存... / Saving...',
      allowOutsideClick: false,
      didOpen: function() { Swal.showLoading(); }
    });

    google.script.run
      .withSuccessHandler(function(result) {
        Swal.close();
        try {
          var res = typeof result === 'string' ? JSON.parse(result) : result;
          if (res.success) {
            Swal.fire('成功 / Success', res.message, 'success').then(function() {
              $('#updateModal').modal('hide');
              loadData();
            });
          } else {
            Swal.fire('失败 / Failed', res.message, 'error');
          }
        } catch(e) {
          Swal.fire('错误 / Error', e.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        Swal.close();
        Swal.fire('错误 / Error', '保存失败 / Save failed: ' + err.message, 'error');
      })
      .updateProjectTracking(projectName, JSON.stringify(updates), globalName);
  }

  // ==========================================
  // 添加项目 / Add Project
  // ==========================================
  var userListCache = null;

  function openAddModal() {
    // Build milestone date inputs
    var msNames = [
      '模具/自动化改造（供应商）<br><small>Tooling & Automation (Supplier)</small>',
      'FAT<br><small>FAT</small>',
      '现场安装<br><small>On-site Installation</small>',
      'IQ/OQ<br><small>IQ/OQ</small>',
      '工程测试<br><small>Engineering Test</small>',
      'PQ<br><small>PQ</small>',
      'Mass Production<br><small>Mass Production</small>'
    ];
    var msHtml = '';
    msNames.forEach(function(label, i) {
      msHtml += '<div class="modal-milestone-row">';
      msHtml += '<div class="modal-milestone-label" style="font-size:12px;font-weight:500;">' + label + '</div>';
      msHtml += '<div style="flex:1;"><input type="date" class="form-control form-control-sm add-ms-planned" data-ms-idx="' + i + '"></div>';
      msHtml += '</div>';
    });
    $('#addMilestones').html(msHtml);

    // Reset form
    $('#addProjectName').val('');
    $('#addStatus').val('Not start');

    // Init Select2 from cache (preloaded at page init)
    $('.select2-user').val(null).trigger('change');
    if ($('.select2-user').hasClass('select2-hidden-accessible')) {
      $('.select2-user').select2('destroy');
    }
    $('.select2-user').select2({
      data: userListCache || [],
      dropdownParent: $('#addModal'),
      templateResult: function(item) { return item.display || item.text; },
      templateSelection: function(item) { return item.name || item.text || ''; },
      placeholder: '请选择 / Select',
      allowClear: false,
      width: '100%'
    });

    $('#addModal').modal('show');
  }

  function submitAddProject() {
    var projectName = $('#addProjectName').val().trim();
    if (!projectName) {
      Swal.fire('提示 / Notice', '请输入项目名称 / Project name required', 'warning');
      return;
    }

    // Collect milestone planned dates
    var milestones = [];
    $('.add-ms-planned').each(function() {
      var val = $(this).val().trim();
      milestones.push(val || 'NA');
    });

    var data = {
      projectName: projectName,
      leader: $('#addLeader').val() || '',
      technician: $('#addTechnician').val() || '',
      status: $('#addStatus').val() || 'Not start',
      milestones: milestones
    };

    Swal.fire({
      title: '正在提交... / Submitting...',
      allowOutsideClick: false,
      didOpen: function() { Swal.showLoading(); }
    });

    google.script.run
      .withSuccessHandler(function(result) {
        Swal.close();
        try {
          var res = typeof result === 'string' ? JSON.parse(result) : result;
          if (res.success) {
            Swal.fire('成功 / Success', res.message, 'success').then(function() {
              $('#addModal').modal('hide');
              loadData();
            });
          } else {
            Swal.fire('失败 / Failed', res.message, 'error');
          }
        } catch(e) {
          Swal.fire('错误 / Error', e.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        Swal.close();
        Swal.fire('错误 / Error', '提交失败 / Submit failed: ' + err.message, 'error');
      })
      .addProject(JSON.stringify(data));
  }

  // Handle empty state
  function onFailure(error) {
    $('#loadingOverlay').hide();
    Swal.fire({
      icon: 'error',
      title: '加载失败 / Load Failed',
      text: error.message || '未知错误 / Unknown error',
      confirmButtonText: '重试 / Retry',
      showCancelButton: true,
      cancelButtonText: '取消 / Cancel'
    }).then(function(result) {
      if (result.isConfirmed) loadData();
    });
  }
</script>
