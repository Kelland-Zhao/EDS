<script>
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;
  // ===== REPLACED_MARKER (do not remove) =====
  var globalName = sessionStorage.getItem('Name') || '';
  var globalId = sessionStorage.getItem('ID') || '';
  var globalProcess = sessionStorage.getItem('Process') || '';
  var globalWorkshop = sessionStorage.getItem('Workshop') || '';
  var siWebPage = sessionStorage.getItem('siWebPage') || '';
  sessionStorage.setItem('siWebPage', siWebPage);

  var globalData = null;
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var isAdmin = false;
  var historyMap = {};
  var dtInstance = null;
  var userListCache = null;
  var currentTypeFilter = 'all';
  var currentLeaderFilter = '';
  var hideCompleted = true;
  var showOnlyMine = false;
  var currentUpdateIsCI = false;
  var currentUpdateLeader = null; // CI 行 owner 为空时默认填项目 Leader
  var currentUpdateProjectId = ''; // 当前更新弹窗对应项目编号（用于删除精确定位）

  var MS_TEMPLATES = {
    standard: [
      '模具/自动化改造（供应商）/ Tooling & Automation (Supplier)',
      'FAT / FAT', '现场安装 / On-site Installation', 'IQ/OQ / IQ/OQ',
      '工程测试 / Engineering Test', 'PQ / PQ', 'Mass Production / Mass Production'
    ],
    simple: ['FAT / FAT', 'IQ/OQ / IQ/OQ', 'Mass Production / Mass Production'],
    custom: []
  };

  $(document).ready(function() {
    $('#name').text(globalName);
    loadData();
    preloadUserList();
    checkAdminPermission();

    // Leader 筛选 change 事件（一次性绑定）
    $('#leaderFilter').on('change', function() {
      currentLeaderFilter = $(this).val() || '';
      renderTable();
    });

    // 事项/里程碑名称 textarea 输入时自动撑高，长文本换行可见（事件委托）
    $(document).on('input', 'textarea.autogrow-name', function() {
      autoGrowTextarea(this);
    });

    $('#refreshBtn').click(function() { loadData(); });
    $('#saveBtn').click(function() { saveUpdates(); });
    $('#deleteProjectBtn').click(function() { deleteCurrentProject(); });
    $('#addProjectBtn').click(function() { openAddModal(); });
    $('#addSubmitBtn').click(function() { submitAddProject(); });
    $('#addMsAddBtn').click(function() { addMilestoneRow('', formatDateYMD(today)); });
    $('#updateMsAddBtn').click(function() { addUpdateMilestoneRow('', formatDateYMD(today), ''); });

    $('#addTemplate').on('change', function() {
      var tpl = $(this).val();
      var names = MS_TEMPLATES[tpl] || [];
      $('#addMilestones').empty();
      names.forEach(function(n) { addMilestoneRow(n, formatDateYMD(today)); });
    });

    // 项目类型切换：新品/新自动化 ↔ CI
    $('#addType').on('change', function() { toggleAddType($(this).val()); });
    $('#addFollowupBtn').click(function() { addFollowupRow('', '', '', formatDateYMD(today), ''); });

    // 弹窗显示后撑高已填内容的事项/里程碑文本框（隐藏时 scrollHeight 不准，须等显示）
    $('#updateModal, #addModal').on('shown.bs.modal', function() { autoGrowAll($(this)); });

    // 类型筛选
    $('#typeFilter button').on('click', function() {
      currentTypeFilter = $(this).data('type');
      $('#typeFilter button').removeClass('btn-danger').addClass('btn-outline-danger');
      $(this).removeClass('btn-outline-danger').addClass('btn-danger');
      renderTable();
    });

    // iOS toggle: 显示/隐藏已完成项目
    $('#toggleCompletedSwitch').on('change', function() {
      hideCompleted = !this.checked;
      $('#toggleCompletedLabel').text(this.checked ? '显示已完成' : '已完成已隐藏');
      renderTable();
    });

    // 只看我的项目
    $('#toggleMineSwitch').on('change', function() {
      showOnlyMine = this.checked;
      renderTable();
    });

    // 状态对所有人可编辑

    // Request delay button handler (delegated, button is dynamically created in modal)
    $('#modalMilestones').on('click', '.request-delay-btn', function() {
      var $btn = $(this);
      var msIdx = parseInt($btn.data('msIdx'));
      var msName = $btn.data('msName');
      var currentPlanned = $btn.data('msPlanned');
      var projectName = $('#updateModal').data('projectName');

      Swal.fire({
        title: '申请推迟计划日期 / Request Planned Date Delay',
        html: '<div style="text-align:left;">'
          + '<p style="font-size:13px;"><strong>' + msName.split(' / ')[0] + '</strong></p>'
          + '<p style="font-size:12px;color:#666;">当前计划 / Current: <strong>' + currentPlanned + '</strong></p>'
          + '<div class="mb-2 mt-3"><label style="font-size:12px;font-weight:500;">新的计划日期 / New Planned Date <span style="color:red;">*</span></label>'
          + '<input type="date" class="form-control form-control-sm" id="swalNewDate" min="' + formatDateYMD(today) + '"></div>'
          + '<div class="mb-2"><label style="font-size:12px;font-weight:500;">推迟原因 / Reason <span style="color:red;">*</span></label>'
          + '<textarea class="form-control form-control-sm" id="swalReason" rows="3" placeholder="请输入推迟原因 / Enter reason"></textarea></div>'
          + '</div>',
        showCancelButton: true,
        confirmButtonText: '提交申请 / Submit',
        cancelButtonText: '取消 / Cancel',
        preConfirm: function() {
          var nd = $('#swalNewDate').val();
          var rs = $('#swalReason').val().trim();
          if (!nd) { Swal.showValidationMessage('请输入新的计划日期 / Please enter new date'); return false; }
          if (!rs) { Swal.showValidationMessage('请输入推迟原因 / Please enter reason'); return false; }
          return { newDate: nd, reason: rs };
        }
      }).then(function(result) {
        if (!result.isConfirmed) return;
        Swal.fire({ title: swalTitle('正在提交...', 'Submitting...'), html: swalHtml('正在处理申请，请稍候。', 'Processing request, please wait.'), allowOutsideClick: false, showConfirmButton: false, didOpen: function() { Swal.showLoading(); } });
        google.script.run
          .withSuccessHandler(function(res) {
            Swal.close();
            try {
              var r = typeof res === 'string' ? JSON.parse(res) : res;
              if (r.success) {
                Swal.fire('成功 / Success', r.message, 'success');
              } else {
                Swal.fire('失败 / Failed', r.message || '请求失败 / Request failed', 'error');
              }
            } catch(e) { Swal.fire('错误 / Error', e.message, 'error'); }
          })
          .withFailureHandler(function(err) {
            Swal.close();
            Swal.fire('错误 / Error', '请求失败 / Request failed: ' + err.message, 'error');
          })
          .requestPlannedDateDelay(projectName, msIdx, result.value.newDate, result.value.reason, globalName);
      });
    });

    // CI 状态改为"已完成"时自动填充实际完成日期为当天
    $('#modalMilestones').on('change', '.upd-ms-status', function() {
      var $row = $(this).closest('.upd-ms-row');
      var $actual = $row.find('.ms-actual');
      if ($(this).val() === '已完成') {
        $actual.val(formatDateYMD(today)).prop('readonly', true).addClass('readonly-field');
      } else {
        $actual.val('').prop('readonly', false).removeClass('readonly-field');
      }
    });
  });

  function checkAdminPermission() {
    google.script.run.withSuccessHandler(function(result) {
      try {
        var res = typeof result === 'string' ? JSON.parse(result) : result;
        isAdmin = res.isAdmin || false;
        var badge = $('#userLevelBadge');
        if (isAdmin) {
          badge.removeClass('bg-secondary').addClass('badge bg-success').text('管理员 / Admin');
        } else {
          badge.removeClass('bg-secondary').addClass('badge bg-warning text-dark').text('普通用户 / User');
        }
        // Enable status field for admins
        if (isAdmin) {
          $('#modalStatus').prop('disabled', false);
          $('#statusHelp').text('你可以修改状态 / You can edit status').css('color', '#E60012');
        }
      } catch(e) {}
    }).checkProjectPermission(globalName);
  }

  // Preload user list at page init for instant add-modal open
  function preloadUserList() {
    google.script.run.withSuccessHandler(function(result) {
      try {
        var users = typeof result === 'string' ? JSON.parse(result) : result;
        if (!users.error && Array.isArray(users)) {
          userListCache = users.map(function(u) {
            return { id: u.display, text: u.display, name: u.name, display: u.display, email: u.email || '' };
          });
        }
      } catch(e) { /* degrade gracefully */ }
    }).getUserList();
  }

  function updateLeaderFilter() {
    var $sel = $('#leaderFilter');
    if (!$sel.length) return;

    // 从现有项目提取唯一 Leader
    var leaders = [], seen = {};
    if (globalData && globalData.projects) {
      globalData.projects.forEach(function(p) {
        var leader = (p.leader || '').trim();
        if (!leader || seen[leader]) return;
        seen[leader] = true;
        var m = leader.match(/^(.*?)\s*\(([^)]*)\)\s*$/);
        leaders.push({
          id: leader,
          text: leader,
          name: m ? m[1].trim() : leader,
          display: leader
        });
      });
    }
    leaders.sort(function(a, b) { return a.name.localeCompare(b.name); });

    // 保存当前选中值
    var prevVal = $sel.val();

    if ($sel.hasClass('select2-hidden-accessible')) $sel.select2('destroy');
    $sel.empty().append('<option value=""></option>');
    $sel.select2({
      data: leaders,
      templateResult: function(item) { return item.name || item.text || ''; },
      templateSelection: function(item) { return item.name || item.text || ''; },
      placeholder: '全部 Leader / All',
      allowClear: true,
      width: '140px'
    });

    // 恢复之前的选中值（若仍存在）
    if (prevVal && seen[prevVal]) {
      $sel.val(prevVal).trigger('change');
    }
  }

  function loadData() {
    Swal.fire({
      title: swalTitle('加载数据中...', 'Loading Data...'),
      html: swalHtml('正在获取数据，请稍候。', 'Fetching data, please wait.'),
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: function() { Swal.showLoading(); }
    });
    google.script.run
      .withSuccessHandler(function(result) {
        Swal.close();
        try {
          var data = typeof result === 'string' ? JSON.parse(result) : result;
          if (data.error) { Swal.fire('错误 / Error', data.error, 'error'); return; }
          globalData = data;
          renderTable();
          updateLeaderFilter();
          loadHistorySummary();
        } catch(e) {
          Swal.fire('错误 / Error', '数据解析失败 / Data parse error: ' + e.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        Swal.close();
        Swal.fire('错误 / Error', '加载失败 / Load failed: ' + err.message, 'error');
      })
      .getProjectTrackingData();
  }

  function loadHistorySummary() {
    google.script.run.withSuccessHandler(function(result) {
      try {
        historyMap = typeof result === 'string' ? JSON.parse(result) : {};
      } catch(e) { /* degrade gracefully */ }
    }).getPlannedDateHistorySummary();
  }

  function parseDate(val) {
    if (!val || val === 'NA' || val === '') return null;
    // Handle Date objects (GAS getValues returns Date for date cells)
    if (Object.prototype.toString.call(val) === '[object Date]') {
      return new Date(val.getFullYear(), val.getMonth(), val.getDate());
    }
    var s = String(val).trim();
    // ISO timestamp from JSON: "2026-04-04T00:00:00.000Z"
    var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2]) - 1, parseInt(iso[3]));
    // YYYY-MM-DD
    var m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
    // M/D or M/D/YYYY
    m = s.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);
    if (m) {
      var year = m[3] ? parseInt(m[3]) : today.getFullYear();
      return new Date(year, parseInt(m[1]) - 1, parseInt(m[2]));
    }
    // Full date string from GAS: "Mon Apr 04 2026 ..."
    var jsDate = new Date(s);
    if (!isNaN(jsDate.getTime())) return new Date(jsDate.getFullYear(), jsDate.getMonth(), jsDate.getDate());
    return null;
  }

  function formatDateYMD(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
  }

  // textarea 内容转义（用于放进 <textarea>...</textarea> 之间）
  function escapeTextarea(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // 根据内容自动调整 textarea 高度，长文本换行全部可见
  function autoGrowTextarea(el) {
    if (!el) return;
    el.style.height = 'auto';
    el.style.height = (el.scrollHeight) + 'px';
  }

  // 对容器内所有 .autogrow-name 执行一次自动撑高
  function autoGrowAll($scope) {
    ($scope || $(document)).find('textarea.autogrow-name').each(function() { autoGrowTextarea(this); });
  }

  function normalizeDateInput(val) {
    // Convert user-entered date to YYYY-MM-DD, or return as-is for NA/empty
    if (!val || val === 'NA' || val === '') return val;
    var d = parseDate(val);
    return d ? formatDateYMD(d) : val;
  }

  function normalizeDate(val) {
    if (!val || val === 'NA' || val === '') return '';
    if (Object.prototype.toString.call(val) === '[object Date]') {
      return formatDateYMD(val);
    }
    var d = parseDate(val);
    return d ? formatDateYMD(d) : String(val);
  }

  function formatHeader(header) {
    if (!header) return '';
    var parts = header.split(' / ');
    if (parts.length >= 2) {
      return parts[0] + '<br><small style="font-weight:normal;font-size:10px;">' + parts.slice(1).join(' / ') + '</small>';
    }
    return header;
  }

  function getStatusColor(status) {
    switch (status) {
      case 'Done': return '#28a745';
      case 'Ongoing': return '#007bff';
      case 'Delayed': return '#dc3545';
      case 'Not start': return '#6c757d';
      default: return '#6c757d';
    }
  }

  function getStatusText(status) {
    switch (status) {
      case 'Done': return '已完成';
      case 'Ongoing': return '进行中';
      case 'Delayed': return '延误';
      case 'Not start': return '未开始';
      default: return status;
    }
  }

  function getMilestoneShortName(name) {
    if (!name) return '';
    var parts = name.split(' / ');
    var cn = parts[0] || name;
    // Use short label for display
    var map = {
      '模具/自动化改造（供应商）': '模具改造',
      'FAT': 'FAT',
      '现场安装': '现场安装',
      'IQ/OQ': 'IQ/OQ',
      '工程测试': '工程测试',
      'PQ': 'PQ',
      'Mass Production': 'MP'
    };
    return map[cn] || cn.substring(0, 6);
  }

  function getMsRowBgColor(status, planned, actual) {
    // Status-based background color for milestone rows in update modal
    if (status === '已完成') return '#e8f5e9'; // green tint
    if (status === '进行中') return '#fff3e0'; // orange tint
    var p = parseDate(planned);
    var a = parseDate(actual);
    if (a) return '#e8f5e9'; // has actual date = done
    if (p && p < today) return '#ffebee'; // overdue = red tint
    return '#f5f5f5'; // pending = light gray
  }

  function getMilestoneColor(ms) {
    var actual = parseDate(ms.actual);
    if (actual) {
      if (actual > today) return '#fd7e14'; // orange - planned delayed
      return '#28a745'; // green - completed
    }
    var planned = parseDate(ms.planned);
    if (!planned) return '#adb5bd'; // gray - no date
    if (planned < today) return '#dc3545'; // red - overdue
    return '#adb5bd'; // gray - pending (future)
  }

  function getMilestoneTitle(ms) {
    var parts = ms.name.split(' / ');
    var shortName = parts[0] || ms.name;
    var lines = [shortName];
    if (ms.planned && ms.planned !== 'NA') {
      lines.push('计划: ' + normalizeDate(ms.planned));
    } else {
      lines.push('计划: NA');
    }
    if (ms.actual) {
      lines.push('实际完成: ' + normalizeDate(ms.actual));
      var actualDate = parseDate(ms.actual);
      if (actualDate && actualDate > today) {
        lines.push('状态: 计划时间推迟 / Planned Delayed');
      } else {
        lines.push('状态: 已完成 / Completed');
      }
    } else {
      var planned = parseDate(ms.planned);
      if (planned && planned < today) {
        lines.push('状态: 逾期未完成 / Overdue');
      } else if (planned) {
        lines.push('状态: 待完成 / Pending');
      } else {
        lines.push('状态: 无计划 / Not Scheduled');
      }
    }
    return lines.join('<br>');
  }

  function rgba(color, alpha) {
    // Convert hex to rgba for td backgrounds (opacity on td would fade ◆ too)
    var r = parseInt(color.slice(1,3), 16);
    var g = parseInt(color.slice(3,5), 16);
    var b = parseInt(color.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // ==================== Table helpers ====================

  function getProgress(proj) {
    var total = proj.milestones.length;
    var done = proj.milestones.filter(function(ms) {
      if (ms.status === '已完成') return true;
      var a = parseDate(ms.actual);
      return a && a <= today;
    }).length;
    return { done: done, total: total };
  }

  function getNextMilestone(proj) {
    for (var i = 0; i < proj.milestones.length; i++) {
      var ms = proj.milestones[i];
      if (ms.status === '已完成') continue;
      var a = parseDate(ms.actual);
      if (!a || a > today) {
        var planned = parseDate(ms.planned);
        var shortName = ms.name.split(' / ')[0];
        if (planned) {
          var isOverdue = planned < today;
          return '<span style="font-weight:500;">' + shortName + '</span><br>'
            + '<span style="font-size:10px;color:' + (isOverdue ? '#dc3545' : '#555') + ';">' + (isOverdue ? '⚠️ ' : '') + normalizeDate(ms.planned) + '</span>';
        }
        return '<span style="font-size:11px;color:#999;">' + shortName + ' (NA)</span>';
      }
    }
    return '<span style="font-size:11px;color:#28a745;">全部完成 / All done</span>';
  }

  function getMsPills(proj) {
    return proj.milestones.map(function(ms) {
      var color = getMilestoneColor(ms);
      var shortName = ms.name.split(' / ')[0];
      if (shortName.length > 5) shortName = shortName.substring(0, 5) + '…';
      return '<span class="ms-pill" style="background:' + color + ';" title="' + ms.name.replace(/"/g, '&quot;') + '">' + shortName + '</span>';
    }).join('');
  }

  // ==================== Main table render ====================

  function projType(p) { return (p.type === 'CI') ? 'CI' : '标准'; }

  function typeBadge(p) {
    var t = projType(p);
    var bg = (t === 'CI') ? '#6f42c1' : '#0d6efd';
    var txt = (t === 'CI') ? 'CI' : '新品/新自动化';
    return '<span class="status-badge" style="background:' + bg + ';">' + txt + '</span>';
  }

  function renderTable() {
    var projects = (globalData && globalData.projects) ? globalData.projects.filter(function(p) {
      if (hideCompleted && p.status === 'Done') return false;
      if (showOnlyMine && (!p.leader || p.leader.replace(/\(.*\)/, '').trim() !== globalName)) return false;
      if (currentTypeFilter !== 'all' && projType(p) !== currentTypeFilter) return false;
      if (currentLeaderFilter && (!p.leader || p.leader !== currentLeaderFilter)) return false;
      return true;
    }) : [];

    if (dtInstance) {
      dtInstance.destroy();
      dtInstance = null;
    }
    $('#projectTable tbody').empty();

    var rows = projects.map(function(proj) {
      var stColor = getStatusColor(proj.status);
      var stText = getStatusText(proj.status);
      var prog = getProgress(proj);
      var progPct = proj.milestones.length > 0 ? Math.round(prog.done / proj.milestones.length * 1000) / 10 : 0;
      var progBar = '<div style="font-size:11px;margin-bottom:2px;">' + prog.done + '/' + proj.milestones.length + ' (' + progPct + '%)</div>'
        + '<div style="background:#eee;border-radius:4px;height:5px;"><div style="background:' + stColor + ';width:' + progPct + '%;height:5px;border-radius:4px;"></div></div>'
        + '<div style="margin-top:3px;">' + getMsPills(proj) + '</div>';
      var statusBadge = '<span class="status-badge" style="background:' + stColor + ';">' + stText + '</span>';
      return [
        '',
        proj.projectName + (proj.projectId ? '<br><small style="color:#999;font-size:10px;">' + proj.projectId + '</small>' : ''),
        typeBadge(proj),
        (proj.leader || '').replace(/\(.*\)/, '').trim(),
        statusBadge,
        progBar,
        getNextMilestone(proj),
        '<button class="btn btn-sm btn-outline-danger gantt-update-btn" data-project="' + proj.projectName.replace(/"/g,'&quot;') + '" style="font-size:11px;">✎ 更新<br><small>Update</small></button>'
      ];
    });

    dtInstance = $('#projectTable').DataTable({
      data: rows,
      columns: [
        { orderable: false, searchable: false, width: '30px' },
        { title: '项目名称<br><small>Project Name</small>' },
        { title: '类型<br><small>Type</small>', orderable: false, width: '110px' },
        { title: 'Leader', width: '100px' },
        { title: '状态<br><small>Status</small>', orderable: false, width: '80px' },
        { title: '进度<br><small>Progress</small>', orderable: false },
        { title: '下一节点<br><small>Next</small>', orderable: false, width: '125px' },
        { title: '操作<br><small>Action</small>', orderable: false, searchable: false, width: '72px' }
      ],
      language: {
        search: '搜索 / Search:', lengthMenu: '每页 _MENU_ 条',
        info: '共 _TOTAL_ 个项目', infoEmpty: '暂无数据',
        zeroRecords: '无匹配结果', paginate: { first: '首页', last: '末页', next: '下一页', previous: '上一页' }
      },
      pageLength: 25, order: [[1, 'asc']],
      createdRow: function(row, data, dataIndex) {
        $(row).attr('data-project', projects[dataIndex] ? projects[dataIndex].projectName : '');
      },
      columnDefs: [{ targets: 0, render: function() { return '<span class="dt-expand-btn" title="展开甘特图 / Expand Gantt">▶</span>'; } }],
      drawCallback: function() {
        $('#projectTable tbody').off('click', '.gantt-update-btn').on('click', '.gantt-update-btn', function(e) {
          e.stopPropagation();
          openUpdateModal($(this).data('project'));

  // ==================== CI follow-up checklist ====================

  function renderCIChecklist(containerId, proj) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var items = (proj.milestones || []).slice();
    if (items.length === 0) {
      container.innerHTML = '<p style="color:#999;font-size:12px;padding:8px;">无 follow-up 事项 / No follow-up items</p>';
      return;
    }
    items.sort(function(a, b) {
      var pa = parseDate(a.planned), pb = parseDate(b.planned);
      if (pa && pb) return pa - pb;
      if (pa) return -1;
      if (pb) return 1;
      return 0;
    });
    var rows = items.map(function(ms, i) {
      var a = parseDate(ms.actual);
      var p = parseDate(ms.planned);
      var st = ms.status || (a ? '已完成' : '未开始');
      var overdue = (st !== '已完成' && p && p < today);
      var stColor = st === '已完成' ? '#28a745' : (st === '进行中' ? '#fd7e14' : '#6c757d');
      if (overdue) stColor = '#dc3545';
      var stHtml = (overdue ? '⚠️ ' : '') + st + (overdue ? '（逾期）' : '');
      var owner = ms.owner || (proj.leader ? proj.leader.replace(/\(.*\)/, '').trim() : '—');
      var dueTxt = (ms.planned && ms.planned !== 'NA') ? normalizeDate(ms.planned) : 'NA';
      var actTxt = ms.actual ? normalizeDate(ms.actual) : '—';
      return '<tr style="background:' + (i % 2 === 0 ? '#fff5f5' : '#fff') + ';">'
        + '<td style="padding:6px 8px;border-bottom:1px solid #eee;">' + (ms.name || '').replace(/</g,'&lt;') + '</td>'
        + '<td style="padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap;">' + owner + '</td>'
        + '<td style="padding:6px 8px;border-bottom:1px solid #eee;font-family:monospace;white-space:nowrap;color:' + (p && p < today && !a ? '#dc3545' : '#555') + ';">' + dueTxt + '</td>'
        + '<td style="padding:6px 8px;border-bottom:1px solid #eee;font-family:monospace;white-space:nowrap;">' + actTxt + '</td>'
        + '<td style="padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap;font-weight:600;color:' + stColor + ';">' + stHtml + '</td>'
        + '</tr>';
    }).join('');
    container.innerHTML = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:6px;overflow:hidden;">'
      + '<thead><tr style="background:linear-gradient(135deg,#6f42c1,#59359a);color:#fff;">'
      + '<th style="padding:8px;text-align:left;">事项 / Item</th>'
      + '<th style="padding:8px;text-align:left;">责任人 / Owner</th>'
      + '<th style="padding:8px;text-align:left;">计划完成 / Due</th>'
      + '<th style="padding:8px;text-align:left;">实际完成 / Actual</th>'
      + '<th style="padding:8px;text-align:left;">状态 / Status</th>'
      + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  // ==================== Single-project Gantt ====================

  function renderSingleProjectGantt(containerId, proj) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var milestones = (proj.milestones || []).slice();
    if (milestones.length === 0) {
      container.innerHTML = '<p style="color:#999;font-size:12px;padding:8px;">无里程碑数据 / No milestone data</p>';
      return;
    }
    milestones.sort(function(a, b) {
      var pa = parseDate(a.planned), pb = parseDate(b.planned);
      if (pa && pb) return pa - pb;
      if (pa) return -1;
      if (pb) return 1;
      return 0;
    });
    var dates = [];
    milestones.forEach(function(ms) {
      var dp = parseDate(ms.planned); if (dp) dates.push(dp);
      var da = parseDate(ms.actual);  if (da) dates.push(da);
    });
    dates.push(today);
    dates.sort(function(a, b) { return a - b; });
    var minDate = new Date(dates[0]); minDate.setDate(minDate.getDate() - 7);
    var maxDate = new Date(dates[dates.length - 1]); maxDate.setDate(maxDate.getDate() + 14);
    var days = [];
    var cur = new Date(minDate);
    while (cur <= maxDate) { days.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }

    function inDay(date, dayObj) {
      return date.getFullYear() === dayObj.getFullYear() && date.getMonth() === dayObj.getMonth() && date.getDate() === dayObj.getDate();
    }
    var COLLAPSE_BUFFER = 3, COLLAPSE_GAP = 10;
    var activeDaySet = {};
    for (var di = 0; di < days.length; di++) { if (inDay(today, days[di])) activeDaySet[di] = true; }
    milestones.forEach(function(ms) {
      [parseDate(ms.planned), parseDate(ms.actual)].forEach(function(dt) {
        if (!dt) return;
        for (var di2 = 0; di2 < days.length; di2++) {
          if (Math.abs((days[di2] - dt) / 86400000) <= COLLAPSE_BUFFER) activeDaySet[di2] = true;
        }
      });
    });
    var displayCols = [], ci = 0;
    while (ci < days.length) {
      if (activeDaySet[ci]) { displayCols.push({ type: 'day', dayIdx: ci }); ci++; }
      else {
        var gapStart = ci;
        while (ci < days.length && !activeDaySet[ci]) ci++;
        var gapLen = ci - gapStart;
        if (gapLen >= COLLAPSE_GAP) displayCols.push({ type: 'collapse', count: gapLen, startDate: days[gapStart], endDate: days[ci - 1] });
        else { for (var j = gapStart; j < ci; j++) displayCols.push({ type: 'day', dayIdx: j }); }
      }
    }
    var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    var monthSpans = [], lastKey = -1;
    displayCols.forEach(function(col) {
      var date = col.type === 'day' ? days[col.dayIdx] : col.startDate;
      var key = date.getFullYear() * 100 + date.getMonth();
      if (key !== lastKey) { monthSpans.push({ month: date.getMonth(), count: 1 }); lastKey = key; }
      else monthSpans[monthSpans.length - 1].count++;
    });
    var stColor = getStatusColor(proj.status);
    var barBg = rgba(stColor, 0.2);
    var barBgC = rgba(stColor, 0.1);
    var projStart = null, projEnd = null;
    milestones.forEach(function(ms) {
      var d = parseDate(ms.planned) || parseDate(ms.actual);
      if (d) { if (!projStart || d < projStart) projStart = d; if (!projEnd || d > projEnd) projEnd = d; }
    });
    var html = '<div class="gantt-container"><table class="gantt-table" style="font-size:10px;"><thead>';
    html += '<tr><th rowspan="2" style="min-width:80px;">里程碑 / Milestone</th>';
    monthSpans.forEach(function(ms2) { html += '<th colspan="' + ms2.count + '">' + monthNames[ms2.month] + '</th>'; });
    html += '</tr><tr>';
    displayCols.forEach(function(col) {
      if (col.type === 'day') html += '<th style="min-width:22px;padding:2px 1px;">' + days[col.dayIdx].getDate() + '</th>';
      else html += '<th style="min-width:12px;max-width:12px;padding:2px 0;background:#e9ecef;color:#adb5bd;font-size:8px;">···</th>';
    });
    html += '</tr></thead><tbody>';
    milestones.forEach(function(ms, msIdx) {
      var shortName = ms.name.split(' / ')[0];
      html += '<tr><td style="font-size:11px;white-space:nowrap;padding:2px 4px;">' + shortName + '</td>';
      displayCols.forEach(function(col) {
        if (col.type === 'day') {
          var d = col.dayIdx;
          var day = days[d];
          var cellStyle = 'text-align:center;vertical-align:middle;';
          var todayCls = inDay(today, day) ? ' class="today-col"' : '';
          if (projStart && projEnd && projEnd >= day && projStart <= day) cellStyle += 'background:' + barBg + ';';
          var cellContent = '';
          var msPlanned = parseDate(ms.planned);
          if (msPlanned && inDay(msPlanned, day)) {
            var msColor = getMilestoneColor(ms);
            var msTitle = getMilestoneTitle(ms);
            var hasHist = historyMap && historyMap[proj.projectName + '::' + ms.name.split(' / ')[0]];
            cellContent += (hasHist ? '<span class="hist-icon" data-project="' + proj.projectName.replace(/"/g,'&quot;') + '" data-milestone="' + ms.name.split(' / ')[0].replace(/"/g,'&quot;') + '" style="cursor:pointer;font-size:10px;color:#E60012;" title="查看变更历史">🔄</span>' : '')
              + '<span class="ms-node" data-ms-title="' + msTitle.replace(/"/g, '&quot;') + '" style="display:inline-block;font-size:13px;color:' + msColor + ';cursor:pointer;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;">&#9670;</span>';
          }
          html += '<td' + todayCls + ' style="' + cellStyle + '">' + cellContent + '</td>';
        } else {
          var inRange = projStart && projEnd && col.endDate >= projStart && col.startDate <= projEnd;
          html += '<td style="min-width:12px;max-width:12px;background:' + (inRange ? barBgC : '#f8f9fa') + ';border-left:1px dashed #dee2e6;border-right:1px dashed #dee2e6;"></td>';
        }
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
    $(container).find('.ms-node').off('mouseenter mouseleave').on('mouseenter', function(e) {
      var $tip = $('#msTooltip');
      if (!$tip.length) { $tip = $('<div id="msTooltip" style="position:fixed;z-index:9999;max-width:200px;padding:6px 10px;background:rgba(0,0,0,0.85);color:#fff;border-radius:4px;font-size:12px;line-height:1.6;pointer-events:none;"></div>'); $('body').append($tip); }
      $tip.html($(this).data('ms-title')).css({ left: e.clientX + 12, top: e.clientY - 8 }).show();
    }).on('mousemove', function(e) { $('#msTooltip').css({ left: e.clientX + 12, top: e.clientY - 8 }); })

    $(container).find('.hist-icon').on('click', function() {

      google.script.run.withSuccessHandler(function(result) {
        try {
          var history = typeof result === 'string' ? JSON.parse(result) : [];
          if (history.error || !Array.isArray(history)) { Swal.fire('错误 / Error', '获取历史失败', 'error'); return; }
          var filtered = history.filter(function(h) { return h.milestone === milestoneName; });

          var html2 = '<table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr style="background:#E60012;color:white;">'

            + '</tr></thead><tbody>';
          filtered.forEach(function(f, h) {

        } catch(e) { Swal.fire('错误', e.message, 'error'); }
      }).getPlannedDateHistory(projectName);
    });
  }

  function openUpdateModal(projectName) {

    var metaParts = [];

      if (pb) return 1;
      return 0;

    $('#updateModal').modal('show');

  function saveUpdates() {
    var projectName = $('#updateModal').data('projectName');
    var newStatus = $('#modalStatus').val();
    var isStatusChanged = false;

    // Find project to compare status
    var proj = null;
    for (var i = 0; i < globalData.projects.length; i++) {
      if (globalData.projects[i].projectName === projectName) {
        proj = globalData.projects[i];
        break;
      }
    }
    if (proj && proj.status !== newStatus) {
      isStatusChanged = true;
    }

    var updates = {};
    var futureMilestones = [];

    // Leader change
    var newLeader = $('#modalLeader').val();
    if (newLeader && proj && newLeader !== proj.leader) updates.leader = newLeader;

    // All users: collect full milestone array
    var newMsArr = [];
    var ciMissingOwner = false;
    $('#modalMilestones .upd-ms-row').each(function() {
      var name = $(this).find('.upd-ms-name').val().trim();
      var plannedVal = $(this).find('.upd-ms-planned').val().trim();
      var actualVal = $(this).find('.ms-actual').val().trim();
      if (!name) return;
      if (actualVal) { var d = parseDate(actualVal); if (d && d > today) futureMilestones.push({ name: name, date: actualVal }); }
      var ownerName = '', ownerEmail = '', itemStatus = '';
      itemStatus = $(this).find('.upd-ms-status').val() || '';
      if (currentUpdateIsCI) {
        var disp = $(this).find('.upd-ms-owner').val() || '';
        var cache = (userListCache || []).filter(function(u) { return u.display === disp; })[0];
        if (cache) { ownerName = cache.name; ownerEmail = cache.email || ''; }
        else if (disp) { ownerName = disp; }
        if (!ownerName) ciMissingOwner = true;
      }
      newMsArr.push({ name: name, planned: plannedVal ? normalizeDateInput(plannedVal) : 'NA', actual: actualVal || '', owner: ownerName, ownerEmail: ownerEmail, status: itemStatus });
    });
    if (ciMissingOwner) { Swal.fire('提示 / Notice', '每条事项都需选择责任人 / Each item needs an owner', 'warning'); return; }
    updates.milestonesReplace = newMsArr;

    var newType = $('#modalType').val();
    if (proj && newType && newType !== (proj.type || '标准') && newType !== '标准') updates.type = newType;
    if (isStatusChanged) updates.status = newStatus;

    function executeSave(pn, upd) {
      Swal.fire({
        title: swalTitle('正在保存...', 'Saving...'),
        html: swalHtml('正在保存项目更新，请稍候。', 'Saving project updates, please wait.'),
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: function() { Swal.showLoading(); }
      });

      google.script.run
        .withSuccessHandler(function(result) {
          Swal.close();
          try {
            var res = typeof result === 'string' ? JSON.parse(result) : result;
            if (res.success) {
              Swal.fire('成功 / Success', res.message, 'success').then(function() {
                $('#updateModal').modal('hide');
                loadData();
              });
            } else {
              Swal.fire('失败 / Failed', res.message, 'error');
            }
          } catch(e) {
            Swal.fire('错误 / Error', e.message, 'error');
          }
        })
        .withFailureHandler(function(err) {
          Swal.close();
          Swal.fire('错误 / Error', '保存失败 / Save failed: ' + err.message, 'error');
        })
        .updateProjectTracking(pn, JSON.stringify(upd), globalName);
    }

    if (futureMilestones.length > 0) {
      var listHtml = futureMilestones.map(function(fm) {
        return '<li>' + fm.name.split(' / ')[0] + ': ' + fm.date + '</li>';
      }).join('');
      Swal.fire({
        title: '实际完成日期异常 / Actual Date Warning',
        html: '<p>以下里程碑的实际完成日期晚于今日，该节点将显示为「计划时间推迟」，确认继续保存吗？</p>'
          + '<p style="font-size:0.85em;color:#666;">The following milestones have actual dates in the future. The node will show as "Planned Delayed". Confirm to save?</p>'
          + '<ul style="text-align:left;">' + listHtml + '</ul>',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '确认保存 / Confirm',
        cancelButtonText: '返回修改 / Cancel'
      }).then(function(result) {
        if (result.isConfirmed) executeSave(projectName, updates);
      });
      return;
    }

    executeSave(projectName, updates);
  }

        var name = $(this).find('.ci-fu-name').val().trim();
        if (!name) return;
        var ownerDisp = $(this).find('.ci-fu-owner').val() || '';
        var due = $(this).find('.ci-fu-date').val().trim();
        var status = $(this).find('.ci-fu-status').val() || '未开始';
        var cache = (userListCache || []).filter(function(u) { return u.display === ownerDisp; })[0];
        if (!ownerDisp || !cache) { missingOwner = true; return; }
        milestones.push({ name: name, planned: due || 'NA', owner: cache.name, ownerEmail: cache.email || '', status: status });
      });
      if (missingOwner) { Swal.fire('提示 / Notice', '每条事项都需选择责任人 / Each item needs an owner', 'warning'); return; }
      if (milestones.length === 0) { Swal.fire('提示 / Notice', '请至少添加一条 follow-up 事项 / Add at least one item', 'warning'); return; }
    } else {
      $('#addMilestones .add-ms-row').each(function() {
        var name = $(this).find('.add-ms-name').val().trim();
        var planned = $(this).find('.add-ms-date').val().trim();
        if (name) milestones.push({ name: name, planned: planned || 'NA' });
      });
    }
    var data = {
      projectName: projectName, leader: $('#addLeader').val() || '',
      technician: $('#addTechnician').val() || '',
      status: $('#addStatus').val() || 'Not start', type: type, milestones: milestones
    };
    Swal.fire({ title: swalTitle('正在提交...', 'Submitting...'), html: swalHtml('正在添加新项目，请稍候。', 'Adding new project, please wait.'), allowOutsideClick: false, showConfirmButton: false, didOpen: function() { Swal.showLoading(); } });
    google.script.run
      .withSuccessHandler(function(result) {
        Swal.close();
        try {
          var res = typeof result === 'string' ? JSON.parse(result) : result;
          if (res.success) { Swal.fire('成功 / Success', res.message, 'success').then(function() { $('#addModal').modal('hide'); loadData(); }); }
          else { Swal.fire('失败 / Failed', res.message, 'error'); }
        } catch(e) { Swal.fire('错误 / Error', e.message, 'error'); }
      })
      .withFailureHandler(function(err) { Swal.close(); Swal.fire('错误 / Error', '提交失败: ' + err.message, 'error'); })
      .addProject(JSON.stringify(data));
  }
</script>
