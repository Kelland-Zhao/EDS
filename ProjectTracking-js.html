<script>
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;
  var globalName = sessionStorage.getItem('Name') || '';
  var globalId = sessionStorage.getItem('ID') || '';
  var globalProcess = sessionStorage.getItem('Process') || '';
  var globalWorkshop = sessionStorage.getItem('Workshop') || '';
  var siWebPage = sessionStorage.getItem('siWebPage') || '';
  sessionStorage.setItem('siWebPage', siWebPage);

  var globalData = null;
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var isAdmin = false;
  var historyMap = {};

  $(document).ready(function() {
    $('#name').text(globalName);
    loadData();
    preloadUserList();
    checkAdminPermission();

    $('#refreshBtn').click(function() { loadData(); });
    $('#todayBtn').click(function() { scrollToToday(); });
    $('#saveBtn').click(function() { saveUpdates(); });
    $('#addProjectBtn').click(function() { openAddModal(); });
    $('#addSubmitBtn').click(function() { submitAddProject(); });

    // Status editor check
    var isLyon = (globalName === 'Lyon Zhang');
    if (isLyon) {
      $('#modalStatus').prop('disabled', false);
      $('#statusHelp').text('你可以修改状态 / You can edit status').css('color', '#E60012');
    }

    // Request delay button handler (delegated, button is dynamically created in modal)
    $('#modalMilestones').on('click', '.request-delay-btn', function() {
      var $btn = $(this);
      var msIdx = parseInt($btn.data('msIdx'));
      var msName = $btn.data('msName');
      var currentPlanned = $btn.data('msPlanned');
      var projectName = $('#updateModal').data('projectName');

      Swal.fire({
        title: '申请推迟计划日期 / Request Planned Date Delay',
        html: '<div style="text-align:left;">'
          + '<p style="font-size:13px;"><strong>' + msName.split(' / ')[0] + '</strong></p>'
          + '<p style="font-size:12px;color:#666;">当前计划 / Current: <strong>' + currentPlanned + '</strong></p>'
          + '<div class="mb-2 mt-3"><label style="font-size:12px;font-weight:500;">新的计划日期 / New Planned Date <span style="color:red;">*</span></label>'
          + '<input type="date" class="form-control form-control-sm" id="swalNewDate" min="' + formatDateYMD(today) + '"></div>'
          + '<div class="mb-2"><label style="font-size:12px;font-weight:500;">推迟原因 / Reason <span style="color:red;">*</span></label>'
          + '<textarea class="form-control form-control-sm" id="swalReason" rows="3" placeholder="请输入推迟原因 / Enter reason"></textarea></div>'
          + '</div>',
        showCancelButton: true,
        confirmButtonText: '提交申请 / Submit',
        cancelButtonText: '取消 / Cancel',
        preConfirm: function() {
          var nd = $('#swalNewDate').val();
          var rs = $('#swalReason').val().trim();
          if (!nd) { Swal.showValidationMessage('请输入新的计划日期 / Please enter new date'); return false; }
          if (!rs) { Swal.showValidationMessage('请输入推迟原因 / Please enter reason'); return false; }
          return { newDate: nd, reason: rs };
        }
      }).then(function(result) {
        if (!result.isConfirmed) return;
        Swal.fire({ title: swalTitle('正在提交...', 'Submitting...'), html: swalHtml('正在处理申请，请稍候。', 'Processing request, please wait.'), allowOutsideClick: false, showConfirmButton: false, didOpen: function() { Swal.showLoading(); } });
        google.script.run
          .withSuccessHandler(function(res) {
            Swal.close();
            try {
              var r = typeof res === 'string' ? JSON.parse(res) : res;
              if (r.success) {
                Swal.fire('成功 / Success', r.message, 'success');
              } else {
                Swal.fire('失败 / Failed', r.message || '请求失败 / Request failed', 'error');
              }
            } catch(e) { Swal.fire('错误 / Error', e.message, 'error'); }
          })
          .withFailureHandler(function(err) {
            Swal.close();
            Swal.fire('错误 / Error', '请求失败 / Request failed: ' + err.message, 'error');
          })
          .requestPlannedDateDelay(projectName, msIdx, result.value.newDate, result.value.reason, globalName);
      });
    });
  });

  function checkAdminPermission() {
    google.script.run.withSuccessHandler(function(result) {
      try {
        var res = typeof result === 'string' ? JSON.parse(result) : result;
        isAdmin = res.isAdmin || false;
        var badge = $('#userLevelBadge');
        if (isAdmin) {
          badge.removeClass('bg-secondary').addClass('badge bg-success').text('管理员 / Admin');
        } else {
          badge.removeClass('bg-secondary').addClass('badge bg-warning text-dark').text('普通用户 / User');
        }
        // Enable status field for admins
        if (isAdmin) {
          $('#modalStatus').prop('disabled', false);
          $('#statusHelp').text('你可以修改状态 / You can edit status').css('color', '#E60012');
        }
      } catch(e) {}
    }).checkProjectPermission(globalName);
  }

  // Preload user list at page init for instant add-modal open
  function preloadUserList() {
    google.script.run.withSuccessHandler(function(result) {
      try {
        var users = typeof result === 'string' ? JSON.parse(result) : result;
        if (!users.error && Array.isArray(users)) {
          userListCache = users.map(function(u) {
            return { id: u.display, text: u.display, name: u.name, display: u.display };
          });
        }
      } catch(e) { /* degrade gracefully */ }
    }).getUserList();
  }

  function loadData() {
    Swal.fire({
      title: swalTitle('加载数据中...', 'Loading Data...'),
      html: swalHtml('正在获取数据，请稍候。', 'Fetching data, please wait.'),
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: function() { Swal.showLoading(); }
    });
    google.script.run
      .withSuccessHandler(function(result) {
        Swal.close();
        $('#ganttContainer').show();
        try {
          var data = typeof result === 'string' ? JSON.parse(result) : result;
          if (data.error) { Swal.fire('错误 / Error', data.error, 'error'); return; }
          globalData = data;
          renderGantt();
          loadHistorySummary();
        } catch(e) {
          Swal.fire('错误 / Error', '数据解析失败 / Data parse error: ' + e.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        Swal.close();
        Swal.fire('错误 / Error', '加载失败 / Load failed: ' + err.message, 'error');
      })
      .getProjectTrackingData();
  }

  function loadHistorySummary() {
    google.script.run.withSuccessHandler(function(result) {
      try {
        historyMap = typeof result === 'string' ? JSON.parse(result) : {};
        updateHistoryIcons();
      } catch(e) { /* degrade gracefully */ }
    }).getPlannedDateHistorySummary();
  }

  function updateHistoryIcons() {
    $('#ganttBody tr.gantt-row').each(function() {
      var $row = $(this);
      var projectName = $row.find('.gantt-info').text().trim();
      if (!projectName) return;
      $row.find('.ms-node').each(function() {
        var title = $(this).data('ms-title') || '';
        var msName = title.split('<br>')[0];
        if (msName && historyMap[projectName + '::' + msName]) {
          var $histIcon = $('<span class="hist-icon" style="display:inline-block;cursor:pointer;font-size:10px;margin-right:1px;color:#E60012;" title="查看变更历史 / View Change History">&#x1F504;</span>');
          $histIcon.data('project', projectName);
          $histIcon.data('milestone', msName);
          $(this).before($histIcon);
        }
      });
    });
  }

  function parseDate(val) {
    if (!val || val === 'NA' || val === '') return null;
    // Handle Date objects (GAS getValues returns Date for date cells)
    if (Object.prototype.toString.call(val) === '[object Date]') {
      return new Date(val.getFullYear(), val.getMonth(), val.getDate());
    }
    var s = String(val).trim();
    // ISO timestamp from JSON: "2026-04-04T00:00:00.000Z"
    var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2]) - 1, parseInt(iso[3]));
    // YYYY-MM-DD
    var m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
    // M/D or M/D/YYYY
    m = s.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);
    if (m) {
      var year = m[3] ? parseInt(m[3]) : today.getFullYear();
      return new Date(year, parseInt(m[1]) - 1, parseInt(m[2]));
    }
    // Full date string from GAS: "Mon Apr 04 2026 ..."
    var jsDate = new Date(s);
    if (!isNaN(jsDate.getTime())) return new Date(jsDate.getFullYear(), jsDate.getMonth(), jsDate.getDate());
    return null;
  }

  function formatDateYMD(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
  }

  function normalizeDateInput(val) {
    // Convert user-entered date to YYYY-MM-DD, or return as-is for NA/empty
    if (!val || val === 'NA' || val === '') return val;
    var d = parseDate(val);
    return d ? formatDateYMD(d) : val;
  }

  function normalizeDate(val) {
    if (!val || val === 'NA' || val === '') return '';
    if (Object.prototype.toString.call(val) === '[object Date]') {
      return formatDateYMD(val);
    }
    var d = parseDate(val);
    return d ? formatDateYMD(d) : String(val);
  }

  function formatHeader(header) {
    if (!header) return '';
    var parts = header.split(' / ');
    if (parts.length >= 2) {
      return parts[0] + '<br><small style="font-weight:normal;font-size:10px;">' + parts.slice(1).join(' / ') + '</small>';
    }
    return header;
  }

  function getStatusColor(status) {
    switch (status) {
      case 'Done': return '#28a745';
      case 'Ongoing': return '#007bff';
      case 'Delayed': return '#dc3545';
      case 'Not start': return '#6c757d';
      default: return '#6c757d';
    }
  }

  function getStatusText(status) {
    switch (status) {
      case 'Done': return '已完成';
      case 'Ongoing': return '进行中';
      case 'Delayed': return '延误';
      case 'Not start': return '未开始';
      default: return status;
    }
  }

  function getMilestoneShortName(name) {
    if (!name) return '';
    var parts = name.split(' / ');
    var cn = parts[0] || name;
    // Use short label for display
    var map = {
      '模具/自动化改造（供应商）': '模具改造',
      'FAT': 'FAT',
      '现场安装': '现场安装',
      'IQ/OQ': 'IQ/OQ',
      '工程测试': '工程测试',
      'PQ': 'PQ',
      'Mass Production': 'MP'
    };
    return map[cn] || cn.substring(0, 6);
  }

  function getMilestoneColor(ms) {
    var actual = parseDate(ms.actual);
    if (actual) {
      if (actual > today) return '#fd7e14'; // orange - planned delayed
      return '#28a745'; // green - completed
    }
    var planned = parseDate(ms.planned);
    if (!planned) return '#adb5bd'; // gray - no date
    if (planned < today) return '#dc3545'; // red - overdue
    return '#adb5bd'; // gray - pending (future)
  }

  function getMilestoneTitle(ms) {
    var parts = ms.name.split(' / ');
    var shortName = parts[0] || ms.name;
    var lines = [shortName];
    if (ms.planned && ms.planned !== 'NA') {
      lines.push('计划: ' + normalizeDate(ms.planned));
    } else {
      lines.push('计划: NA');
    }
    if (ms.actual) {
      lines.push('实际完成: ' + normalizeDate(ms.actual));
      var actualDate = parseDate(ms.actual);
      if (actualDate && actualDate > today) {
        lines.push('状态: 计划时间推迟 / Planned Delayed');
      } else {
        lines.push('状态: 已完成 / Completed');
      }
    } else {
      var planned = parseDate(ms.planned);
      if (planned && planned < today) {
        lines.push('状态: 逾期未完成 / Overdue');
      } else if (planned) {
        lines.push('状态: 待完成 / Pending');
      } else {
        lines.push('状态: 无计划 / Not Scheduled');
      }
    }
    return lines.join('<br>');
  }

  function rgba(color, alpha) {
    // Convert hex to rgba for td backgrounds (opacity on td would fade ◆ too)
    var r = parseInt(color.slice(1,3), 16);
    var g = parseInt(color.slice(3,5), 16);
    var b = parseInt(color.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function renderGantt() {
    // 仅显示未完成项目
    var projects = globalData.projects.filter(function(proj) {
      return proj.status !== 'Done';
    });

    if (projects.length === 0) {
      $('#ganttHead').html('<tr><th style="font-size:14px;padding:20px;">暂无未完成项目 / No unfinished projects</th></tr>');
      $('#ganttBody').html('');
      $('#dataRangeInfo').text('全部项目已完成 / All projects done');
      return;
    }

    // 开始日期：仅从进行中+未开始项目取第一个milestone
    var startDates = [];
    var activeProjects = projects.filter(function(proj) {
      return proj.status === 'Ongoing' || proj.status === 'Not start';
    });
    var startSource = activeProjects.length > 0 ? activeProjects : projects;
    startSource.forEach(function(proj) {
      proj.milestones.forEach(function(ms) {
        var d = parseDate(ms.planned);
        if (d) startDates.push(d);
        d = parseDate(ms.actual);
        if (d) startDates.push(d);
      });
    });
    startDates.sort(function(a, b) { return a - b; });

    // 结束日期：使用所有显示项目的最后一个milestone
    var endDates = [];
    projects.forEach(function(proj) {
      proj.milestones.forEach(function(ms) {
        var d = parseDate(ms.planned);
        if (d) endDates.push(d);
        d = parseDate(ms.actual);
        if (d) endDates.push(d);
      });
    });
    endDates.sort(function(a, b) { return a - b; });

    var localMax = endDates.length > 0 ? new Date(endDates[endDates.length - 1]) : new Date(today.getFullYear(), today.getMonth() + 3, 1);
    var effectiveMin = startDates.length > 0 ? new Date(startDates[0]) : new Date(today.getFullYear(), today.getMonth(), 1);

    // Build day columns
    var days = [];
    var cur = new Date(effectiveMin);
    while (cur <= localMax) {
      days.push({ label: cur.getDate(), date: new Date(cur), month: cur.getMonth(), year: cur.getFullYear() });
      cur.setDate(cur.getDate() + 1);
    }

    function inDay(date, dayObj) {
      return date.getFullYear() === dayObj.date.getFullYear()
        && date.getMonth() === dayObj.date.getMonth()
        && date.getDate() === dayObj.date.getDate();
    }

    var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    // Collapse empty stretches: days with no milestone across all projects
    var COLLAPSE_BUFFER = 3;  // keep N days around each milestone
    var COLLAPSE_GAP = 14;    // only collapse gaps >= N days
    var activeDaySet = {};
    // Always keep today
    for (var di = 0; di < days.length; di++) {
      if (inDay(today, days[di])) activeDaySet[di] = true;
    }
    projects.forEach(function(proj) {
      proj.milestones.forEach(function(ms) {
        [parseDate(ms.planned), parseDate(ms.actual)].forEach(function(dt) {
          if (!dt) return;
          for (var di = 0; di < days.length; di++) {
            if (Math.abs((days[di].date - dt) / 86400000) <= COLLAPSE_BUFFER) activeDaySet[di] = true;
          }
        });
      });
    });

    var displayCols = [];
    var ci = 0;
    while (ci < days.length) {
      if (activeDaySet[ci]) {
        displayCols.push({ type: 'day', dayIdx: ci });
        ci++;
      } else {
        var gapStart = ci;
        while (ci < days.length && !activeDaySet[ci]) ci++;
        var gapLen = ci - gapStart;
        if (gapLen >= COLLAPSE_GAP) {
          displayCols.push({ type: 'collapse', gapStart: gapStart, gapEnd: ci - 1, count: gapLen, startDate: days[gapStart].date, endDate: days[ci - 1].date });
        } else {
          for (var j = gapStart; j < ci; j++) displayCols.push({ type: 'day', dayIdx: j });
        }
      }
    }

    // Month spans from displayCols
    var monthSpans = [];
    var lastKey = -1;
    displayCols.forEach(function(col) {
      var date = col.type === 'day' ? days[col.dayIdx].date : col.startDate;
      var key = date.getFullYear() * 100 + date.getMonth();
      if (key !== lastKey) {
        monthSpans.push({ year: date.getFullYear(), month: date.getMonth(), count: 1 });
        lastKey = key;
      } else {
        monthSpans[monthSpans.length - 1].count++;
      }
    });

    // Year spans
    var yearSpans = [];
    var lastYear = -1;
    monthSpans.forEach(function(ms) {
      if (ms.year !== lastYear) {
        yearSpans.push({ year: ms.year, count: ms.count });
        lastYear = ms.year;
      } else {
        yearSpans[yearSpans.length - 1].count += ms.count;
      }
    });

    // Header: year row + month row + day row
    var headHtml = '<tr>';
    headHtml += '<th rowspan="3">项目名称<br><small>Project Name</small></th>';
    headHtml += '<th rowspan="3">Leader<br><small>状态 Status</small></th>';
    yearSpans.forEach(function(ys) {
      headHtml += '<th colspan="' + ys.count + '" style="font-size:10px;">' + ys.year + '</th>';
    });
    headHtml += '<th rowspan="3" style="width:72px;">操作<br><small>Action</small></th>';
    headHtml += '</tr>';

    headHtml += '<tr>';
    monthSpans.forEach(function(ms) {
      headHtml += '<th colspan="' + ms.count + '" style="font-size:9px;">' + monthNames[ms.month] + '</th>';
    });
    headHtml += '</tr>';

    headHtml += '<tr>';
    displayCols.forEach(function(col) {
      if (col.type === 'day') {
        headHtml += '<th style="font-size:8px;min-width:28px;padding:2px 1px;">' + days[col.dayIdx].label + '</th>';
      } else {
        headHtml += '<th class="collapsed-col" title="折叠 ' + col.count + ' 天 / Collapsed ' + col.count + ' days&#10;' + formatDateYMD(col.startDate) + ' ~ ' + formatDateYMD(col.endDate) + '" style="font-size:8px;min-width:18px;max-width:18px;padding:2px 0;background:#e9ecef;color:#adb5bd;letter-spacing:-1px;">···</th>';
      }
    });
    headHtml += '</tr>';
    $('#ganttHead').html(headHtml);

    // Body
    var bodyHtml = '';
    projects.forEach(function(proj) {
      var stColor = getStatusColor(proj.status);
      var stText = getStatusText(proj.status);
      var barBg = rgba(stColor, 0.25);
      var barBgCollapse = rgba(stColor, 0.12);

      var projStart = null, projEnd = null;
      proj.milestones.forEach(function(ms) {
        var d = parseDate(ms.planned) || parseDate(ms.actual);
        if (d) {
          if (!projStart || d < projStart) projStart = d;
          if (!projEnd || d > projEnd) projEnd = d;
        }
      });

      // Milestone lookup by day index
      var msByDay = {};
      proj.milestones.forEach(function(ms) {
        var planned = parseDate(ms.planned);
        if (!planned) return;
        for (var d = 0; d < days.length; d++) {
          if (inDay(planned, days[d])) {
            if (!msByDay[d]) msByDay[d] = [];
            msByDay[d].push({ color: getMilestoneColor(ms), title: getMilestoneTitle(ms), msName: ms.name, projName: proj.projectName });
            break;
          }
        }
      });

      bodyHtml += '<tr class="gantt-row">';
      bodyHtml += '<td class="gantt-info">' + proj.projectName + '</td>';
      bodyHtml += '<td style="text-align:center;white-space:nowrap;font-size:12px;">' + proj.leader + '<br><span class="status-badge" style="background:' + stColor + ';">' + stText + '</span></td>';

      displayCols.forEach(function(col) {
        if (col.type === 'day') {
          var d = col.dayIdx;
          var day = days[d];
          var cellStyle = 'text-align:center;vertical-align:middle;';
          var cellContent = '';
          if (projStart && projEnd && projEnd >= day.date && projStart <= day.date) cellStyle += 'background:' + barBg + ';';
          var tdClass = inDay(today, day) ? ' class="today-col"' : '';
          if (msByDay[d]) {
            msByDay[d].forEach(function(item) {
              cellContent += '<span class="ms-node" data-ms-title="' + item.title.replace(/"/g, '&quot;') + '" style="display:inline-block;margin:0 1px;font-size:14px;padding:1px;line-height:1;color:' + item.color + ';cursor:pointer;text-shadow:-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">&#9670;</span>';
            });
          }
          bodyHtml += '<td' + tdClass + ' style="' + cellStyle + '">' + cellContent + '</td>';
        } else {
          var inRange = projStart && projEnd && col.endDate >= projStart && col.startDate <= projEnd;
          bodyHtml += '<td style="min-width:18px;max-width:18px;background:' + (inRange ? barBgCollapse : '#f8f9fa') + ';border-left:1px dashed #dee2e6;border-right:1px dashed #dee2e6;"></td>';
        }
      });

      bodyHtml += '<td style="text-align:center;white-space:nowrap;width:72px;">';
      bodyHtml += '<button class="btn btn-sm btn-outline-danger gantt-update-btn" data-project="' + proj.projectName + '" title="更新 / Update" style="font-size:11px;">&#9998; 更新<br><small>Update</small></button>';
      bodyHtml += '</td>';
      bodyHtml += '</tr>';
    });

    $('#ganttBody').html(bodyHtml);

    // Custom jQuery hover tooltip
    $('.ms-node').off('mouseenter mouseleave').on('mouseenter', function(e) {
      var $tip = $('#msTooltip');
      if (!$tip.length) {
        $tip = $('<div id="msTooltip" style="position:fixed;z-index:9999;max-width:200px;padding:6px 10px;background:rgba(0,0,0,0.85);color:#fff;border-radius:4px;font-size:12px;line-height:1.6;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>');
        $('body').append($tip);
      }
      $tip.html($(this).data('ms-title')).css({ left: e.clientX + 12, top: e.clientY - 8 }).show();
    }).on('mousemove', function(e) {
      $('#msTooltip').css({ left: e.clientX + 12, top: e.clientY - 8 });
    }).on('mouseleave', function() {
      $('#msTooltip').hide();
    });

    $('#ganttBody').on('click', '.gantt-update-btn', function() {
      openUpdateModal($(this).data('project'));
    });

    // History icon click handler
    $('#ganttBody').on('click', '.hist-icon', function() {
      var $icon = $(this);
      var projectName = $icon.data('project');
      var milestoneName = $icon.data('milestone');
      google.script.run.withSuccessHandler(function(result) {
        try {
          var history = typeof result === 'string' ? JSON.parse(result) : [];
          if (history.error || !Array.isArray(history)) {
            Swal.fire('错误 / Error', '获取历史失败 / Failed to load history', 'error');
            return;
          }
          var filtered = [];
          for (var h = 0; h < history.length; h++) {
            if (history[h].milestone === milestoneName) {
              filtered.push(history[h]);
            }
          }
          if (filtered.length === 0) {
            Swal.fire('提示 / Info', '无历史记录 / No history', 'info');
            return;
          }
          var html = '<table style="width:100%;border-collapse:collapse;font-size:12px;">'
            + '<thead><tr style="background:#E60012;color:white;">'
            + '<th style="padding:8px 6px;">原计划日期<br><small>Old</small></th>'
            + '<th style="padding:8px 6px;">新计划日期<br><small>New</small></th>'
            + '<th style="padding:8px 6px;">修改人<br><small>Editor</small></th>'
            + '<th style="padding:8px 6px;">修改时间<br><small>Time</small></th>'
            + '</tr></thead><tbody>';
          for (var h = 0; h < filtered.length; h++) {
            var f = filtered[h];
            html += '<tr style="background:' + (h % 2 === 0 ? '#fff5f5' : '#fff') + ';">'
              + '<td style="padding:6px;font-family:monospace;">' + (f.oldDate || 'NA') + '</td>'
              + '<td style="padding:6px;font-family:monospace;font-weight:600;">' + (f.newDate || 'NA') + '</td>'
              + '<td style="padding:6px;">' + (f.editor || '') + '</td>'
              + '<td style="padding:6px;">' + (f.modifiedTime || '') + '</td>'
              + '</tr>';
          }
          html += '</tbody></table>';
          Swal.fire({
            title: milestoneName + '<br><small style="font-weight:normal;">计划日期变更历史 / Planned Date Change History</small>',
            html: html,
            width: 650,
            confirmButtonText: '关闭 / Close'
          });
        } catch(e) {
          Swal.fire('错误 / Error', e.message, 'error');
        }
      }).getPlannedDateHistory(projectName);
    });

    var collapsedCount = displayCols.filter(function(c) { return c.type === 'collapse'; }).length;
    var collapsedDays = displayCols.filter(function(c) { return c.type === 'collapse'; }).reduce(function(s, c) { return s + c.count; }, 0);
    var collapseInfo = collapsedDays > 0 ? ' | 已折叠 ' + collapsedDays + ' 天（' + collapsedCount + ' 段）/ Collapsed ' + collapsedDays + ' days' : '';
    $('#dataRangeInfo').text('时间范围: ' + formatDateYMD(effectiveMin) + ' ~ ' + formatDateYMD(localMax) + ' | 共 ' + days.length + ' 天 | 仅未完成项目' + collapseInfo);
  }

  function scrollToToday() {
    var cell = $('.today-col').first();
    if (cell.length) {
      $('#ganttContainer').animate({
        scrollLeft: cell[0].offsetLeft - $('#ganttContainer').width() / 2
      }, 500);
    }
  }

  function openUpdateModal(projectName) {
    if (!globalData) return;
    var proj = null;
    for (var i = 0; i < globalData.projects.length; i++) {
      if (globalData.projects[i].projectName === projectName) {
        proj = globalData.projects[i];
        break;
      }
    }
    if (!proj) return;

    $('#modalProjectName').val(proj.projectName);
    $('#modalStatus').val(proj.status);

    // Init Select2 for leader in update modal
    if ($('#modalLeader').hasClass('select2-hidden-accessible')) {
      $('#modalLeader').select2('destroy');
    }
    $('#modalLeader').empty().append('<option value="' + (proj.leader || '') + '" selected>' + (proj.leader ? proj.leader.replace(/\(.*\)/, '').trim() : '') + '</option>');
    $('#modalLeader').select2({
      data: userListCache || [],
      dropdownParent: $('#updateModal'),
      templateResult: function(item) { return item.display || item.text; },
      templateSelection: function(item) { return item.name || item.text || ''; },
      placeholder: '请选择 / Select',
      allowClear: false,
      width: '100%'
    });

    // Admin can edit status and planned dates
    $('#modalStatus').prop('disabled', !isAdmin);
    if (!isAdmin) {
      $('#statusHelp').text('仅管理员可修改状态 / Only admin can edit status');
    } else {
      $('#statusHelp').text('你可以修改状态 / You can edit status').css('color', '#E60012');
    }

    // Build milestone rows
    var msHtml = '';
    proj.milestones.forEach(function(ms, i) {
      var plannedDisplay = normalizeDate(ms.planned) || (ms.planned === 'NA' ? 'NA' : ms.planned);
      msHtml += '<div class="modal-milestone-row">';
      msHtml += '<div class="modal-milestone-label">' + formatHeader(ms.name) + '</div>';
      msHtml += '<div class="modal-milestone-dates">';
      if (isAdmin) {
        msHtml += '<div class="flex-fill"><label style="font-size:10px;color:#666;">计划日期<br><small>Planned</small></label><input type="text" class="form-control form-control-sm ms-planned" data-ms-idx="' + i + '" value="' + (plannedDisplay || '') + '" placeholder="YYYY-MM-DD or NA"></div>';
      } else {
        msHtml += '<div class="flex-fill"><label style="font-size:10px;color:#666;">计划日期<br><small>Planned</small></label>';
        msHtml += '<div class="input-group input-group-sm">';
        msHtml += '<input type="text" class="form-control form-control-sm readonly-field" value="' + (plannedDisplay || '') + '" readonly style="font-size:12px;">';
        if (plannedDisplay && plannedDisplay !== 'NA') {
          msHtml += '<button class="btn btn-sm btn-outline-warning request-delay-btn" type="button" data-ms-idx="' + i + '" data-ms-name="' + ms.name.replace(/"/g, '&quot;') + '" data-ms-planned="' + (plannedDisplay || '') + '" style="font-size:10px;white-space:nowrap;border-color:#fd7e14;color:#fd7e14;">申请推迟<br><small>Delay</small></button>';
        }
        msHtml += '</div></div>';
      }
      msHtml += '<div class="flex-fill"><label style="font-size:10px;color:#666;">实际完成<br><small>Actual</small></label><input type="date" class="form-control form-control-sm ms-actual" data-ms-index="' + i + '" value="' + normalizeDate(ms.actual) + '"></div>';
      msHtml += '</div>';
      msHtml += '</div>';
    });
    $('#modalMilestones').html(msHtml);

    // Store current project for save
    $('#updateModal').data('projectName', proj.projectName);
    $('#updateModal').modal('show');
  }

  function saveUpdates() {
    var projectName = $('#updateModal').data('projectName');
    var newStatus = $('#modalStatus').val();
    var isStatusChanged = false;

    // Find project to compare status
    var proj = null;
    for (var i = 0; i < globalData.projects.length; i++) {
      if (globalData.projects[i].projectName === projectName) {
        proj = globalData.projects[i];
        break;
      }
    }
    if (proj && proj.status !== newStatus) {
      isStatusChanged = true;
    }

    var milestones = [];
    $('#modalMilestones .ms-actual').each(function() {
      var idx = parseInt($(this).data('msIndex'));
      var actual = $(this).val().trim();
      milestones.push({ index: idx, actual: actual });
    });

    var updates = { milestones: milestones };

    // Leader change
    var newLeader = $('#modalLeader').val();
    if (newLeader && proj && newLeader !== proj.leader) {
      updates.leader = newLeader;
    }

    if (isAdmin) {
      var plannedDates = [];
      var hasPlannedChanges = false;
      $('#modalMilestones .ms-planned').each(function() {
        var idx = parseInt($(this).data('msIdx'));
        var val = $(this).val().trim();
        if (val && val !== 'NA') val = normalizeDateInput(val);
        if (proj && proj.milestones[idx]) {
          var oldVal = proj.milestones[idx].planned;
          if (val !== oldVal) hasPlannedChanges = true;
        }
        plannedDates.push({ index: idx, planned: val || 'NA' });
      });
      if (hasPlannedChanges) {
        updates.plannedDates = plannedDates;
        updates.hasPlannedChanges = true;
      }
    }
    if (isStatusChanged) {
      updates.status = newStatus;
    }

    // Detect future actual dates
    var futureMilestones = [];
    $('#modalMilestones .ms-actual').each(function() {
      var idx = parseInt($(this).data('msIndex'));
      var actual = $(this).val().trim();
      if (actual) {
        var d = parseDate(actual);
        if (d && d > today) {
          futureMilestones.push({
            name: proj && proj.milestones[idx] ? proj.milestones[idx].name : ('里程碑 ' + idx),
            date: actual
          });
        }
      }
    });

    function executeSave(pn, upd) {
      Swal.fire({
        title: swalTitle('正在保存...', 'Saving...'),
        html: swalHtml('正在保存项目更新，请稍候。', 'Saving project updates, please wait.'),
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: function() { Swal.showLoading(); }
      });

      google.script.run
        .withSuccessHandler(function(result) {
          Swal.close();
          try {
            var res = typeof result === 'string' ? JSON.parse(result) : result;
            if (res.success) {
              Swal.fire('成功 / Success', res.message, 'success').then(function() {
                $('#updateModal').modal('hide');
                loadData();
              });
            } else {
              Swal.fire('失败 / Failed', res.message, 'error');
            }
          } catch(e) {
            Swal.fire('错误 / Error', e.message, 'error');
          }
        })
        .withFailureHandler(function(err) {
          Swal.close();
          Swal.fire('错误 / Error', '保存失败 / Save failed: ' + err.message, 'error');
        })
        .updateProjectTracking(pn, JSON.stringify(upd), globalName);
    }

    if (futureMilestones.length > 0) {
      var listHtml = futureMilestones.map(function(fm) {
        return '<li>' + fm.name.split(' / ')[0] + ': ' + fm.date + '</li>';
      }).join('');
      Swal.fire({
        title: '实际完成日期异常 / Actual Date Warning',
        html: '<p>以下里程碑的实际完成日期晚于今日，该节点将显示为「计划时间推迟」，确认继续保存吗？</p>'
          + '<p style="font-size:0.85em;color:#666;">The following milestones have actual dates in the future. The node will show as "Planned Delayed". Confirm to save?</p>'
          + '<ul style="text-align:left;">' + listHtml + '</ul>',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '确认保存 / Confirm',
        cancelButtonText: '返回修改 / Cancel'
      }).then(function(result) {
        if (result.isConfirmed) executeSave(projectName, updates);
      });
      return;
    }

    executeSave(projectName, updates);
  }

  function submitAddProject() {
    var projectName = $('#addProjectName').val().trim();
    if (!projectName) {
      Swal.fire('提示 / Notice', '请输入项目名称 / Project name required', 'warning');
      return;
    }

    // Collect milestone planned dates
    var milestones = [];
    $('.add-ms-planned').each(function() {
      var val = $(this).val().trim();
      milestones.push(val || 'NA');
    });

    var data = {
      projectName: projectName,
      leader: $('#addLeader').val() || '',
      technician: $('#addTechnician').val() || '',
      status: $('#addStatus').val() || 'Not start',
      milestones: milestones
    };

    Swal.fire({
      title: swalTitle('正在提交...', 'Submitting...'),
      html: swalHtml('正在添加新项目，请稍候。', 'Adding new project, please wait.'),
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: function() { Swal.showLoading(); }
    });

    google.script.run
      .withSuccessHandler(function(result) {
        Swal.close();
        try {
          var res = typeof result === 'string' ? JSON.parse(result) : result;
          if (res.success) {
            Swal.fire('成功 / Success', res.message, 'success').then(function() {
              $('#addModal').modal('hide');
              loadData();
            });
          } else {
            Swal.fire('失败 / Failed', res.message, 'error');
          }
        } catch(e) {
          Swal.fire('错误 / Error', e.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        Swal.close();
        Swal.fire('错误 / Error', '提交失败 / Submit failed: ' + err.message, 'error');
      })
      .addProject(JSON.stringify(data));
  }
