<script>
    window.onerror = function(msg, src, line, col, err) {
        console.error('[onerror] ' + msg + ' | src:' + src + ' | line:' + line + ':' + col);
    };

    let userHasManagePermission = false;
    let currentUserEmail = sessionStorage.getItem('Email') || '';
    let currentUserName = sessionStorage.getItem('Name') || '';

    function checkUserManagePermission() {
        if (typeof google === 'undefined' || typeof google.script === 'undefined' || typeof google.script.run === 'undefined') {
            console.warn('无法检查权限：google.script.run 不可用');
            updateUIByPermission();
            return;
        }
        google.script.run
            .withSuccessHandler(function (result) {
                userHasManagePermission = result === true;
                updateUIByPermission();
                // 如果表格已有数据，重绘确认列以反映权限状态
                [imTable, tfTable, pkTable].forEach(function (table) {
                    if (table && table.rows().count() > 0) {
                        table.rows().invalidate().draw(false);
                    }
                });
            })
            .withFailureHandler(function (error) {
                console.error('权限检查失败:', error);
                userHasManagePermission = false;
                updateUIByPermission();
            })
            .checkFailureReportManagePermission(currentUserEmail, currentUserName);
    }

    function updateUIByPermission() {
        if (userHasManagePermission) {
            $('#manualAddBtn').show();
            $('#permissionNotice').hide();
            $('#userLevelBadge').removeClass('bg-secondary').addClass('bg-success').text('管理员 / Admin');
        } else {
            $('#manualAddBtn').hide();
            $('#permissionNotice').show();
            $('#userLevelBadge').removeClass('bg-secondary').addClass('bg-warning text-dark').text('普通用户 / User');
        }
    }

    $(document).ready(function () {

        // 启动权限检查
        checkUserManagePermission();

        // 基于 sessionStorage.Process 决定默认显示哪个工序 Tab（TagName）
        // - 注塑口径：INJ/IM -> IM tab
        // - TF -> TF tab
        // - PK -> PK tab
        // 若 session 缺失或不匹配，则保持默认（IM tab）
        (function setDefaultProcessTabBySession() {
            try {
                let sessionProcess = (sessionStorage.getItem('Process') || sessionStorage.getItem('pmProcess') || '').toString().trim();
                if (sessionProcess === 'INJ') sessionProcess = 'IM';

                let activeKey = 'IM';
                if (sessionProcess === 'TF') activeKey = 'TF';
                else if (sessionProcess === 'PK') activeKey = 'PK';

                const tabs = [
                    { key: 'IM', tabBtn: '#im-tab', tabContent: '#im-content' },
                    { key: 'TF', tabBtn: '#tf-tab', tabContent: '#tf-content' },
                    { key: 'PK', tabBtn: '#pk-tab', tabContent: '#pk-content' },
                ];

                // 保持三个工序 Tab 都可见，只将当前工序放在最前并设为激活
                // 说明：只调整显示顺序，不隐藏其他工序
                const $tabList = $('#processTabs');
                const $contentList = $('#processTabContent');

                // 确保不会遗留隐藏样式
                tabs.forEach(t => {
                    $(t.tabBtn).closest('li').removeClass('d-none');
                    $(t.tabContent).removeClass('d-none');
                });

                // 将当前工序 tab 与内容移动到最前
                const activeTab = tabs.find(t => t.key === activeKey);
                if (activeTab && $tabList.length && $contentList.length) {
                    const $activeLi = $(activeTab.tabBtn).closest('li');
                    const $activePane = $(activeTab.tabContent);
                    if ($activeLi.length) $tabList.prepend($activeLi);
                    if ($activePane.length) $contentList.prepend($activePane);
                }

                // 激活对应 Tab
                const activeTabBtn = document.querySelector(
                    activeKey === 'TF' ? '#tf-tab' : activeKey === 'PK' ? '#pk-tab' : '#im-tab'
                );
                if (activeTabBtn && window.bootstrap && window.bootstrap.Tab) {
                    new window.bootstrap.Tab(activeTabBtn).show();
                }
            } catch (e) {
                // 保持默认显示（IM tab）
            }
        })();

        const buildBilingualTitle = (cn, en) => {
            return `<span class="label-cn">${cn}</span><span class="label-en">${en}</span>`;
        };

        const escapeHtml = (value) => {
            if (value == null) return '';
            return String(value).replace(/[&<>"]+/g, function (match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
                return escape[match] || match;
            });
        };

        const getActiveProcessKey = () => {
            const activeId = $('#processTabs .nav-link.active').attr('id');
            if (activeId === 'tf-tab') return 'TF';
            if (activeId === 'pk-tab') return 'PK';
            return 'IM';
        };

        let imTable, tfTable, pkTable;

        const getRowIdentifier = (row) => {
            if (!row) return '';
            if (row.manualEntry && row.tempId) return row.tempId;
            return String(row.reportNo || '').trim();
        };

        const findRowIndexByIdentifier = (table, identifier) => {
            if (!table || !identifier) return undefined;
            const normalized = String(identifier).trim();
            const indexes = table.rows().indexes().toArray();
            for (let i = 0; i < indexes.length; i++) {
                const idx = indexes[i];
                const rowData = table.row(idx).data();
                if (!rowData) continue;
                const candidates = [rowData.reportNo, rowData.tempId];
                for (let candidate of candidates) {
                    if (!candidate) continue;
                    if (String(candidate).trim() === normalized) {
                        return idx;
                    }
                }
            }
            return undefined;
        };

        const locateRowByIdentifier = (identifier) => {
            if (!identifier) return { table: null, rowIndex: undefined, rowData: null };
            const tables = [imTable, tfTable, pkTable];
            for (const table of tables) {
                const rowIndex = findRowIndexByIdentifier(table, identifier);
                if (rowIndex !== undefined) {
                    return { table, rowIndex, rowData: table.row(rowIndex).data() };
                }
            }
            return { table: null, rowIndex: undefined, rowData: null };
        };
        let responsibleOptions = [];
        let responsibleOptionsLoaded = false;
        let machineNoOptions = [];

        const loadMachineNoOptions = () => {
            if (typeof google === 'undefined' || typeof google.script === 'undefined' || typeof google.script.run === 'undefined') return;
            google.script.run
                .withSuccessHandler(function(result) {
                    try { machineNoOptions = typeof result === 'string' ? JSON.parse(result) : (result || []); }
                    catch(err) { console.error('解析机台号列表失败:', err); }
                })
                .withFailureHandler(function(error) { console.error('获取机台号列表失败:', error); })
                .getMachineNumbers();
        };

        const normalizeResponsibleDisplay = (user) => {
            if (!user) return '';
            if (typeof user === 'string') return user.trim();
            return String(user.display || '').trim();
        };

        const loadResponsibleOptions = () => {
            if (typeof google === 'undefined' || typeof google.script === 'undefined' || typeof google.script.run === 'undefined') {
                console.warn('无法加载责任人列表：google.script.run 不可用 / Cannot load responsible options');
                return;
            }
            google.script.run
                .withSuccessHandler(function (result) {
                    try {
                        const parsed = typeof result === 'string' ? JSON.parse(result) : (result || []);
                        responsibleOptions = (parsed || []).map(normalizeResponsibleDisplay).filter(Boolean);
                        responsibleOptionsLoaded = true;
                        refreshResponsibleColumnRenders();
                    } catch (err) {
                        console.error('解析责任人列表失败 / Failed to parse responsible options:', err);
                    }
                })
                .withFailureHandler(function (error) {
                    console.error('获取责任人列表失败 / Failed to fetch responsible options:', error);
                })
                .getEDSUserNames();
        };

        const parseResponsibleDisplay = (display) => {
            if (!display) return { name: '', email: '' };
            const match = display.match(/^(.+?)【(.+?)】$/);
            if (match) {
                return { name: match[1].trim(), email: match[2].trim() };
            }
            return { name: display.trim(), email: '' };
        };

        const findResponsibleOptionByName = (input) => {
            if (!input) return null;
            const target = String(input).toLowerCase();
            for (let i = 0; i < responsibleOptions.length; i++) {
                const option = responsibleOptions[i];
                if (!option) continue;
                const optionText = String(option).toLowerCase();
                if (optionText === target) {
                    return option;
                }
                const parsed = parseResponsibleDisplay(option);
                if (parsed.name && parsed.name.toLowerCase() === target) {
                    return option;
                }
            }
            return null;
        };

        const enhanceResponsibleSelects = (scope) => {
            if (!$.fn.select2) return;
            const $targets = scope ? $(scope).find('.responsible-select') : $('.responsible-select');
            const DROPDOWN_PARENT = $('body');
            $targets.each(function () {
                const $el = $(this);
                const currentValue = $el.val();
                if ($el.hasClass('select2-hidden-accessible')) {
                    $el.select2('destroy');
                    $el.val(currentValue);
                }
                $el.select2({
                    width: '120px',
                    theme: 'bootstrap',
                    dropdownParent: DROPDOWN_PARENT,
                    placeholder: '请输入或选择责任人 / Type or Select',
                    tags: true,
                    allowClear: false,
                    templateSelection: function (data) {
                        const parsed = parseResponsibleDisplay(data.text);
                        return parsed.name || data.text;
                    },
                    templateResult: function (data) {
                        if (data.loading) return data.text;
                        const parsed = parseResponsibleDisplay(data.text);
                        if (parsed.email) {
                            return $('<span>' + parsed.name + '<br/><small style="color:#666">' + parsed.email + '</small></span>');
                        }
                        return data.text;
                    },
                    matcher: function (params, data) {
                        if ($.trim(params.term) === '') {
                            return data;
                        }
                        if (typeof data.text === 'undefined') {
                            return null;
                        }
                        const term = params.term.toLowerCase();
                        const text = data.text.toLowerCase();
                        if (text.indexOf(term) > -1) {
                            return data;
                        }
                        return null;
                    },
                    createTag: function (params) {
                        const term = $.trim(params.term);
                        if (!term) {
                            return null;
                        }
                        const matched = findResponsibleOptionByName(term);
                        if (matched) {
                            return null;
                        }
                        if (!responsibleOptions.includes(term)) {
                            responsibleOptions.push(term);
                            responsibleOptions.sort();
                        }
                        return {
                            id: term,
                            text: term,
                            newTag: true,
                        };
                    },
                });
            });
        };

        const enhanceMachineNoSelects = (scope) => {
            if (!$.fn.select2) return;
            const $targets = scope ? $(scope).find('.machine-no-select') : $('.machine-no-select');
            $targets.each(function() {
                const $el = $(this);
                if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
                $el.select2({
                    width: '140px',
                    theme: 'bootstrap',
                    dropdownParent: $('body'),
                    placeholder: '请选择机台号 / Select Machine No.',
                    allowClear: false
                });
            });
        };

        const enhanceManualSelects = (scope) => {
            if (!$.fn.select2) return;
            const $targets = scope ? $(scope).find('.manual-select') : $('.manual-select');
            const DROPDOWN_PARENT = $('body');
            $targets.each(function () {
                const $el = $(this);
                const placeholder = $el.data('placeholder') || '请选择 / Select';
                const currentValue = $el.val();
                if ($el.hasClass('select2-hidden-accessible')) {
                    $el.select2('destroy');
                    $el.val(currentValue);
                }
                $el.select2({
                    width: '160px',
                    theme: 'bootstrap',
                    dropdownParent: DROPDOWN_PARENT,
                    placeholder: placeholder,
                    allowClear: false
                });
            });
        };

        const refreshResponsibleColumnRenders = () => {
            [imTable, tfTable, pkTable].forEach(function (table) {
                if (table) {
                    table.rows().invalidate().draw(false);
                }
            });
            enhanceResponsibleSelects();
            enhanceManualSelects();
            enhanceMachineNoSelects();
        };

        loadResponsibleOptions();
        loadMachineNoOptions();

        const renderNeedFailureBadge = (value) => {
            if (value === '是' || value === true || value === 'true') {
                return '<span class="badge bg-success">是 / Yes</span>';
            }
            if (value === '否' || value === false || value === 'false') {
                return '<span class="badge bg-secondary">否 / No</span>';
            }
            return '<span class="badge bg-warning">待定 / Pending</span>';
        };

        const renderResponsibleSelect = (processKey) => {
            return function (data, type, row) {
                if (type !== 'display') {
                    return data || '';
                }
                const current = data || '';
                const options = ['<option value="">请选择 / Select</option>'];
                const identifier = getRowIdentifier(row);
                (responsibleOptions || []).forEach(function (option) {
                    if (!option) return;
                    const selected = option === current ? ' selected' : '';
                    options.push(`<option value="${escapeHtml(option)}"${selected}>${escapeHtml(option)}</option>`);
                });
                return `<select class="form-select form-select-sm responsible-select" data-id="${identifier}" data-process="${processKey}">${options.join('')}</select>`;
            };
        };

        const createManualSelectRenderer = (field, placeholder, options) => {
            return function (data, type, row) {
                if (type !== 'display') return escapeHtml(data);
                if (row && row.manualEntry) {
                    const identifier = getRowIdentifier(row);
                    const current = row[field] || '';
                    const optionTags = [`<option value="">${escapeHtml(placeholder)}</option>`];
                    options.forEach(opt => {
                        const selected = current === opt.value ? ' selected' : '';
                        optionTags.push(`<option value="${escapeHtml(opt.value)}"${selected}>${escapeHtml(opt.text)}</option>`);
                    });
                    return `<select class="form-select form-select-sm manual-select manual-select-${field}" data-field="${field}" data-report="${identifier}" data-placeholder="${escapeHtml(placeholder)}">${optionTags.join('')}</select>`;
                }
                return escapeHtml(data);
            };
        };

        const manualSpecialRenderers = {
            reportNo: function (data, type, row) {
                if (type !== 'display') return escapeHtml(data);
                if (row && row.manualEntry) {
                    return escapeHtml(row.reportNo || '');
                }
                return escapeHtml(data);
            },
            process: function (data, type, row) {
                if (type !== 'display') return escapeHtml(data);
                if (row && row.manualEntry) {
                    return escapeHtml(row.process || '');
                }
                return escapeHtml(data);
            },
            repairTime: function (data, type, row) {
                if (type !== 'display') return escapeHtml(data);
                if (row && row.manualEntry) {
                    const identifier = getRowIdentifier(row);
                    const value = escapeHtml((row.repairTime || '').toString());
                    return `<input type="number" class="form-control form-control-sm manual-input manual-input-numeric" data-field="repairTime" data-report="${identifier}" placeholder="请输入维修时间 / Enter Repair Time" inputmode="numeric" pattern="\\d*" min="0" step="1" value="${value}">`;
                }
                return escapeHtml(data);
            },
            status: createManualSelectRenderer('status', '请选择状态 / Select Status', [
                { value: '已解决', text: '已解决 / Resolved' },
                { value: '未解决', text: '未解决 / Unresolved' }
            ]),
            submitDate: function (data, type, row) {
                if (type !== 'display') return escapeHtml(data);
                if (row && row.manualEntry) {
                    const identifier = getRowIdentifier(row);
                    const value = escapeHtml(row.submitDate || '');
                    return `<input type="date" class="form-control form-control-sm manual-input manual-date" data-field="submitDate" data-report="${identifier}" value="${value}">`;
                }
                return escapeHtml(data);
            },
            workshop: createManualSelectRenderer('workshop', '请选择车间 / Select Workshop', [
                { value: 'TB1', text: 'TB1 车间 / TB1 Workshop' },
                { value: 'TB2', text: 'TB2 车间 / TB2 Workshop' }
            ]),
            machineNo: function(data, type, row) {
                if (type !== 'display') return escapeHtml(data);
                if (row && row.manualEntry) {
                    const identifier = getRowIdentifier(row);
                    const opts = ['<option value=""></option>'];
                    machineNoOptions.forEach(m => {
                        const sel = (row.machineNo === m) ? ' selected' : '';
                        opts.push(`<option value="${escapeHtml(m)}"${sel}>${escapeHtml(m)}</option>`);
                    });
                    return `<select class="form-select form-select-sm machine-no-select" data-field="machineNo" data-report="${identifier}">${opts.join('')}</select>`;
                }
                return escapeHtml(data);
            }
        };

        const manualFieldRenderer = (field, placeholder) => {
            if (manualSpecialRenderers[field]) {
                return manualSpecialRenderers[field];
            }
            return function (data, type, row) {
                if (type !== 'display') return escapeHtml(data);
                if (row && row.manualEntry) {
                    const identifier = getRowIdentifier(row);
                    const value = escapeHtml(row[field] || '');
                    const ph = placeholder ? escapeHtml(placeholder) : '';
                    return `<input type="text" class="form-control form-control-sm manual-input" data-field="${field}" data-report="${identifier}" placeholder="${ph}" value="${value}">`;
                }
                return escapeHtml(data);
            };
        };

        const buildColumnsConfig = (processKey) => {
            return [
                { data: 'reportNo', title: buildBilingualTitle('编号', 'Report No.'), render: manualFieldRenderer('reportNo', '请输入编号 / Enter Report No.') },
                { data: 'machineNo', title: buildBilingualTitle('机台号', 'Machine No.'), render: manualFieldRenderer('machineNo', '请输入机台号 / Enter Machine No.') },
                { data: 'problemDescription', title: buildBilingualTitle('问题描述', 'Problem Description'), render: manualFieldRenderer('problemDescription', '请输入问题描述 / Describe the problem') },
                { data: 'status', title: buildBilingualTitle('状态', 'Status'), render: manualFieldRenderer('status', '请输入状态 / Enter Status') },
                { data: 'repairTime', title: buildBilingualTitle('维修时间', 'Repair Time'), render: manualFieldRenderer('repairTime', '请输入维修时间 / Enter Repair Time') },
                { data: 'submitDate', title: buildBilingualTitle('提交日期', 'Submit Date'), render: manualFieldRenderer('submitDate', '请输入提交日期 / Enter Submit Date') },
                { data: 'workshop', title: buildBilingualTitle('车间', 'Workshop'), render: manualFieldRenderer('workshop', '请输入车间 / Enter Workshop') },
                { data: 'process', title: buildBilingualTitle('工序', 'Process'), render: manualFieldRenderer('process', '请输入工序 / Enter Process') },
                {
                    data: 'responsiblePerson',
                    title: buildBilingualTitle('责任人', 'Responsible'),
                    orderable: false,
                    render: renderResponsibleSelect(processKey)
                },
                {
                    data: 'confirmation',
                    title: buildBilingualTitle('故障报告确认', 'Failure Report Confirmation'),
                    className: 'text-center align-middle confirm-actions-cell',
                    render: function (data, type, row) {
                        if (type !== 'display') {
                            return data || '';
                        }
                        if (!userHasManagePermission) {
                            return '<span class="text-muted small">无权限 / No Permission</span>';
                        }
                        const identifier = getRowIdentifier(row);
                        return '<div class="confirm-action-group">'
                            + '<button class="btn btn-sm btn-success confirm-btn btn-confirm-action" data-id="' + identifier + '" data-process="' + processKey + '"><span class="label-cn">需要故障报告</span><span class="label-en">Need Failure Report</span></button>'
                            + '<button class="btn btn-sm btn-secondary no-confirm-btn btn-confirm-action" data-id="' + identifier + '" data-process="' + processKey + '"><span class="label-cn">不需要故障报告</span><span class="label-en">No Failure Report</span></button>'
                            + '</div>';
                    }
                },
                {
                    data: 'needFailureReport',
                    title: buildBilingualTitle('是否需要故障报告', 'Need Failure Report'),
                    render: function (data, type) {
                        if (type !== 'display') {
                            return data || '';
                        }
                        return renderNeedFailureBadge(data);
                    }
                }
            ];
        };

        const getTableByProcess = (processKey) => {
            if (processKey === 'IM') return imTable;
            if (processKey === 'TF') return tfTable;
            if (processKey === 'PK') return pkTable;
            return null;
        };

        const getRowDataByReport = (processKey, reportId) => {
            if (!reportId) {
                return { table: null, rowIndex: undefined, rowData: null };
            }
            const table = getTableByProcess(processKey);
            const rowIndex = findRowIndexByIdentifier(table, reportId);
            if (table && rowIndex !== undefined) {
                return { table, rowIndex, rowData: table.row(rowIndex).data() };
            }
            return locateRowByIdentifier(reportId);
        };

        // 页面加载时显示一个提示框
        Swal.fire({
            title: '加载数据中... / Loading Data...',
            text: '正在从服务器获取故障报告列表，请稍候。 / Fetching failure report list from server, please wait.',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // 获取URL参数 - 已注释
        // const urlParams = new URLSearchParams(window.location.search);
        // const userId = urlParams.get('ID');
        // const userName = urlParams.get('Name');
        // const userProcess = urlParams.get('Process');
        // const userWorkshop = urlParams.get('Workshop');

        // 初始化三个工序的DataTable，添加错误处理
        try {
            if ($('#imTable').length) {
                imTable = $('#imTable').DataTable({
                    pageLength: 10,
                    responsive: true,
                    columns: buildColumnsConfig('IM')
                });
                imTable.on('draw', function () {
                    const $table = $('#imTable');
                    enhanceResponsibleSelects($table);
                    enhanceManualSelects($table);
                    enhanceMachineNoSelects($table);
                });
            } else {
                console.error('imTable 元素未找到 / imTable element not found');
            }
        } catch (e) {
            console.error('初始化 imTable 出错 / Error initializing imTable:', e);
        }

        tfTable = null;
        try {
            if ($('#tfTable').length) {
                tfTable = $('#tfTable').DataTable({
                    pageLength: 10,
                    responsive: true,
                    columns: buildColumnsConfig('TF')
                });
                tfTable.on('draw', function () {
                    const $table = $('#tfTable');
                    enhanceResponsibleSelects($table);
                    enhanceManualSelects($table);
                    enhanceMachineNoSelects($table);
                });
            } else {
                console.error('tfTable 元素未找到 / tfTable element not found');
            }
        } catch (e) {
            console.error('初始化 tfTable 出错 / Error initializing tfTable:', e);
        }

        pkTable = null;
        try {
            if ($('#pkTable').length) {
                pkTable = $('#pkTable').DataTable({
                    pageLength: 10,
                    responsive: true,
                    columns: buildColumnsConfig('PK')
                });
                pkTable.on('draw', function () {
                    const $table = $('#pkTable');
                    enhanceResponsibleSelects($table);
                    enhanceManualSelects($table);
                    enhanceMachineNoSelects($table);
                });
            } else {
                console.error('pkTable 元素未找到 / pkTable element not found');
            }
        } catch (e) {
            console.error('初始化 pkTable 出错 / Error initializing pkTable:', e);
        }

        // 加载各工序的故障报告数据
        function loadProcessData() {
            if (typeof google !== 'undefined' && typeof google.script !== 'undefined' && typeof google.script.run !== 'undefined') {
                google.script.run
                    .withSuccessHandler(function (data) {
                        let parsedData = typeof data === 'string' ? JSON.parse(data) : data;
                        function formatDate(dateStr) {
                            if (!dateStr) return '';
                            try {
                                let date = new Date(dateStr);
                                if (isNaN(date.getTime())) return dateStr;
                                let year = date.getFullYear();
                                let month = String(date.getMonth() + 1).padStart(2, '0');
                                let day = String(date.getDate()).padStart(2, '0');
                                return `${year}-${month}-${day}`;
                            } catch (e) {
                                console.error('日期格式化错误 / Date formatting error:', e, '原始日期 / Original date:', dateStr);
                                return dateStr;
                            }
                        }
                        ['IM','TF','PK'].forEach(key => {
                            const list = parsedData[key] || [];
                            list.forEach(item => {
                                item.submitDate = formatDate(item.submitDate);
                                if (item.needFailureReport === undefined || item.needFailureReport === null || item.needFailureReport === '') {
                                    item.needFailureReport = 'pending';
                                }
                                item.responsiblePerson = item.responsiblePerson || '';
                            });
                        });
                        const filteredIM = (parsedData.IM || []).filter(item => ['pending','', undefined, null].includes(item.needFailureReport));
                        const filteredTF = (parsedData.TF || []).filter(item => ['pending','', undefined, null].includes(item.needFailureReport));
                        const filteredPK = (parsedData.PK || []).filter(item => ['pending','', undefined, null].includes(item.needFailureReport));
                        if (imTable) {
                            imTable.clear().rows.add(filteredIM).draw();
                            enhanceResponsibleSelects($('#imTable'));
                        }
                        if (tfTable) {
                            tfTable.clear().rows.add(filteredTF).draw();
                            enhanceResponsibleSelects($('#tfTable'));
                        }
                        if (pkTable) {
                            pkTable.clear().rows.add(filteredPK).draw();
                            enhanceResponsibleSelects($('#pkTable'));
                        }
                        refreshResponsibleColumnRenders();
                        Swal.close();
                    })
                    .withFailureHandler(function (error) {
                        Swal.close();
                        console.error('获取故障报告列表失败 / Failed to fetch failure report list:', error);
                        Swal.fire({
                            icon: 'error',
                            title: '加载失败 / Load Failed',
                            text: '无法加载故障报告列表，请稍后重试。 / Unable to load failure report list, please try again later.',
                            confirmButtonText: '确定 / OK'
                        });
                    })
                    .getFilteredFailureReportData();
            } else {
                console.error('google.script.run不可用，无法调用后端函数 / google.script.run is not available, cannot call backend function');
                alert('无法连接到后端服务，请确保在Google Apps Script环境中运行 / Cannot connect to backend service, please ensure running in Google Apps Script environment');
                Swal.close();
            }
        }

        const generateManualReportNo = () => {
            const now = new Date();
            const pad = (value) => String(value).padStart(2, '0');
            return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        };

        const addManualRow = () => {
            const processKey = getActiveProcessKey();
            const table = getTableByProcess(processKey);
            if (!table) {
                Swal.fire({
                    icon: 'error',
                    title: '操作失败 / Action Failed',
                    text: '当前工序表格尚未准备好，无法添加手动记录。 / Current process table is not ready for manual entry.',
                    confirmButtonText: '确定 / OK'
                });
                return;
            }

            const tempId = `manual-${Date.now()}`;
            const data = {
                manualEntry: true,
                tempId: tempId,
                process: processKey,
                reportNo: generateManualReportNo(),
                machineNo: '',
                problemDescription: '',
                status: '',
                repairTime: '',
                submitDate: '',
                workshop: '',
                responsiblePerson: '',
                needFailureReport: 'pending',
                confirmation: ''
            };
            Swal.fire({
                title: '创建手动录入行... / Creating Manual Entry...',
                text: '正在为当前工序插入手动录入行，请稍候。 / Inserting manual entry row for the active process, please wait.',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            table.row.add(data).draw(false);

            // 使用微延时等待 DataTable 完成渲染后再高亮行并关闭弹窗
            window.setTimeout(() => {
                const rowIndex = findRowIndexByIdentifier(table, tempId);
                if (rowIndex !== undefined) {
                    const node = table.row(rowIndex).node();
                    if (node) {
                        $(node).addClass('table-warning');
                    }
                }
                if (Swal.isVisible()) {
                    Swal.close();
                }
            }, 120);
        };

        // 页面加载时获取数据
        loadProcessData();

        // 表格行操作事件 - 统一处理所有工序的按钮点击
        $(document).on('click', '.view-btn', function () {
            const reportId = $(this).data('id');
            const process = $(this).data('process');
            alert(`查看${process}工序故障报告 ${reportId} / View ${process} Process Failure Report ${reportId}`);
        });

        $(document).on('click', '.edit-btn', function () {
            const reportId = $(this).data('id');
            const process = $(this).data('process');
            alert(`编辑${process}工序故障报告 ${reportId} / Edit ${process} Process Failure Report ${reportId}`);
        });

        $(document).on('click', '.delete-btn', function () {
            const reportId = $(this).data('id');
            const process = $(this).data('process');
            if (confirm(`确定要删除${process}工序故障报告 ${reportId} 吗？/ Are you sure you want to delete ${process} process failure report ${reportId}?`)) {
                alert(`删除${process}工序故障报告 ${reportId} / Delete ${process} Process Failure Report ${reportId}`);
            }
        });

        $(document).on('change', '.responsible-select', function () {
            const reportId = $(this).data('id');
            const process = $(this).data('process');
            const value = $(this).val();
            const { table, rowIndex, rowData } = getRowDataByReport(process, reportId);
            if (table && rowIndex !== undefined && rowData) {
                rowData.responsiblePerson = value || '';
                table.row(rowIndex).data(rowData).draw(false);
            }
        });

        // 新增：故障报告确认按钮事件
        $(document).on('click', '.confirm-btn', function () {
            const reportId = $(this).data('id');
            const process = $(this).data('process');
            const { rowData } = getRowDataByReport(process, reportId);
            const responsible = rowData ? (rowData.responsiblePerson || '') : '';
            if (!responsible) {
                Swal.fire({
                    icon: 'warning',
                    title: '请先分配责任人 / Assign Responsible',
                    text: '请在责任人列选择负责人后再标记需要故障报告。 / Please select a responsible person before marking as need failure report.',
                    confirmButtonText: '确定 / OK'
                });
                return;
            }

            // 弹窗确认操作
            Swal.fire({
                title: '确认操作 / Confirm Action',
                text: `确定要将故障报告 ${reportId} 标记为"需要故障报告"吗？/ Are you sure you want to mark failure report ${reportId} as "Need Failure Report"?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '确定 / Confirm',
                cancelButtonText: '取消 / Cancel',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    // 用户确认后，更新对应行的"是否需要故障报告"列显示为"是"
                    updateFailureReportStatus(reportId, process, true, responsible);
                }
            });
        });

        $(document).on('click', '#manualAddBtn', function () {
            addManualRow();
        });

        $(document).on('input', '.manual-input', function () {
            const reportId = $(this).data('report');
            const field = $(this).data('field');
            if (!reportId || !field) return;
            const { table, rowIndex, rowData } = locateRowByIdentifier(reportId);
            if (!table || rowIndex === undefined || !rowData) return;
            let value = $(this).val();
            if (field === 'repairTime') {
                value = value.replace(/\D+/g, '');
                $(this).val(value);
            }
            rowData[field] = value;
        });

        $(document).on('change', '.manual-date', function () {
            const reportId = $(this).data('report');
            const field = $(this).data('field');
            if (!reportId || !field) return;
            const { table, rowIndex, rowData } = locateRowByIdentifier(reportId);
            if (!table || rowIndex === undefined || !rowData) return;
            rowData[field] = $(this).val();
        });

        $(document).on('change', '.machine-no-select', function () {
            const reportId = $(this).data('report');
            if (!reportId) return;
            const { table, rowIndex, rowData } = locateRowByIdentifier(reportId);
            if (!table || rowIndex === undefined || !rowData) return;
            rowData.machineNo = $(this).val() || '';
        });

        $(document).on('change', '.manual-select', function () {
            const reportId = $(this).data('report');
            const field = $(this).data('field');
            if (!reportId || !field) return;
            const { table, rowIndex, rowData } = locateRowByIdentifier(reportId);
            if (!table || rowIndex === undefined || !rowData) return;
            rowData[field] = $(this).val() || '';
        });

        $(document).on('click', '.no-confirm-btn', function () {
            const reportId = $(this).data('id');
            const process = $(this).data('process');

            // 弹窗确认操作
            Swal.fire({
                title: '确认操作 / Confirm Action',
                text: `确定要将故障报告 ${reportId} 标记为"不需要故障报告"吗？/ Are you sure you want to mark failure report ${reportId} as "No Failure Report"?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#6c757d',
                cancelButtonColor: '#28a745',
                confirmButtonText: '确定 / Confirm',
                cancelButtonText: '取消 / Cancel',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    // 用户确认后，更新对应行的"是否需要故障报告"列显示为"否"
                    const { rowData } = getRowDataByReport(process, reportId);
                    const responsible = rowData ? (rowData.responsiblePerson || '') : '';
                    updateFailureReportStatus(reportId, process, false, responsible);
                }
            });
        });

        // 新增：更新故障报告状态的函数
        function updateFailureReportStatus(reportId, process, needReport, responsiblePerson) {
            const { table, rowIndex, rowData } = getRowDataByReport(process, reportId);
            if (!table) {
                console.error('目标表格不存在 / Target table not found for process:', process);
                return;
            }
            if (rowIndex === undefined || !rowData) {
                console.error('未找到对应的行 / Row not found for reportId:', reportId);
                return;
            }
            if (needReport && !responsiblePerson) {
                Swal.fire({
                    icon: 'warning',
                    title: '请先分配责任人 / Assign Responsible',
                    text: '请先选择责任人后再提交需要故障报告。 / Please assign a responsible person before updating.',
                    confirmButtonText: '确定 / OK'
                });
                return;
            }
            rowData.needFailureReport = needReport;
            if (typeof responsiblePerson !== 'undefined') {
                rowData.responsiblePerson = responsiblePerson || '';
            }
            table.row(rowIndex).data(rowData).draw(false);
            updateFailureReportInBackend(reportId, process, needReport, rowData.responsiblePerson || '', rowData);
        }

        // 新增：调用后端更新故障报告状态的函数
        function updateFailureReportInBackend(reportId, process, needReport, responsiblePerson, rowContext) {
            if (typeof google !== 'undefined' && typeof google.script !== 'undefined' && typeof google.script.run !== 'undefined') {
                // 显示加载提示
                Swal.fire({
                    title: '更新中... / Updating...',
                    text: '正在将故障报告状态写回到后台，请稍候。 / Writing failure report status back to backend, please wait.',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                google.script.run
                    .withSuccessHandler(function (result) {
                        Swal.close();
                        
                        // 显示成功提示
                        Swal.fire({
                            icon: 'success',
                            title: '更新成功 / Update Successful',
                            text: '故障报告状态已成功写回到后台。 / Failure report status has been successfully written back to backend.',
                            timer: 2000,
                            showConfirmButton: false
                        }).then(function () {
                            const { table: t, rowIndex: ri } = getRowDataByReport(process, reportId);
                            if (t && ri !== undefined) {
                                t.row(ri).remove().draw(false);
                            }
                        });
                    })
                    .withFailureHandler(function (error) {
                        console.error('后端更新失败 / Backend update failed:', error);
                        Swal.close();
                        
                        // 显示错误提示
                        Swal.fire({
                            icon: 'error',
                            title: '更新失败 / Update Failed',
                            text: '故障报告状态写回后台失败: ' + error + ' / Failed to write failure report status back to backend: ' + error,
                            confirmButtonText: '确定 / OK'
                        });
                    })
                    .updateFailureReportConfirmation(reportId, process, needReport, responsiblePerson || '', rowContext || null);
            } else {
                console.error('google.script.run不可用，无法调用后端函数 / google.script.run is not available, cannot call backend function');
                Swal.fire({
                    icon: 'error',
                    title: '环境错误 / Environment Error',
                    text: '无法连接到后端服务，请确保在Google Apps Script环境中运行 / Cannot connect to backend service, please ensure running in Google Apps Script environment',
                    confirmButtonText: '确定 / OK'
                });
            }
        }

        // 标签页切换事件
        $('#processTabs button[data-bs-toggle="tab"]').on('shown.bs.tab', function () {
            // 可在此扩展标签切换后的逻辑
        });

        // 显示用户信息 - 已注释
        // console.log('用户信息 / User Info:', {
        //     ID: userId,
        //     Name: userName,
        //     Process: userProcess,
        //     Workshop: userWorkshop
        // });
    });
</script>
