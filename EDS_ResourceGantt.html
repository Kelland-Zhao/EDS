  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; }
    body { background:#f5f6f8; color:#333; }
    .toolbar {
      background:#fff; border-left:4px solid #E60012; border-radius:4px;
      padding:10px 16px; margin:12px 0; display:flex; gap:10px;
      align-items:center; flex-wrap:wrap; box-shadow:0 1px 3px rgba(0,0,0,.04);
    }
    .toolbar .form-control, .toolbar .form-select { width:auto; font-size:12px; }
    .group-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .group-tab {
      border:1px solid #dee2e6; background:#fff; color:#555; border-radius:4px;
      padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer;
    }
    .group-tab.active { background:#E60012; color:#fff; border-color:#E60012; }
    .gantt-wrap {
      background:#fff; border-radius:6px; padding:10px; box-shadow:0 1px 3px rgba(0,0,0,.04);
      overflow:auto;
    }
    .gantt-grid {
      display:grid;
      grid-template-columns:150px repeat(var(--day-count), 120px);
      gap:2px;
      min-width:max-content;
      font-size:11px;
    }
    .gantt-head, .gantt-name, .gantt-count, .gantt-cell {
      padding:7px; min-height:34px; box-sizing:border-box;
    }
    .gantt-head { background:#343a40; color:#fff; font-weight:700; text-align:center; position:sticky; top:0; z-index:4; }
    .gantt-head.first, .gantt-name { position:sticky; left:0; z-index:5; }
    .gantt-head.first { text-align:left; }
    .gantt-name { background:#fff; border-left:3px solid #E60012; font-weight:700; }
    .gantt-name small { display:block; color:#777; font-weight:400; margin-top:2px; }
    .gantt-count { background:#f8f9fa; text-align:center; font-weight:700; color:#555; }
    .gantt-count.hot { background:#fff5f5; color:#E60012; border:1px solid #E60012; }
    .person-lane {
      grid-column:2 / span var(--day-count);
      display:grid;
      grid-template-columns:repeat(var(--day-count), 120px);
      grid-auto-rows:24px;
      gap:3px 2px;
      background:repeating-linear-gradient(to right,#fff 0,#fff 119px,#f0f0f0 120px,#f0f0f0 122px);
      min-height:40px;
      padding:5px 2px;
    }
    .task-bar {
      border-radius:10px; color:#fff; padding:3px 9px; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis; font-size:11px; line-height:16px;
      box-shadow:0 1px 2px rgba(0,0,0,.12);
    }
    .task-pm { background:#0d6efd; }
    .task-cm { background:#fd7e14; }
    .task-test { background:#6f42c1; }
    .task-done { background:#198754; }
    .task-wait { background:#0dcaf0; color:#033; }
    .empty-state { color:#adb5bd; text-align:center; padding:28px 0; font-size:13px; }
  </style>
</head>
<body>

          <span style="font-size:xx-large;font-weight:bold;">任务规划</span><br>
