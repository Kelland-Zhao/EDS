// 日期格式化函数
function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
        let date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr; // 如果不是有效日期，返回原始字符串
        let year = date.getFullYear();
        let month = String(date.getMonth() + 1).padStart(2, '0');
        let day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    } catch (e) {
        console.error('日期格式化错误 / Date formatting error:', e, '原始日期 / Original date:', dateStr);
        return dateStr;
    }
}

// 处理故障报告数据
function processFailureReportData(data) {
    try {
        console.log('处理故障报告数据...');
        
        // 清空现有数据
        imTable.clear().draw();
        tfTable.clear().draw();
        pkTable.clear().draw();
        
        if (!data || !data.IM || !data.TF || !data.PK) {
            console.warn('数据格式不正确或为空');
            return;
        }
        
        // 处理IM工序数据
        if (data.IM && data.IM.length > 0) {
            console.log('处理IM工序数据，共', data.IM.length, '条');
            console.log('IM数据示例:', data.IM[0]); // 调试：查看数据结构
            const imData = data.IM.map(item => ({
                failureReportNumber: item.failureReportNumber || '',
                workshop: item.workshop || '',
                process: item.process || 'IM',
                machineNo: item.machineNo || item.machineNumber || '', // 尝试多个可能的字段名
                submitDate: formatDate(item.submitDate) || '',
                problemDescription: item.problemDescription || '',
                assignmentDate: formatDate(item.assignmentDate) || '',
                uploadDate: formatDate(item.uploadDate) || '',
                attachments: item.attachments || ''
            }));
            console.log('IM数据映射后示例:', imData[0]); // 调试：查看映射结果
            imTable.rows.add(imData).draw();
        }
        
        // 处理TF工序数据
        if (data.TF && data.TF.length > 0) {
            console.log('处理TF工序数据，共', data.TF.length, '条');
            console.log('TF数据示例:', data.TF[0]); // 调试：查看数据结构
            const tfData = data.TF.map(item => ({
                failureReportNumber: item.failureReportNumber || '',
                workshop: item.workshop || '',
                process: item.process || 'TF',
                machineNo: item.machineNo || item.machineNumber || '', // 尝试多个可能的字段名
                submitDate: formatDate(item.submitDate) || '',
                problemDescription: item.problemDescription || '',
                assignmentDate: formatDate(item.assignmentDate) || '',
                uploadDate: formatDate(item.uploadDate) || '',
                attachments: item.attachments || ''
            }));
            console.log('TF数据映射后示例:', tfData[0]); // 调试：查看映射结果
            tfTable.rows.add(tfData).draw();
        }
        
        // 处理PK工序数据
        if (data.PK && data.PK.length > 0) {
            console.log('处理PK工序数据，共', data.PK.length, '条');
            console.log('PK数据示例:', data.PK[0]); // 调试：查看数据结构
            const pkData = data.PK.map(item => ({
                failureReportNumber: item.failureReportNumber || '',
                workshop: item.workshop || '',
                process: item.process || 'PK',
                machineNo: item.machineNo || item.machineNumber || '', // 尝试多个可能的字段名
                submitDate: formatDate(item.submitDate) || '',
                problemDescription: item.problemDescription || '',
                assignmentDate: formatDate(item.assignmentDate) || '',
                uploadDate: formatDate(item.uploadDate) || '',
                attachments: item.attachments || ''
            }));
            console.log('PK数据映射后示例:', pkData[0]); // 调试：查看映射结果
            pkTable.rows.add(pkData).draw();
        }
        
        console.log('故障报告数据处理完成');
        
        // 显示统计信息
        showStatistics(data);
        
    } catch (error) {
        console.error('处理故障报告数据时出错:', error);
        showError('处理数据时出错 / Error processing data: ' + error.message);
    }
}

}

// 显示确认信息
function showConfirm(title, text, callback) {
    Swal.fire({
        title: title,
        text: text,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#28a745',
        cancelButtonColor: '#6c757d',
        confirmButtonText: '确定 / Confirm',
        cancelButtonText: '取消 / Cancel'
    }).then((result) => {
        if (result.isConfirmed && callback) {
            callback();
        }
    });
}

// 显示文件上传对话框
function showFileUploadDialog(reportId, process, rowData) {
    // 从行数据直接获取车间和工序信息
    const workshop = rowData.workshop || '车间';
    const processName = rowData.process || process;
    
    console.log('显示文件上传对话框:', { reportId, process, workshop, processName, rowData });
    
    Swal.fire({
        title: '上传故障报告附件 / Upload Failure Report Attachment',
        html: `
            <!-- 文件选择 -->
            <div class="mb-3">
                <label for="fileInput" class="form-label">选择本地文件 / Select Local File:</label>
                <input type="file" class="form-control" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png">
            </div>
            
            <!-- 文件名称预览 -->
            <div class="mb-3">
                <label class="form-label">文件名称预览 / File Name Preview:</label>
                <div class="alert alert-secondary">
                    <strong id="fileNamePreview">${reportId}_${workshop}_${processName}</strong>
                    <small class="d-block text-muted mt-1">
                        文件将自动重命名为：故障报告编号_车间_工序 / File will be automatically renamed to: Failure Report No._Workshop_Process
                    </small>
                </div>
            </div>
        `,
        showCancelButton: true,
        confirmButtonText: '上传 / Upload',
        cancelButtonText: '取消 / Cancel',
        width: '600px',
        didOpen: () => {
            // 绑定本地文件选择事件，实时更新文件名称预览
            const fileInput = document.getElementById('fileInput');
            const fileNamePreview = document.getElementById('fileNamePreview');
            
            fileInput.addEventListener('change', function() {
                if (this.files[0]) {
                    const file = this.files[0];
                    const fileExtension = file.name.includes('.') ? file.name.substring(file.name.lastIndexOf('.')) : '';
                    fileNamePreview.textContent = `${reportId}_${workshop}_${processName}${fileExtension}`;
                } else {
                    fileNamePreview.textContent = `${reportId}_${workshop}_${processName}`;
                }
            });
        },
        preConfirm: () => {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) {
                Swal.showValidationMessage('请选择本地文件 / Please select a local file');
                return false;
            }
            return fileInput.files[0];
        }
    }).then((result) => {
        if (result.isConfirmed) {
            // 处理本地上传，确保传递正确的process参数
            console.log('确认上传，调用handleFileUpload:', { reportId, process, fileName: result.value.name });
            handleFileUpload(reportId, process, result.value);
        }
    });
}

// 处理文件上传
function handleFileUpload(reportId, process, file) {
    console.log('开始上传文件:', { reportId, process, fileName: file.name, processType: typeof process });
    
    // 验证参数
    if (!reportId || !process || !file) {
        console.error('参数验证失败:', { reportId, process, file });
        showError('上传参数错误 / Upload parameters error');
        return;
    }
    
    // 显示上传进度
    Swal.fire({
        title: '上传中... / Uploading...',
        text: '正在上传文件，请稍候... / Uploading file, please wait...',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });
    
    // 将文件转换为base64格式
    const reader = new FileReader();
    reader.onload = function(e) {
        const fileData = e.target.result;
        
        console.log('文件读取完成，调用后端上传函数:', { reportId, process, fileName: file.name });
        
        // 调用后端的上传函数
        google.script.run
            .withSuccessHandler(function(response) {
                Swal.close();
                if (response.success) {
                    showSuccess(`文件上传成功 / File uploaded successfully<br><br><strong>文件名 / Filename:</strong> ${response.details.standardizedFileName}<br><strong>保存位置 / Save Location:</strong> Google Drive 指定文件夹`);
                    
                    // 刷新数据
                    loadFailureReportData();
                } else {
                    showError('文件上传失败 / File upload failed: ' + response.message);
                }
            })
            .withFailureHandler(function(error) {
                Swal.close();
                console.error('后端上传失败:', error);
                showError('文件上传失败 / File upload failed: ' + error.message);
            })
            .uploadFailureReportAttachment(reportId, process, fileData, file.name, '');
    };
    
    reader.onerror = function() {
        Swal.close();
        showError('文件读取失败 / File read failed');
    };
    
    reader.readAsDataURL(file);
}

                            <hr>

                            </a>

            } else {

                    text: response.message || '未找到附件信息 / No attachment information found',
