<script>
// 全局变量
let imTable, tfTable, pkTable;
let responsibleOptions = [];
let responsibleOptionsLoaded = false;
let isSaving = false; // 全局保存锁，防止跨行并发操作

const buildBilingualTitle = (cn, en) => `<span class="label-cn">${cn}</span><span class="label-en">${en}</span>`;
const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

const escapeHtml = (value) => {
    if (value == null) return '';
    return String(value).replace(/[&<>"]+/g, function(match) {
        const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
        return escape[match] || match;
    });
};

// ===== 主管审核：Upload 状态/操作按改造后审核状态驱动（不再看 attachments） =====
// Upload 仅展示：未提交(空) / 已退回 / 主管审核中（已通过及之后去 Progress）
function isUploadVisible(item) {
    const rs = String((item && item.reviewStatus) || '').trim();
    if (rs === '审核通过' || rs === '已完成' || rs === '已通过') return false; // 已审核通过的去 Progress
    if (item && item.attachments && String(item.attachments).trim() !== '') return false; // 已最终上传
    return true; // 待提交 / 已退回 / 主管审核中
}

function renderUploadStatus(data, type, row) {
    const rs = String((row && row.reviewStatus) || '').trim();
    if (rs === '已退回') {
        const reason = row.returnReason ? '<br><small class="text-danger">退回原因: ' + escapeHtml(row.returnReason) + '</small>' : '';
        return '<span class="badge bg-danger">已退回<br>Returned</span>' + reason;
    }
    if (rs === '主管审核中') {
        return '<span class="badge bg-warning text-dark">审核中<br>Under Review</span>';
    }
    if (rs === '审核通过') {
        return '<span class="badge bg-info">审核通过<br>Approved</span>';
    }
    if (rs === '已完成') {
        return '<span class="badge bg-success">已完成<br>Completed</span>';
    }
    return '<span class="badge bg-secondary">待提交<br>Pending</span>';
}

function renderUploadActions(row, proc) {
    const rs = String((row && row.reviewStatus) || '').trim();
    const id = row.failureReportNumber;
    const p = row.process || proc;
    const saveBtn = '<button class="btn btn-sm btn-success save-btn" data-id="' + id + '" data-process="' + p + '" style="display:block;width:120px;margin:2px auto;">保存<br>Save</button>';
    if (rs === '主管审核中') {
        return '<button class="btn btn-sm btn-secondary" disabled style="display:block;width:120px;margin:2px auto;">审核中<br>Under Review</button>' + saveBtn;
    }
    if (rs === '已退回') {
        return '<button class="btn btn-sm btn-warning edit-template-btn" data-id="' + id + '" style="display:block;width:120px;margin:2px auto;">修改<br>Edit</button>' + saveBtn;
    }
    if (rs === '审核通过' || rs === '已完成') {
        return ''; // 不应出现在 Upload，防御性返回空
    }
    // 待提交
    return '<button class="btn btn-sm btn-primary fill-template-btn" data-id="' + id + '" style="display:block;width:120px;margin:2px auto;">填写故障报告<br>Fill Report</button>' + saveBtn;
}

const normalizeResponsibleDisplay = (user) => {
    if (!user) return '';
    if (typeof user === 'string') return user.trim();
    return String(user.display || '').trim();
};

const parseResponsibleDisplay = (display) => {
    if (!display) return { name: '', email: '' };
    const match = display.match(/^(.+?)【(.+?)】$/);
    if (match) return { name: match[1].trim(), email: match[2].trim() };
    return { name: display.trim(), email: '' };
};

const findResponsibleOptionByName = (input) => {
    if (!input) return null;
    const target = String(input).toLowerCase();
    for (let i = 0; i < responsibleOptions.length; i++) {
        const option = responsibleOptions[i];
        if (!option) continue;
        if (String(option).toLowerCase() === target) return option;
        const parsed = parseResponsibleDisplay(option);
        if (parsed.name && parsed.name.toLowerCase() === target) return option;
    }
    return null;
};

const renderResponsibleSelect = (processKey) => {
    return function(data, type, row) {
        if (type !== 'display') return data || '';
        const current = data || '';
        const options = ['<option value="">\u8bf7\u9009\u62e9 / Select</option>'];
        const identifier = (row && row.failureReportNumber) || '';
        const proc = (row && row.process) || processKey || '';
        (responsibleOptions || []).forEach(function(option) {
            if (!option) return;
            const selected = option === current ? ' selected' : '';
            options.push(`<option value="${escapeHtml(option)}"${selected}>${escapeHtml(option)}</option>`);
        });
        return `<select class="form-select form-select-sm responsible-select" data-id="${identifier}" data-process="${proc}">${options.join('')}</select>`;
    };
};

const enhanceResponsibleSelects = (scope) => {
    if (!$.fn.select2) return;
    const $targets = scope ? $(scope).find('.responsible-select') : $('.responsible-select');
    $targets.each(function() {
        const $el = $(this);
        const currentValue = $el.val();
        if ($el.hasClass('select2-hidden-accessible')) {
            $el.select2('destroy');
            $el.val(currentValue);
        }
        $el.select2({
            width: '200px',
            theme: 'bootstrap',
            dropdownParent: $('body'),
            placeholder: '\u8bf7\u8f93\u5165\u6216\u9009\u62e9\u8d23\u4efb\u4eba / Type or Select',
            tags: true,
            allowClear: false,
            templateSelection: function(data) {
                const parsed = parseResponsibleDisplay(data.text);
                if (parsed.email) {
                    return $('<span>' + parsed.name + ' <small style="color:#666">' + parsed.email + '</small></span>');
                }
                return parsed.name || data.text;
            },
            templateResult: function(data) {
                if (data.loading) return data.text;
                const parsed = parseResponsibleDisplay(data.text);
                if (parsed.email) return $('<span>' + parsed.name + '<br/><small style="color:#666">' + parsed.email + '</small></span>');
                return data.text;
            },
            matcher: function(params, data) {
                if ($.trim(params.term) === '') return data;
                if (typeof data.text === 'undefined') return null;
                return data.text.toLowerCase().indexOf(params.term.toLowerCase()) > -1 ? data : null;
            },
            createTag: function(params) {
                const term = $.trim(params.term);
                if (!term) return null;
                if (findResponsibleOptionByName(term)) return null;
                if (!responsibleOptions.includes(term)) {
                    responsibleOptions.push(term);
                    responsibleOptions.sort();
                }
                return { id: term, text: term, newTag: true };
            }
        });
    });
};

const refreshResponsibleColumnRenders = () => {
    [imTable, tfTable, pkTable].forEach(function(table) {
        if (table) table.rows().invalidate().draw(false);
    });
    enhanceResponsibleSelects();
};

const loadResponsibleOptions = () => {
    if (typeof google === 'undefined' || typeof google.script === 'undefined' || typeof google.script.run === 'undefined') return;
    google.script.run
        .withSuccessHandler(function(result) {
            try {
                const parsed = typeof result === 'string' ? JSON.parse(result) : (result || []);
                responsibleOptions = (parsed || []).map(normalizeResponsibleDisplay).filter(Boolean);
                responsibleOptionsLoaded = true;
                refreshResponsibleColumnRenders();
            } catch (err) {
                console.error('\u89e3\u6790\u8d23\u4efb\u4eba\u5217\u8868\u5931\u8d25:', err);
            }
        })
        .withFailureHandler(function(error) {
            console.error('\u83b7\u53d6\u8d23\u4efb\u4eba\u5217\u8868\u5931\u8d25:', error);
        })
        .getEDSUserNames();
};

    // 基于 sessionStorage.Process 决定默认显示哪个工序 Tab（与 FailureReport_Manage 一致）
    (function setDefaultProcessTabBySession() {
        try {
            let sessionProcess = (sessionStorage.getItem('Process') || sessionStorage.getItem('pmProcess') || '').toString().trim();
            if (sessionProcess === 'INJ') sessionProcess = 'IM';

            let activeKey = 'IM';
            if (sessionProcess === 'TF') activeKey = 'TF';
            else if (sessionProcess === 'PK') activeKey = 'PK';

            const tabs = [
                { key: 'IM', tabBtn: '#im-tab', tabContent: '#im-content' },
                { key: 'TF', tabBtn: '#tf-tab', tabContent: '#tf-content' },
                { key: 'PK', tabBtn: '#pk-tab', tabContent: '#pk-content' },
            ];

            const $tabList = $('#processTabs');
            const $contentList = $('#processTabContent');

            tabs.forEach(t => {
                $(t.tabBtn).closest('li').removeClass('d-none');
                $(t.tabContent).removeClass('d-none');
            });

            const activeTab = tabs.find(t => t.key === activeKey);
            if (activeTab && $tabList.length && $contentList.length) {
                const $activeLi = $(activeTab.tabBtn).closest('li');
                const $activePane = $(activeTab.tabContent);
                if ($activeLi.length) $tabList.prepend($activeLi);
                if ($activePane.length) $contentList.prepend($activePane);
            }

            const activeTabBtn = document.querySelector(
                activeKey === 'TF' ? '#tf-tab' : activeKey === 'PK' ? '#pk-tab' : '#im-tab'
            );
            if (activeTabBtn && window.bootstrap && window.bootstrap.Tab) {
                new window.bootstrap.Tab(activeTabBtn).show();
            }
        } catch (e) {}
    })();
    
    // 页面加载时显示一个提示框
    Swal.fire({
        title: swalTitle('加载数据中...', 'Loading Data...'),
        html: swalHtml('正在从服务器获取故障报告数据，请稍候。', 'Fetching failure report data from server, please wait.'),
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    // 检查用户填写权限并显示级别

        const userEmail = sessionStorage.getItem('Email') || '';
        const userName = sessionStorage.getItem('Name') || '';

            .withSuccessHandler(function(hasPermission) {

                          .text('管理员 / Admin');
                } else {
                    $badge.removeClass('bg-secondary').addClass('bg-warning text-dark')
                          .text('普通用户 / User');
                }
            })
            .withFailureHandler(function() {
                $('#userLevelBadge').removeClass('bg-secondary').addClass('bg-warning text-dark')
                                    .text('普通用户 / User');
            })
            .checkFailureReportFillPermission(userEmail, userName);
    })();

    loadResponsibleOptions();
    initializeTables();
    loadFailureReportData();
});

// 日期格式化函数
function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
        let date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr; // 如果不是有效日期，返回原始字符串
        let year = date.getFullYear();
        let month = String(date.getMonth() + 1).padStart(2, '0');
        let day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    } catch (e) {
        console.error('日期格式化错误 / Date formatting error:', e, '原始日期 / Original date:', dateStr);
        return dateStr;
    }
}

                submitter: item.submitter || '',

                repairTime: item.repairTime || '',
                attachments: item.attachments || '',
                reviewStatus: item.reviewStatus || '',
                returnReason: item.returnReason || ''
            }));
            console.log('PK数据映射后示例:', pkData[0]); // 调试：查看映射结果
            pkTable.rows.add(pkData).draw();
        }
        
        console.log('故障报告数据处理完成');
        
        // 显示统计信息

}

$(document).on('click', '.view-btn', function() {
    const reportId = $(this).data('id');
    const row = $(this).closest('tr');
    const table = $(this).closest('table').DataTable();
    const rowData = table.row(row).data();
    const attachments = rowData ? (rowData.attachments || '') : '';

    // 从 HYPERLINK 公式或纯 URL 中提取 PDF 链接
    let pdfUrl = '';
    if (attachments) {
        const match = attachments.match(/=HYPERLINK\("([^"]+)"/i);
        if (match) {
            pdfUrl = match[1];
        } else if (/^https?:\/\//i.test(attachments)) {
            pdfUrl = attachments;
        }
    }

    if (pdfUrl) {
        window.open(pdfUrl);
    } else {
        Swal.fire({
            title: '暂无报告 / No Report',
            text: '该记录尚未上传故障报告PDF / No failure report PDF uploaded yet.',
            icon: 'info',
            confirmButtonText: '确定 / OK'
        });
    }
});

// 保存按钮点击事件：保存责任人并发送邮件通知
$(document).on('click', '.save-btn', function() {
    // 全局锁：同一时间只允许一个保存操作
    if (isSaving) {
        Swal.fire({
            icon: 'warning',
            title: '正在保存中 / Saving in Progress',
            text: '请等待当前保存完成后再操作 / Please wait for the current save to complete.',
            confirmButtonText: '确定 / OK',
            timer: 2000
        });
        return;
    }

    const $btn = $(this);
    const reportId = $btn.data('id');
    const process = $btn.data('process');
    const $row = $btn.closest('tr');
    const $select = $row.find('.responsible-select');
    const value = $select.val() || '';

    if (!value) {
        Swal.fire({
            icon: 'warning',
            title: '请选择责任人 / Select Responsible',
            text: '请先在责任人列选择或输入责任人后再保存 / Please select a responsible person first.',
            confirmButtonText: '确定 / OK'
        });
        return;
    }

    // 全局锁定：禁用所有按钮 + 所有 Select2 下拉框
    isSaving = true;
    $('.btn').prop('disabled', true).addClass('save-locked');
    $('.responsible-select').each(function() {
        if ($(this).hasClass('select2-hidden-accessible')) {
            $(this).prop('disabled', true).trigger('change');
        } else {
            $(this).prop('disabled', true);
        }
    });
    $btn.text('保存中... / Saving...');

    // 结束后恢复可编辑状态
    function restoreAll() {
        isSaving = false;
        $('.btn.save-locked').prop('disabled', false).removeClass('save-locked');
        $btn.html('保存<br>Save');
        $('.responsible-select').each(function() {
            if ($(this).hasClass('select2-hidden-accessible')) {
                $(this).prop('disabled', false).trigger('change');
            } else {
                $(this).prop('disabled', false);
            }
        });
    }

    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
            .withSuccessHandler(function(result) {
                restoreAll();
                try {
                    const res = typeof result === 'string' ? JSON.parse(result) : result;
                    if (res.success) {
                        Swal.fire({
                            icon: 'success',
                            title: '保存成功 / Saved',
                            html: swalHtml(res.message || '责任人已更新 / Responsible person updated.',
                                (res.respEmail ? '通知已发送至 / Notification sent to: ' + res.respEmail
                                    + (res.supervisorEmail ? '<br>CC: ' + res.supervisorEmail : '') : '')),
                            confirmButtonText: '确定 / OK',
                            timer: 3000
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: '保存失败 / Save Failed',
                            text: res.message || '未知错误 / Unknown error',
                            confirmButtonText: '确定 / OK'
                        });
                    }
                } catch (e) {
                    Swal.fire({
                        icon: 'error',
                        title: '保存失败 / Save Failed',
                        text: '返回数据异常 / Invalid response',
                        confirmButtonText: '确定 / OK'
                    });
                }
            })
            .withFailureHandler(function(err) {
                restoreAll();
                Swal.fire({
                    icon: 'error',
                    title: '保存失败 / Save Failed',
                    text: '责任人更新失败 / Responsible update failed: ' + (err.message || err),
                    confirmButtonText: '确定 / OK'
                });
            })
            .saveResponsibleAndNotify(reportId, process, value);
    }
});

// 显示附件查看对话框
function showAttachmentViewDialog(reportId, process) {
    // 显示加载弹窗
    Swal.fire({
        title: '加载中 / Loading...',
        text: '正在获取附件信息 / Getting attachment info',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    // 获取附件信息
    google.script.run
        .withSuccessHandler(function(response) {
            if (!response || typeof response !== 'object') {
                Swal.fire({
                    title: '查看附件 / View Attachment',
                    text: '附件返回数据异常 / Invalid attachment response',
                    icon: 'error',
                    confirmButtonText: '确定 / OK'
                });
                return;
            }
            if (response.success && response.hasAttachment) {
                const attachment = response.attachment;
                const hasValidUrl = attachment.fileUrl && attachment.fileUrl !== '' && attachment.fileUrl !== '链接无效 / Invalid link';
                Swal.fire({
                    title: '查看附件 / View Attachment',
                    html: `
                        <div class="text-start">
                            <p><strong>故障报告编号 / Failure Report No.:</strong> ${reportId}</p>
                            <p><strong>文件名 / Filename:</strong> ${attachment.fileName}</p>
                            <p><strong>文件描述 / Description:</strong> ${attachment.fileDescription || '无描述 / No description'}</p>
                            <p><strong>上传日期 / Upload Date:</strong> ${attachment.uploadDate}</p>
                            <p><strong>保存位置 / Save Location:</strong> Google Drive 指定文件夹</p>
                            <hr>
                            ${hasValidUrl ? `
                                <a href="${attachment.fileUrl}" target="_blank" class="btn btn-primary">
                                    <i class="fas fa-external-link-alt"></i> 查看文件 / View File
                                </a>
                            ` : `
                                <button class="btn btn-secondary" disabled>
                                    <i class="fas fa-exclamation-circle"></i> 链接无效 / Invalid link
                                </button>
                            `}
                        </div>
                    `,
                    icon: 'info',
                    confirmButtonText: '确定 / OK',
                    width: '600px'
                });
            } else {
                Swal.fire({
                    title: '查看附件 / View Attachment',
                    text: response.message || '未找到附件信息 / No attachment information found',
                    icon: 'warning',
                    confirmButtonText: '确定 / OK'
                });
            }
        })
        .withFailureHandler(function(error) {
            Swal.fire({
                title: '查看附件 / View Attachment',
                text: '获取附件信息失败 / Failed to get attachment info: ' + error.message,
                icon: 'error',
                confirmButtonText: '确定 / OK'
            });
        })
        .getFailureReportAttachmentInfo(reportId);
}
