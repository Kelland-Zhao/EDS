<script>
    console.log('故障报告跟进页面JavaScript加载开始...');
    const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
    const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

    let followupTable = null;
    let followupData = [];
    let currentUserName = '';
    let currentUserEmail = '';
    let userIsAdmin = false;

    const FIELD_LABELS = {
        paPlan: '预防性措施 / PA Action',
        status: '状态 / Status',
        followupContent: '跟进内容 / Follow-up Content'
    };

    const loadingSpinner = {
        show: function() {
            $('#loadingSpinner').show();
        },
        hide: function() {
            $('#loadingSpinner').hide();
        }
    };

    // 从hidden input获取当前用户信息
    function getCurrentUser() {
        const name = $('#currentUserName').val() || '';
        return name;
    }

    $(document).ready(function() {
        console.log('页面DOM加载完成，开始初始化...');

        currentUserName = getCurrentUser();
        currentUserEmail = sessionStorage.getItem('Email') || '';
        console.log('当前用户:', currentUserName);

        // 立即显示加载弹窗
        Swal.fire({
            title: swalTitle('加载中...', 'Loading...'),
            html: swalHtml('正在初始化页面，请稍候。', 'Initializing page, please wait.'),
            allowOutsideClick: false,
            didOpen: function() { Swal.showLoading(); }
        });

        checkUserPermission();
    });

    function escapeHtml(text) {
        return String(text || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function toYMD(d) {
        const y = d.getFullYear();
        if (y < 2000 || y > 2100) return '';
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
    }

    function formatDisplayDate(value) {
        if (!value) return '';
        // Date 对象 → YYYY-MM-DD
        if (value instanceof Date && !isNaN(value)) return toYMD(value) || '';
        const str = String(value).trim();
        if (!str) return '';
        // ISO 时间戳 "2026-04-04T00:00:00.000Z"
        var isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})T/);
        if (isoMatch) return isoMatch[1] + '-' + isoMatch[2] + '-' + isoMatch[3];
        // YYYY-MM-DD
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
        // 纯数字时间戳（毫秒13位 或 秒10位）
        if (/^\d{10,13}$/.test(str)) {
            var ms = str.length === 10 ? parseInt(str) * 1000 : parseInt(str);
            return toYMD(new Date(ms)) || '';
        }
        // M/D/YYYY
        var mdMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (mdMatch) {
            return mdMatch[3] + '-' + String(mdMatch[1]).padStart(2, '0') + '-' + String(mdMatch[2]).padStart(2, '0');
        }
        // 兜底：尝试用 Date 解析（覆盖 "Wed May 18 2026..." 等格式）
        var fallback = new Date(str);
        if (!isNaN(fallback)) return toYMD(fallback) || '';
        return str;
    }

    function checkUserPermission() {
        google.script.run
            .withSuccessHandler(function(isAdmin) {
                userIsAdmin = isAdmin === true;
                if (userIsAdmin) {
                    $('#userLevelBadge').text('管理员 / Admin').removeClass('bg-secondary bg-info bg-warning').addClass('bg-success');
                } else {
                    $('#userLevelBadge').text('普通用户 / User').removeClass('bg-secondary bg-warning').addClass('bg-warning text-dark');
                }
                fetchFollowupRecords();
            })
            .withFailureHandler(function() {
                userIsAdmin = false;
                $('#userLevelBadge').text('普通用户 / User').removeClass('bg-secondary').addClass('bg-warning text-dark');
                fetchFollowupRecords();
            })
            .checkFailureReportManagePermission(currentUserEmail, currentUserName);
    }

    function fetchFollowupRecords() {
        if (Swal.isVisible()) {
            Swal.update({
                title: swalTitle('加载中...', 'Loading...'),
                html: swalHtml('正在获取跟进记录，请稍候。', 'Loading follow-up records, please wait.')
            });
        } else {
            Swal.fire({
                title: swalTitle('加载中...', 'Loading...'),
                html: swalHtml('正在获取跟进记录，请稍候。', 'Loading follow-up records, please wait.'),
                allowOutsideClick: false,
                didOpen: function() { Swal.showLoading(); }
            });
        }

        const serverFn = userIsAdmin ? 'getFollowupRecords' : 'getFollowupRecordsForResponsiblePerson';
        const serverArgs = userIsAdmin ? [] : [currentUserName];

        google.script.run
            .withSuccessHandler(function(response) {
                Swal.close();
                console.log('跟进记录获取成功:', response);

                if (response && response.success) {
                    followupData = mapRowsToObjects(response.data || []);
                    initializeTable(followupData);
                } else {
                    Swal.fire({
                        title: '错误 / Error',
                        text: (response && response.message) || '获取跟进记录失败 / Failed to get follow-up records',
                        icon: 'error',
                        confirmButtonText: '确定 / OK'
                    });
                }
            })
            .withFailureHandler(function(error) {
                Swal.close();
                console.error('获取跟进记录失败:', error);
                Swal.fire({
                    title: '错误 / Error',
                    text: '获取跟进记录失败 / Failed to get follow-up records: ' + (error.message || ''),
                    icon: 'error',
                    confirmButtonText: '确定 / OK'
                });
            })[serverFn](...serverArgs);
    }

    function mapRowsToObjects(rows) {
        return (rows || []).map(function(row) {
            return {
                followupId: String(row[0] || ''),
                failureReportNo: String(row[1] || ''),
                paType: String(row[2] || ''),
                paPlan: String(row[3] || ''),
                paWho: String(row[4] || ''),
                paWhen: String(row[5] || ''),
                paVerifier: String(row[6] || ''),
                status: String(row[8] || ''),
                createdDate: String(row[9] || ''),
                updatedDate: String(row[10] || ''),
                pdfUrl: String(row[11] || ''),
                followupContent: String(row[12] || '')
            };
        });
    }

    function initializeTable(data) {
        console.log('初始化表格，数据行数:', data.length);

        if (followupTable) {
            followupTable.clear();
            followupTable.rows.add(data);
            followupTable.draw();
            return;
        }

        followupTable = $('#followupTable').DataTable({
            data: data,
            columns: [
                { data: 'followupId' },
                { data: 'failureReportNo' },
                { data: 'paType' },
                {
                    data: 'paPlan',
                    className: 'pa-action-cell',
                    render: function(value, type) {
                        if (type !== 'display') {
                            return value || '';
                        }
                        const safe = escapeHtml(value || '');
                        const formatted = safe.replace(/\n/g, '<br>');
                        return '<div class="pa-action-content">' + (formatted || '<span class="text-muted">（未填写 / Not Provided）</span>') + '</div>';
                    }
                },
                { data: 'paWho', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    // 从"名字【邮箱】"格式中提取名字
                    const name = String(value || '').replace(/【.+】/, '').trim();
                    return name || '<span class="text-muted">-</span>';
                }}, // 责任人只显示名字
                { data: 'paWhen', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    const formatted = formatDisplayDate(value);
                    return formatted || '<span class="text-muted">-</span>';
                }},
                { data: 'paVerifier', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    // 从"名字【邮箱】"格式中提取名字
                    const name = String(value || '').replace(/【.+】/, '').trim();
                    return name || '<span class="text-muted">-</span>';
                }}, // 验证人只显示名字
                {
                    data: 'status',
                    className: 'pa-status-cell text-center',
                    orderable: false,
                    render: function(value, type) {
                        if (type !== 'display') return value || '';
                        return buildStatusBadgeHtml(value);
                    }
                },
                { data: 'createdDate', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    const formatted = formatDisplayDate(value);
                    return formatted || '<span class="text-muted">-</span>';
                }},
                { data: 'updatedDate', render: function(value, type) {
                    if (type !== 'display') return value || '';
                    const formatted = formatDisplayDate(value);
                    return formatted || '<span class="text-muted">-</span>';
                }},
                {
                    data: 'followupContent',
                    className: 'pa-content-cell',
                    orderable: false,
                    render: function(value, type) {
                        if (type !== 'display') return value || '';
                        const safe = escapeHtml(value || '');
                        return '<textarea class="form-control followup-content-textarea" rows="2" style="min-width:180px;font-size:0.875rem;" placeholder="输入跟进内容...">' + safe + '</textarea>';
                    }
                },
                {
                    data: null,
                    orderable: false,
                    render: function(data, type, row) {
                        if (type !== 'display') return '';
                        const btnStyle = 'font-size:0.75rem;width:64px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2;';
                        let actions = '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:stretch;">';
                        actions += '<button class="btn btn-sm btn-primary save-content-btn" data-id="' + row.followupId + '" style="' + btnStyle + '"><i class="fas fa-save"></i><br>保存<br>Save</button>';
                        if (row.pdfUrl) {
                            actions += '<button class="btn btn-sm btn-info view-pdf-btn" data-id="' + row.followupId + '" data-pdf="' + row.pdfUrl + '" data-report="' + row.failureReportNo + '" style="' + btnStyle + '">';
                            actions += '<i class="fas fa-file-pdf"></i><br>查看PDF<br>View PDF';
                            actions += '</button>';
                        }
                        actions += '</div>';
                        return actions;
                    }
                }
            ],
            language: {
                search: '搜索 / Search:',
                lengthMenu: '显示 _MENU_ 条记录 / Show _MENU_ entries',
                info: '显示第 _START_ 至 _END_ 条记录，共 _TOTAL_ 条 / Showing _START_ to _END_ of _TOTAL_ entries',
                infoEmpty: '没有记录 / No entries',
                infoFiltered: '(从 _TOTAL_ 条记录中过滤 / filtered from _TOTAL_ total entries)',
                paginate: {
                    first: '首页 / First',
                    last: '末页 / Last',
                    next: '下一页 / Next',
                    previous: '上一页 / Previous'
                },
                emptyTable: '暂无数据 / No data available'
            },
            order: [[8, 'desc']],
            pageLength: 25,
            responsive: true
        });

        console.log('表格初始化完成');
    }

    function buildStatusBadgeHtml(value) {
        const v = String(value || '').trim();
        if (!v) return '<span class="text-muted">-</span>';
        // 提取中文和英文部分
        const parts = v.split(' / ');
        const cn = parts[0] || v;
        const en = parts[1] || '';
        let bg = 'bg-secondary';
        if (v === '已完成 / Completed') bg = 'bg-success';
        else if (v === '进行中 / Ongoing') bg = 'bg-warning text-dark';
        else if (v === '未验证 / Not Verified') bg = 'bg-info text-dark';
        const display = en ? (cn + '<br>' + en) : cn;
        return '<span class="badge ' + bg + '" style="font-size:0.8rem;">' + display + '</span>';
    }

    function showToast(message, icon) {
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: icon || 'success',
            title: message,
            showConfirmButton: false,
            timer: 1800,
            timerProgressBar: true,
            didOpen: function(toast) {
                toast.addEventListener('mouseenter', Swal.stopTimer);
                toast.addEventListener('mouseleave', Swal.resumeTimer);
            }
        });
    }

    function buildDualMessage(fieldKey, suffixCn, suffixEn) {
        const label = FIELD_LABELS[fieldKey] || '字段 / Field';
        const parts = label.split(' / ');
        const cn = parts[0] || label;
        const en = parts[1] || 'Field';
        return cn + suffixCn + ' / ' + en + suffixEn;
    }

    function updateFollowupField(fieldKey, followupId, value, onSuccess, onError) {
        loadingSpinner.show();
        google.script.run
            .withSuccessHandler(function(response) {
                loadingSpinner.hide();
                if (response && response.success) {
                    if (typeof onSuccess === 'function') onSuccess(response);
                } else {
                    if (typeof onError === 'function') onError(response ? response.message : '');
                }
            })
            .withFailureHandler(function(error) {
                loadingSpinner.hide();
                console.error('更新跟进字段失败:', error);
                if (typeof onError === 'function') onError(error && error.message ? error.message : '');
            })
            .updateFollowupFieldValue(followupId, fieldKey, value);
    }

    // 保存跟进内容按钮点击事件
    $(document).on('click', '.save-content-btn', function() {
        if (!followupTable) return;
        const followupId = $(this).data('id');
        const $btn = $(this);
        const $row = $btn.closest('tr');
        const $textarea = $row.find('.followup-content-textarea');
        const newValue = String($textarea.val() || '').trim();

        if (!newValue) {
            showToast('请先输入跟进内容 / Please enter follow-up content first', 'warning');
            return;
        }

        const rowApi = followupTable.row($row);
        const rowData = rowApi.data();
        if (!rowData) return;

        if (newValue === String(rowData.followupContent || '').trim()) {
            showToast('内容未变更 / Content unchanged', 'info');
            return;
        }

        $btn.prop('disabled', true);

        // 保存中toast
        const toastInstance = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 0,
            timerProgressBar: false,
            didOpen: function(toast) {
                toast.addEventListener('mouseenter', Swal.stopTimer);
                toast.addEventListener('mouseleave', Swal.resumeTimer);
            }
        });
        toastInstance.fire({
            icon: 'info',
            title: '保存中 / Saving...'
        });

        updateFollowupField('followupContent', followupId, newValue, function(response) {
            Swal.close();
            $btn.prop('disabled', false);
            const updatedRow = Object.assign({}, rowData, {
                followupContent: newValue,
                status: '未验证 / Not Verified'
            });
            if (response && response.updatedDate) {
                updatedRow.updatedDate = response.updatedDate;
            }
            rowApi.data(updatedRow).draw(false);
            // 保存成功，该行闪淡绿色
            var $savedTr = $(rowApi.node());
            $savedTr.addClass('row-saved-flash');
            setTimeout(function() { $savedTr.removeClass('row-saved-flash'); }, 2000);
            const index = followupData.findIndex(function(r) { return r.followupId === followupId; });
            if (index !== -1) { followupData[index] = updatedRow; }
            showToast('跟进内容已保存，状态已更新为未验证 / Follow-up content saved, status updated to Not Verified', 'success');
        }, function(message) {
            Swal.close();
            $btn.prop('disabled', false);
            showToast(message || '保存失败 / Save failed', 'error');
        });
    });

    // 查看PDF按钮点击事件
    $(document).on('click', '.view-pdf-btn', function() {
        const pdfUrl = $(this).data('pdf');
        const reportNo = $(this).data('report');
        console.log('查看PDF:', { pdfUrl: pdfUrl, reportNo: reportNo });

        if (pdfUrl) {
            window.open(pdfUrl, '_blank');
        } else {
            Swal.fire({
                title: '提示 / Info',
                text: 'PDF链接无效 / Invalid PDF link',
                icon: 'warning',
                confirmButtonText: '确定 / OK'
            });
        }
    });

    // 预防性措施双击编辑 - 单元格内直接编辑
    $('#followupTable tbody').on('dblclick', 'td.pa-action-cell', function(e) {
        if (!followupTable) return;
        const $cell = $(this);
        if ($cell.find('textarea').length > 0) return;

        const rowApi = followupTable.row($cell.closest('tr'));
        const rowData = rowApi.data();
        if (!rowData) return;

        const originalValue = String(rowData.paPlan || '').trim();

        const $textarea = $('<textarea class="form-control pa-action-editor" rows="3">' + escapeHtml(originalValue) + '</textarea>');
        $cell.empty().append($textarea);
        $textarea.focus();
        $textarea[0].setSelectionRange($textarea.val().length, $textarea.val().length);

        let isSaved = false;

        const saveEdit = function() {
            if (isSaved) return;
            isSaved = true;
            const newValue = String($textarea.val() || '').trim();
            $textarea.off('blur keydown');

            if (newValue === originalValue) {
                rowApi.draw(false);
                return;
            }

            updateFollowupField('paPlan', rowData.followupId, newValue, function(response) {
                const updatedRow = Object.assign({}, rowData, { paPlan: newValue });
                if (response && response.updatedDate) {
                    updatedRow.updatedDate = response.updatedDate;
                }
                rowApi.data(updatedRow).draw(false);
                showToast(buildDualMessage('paPlan', '已更新', ' updated'), 'success');
            }, function(message) {
                rowApi.data(rowData).draw(false);
                showToast(message || buildDualMessage('paPlan', '更新失败', ' update failed'), 'error');
            });
        };

        const cancelEdit = function() {
            if (isSaved) return;
            isSaved = true;
            $textarea.off('blur keydown');
            rowApi.draw(false);
        };

        $textarea.on('blur', saveEdit);
        $textarea.on('keydown', function(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                cancelEdit();
            } else if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                saveEdit();
            }
        });
    });

    // 邮件提醒验证人按钮点击事件
    $('#btnEmailVerifier').click(function() {
        // 筛选出状态为"已完成"的记录
        const completedRecords = followupData.filter(function(record) {
            return record.status === '已完成 / Completed';
        });

        if (completedRecords.length === 0) {
            showToast('没有状态为"已完成"的记录需要提醒 / No completed records to remind', 'warning');
            return;
        }

        Swal.fire({
            title: '确认发送 / Confirm Send',
            text: '确定要发送邮件提醒验证人吗？共有 ' + completedRecords.length + ' 条已完成记录。 / Are you sure you want to send email reminders to verifiers? There are ' + completedRecords.length + ' completed records.',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: '发送 / Send',
            cancelButtonText: '取消 / Cancel'
        }).then(function(result) {
            if (result.isConfirmed) {
                sendVerificationReminderEmail(completedRecords);
            }
        });
    });

    // 发送验证提醒邮件
    function sendVerificationReminderEmail(records) {
        loadingSpinner.show();

        // 构建要发送的数据
        const emailData = records.map(function(record) {
            return {
                followupId: record.followupId,
                failureReportNo: record.failureReportNo,
                paType: record.paType,
                paPlan: record.paPlan,
                paVerifier: record.paVerifier,
                paWhen: record.paWhen,
                status: record.status
            };
        });

        google.script.run
            .withSuccessHandler(function(response) {
                loadingSpinner.hide();
                if (response && response.success) {
                    showToast('邮件发送成功：' + response.sentCount + ' 封 / Email sent successfully: ' + response.sentCount + ' emails', 'success');
                } else {
                    showToast((response && response.message) || '邮件发送失败 / Email sending failed', 'error');
                }
            })
            .withFailureHandler(function(error) {
                loadingSpinner.hide();
                console.error('邮件发送失败:', error);
                showToast('邮件发送失败 / Email sending failed: ' + (error.message || ''), 'error');
            })
            .sendVerificationReminderToVerifiers(emailData);
    }

    $(window).on('beforeunload', function() {
        console.log('页面即将卸载，清理资源...');
        if (followupTable) {
            followupTable.destroy();
        }
    });

    console.log('故障报告跟进页面JavaScript加载完成');
</script>
