  function sweetAlert(status, id) {

    if (status == "Loading") {

        title: '页面加载中/ Page Loading',
        text: '页面加载中，请稍后.../ Page loading, please wait...',
        icon: 'info',

      });
    } else if (status == "No Data") {

  function dataCollect(selectedValue, callback) {

    let workNumber = $("#workingNunber").val();

    let name = $("#Name").val();

    let sampleStatus = selectedValue;

    let imageSample;

    let samplesDescruption;

    let data;

    let pro_info = { workNumber: workNumber, name: name, sampleStatus: sampleStatus };

    if (sampleStatus == "Normal") {

      imageSample = 'NA';

      samplesDescruption = 'NA';

      data = [pro_info, samplesDescruption, imageSample];

      callback(data);

    } else {

      let fileInput = document.getElementById('take-photo');

      let file = fileInput.files[0]; // 获取选中的文件对象

      let reader = new FileReader();

      reader.readAsDataURL(file);

      reader.onload = function (e) {

        imageSample = e.target.result.split(',')[1];

        samplesDescruption = $("#SamplesDescruption").val();

        data = [pro_info, samplesDescruption, imageSample];

        callback(data);
      }
    }
  }

  function getCurrentDateTime() {
    var now = new Date();
    var year = now.getFullYear();
    var month = ('0' + (now.getMonth() + 1)).slice(-2); // 月份是从0开始的
    var day = ('0' + now.getDate()).slice(-2);
    var hours = ('0' + now.getHours()).slice(-2);
    var minutes = ('0' + now.getMinutes()).slice(-2);
    var seconds = ('0' + now.getSeconds()).slice(-2);

    // 返回标准时间格式 "2025-01-20 19:38:02"
    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
  }

  function getCurrentDate() {
    var now = new Date();

    var year = now.getFullYear();
    var month = ('0' + (now.getMonth() + 1)).slice(-2); // 月份是从0开始的
    var day = ('0' + now.getDate()).slice(-2);

    return year + '/' + month + '/' + day;
  }

    // 生成PM保养任务报告PDF
  function generatePMReport(data, confirmationStatus, callback) {
    try {
      // 准备PDF报告数据
      let reportData = {
        pmSerialNumber: global_PM_SerialNumber,
        pmData: global_data,
        confirmationData: data,
        confirmationStatus: confirmationStatus,
        confirmationTime: getCurrentDateTime(),
        targetFolderId: "1MyQwrX6eCVz3rmrBKJ1Je_Myy5-6LuKw", // Google Drive文件夹ID
        pmPlannerConfirmation: storedPlannerConfirmation ? JSON.parse(storedPlannerConfirmation) : null,// 添加PM Planner确认信息
        // 直接传递解析后的任务详情数组，使其与后端代码匹配
        taskDetails: (function() {
          try {
            if (!storedTaskDetails) return [];
            
            const taskData = JSON.parse(storedTaskDetails);
            if (!taskData || !Array.isArray(taskData) || taskData.length === 0) return [];
            
            console.log('正在准备任务明细数据，共', taskData.length, '条记录');
            
            // 创建包含表头的任务数据表格
            // 注意：这里的格式需要与后端期望的格式一致 - 第一行是表头，后面是数据
            const headers = ['任务编号', '任务描述', '执行人员', '完成状态', '备注'];
            
            // 从数据中提取所需字段，构建符合后端期望的数据格式
            const rows = taskData.map((task, index) => {
              // 尝试从多种可能的字段名中提取数据
              const taskNo = task['Task No'] || task['任务编号'] || task['Task Item'] || `Task ${index + 1}`;
              const taskDesc = task['Task Description'] || task['任务描述'] || task['Standard'] || '';
              // 根据taskStatus的值确定完成状态
              const taskStatus = task.taskStatus === true || task['Task Status'] === true ? '✓ 已完成' : '✗ 未完成';
              // 优先从数值记录&备注或valueAndNote字段提取备注信息
              const taskNotes = task.valueAndNote || task['数值记录&备注'] || task['备注'] || task['Result'] || task['Notes'] || '';
              // 只从执行人员字段提取执行人员信息
              const taskResource = task['执行人员'] || 'N/A';
              
              return [taskNo, taskDesc, taskResource, taskStatus, taskNotes];
            });
            
            // 添加表头作为第一行
            return [headers, ...rows];
          } catch (error) {
            console.error('处理任务明细数据出错:', error);
            return [];
          }
        })()
      };

      // 直接生成PDF
      console.log('最终PDF生成前的reportData:', reportData);

      generatePDFWithData(reportData, callback);

    } catch (error) {
      console.error('准备PDF报告数据时出错:', error);
      callback(false, null);
    }
  }

  // 辅助函数：使用提供的数据生成PDF
  function generatePDFWithData(reportData, callback) {
    google.script.run
      .withSuccessHandler(function (result) {
        console.log('PDF报告生成结果:', result);
        if (result && result.success) {

          // 调用函数将PDF链接保存到后台数据

          callback(true, result.fileUrl);
        } else {
          console.error('PDF报告生成失败:', result);
          callback(false, null);
        }
      })
      .withFailureHandler(function (error) {
        console.error('PDF报告生成错误:', error);
        callback(false, null);
      })
      .generatePMTaskReport(reportData);
  }
