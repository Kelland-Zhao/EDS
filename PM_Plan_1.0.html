    /* 确保表头保持原来的红色背景色 */

      color: white !important;

      top: 0;
      z-index: 10;
    }

    /* 确保第14、15、16列内容居中显示 */
    #table tbody tr td:nth-child(15),
    #table tbody tr td:nth-child(16),
    #table tbody tr td:nth-child(17) {
      text-align: center !important;
    }

    /* 确保badge标签在单元格内居中 */
    #table tbody tr td:nth-child(15) .badge {
      display: inline-block;
      text-align: center;
    }

    /* 操作按钮热区优化 */
    #table tbody tr td:nth-child(16) button,
    #table tbody tr td:nth-child(17) button {
      min-height: 36px;
      margin: 3px 0;
      padding: 5px 10px;
    }
  </style>
</head>
