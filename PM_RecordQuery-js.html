<script>
  // еҸҢиҜӯ Toast и§„иҢғ
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

  $(document).ready(function () {
    // 2024е№ҙж–°еўһпјҡи®°еҪ•йЎөйқўеҠ иҪҪејҖе§Ӣж—¶й—ҙ
    const pageLoadStartTime = performance.now();
    console.log('йЎөйқўеҠ иҪҪејҖе§Ӣж—¶й—ҙпјҡ', new Date().toLocaleString());

    // и®ҫзҪ®ејҖе§Ӣж—Ҙжңҹе’Ңз»“жқҹж—ҘжңҹдёәеҪ“еӨ©
    var today = new Date();
    var yyyy = today.getFullYear();
    var mm = String(today.getMonth() + 1).padStart(2, '0');
    var dd = String(today.getDate()).padStart(2, '0');
    var todayStr = yyyy + '-' + mm + '-' + dd;
    $('#startDate').val(todayStr);
    $('#endDate').val(todayStr);

    // ж•°жҚ®еҠ иҪҪжҸҗзӨәпјҲдёӯиӢұеҸҢиҜӯпјү
    Swal.fire({
      title: swalTitle('еҠ иҪҪж•°жҚ®дёӯ...', 'Loading Data...'),
      html: swalHtml('жӯЈеңЁиҺ·еҸ–дҝқе…»и®°еҪ•пјҢиҜ·зЁҚеҖҷгҖӮ', 'Fetching PM records, please wait.'),
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });
    
    google.script.run
      .withSuccessHandler(function (data) {
        const pageLoadEndTime = performance.now();
        const loadTime = ((pageLoadEndTime - pageLoadStartTime) / 1000).toFixed(2);
        console.log(`вң… йЎөйқўеҠ иҪҪжҲҗеҠҹпјҒжҖ»иҖ—ж—¶пјҡ${loadTime}з§’`);
        
        console.log(data);
        // ж•°жҚ®еҠ иҪҪе®ҢжҲҗпјҢе…ій—ӯеј№зӘ—
        Swal.close();
        if (data && Array.isArray(data.Head) && Array.isArray(data.Content)) {
          try {
            const tableRenderStartTime = performance.now();
            console.log(`рҹ“Ҡ ж•°жҚ®з»ҹи®Ўпјҡе…ұеҠ иҪҪ ${data.Content.length} жқЎдҝқе…»и®°еҪ•`);
            
            $('#recordTable').empty();
                        // йңҖиҰҒеү”йҷӨзҡ„еҲ—зҙўеј•пјҲ6/7/8/9/13/15/16/18/19еҲ—пјҢж•°з»„дёӢж Үдёә5/6/7/8/12/14/15/17/18пјү
            const excludeIdx = [5, 6, 7, 8, 12, 14, 15, 17, 18];
          // иҝҮж»ӨиЎЁеӨҙ
          const filteredHead = data.Head.filter((h, idx) => !excludeIdx.includes(idx));
          // еҸӘжҳҫзӨәз¬¬дәҢеҲ—еҢ…еҗ«вҖңе·Іе®ҢжҲҗвҖқжҲ–вҖңFinishвҖқзҡ„жқЎзӣ®
          const colName = filteredHead[1];
          const detailColName = filteredHead.find(h => h.includes('д»»еҠЎжҳҺз»Ҷ'));
          const filteredContent = data.Content.map(row => {
            let newRow = {};
            filteredHead.forEach(h => {
              let val = row[h];
              if (val === undefined) {
                // еҝҪз•ҘеӨ§е°ҸеҶҷе’Ңз©әж јеҢ№й…Қ
                const realKey = Object.keys(row).find(k => k.replace(/\s/g, '').toLowerCase() === h.replace(/\s/g, '').toLowerCase());
                val = realKey ? row[realKey] : '';
              }
              newRow[h] = val;
            });
            return newRow;
          }).filter(row => {
            const col2 = filteredHead[1];
            const val = row[col2] ? row[col2].toString() : '';
            return val.includes('е·Іе®ҢжҲҗ') || val.includes('Finish');
          });
          // з”ҹжҲҗиЎЁеӨҙжҳ е°„иЎЁпјҲдёӯиӢұж–ҮеҜ№з…§пјү
          const headMap = {
            "PM No.": "дҝқе…»зј–еҸ·<br>PM No.",
            "PmStatus": "дҝқе…»зҠ¶жҖҒ<br>PM Status",
            "Notification": "е·ҘеҚ•еҸ·<br>Notification",
            "PM People": "дҝқе…»дәәе‘ҳ<br>PM People",
            "Plan PM Date": "и®ЎеҲ’дҝқе…»ж—Ҙжңҹ<br>Plan PM Date",
            "Workcenter": "жңәеҸ°еҸ·<br>Workcenter",
            "д»»еҠЎжҳҺз»Ҷ": "д»»еҠЎжҳҺз»Ҷ<br>Task Details",
            "жҖ»д»»еҠЎж•°йҮҸ": "жҖ»д»»еҠЎж•°йҮҸ<br>Total Tasks",
            "д»»еҠЎжңӘе®ҢжҲҗж•°йҮҸ": "жңӘе®ҢжҲҗд»»еҠЎж•°<br>Unfinished Tasks",
            "зҸӯз»„дәӨжҺҘ": "зҸӯз»„дәӨжҺҘ<br>Team Handover",
            "дҝқе…»зЎ®и®Өдәә": "дҝқе…»зЎ®и®Өдәә<br>PM Confirmer",
            "дҝқе…»д»»еҠЎжҠҘе‘Ҡ": "дҝқе…»д»»еҠЎжҠҘе‘Ҡ<br>PM Task Report"
          };
          // з”ҹжҲҗиЎЁеӨҙ
          let thead = '<thead><tr>';
          filteredHead.forEach(h => { thead += `<th>${headMap[h] || h}</th>`; });
          thead += '</tr></thead>';
          // DataTableеҲ—е®ҡд№ү
          const columns = filteredHead.map((h, idx) => {
            if (h === detailColName) {
              return {
                title: headMap[h] || h,
                data: null,
                className: 'text-center', // еұ…дёӯжҳҫзӨә
                render: function (data, type, row) {
                  return `<button class='btn btn-info btn-sm detail-btn'>иҜҰз»Ҷжғ…еҶө</button>`;
                }
              };
            } else if (h === 'PM People') {
              return {
                title: headMap[h] || h,
                data: h,
                render: function (data, type, row) {
                  if (!data) return '';
                  let arr = [];
                  if (Array.isArray(data)) {
                    arr = data;
                  } else if (typeof data === 'string' && data.trim().startsWith('[')) {
                    try {
                      arr = JSON.parse(data);
                    } catch (e) {
                      arr = [data];
                    }
                  } else {
                    arr = data.toString().split(/[\/пјҢ,]/).map(s => s.trim()).filter(Boolean);
                  }
                  return arr.map(item => `<div>${item}</div>`).join('');
                }
              };
            } else if (h === 'зҸӯз»„дәӨжҺҘ') {
              return {
                title: headMap[h] || h,
                data: h,
                render: function (data, type, row) {
                  // и§ЈжһҗеҶ…е®№дёәеҜ№иұЎ
                  let status = '', workNumber = '', name = '';
                  if (typeof data === 'string') {
                    // е°Ҷ{name=жӣ№з‘ӣ, sampleStatus=Normal, workNumber=69039}иҪ¬дёәеҜ№иұЎ
                    const obj = {};
                    data.replace(/[{}]/g, '').split(',').forEach(pair => {
                      const [k, v] = pair.split('=');
                      if (k && v !== undefined) obj[k.trim()] = v.trim();
                    });
                    status = obj['sampleStatus'] || '';
                    workNumber = obj['workNumber'] || '';
                    name = obj['name'] || '';
                  }
                  
                  // еӨ„зҗҶж ·е“ҒзҠ¶жҖҒжҳҫзӨәпјҢеҰӮжһңеҢ…еҗ«NormalеҲҷжҳҫзӨәдёәеёҰеә•иүІзҡ„жҢүй’®ж ·ејҸ
                  let displayStatus = status;
                  if (status && status.includes('Normal')) {
                    displayStatus = '<span class="badge" style="background-color:#32CD32;color:white;font-weight:bold;">жӯЈеёё/ Normal</span>';
                  }
                  
                  return `ж ·е“ҒзҠ¶жҖҒпјҡ${displayStatus}<br>е·ҘеҸ·пјҡ${workNumber}<br>е§“еҗҚпјҡ${name}`;
                }
              };
            } else if (h === 'PmStatus') {
              return {
                title: headMap[h] || h,
                data: h,
                render: function (data, type, row) {
                  if (type === 'display' || type === 'filter') {
                    if (data && (data.includes('Finished') || data.includes('е·Іе®ҢжҲҗ'))) {
                      return '<span class="badge bg-success">е·Іе®ҢжҲҗ/ Done</span>';
                    } else if (data && (data.includes('Ongoing') || data.includes('иҝӣиЎҢдёӯ'))) {
                      return '<span class="badge bg-warning text-dark">иҝӣиЎҢдёӯ/ Ongoing</span>';
                    } else if (data && data.includes('жңӘејҖе§Ӣ')) {
                      return '<span class="badge" style="background-color:#FFB6C1;color:white;">жңӘејҖе§Ӣ/ Not Start</span>';
                    } else if (data && data.includes('дәәе‘ҳе·ІеҲҶй…Қ')) {
                      return '<span class="badge" style="background-color:#00BFFF;color:white;">дәәе‘ҳе·ІеҲҶй…Қ/ Personnel Assigned</span>';
                    } else if (data && data.includes('е·Іж·»еҠ дёҙж—¶д»»еҠЎ')) {
                      return '<span class="badge" style="background-color:#9370DB;color:white;">е·Іж·»еҠ дёҙж—¶д»»еҠЎ</span>';
                    } else {
                      return `<span class="badge bg-secondary">${data ? data : ''}</span>`;
                    }
                  }
                  return data;
                }
              };
            } else if (h === 'Notification') {
              return {
                title: headMap[h] || h,
                data: h,
                render: function (data, type, row) {
                  if (!data) return '';
                  if (Array.isArray(data)) {
                    return data.map(s => `<div>${s}</div>`).join('');
                  }
                  return data.toString().split(/[\/\t]/).map(s => `<div>${s.trim()}</div>`).join('');
                }
              };
            } else if (h === 'дҝқе…»д»»еҠЎжҠҘе‘Ҡ') {
              return {
                title: headMap[h] || h,
                data: h,
                className: 'text-center',
                render: function (data, type, row) {
                  if (typeof data === 'string' && data.startsWith('http')) {
                    return `<a href="${data}" target="_blank" class="btn btn-success btn-sm">йҷ„д»¶</a>`;
                  } else {
                    return '<span style="color:#888;">ж— жҠҘе‘Ҡ</span>';
                  }
                }
              };
            } else if (h === 'дҝқе…»зЎ®и®Өдәә') {
              return {
                title: headMap[h] || h,
                data: h,
                render: function (data, type, row) {
                  if (!data || typeof data !== 'string' || !data.includes('confirmed by:')) {
                    return '<span style="color:#888;">жңӘзЎ®и®Ө</span>';
                  }
                  // и§Јжһҗж јејҸпјҡ2025-07-24 15:19:02 confirmed by: 33017/иҢғжңқй”Ӣ
                  const match = data.match(/^(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2}) confirmed by: (\d+)\/(.+)$/);
                  if (match) {
                    const date = match[1];
                    const time = match[2];
                    const workNo = match[3];
                    const name = match[4];
                    return `зЎ®и®Өж—Ҙжңҹпјҡ${date}<br>зЎ®и®Өж—¶й—ҙпјҡ${time}<br>е·ҘеҸ·пјҡ${workNo}<br>е§“еҗҚпјҡ${name}`;
                  } else {
                    return data;
                  }
                }
              };
            } else if (idx === 0) {
              return {
                title: headMap[h] || h,
                data: h,
                className: 'firstcol-auto-width',
                render: function (data, type, row) {
                  return (data !== undefined && data !== null && data !== '') ? data : (row && row[h] ? row[h] : '');
                }
              };
            } else {
              return {
                title: headMap[h] || h,
                data: h,
                render: function (data) {
                  // 0иҰҒжҳҫзӨәдёә'0'пјҢе…¶е®ғз©әеҖјжҳҫзӨәдёәз©ә
                  return (data === 0) ? '0' : (data || '');
                }
              };
            }
          });
          if ($.fn.DataTable.isDataTable('#recordTable')) {
            $('#recordTable').DataTable().destroy();
          }
          const table = $('#recordTable').DataTable({
            data: filteredContent,
            columns: columns,
            language: {
              url: 'https://cdn.datatables.net/plug-ins/2.0.8/i18n/zh-Hans.json'
            },
            initComplete: function () {
              $('#recordTable thead th').css({
                'background-color': '#E60012',
                'color': 'white'
              });
            }
          });
          // дәӢд»¶е§”жүҳпјҢзӮ№еҮ»вҖңиҜҰз»Ҷжғ…еҶөвҖқжҢүй’®еј№зӘ—жҳҫзӨәеҶ…е®№
          $('#recordTable tbody').off('click').on('click', '.detail-btn', function () {
            const rowData = table.row($(this).closest('tr')).data();
            const detailContent = rowData[detailColName];
            let tableData = [];
            let columns = [];
            let isJson = false;
            try {
              // е°қиҜ•и§ЈжһҗдёәJSONж•°з»„
              const parsed = JSON.parse(detailContent);
              if (Array.isArray(parsed)) {
                tableData = parsed;
                // иҮӘеҠЁз”ҹжҲҗиЎЁеӨҙ
                if (parsed.length > 0 && typeof parsed[0] === 'object') {
                  columns = Object.keys(parsed[0]).map(k => ({ title: k, data: k }));
                } else {
                  columns = [{ title: 'еҶ…е®№', data: null, render: d => d }];
                }
                isJson = true;
              }
            } catch (e) { }
            if (!isJson) {
              // дёҚжҳҜJSONпјҢжҢүиЎҢеҲҶеүІ
              tableData = (detailContent || '').toString().split(/\r?\n/).filter(line => line.trim()).map(line => ({ content: line }));
              columns = [{ title: 'еҶ…е®№', data: 'content' }];
            } else if (tableData.length > 0 && typeof tableData[0] === 'object') {
              // еҰӮжһңжҳҜеҜ№иұЎж•°з»„пјҢеӨ„зҗҶimageContentе’Ңеӯ—ж®өеҗҚжҳ е°„
              const fieldMapping = {
                'taskStatus': 'Task Status',
                'valueAndNote': 'ж•°еҖји®°еҪ•&еӨҮжіЁ',
                'image': 'еӣҫзүҮ'
              };
              
              // иҝҮж»ӨжҺү"Task Status"еӯ—ж®өпјҢж— и®әжҳҜеҗҰдёәз©әйғҪдёҚжҳҫзӨә
              const validFields = Object.keys(tableData[0]).filter(k => {
                // еҰӮжһңеӯ—ж®өеҗҚжҳҜ"Task Status"пјҢеҲҷиҝҮж»ӨжҺү
                if (k === 'Task Status') {
                  return false;
                }
                return true;
              });
              
              columns = validFields.map(k => {
                if (k === 'imageContent') {
                  return {
                    title: k,
                    data: k,
                    render: function (data, type, row) {
                      return data ? 'и§Ғй“ҫжҺҘ' : '';
                    }
                  };
                } else if (fieldMapping[k] === 'Task Status' || fieldMapping[k] === 'жҳҜеҗҰе®ҢжҲҗ' || k === 'Task Status' || k === 'жҳҜеҗҰе®ҢжҲҗ') {
                  return {
                    title: fieldMapping[k] || k,
                    data: k,
                    render: function (data) {
                      return data === true || data === 'true' ? 'вҲҡ' : 'Г—';
                    }
                  };
                } else {
                  return { 
                    title: fieldMapping[k] || k, 
                    data: k 
                  };
                }
              });
            }
            Swal.fire({
              title: swalTitle('д»»еҠЎжҳҺз»ҶеҶ…е®№', 'Task Detail'),
              html: `<table id="detailTable" class="table table-bordered table-striped" style="width:100%"></table>`,
              didOpen: () => {
                $('#detailTable').DataTable({
                  data: tableData,
                  columns: columns,
                  searching: false,
                  paging: false,
                  info: false,
                  ordering: false,
                  language: {
                    emptyTable: 'ж— ж•°жҚ®'
                  }
                });
                // и®ҫзҪ®иЎЁеӨҙж ·ејҸдёҺдё»иЎЁдёҖиҮҙ
                $('#detailTable thead th').css({
                  'background-color': '#E60012',
                  'color': 'white'
                });
              },
              customClass: {
                popup: 'swal-wide'
              }
            });
          });
          // иҺ·еҸ–и®ҫеӨҮзј–еҸ·йҖүйЎ№пјҲз¬¬10еҲ—пјҢfilteredHead[8]пјү
          // иҺ·еҸ–WorkcenterеҲ—еҗҚ
          const workcenterCol = filteredHead.find(h => h === 'Workcenter');
          const deviceSet = new Set(filteredContent.map(row => row[workcenterCol]).filter(Boolean));
          const deviceOptions = Array.from(deviceSet).map(val => ({ id: val, text: val }));
          // 1. зЎ®дҝқselectжңүз©әoption
          $('#deviceSelect').empty().append('<option value=""></option>');
          // 2. еҲқе§ӢеҢ–select2
          $('#deviceSelect').select2({
            data: deviceOptions,
            placeholder: 'иҜ·йҖүжӢ©жңәеҸ°еҸ·',
            allowClear: true,
            width: '100%',
            language: 'zh-CN'
          });
          // 3. дҝқиҜҒеҲқе§Ӣж— йҖүдёӯйЎ№пјҢжҳҫзӨәplaceholder
          $('#deviceSelect').val(null).trigger('change');
          // дҝқеӯҳеҺҹе§Ӣж•°жҚ®дҫӣзӯӣйҖүз”Ё
          let allTableData = filteredContent;

          // 2024е№ҙж–°еўһпјҡи®°еҪ•иЎЁж јжёІжҹ“е®ҢжҲҗж—¶й—ҙ
          const tableRenderEndTime = performance.now();
          const tableRenderTime = ((tableRenderEndTime - tableRenderStartTime) / 1000).toFixed(2);
          console.log(`рҹҺҜ иЎЁж јжёІжҹ“е®ҢжҲҗпјҒжёІжҹ“иҖ—ж—¶пјҡ${tableRenderTime}з§’`);

          // жҹҘиҜўжҢүй’®зӯӣйҖүйҖ»иҫ‘
          $('#searchBtn').off('click').on('click', function () {
            const filterStartTime = performance.now();
            console.log('рҹ”Қ ејҖе§Ӣжү§иЎҢзӯӣйҖүж“ҚдҪң...');
            
            const startDate = $('#startDate').val();
            const endDate = $('#endDate').val();
            const device = $('#deviceSelect').val();
            // иҺ·еҸ–еҲ—еҗҚ
            const planDateCol = filteredHead.find(h => h.includes('Plan PM Date'));
            const workcenterCol = filteredHead.find(h => h.includes('Workcenter'));
            // иҝҮж»Ө
            let filtered = allTableData.filter(row => {
              let pass = true;
              // ж—ҘжңҹиҢғеӣҙ
              if (startDate) {
                pass = pass && row[planDateCol] && row[planDateCol] >= startDate;
              }
              if (endDate) {
                pass = pass && row[planDateCol] && row[planDateCol] <= endDate;
              }
              // жңәеҸ°еҸ·
              if (device) {
                pass = pass && row[workcenterCol] && row[workcenterCol] == device;
              }
              return pass;
            });
            // еҲ·ж–°иЎЁж ј
            const table = $('#recordTable').DataTable();
            table.clear();
            table.rows.add(filtered);
            table.draw();
            
            const filterEndTime = performance.now();
            const filterTime = ((filterEndTime - filterStartTime) / 1000).toFixed(2);
            console.log(`вң… зӯӣйҖүж“ҚдҪңе®ҢжҲҗпјҒзӯӣйҖүиҖ—ж—¶пјҡ${filterTime}з§’`);
          });
        } catch (e) {
          const errorEndTime = performance.now();
          const errorTime = ((errorEndTime - pageLoadStartTime) / 1000).toFixed(2);
          console.error(`вқҢ жёІжҹ“иЎЁж јејӮеёёпјҒжҖ»иҖ—ж—¶пјҡ${errorTime}з§’`);
          console.error('й”ҷиҜҜиҜҰжғ…:', e);
          Swal.fire({
            icon: 'error',
            title: swalTitle('й”ҷиҜҜ', 'Error'),
            html: swalHtml('жёІжҹ“иЎЁж јејӮеёё: ' + e, 'Table rendering error: ' + e)
          });
        }
      } else {
        const errorEndTime = performance.now();
        const errorTime = ((errorEndTime - pageLoadStartTime) / 1000).toFixed(2);
        console.error(`вқҢ еҗҺз«Ҝиҝ”еӣһж•°жҚ®дёәз©әжҲ–ж јејҸдёҚжӯЈзЎ®пјҒжҖ»иҖ—ж—¶пјҡ${errorTime}з§’`);
        console.log('еҗҺз«Ҝиҝ”еӣһ:', data);
        Swal.fire({
          icon: 'error',
          title: swalTitle('й”ҷиҜҜ', 'Error'),
          html: swalHtml('еҗҺз«Ҝиҝ”еӣһж•°жҚ®дёәз©әжҲ–ж јејҸдёҚжӯЈзЎ®', 'Backend returned empty or invalid data')
        });
      }
    })
    .withFailureHandler(function(error) {
      const errorEndTime = performance.now();
      const errorTime = ((errorEndTime - pageLoadStartTime) / 1000).toFixed(2);
      console.error(`вқҢ йЎөйқўеҠ иҪҪеӨұиҙҘпјҒжҖ»иҖ—ж—¶пјҡ${errorTime}з§’`);
      console.error('й”ҷиҜҜиҜҰжғ…:', error);
      Swal.close();
      Swal.fire({
        icon: 'error',
        title: swalTitle('й”ҷиҜҜ', 'Error'),
        html: swalHtml('ж•°жҚ®еҠ иҪҪеӨұиҙҘпјҡ' + error.message, 'Data loading failed: ' + error.message)
      });
    })
